name: secretsmanager-path-read
category: borderline
expected_score_min: 2
expected_score_max: 7   # wider than ideal — see known_calibration_issue
why: Two named secret paths under the same prefix; the trailing `-*` matches version suffixes. Reading raw secret values is a sensitive read regardless of how narrow the resource ARN is — the value itself is the blast radius.
demonstrates: "Sensitive-read floor: even a tightly-scoped resource ARN should score borderline-or-above when the action returns secret material. The Stripe publishable key is technically less sensitive, but the webhook-secret is signing material."
gotcha: "secretsmanager:GetSecretValue returns plaintext; the secret rotation does NOT invalidate previously-fetched copies. A grant with a 1-hour duration can leave the secret in agent-process memory long after the grant expired."
known_calibration_issue: |
  Tracked under task #99. The deterministic scorer currently emits
  score 2 for narrow-ARN secretsmanager:GetSecretValue, missing the
  sensitive-read floor that the [[mfa-compliance-strategy]] memo
  describes. The intuitive floor is 5 (the action returns secret
  material regardless of resource scope). Sensitive-action floors
  should make this score >=5 even on a single secret ARN. expected
  band widened to 2-7 to keep CI green; the fix is in review.py
  (a sensitive_actions floor table), not in this sidecar.
