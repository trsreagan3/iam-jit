name: 'IAM Policy Risk Score'
description: |
  Score AWS IAM policies for risk on every PR. Returns a 1-10
  score plus risk factors and suggestions. Pairs with branch
  protection / required-reviewer rules to gate destructive
  policies before they merge.
author: 'iam-jit'
branding:
  icon: 'shield'
  color: 'red'

inputs:
  policy-file:
    description: |
      Path to the IAM policy JSON file to score. Supports glob
      patterns — when multiple files match, each is scored and the
      WORST score is used for the pass/fail gate.
    required: true

  preset:
    description: |
      Pre-configured gate. Sets `threshold` and `access-type`
      together so you don't have to think about them. Override any
      individual field by setting it explicitly.

        - `strict`     — threshold=3, access-type=read-only.
                        Refuses almost any privilege beyond
                        read-only. Right for prod IAM,
                        compliance-tracked accounts, customer-data
                        roles.
        - `standard`   — threshold=5, access-type=read-write.
                        Default — refuses HIGH-tier policies.
                        Right for the vast majority of CI gates.
        - `permissive` — threshold=7, access-type=read-write.
                        Refuses only the most egregious (admin/*,
                        IAM full, CloudTrail-tamper). Right for
                        dev/staging where false-positives hurt
                        more than the rare HIGH slipping through.

      Leave unset (`''`) to use the explicit threshold/access-type
      inputs without a preset.
    required: false
    default: 'standard'

  threshold:
    description: |
      Score threshold for the pass/fail gate (overrides the
      preset's threshold if both are set). Set lower (e.g. 3) for
      stricter gating.
    required: false
    default: ''

  api-url:
    description: |
      Scoring API URL. Use the hosted service or your own
      self-hosted deployment. Omit to use offline mode (runs the
      deterministic scorer locally — fastest, no network call).
    required: false
    default: ''

  api-key:
    description: |
      API key for the hosted service. Pass via secrets (never
      inline). Not needed in offline mode.
    required: false
    default: ''

  access-type:
    description: |
      "read-only" or "read-write" — affects scoring (overrides
      the preset's access-type if both are set).
    required: false
    default: ''

  duration-hours:
    description: 'Hypothetical grant duration in hours (default 1)'
    required: false
    default: '1'

  comment-on-pr:
    description: |
      When 'true' and run on a PR, post the score as a PR comment.
      Requires write permissions on issues. Default 'false'.
    required: false
    default: 'false'

  sarif-output:
    description: |
      Optional path to write a SARIF 2.1.0 report. When set, the
      action also writes the report at this path so a follow-up
      `actions/upload-sarif@v3` step can publish it to GitHub Code
      Scanning. Example: `iam.sarif`.
    required: false
    default: ''

outputs:
  score:
    description: 'The worst risk score across all policy files (1-10)'
    value: ${{ steps.score.outputs.score }}
  tier:
    description: 'low | medium | high'
    value: ${{ steps.score.outputs.tier }}
  would_auto_approve:
    description: '"true" if score is below threshold'
    value: ${{ steps.score.outputs.would_auto_approve }}
  policy_fingerprint:
    description: 'sha256 fingerprint of the policy (for caching)'
    value: ${{ steps.score.outputs.policy_fingerprint }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install iam-risk-score CLI
      shell: bash
      run: |
        pip install --quiet 'iam-risk-score>=0.1.0' || \
          pip install --quiet 'git+https://github.com/trsreagan3/iam-jit.git@main'

    - name: Score policies
      id: score
      shell: bash
      env:
        IAM_RISK_SCORE_API_URL: ${{ inputs.api-url }}
        IAM_RISK_SCORE_API_KEY: ${{ inputs.api-key }}
      run: |
        # ---- Resolve preset → defaults; explicit inputs override ----
        preset="${{ inputs.preset }}"
        explicit_threshold="${{ inputs.threshold }}"
        explicit_access_type="${{ inputs.access-type }}"
        case "$preset" in
          strict)
            preset_threshold=3
            preset_access_type=read-only
            ;;
          standard|"")
            preset_threshold=5
            preset_access_type=read-write
            ;;
          permissive)
            preset_threshold=7
            preset_access_type=read-write
            ;;
          *)
            echo "::error::unknown preset '$preset'. Use one of: strict, standard, permissive."
            exit 2
            ;;
        esac
        threshold="${explicit_threshold:-$preset_threshold}"
        access_type="${explicit_access_type:-$preset_access_type}"
        echo "Preset=$preset  threshold=$threshold  access-type=$access_type"

        # ---- Expand glob ----
        shopt -s nullglob globstar
        files=( ${{ inputs.policy-file }} )
        if [ ${#files[@]} -eq 0 ]; then
          echo "ERROR: no files matched ${{ inputs.policy-file }}"
          exit 2
        fi

        worst_score=0
        worst_tier="low"
        worst_fingerprint=""
        worst_file=""

        offline_flag=""
        if [ -z "${{ inputs.api-url }}" ]; then
          offline_flag="--offline"
        fi

        sarif_out="${{ inputs.sarif-output }}"
        # Collect per-file SARIF results into a combined report when
        # sarif_out is set. Each file's run becomes one element in
        # the top-level runs array.
        combined_sarif_runs="[]"

        for f in "${files[@]}"; do
          echo "::group::Scoring $f"
          # JSON output for the gate decision
          result=$(iam-risk-score $offline_flag \
            --format json \
            --access-type "$access_type" \
            --duration-hours "${{ inputs.duration-hours }}" \
            --threshold "$threshold" \
            "$f" || true)
          echo "$result"
          score=$(echo "$result" | python3 -c "import sys, json; print(json.load(sys.stdin)['score'])")
          tier=$(echo "$result" | python3 -c "import sys, json; print(json.load(sys.stdin)['tier'])")
          fingerprint=$(echo "$result" | python3 -c "import sys, json; print(json.load(sys.stdin)['policy_fingerprint'])")

          # SARIF — only run if the caller asked for it. Avoids the
          # cost of a second CLI invocation when SARIF isn't used.
          if [ -n "$sarif_out" ]; then
            sarif_one=$(iam-risk-score $offline_flag \
              --format sarif \
              --access-type "$access_type" \
              --duration-hours "${{ inputs.duration-hours }}" \
              --threshold "$threshold" \
              "$f" || true)
            combined_sarif_runs=$(python3 -c "
import json, sys
existing = json.loads('''$combined_sarif_runs''')
one = json.loads('''$sarif_one''')
existing.extend(one.get('runs', []))
print(json.dumps(existing))
")
          fi
          echo "::endgroup::"

          # GH annotation
          ann_level="notice"
          [ "$tier" = "medium" ] && ann_level="warning"
          [ "$tier" = "high" ] && ann_level="error"
          factors=$(echo "$result" | python3 -c "import sys, json; print(' | '.join(json.load(sys.stdin)['factors'][:3]))")
          echo "::${ann_level} file=${f},title=IAM Policy Risk Score::Score ${score}/10 (${tier}). ${factors}"

          if [ "$score" -gt "$worst_score" ]; then
            worst_score=$score
            worst_tier=$tier
            worst_fingerprint=$fingerprint
            worst_file=$f
          fi
        done

        # Write the combined SARIF file if requested
        if [ -n "$sarif_out" ]; then
          python3 -c "
import json
runs = json.loads('''$combined_sarif_runs''')
sarif = {
    '\$schema': 'https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json',
    'version': '2.1.0',
    'runs': runs,
}
with open('$sarif_out', 'w') as f:
    json.dump(sarif, f, indent=2)
print(f'Wrote {len(runs)} run(s) to $sarif_out')
"
        fi

        echo "score=$worst_score" >> "$GITHUB_OUTPUT"
        echo "tier=$worst_tier" >> "$GITHUB_OUTPUT"
        echo "policy_fingerprint=$worst_fingerprint" >> "$GITHUB_OUTPUT"
        echo "worst_file=$worst_file" >> "$GITHUB_OUTPUT"

        if [ "$worst_score" -ge "$threshold" ]; then
          echo "would_auto_approve=false" >> "$GITHUB_OUTPUT"
          echo ""
          echo "::error::Worst score $worst_score (from $worst_file) is at or above threshold $threshold (preset=$preset). Review required."
          exit 1
        else
          echo "would_auto_approve=true" >> "$GITHUB_OUTPUT"
          echo ""
          echo "✓ All policies scored below threshold $threshold (worst: $worst_score, preset=$preset)"
          exit 0
        fi

    - name: Post PR comment
      if: |
        inputs.comment-on-pr == 'true' &&
        github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const score = '${{ steps.score.outputs.score }}';
          const tier = '${{ steps.score.outputs.tier }}';
          const threshold = '${{ inputs.threshold }}';
          const wouldAutoApprove = '${{ steps.score.outputs.would_auto_approve }}';

          const emoji = tier === 'high' ? '🔴' : (tier === 'medium' ? '🟡' : '🟢');
          const verdict = wouldAutoApprove === 'true' ? 'PASS' : 'NEEDS REVIEW';

          const body = `## ${emoji} IAM Policy Risk Score: **${score}/10** (${tier})

          **Verdict:** ${verdict} (threshold: ${threshold})

          See the run logs for full risk factors and suggestions.
          [What does this score mean?](https://github.com/trsreagan3/iam-jit/blob/main/docs/USE-CASES.md)
          `;

          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body: body,
          });
