# iam-jit Bounce — Splunk app manifest
#
# This file is the Splunkbase-required app metadata. It tells Splunk:
#   * how to display the app in the UI (`ui` stanza)
#   * who maintains it + which version is shipping (`launcher` + `id`)
#   * that the app is visible to operators (vs. a hidden TA / add-on)
#
# Per [[creates-never-mutates]] this app ships zero destructive
# capability. It contains props, transforms, eventtypes, saved searches
# and one Simple-XML dashboard — all read-side surface for the OCSF
# v1.1.0 class 6003 events ibounce / kbounce / dbounce emit.
#
# Per [[self-host-zero-billing-dependency]] there is no phone-home
# beyond what an operator-installed Splunk does on its own behalf; the
# app contributes no telemetry endpoints.

[install]
is_configured = false
state = enabled
build = 1

[launcher]
author = iam-jit
description = Dashboards, saved searches, and parsers for OCSF v1.1.0 class 6003 events emitted by the iam-jit Bounce suite (ibounce / kbounce / dbounce). Drop-in install — no proprietary fields, no phone-home.
version = 1.0.0

[ui]
is_visible = true
label = iam-jit Bounce

[package]
id = iam_jit_bounce
check_for_updates = false

[id]
name = iam_jit_bounce
version = 1.0.0
