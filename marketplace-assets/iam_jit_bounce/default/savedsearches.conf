# iam-jit Bounce — 10 saved searches
#
# Each saved search references the eventtypes defined in
# eventtypes.conf so the SPL stays readable. The names follow
# [[security-team-positioning-safety-not-surveillance]] — neutral
# operational framing (counts, trends, correlation) rather than
# threat-model assertions about specific actors.
#
# Scheduling defaults to disabled (`enabled = 0` on the [scheduler]
# stanza). Operators flip the ones they want running.

[All denies in last 24h, by agent]
search = `iam_jit_deny` earliest=-24h@h | stats count by agent_name, agent_version, service, operation | sort -count
description = Aggregate counts of every deny event (enforced + advisory) in the last 24 hours, grouped by the AI agent that originated the call. Helps answer "which agent had the most friction with the policy yesterday."
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
enableSched = 0
is_visible = 1

[Admin actions by hour]
search = `iam_jit_admin_action` earliest=-7d@d | timechart span=1h count by user
description = Hourly rate of operator-initiated ibounce CLI actions (mode swaps, profile installs, pauses, rule edits) over the last 7 days, split by the operator who ran them. Spike investigation aid.
dispatch.earliest_time = -7d@d
dispatch.latest_time = now
enableSched = 0
is_visible = 1

[Heartbeat-gap events (audit pipeline alarms)]
search = `iam_jit_heartbeat_gap` earliest=-7d@d | table _time, product_name, status_detail | sort -_time
description = Lists every heartbeat_gap alert from the last 7 days. A heartbeat gap means the audit-export channel went silent (the bouncer process may have been killed or the webhook target may be unreachable). Each row is an operational signal to investigate.
dispatch.earliest_time = -7d@d
dispatch.latest_time = now
enableSched = 0
is_visible = 1

[Burst-detected events]
search = `iam_jit_burst_detected` earliest=-24h@h | table _time, alert_pattern, severity, status_detail, user, agent_name | sort -_time
description = Burst-pattern rule fires (admin-fallback-burst, high-risk-action-denied) in the last 24 hours. Burst patterns indicate many high-signal events landed in a short window — useful "look at this session" prompt.
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
enableSched = 0
is_visible = 1

[Top 10 actors by deny count]
search = `iam_jit_deny` earliest=-7d@d | stats count, dc(operation) AS unique_operations by user | sort -count | head 10
description = Top 10 actors by deny count over the last 7 days. `unique_operations` shows how diverse the deny set was per actor — high diversity often means "the policy needs widening" rather than "this user is doing the wrong thing."
dispatch.earliest_time = -7d@d
dispatch.latest_time = now
enableSched = 0
is_visible = 1

[Cross-bouncer session correlation]
search = `iam_jit_event` earliest=-24h@h agent_session_id=* | stats values(product_name) AS bouncers, values(service) AS services, count by agent_session_id, agent_name | where mvcount(bouncers)>1 | sort -count
description = Sessions whose agent.session_id appears in events from more than one bouncer product (ibounce + kbounce + dbounce). Lets you trace a single agent's activity across AWS API calls + Kubernetes API calls + database queries.
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
enableSched = 0
is_visible = 1

[Audit-export failures]
search = (`iam_jit_audit_export_degraded` OR `iam_jit_audit_dropped`) earliest=-7d@d | table _time, alert_pattern, event_type, severity, status_detail | sort -_time
description = Health events from the audit-export channel itself: degraded-rule fires, dropped-event synthetics. If you see rows here, the SIEM view of bouncer activity is incomplete — fix the export channel before trusting downstream dashboards.
dispatch.earliest_time = -7d@d
dispatch.latest_time = now
enableSched = 0
is_visible = 1

[Profile install + swap events]
search = `iam_jit_profile_install` earliest=-30d@d | table _time, user, profile, status_detail | sort -_time
description = Every profile install or swap in the last 30 days. Carries the operator, the new profile, and the source URL + sha256 fingerprint (in status_detail). Drift-detection signal for org-curated profile distribution.
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
enableSched = 0
is_visible = 1

[Pause events (timed allow grants)]
search = `iam_jit_pause` earliest=-30d@d | table _time, user, status_detail, profile | sort -_time
description = Every timed allow-grant window that closed in the last 30 days. `status_detail` carries the window duration. Long pauses (>30min) also fire the long-pause alert pattern — check the burst-detected search for those.
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
enableSched = 0
is_visible = 1

[Rule edits + preset applies (config changes)]
search = `iam_jit_admin_action` earliest=-30d@d (operation="ibounce:rules*" OR operation="ibounce:presets*" OR operation="ibounce:config*") | table _time, user, operation, status_detail | sort -_time
description = Config-shape ADMIN_ACTION events in the last 30 days — rule edits, preset applies, config import/export. Pairs with the audit hash-chain checkpoint feature to make config drift auditable end-to-end.
dispatch.earliest_time = -30d@d
dispatch.latest_time = now
enableSched = 0
is_visible = 1
