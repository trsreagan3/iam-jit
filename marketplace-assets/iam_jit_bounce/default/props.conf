# iam-jit Bounce — sourcetype configuration
#
# Maps incoming OCSF v1.1.0 class 6003 events into a Splunk sourcetype
# the dashboards + saved searches in this app expect. Events arrive
# either via the JSONL log file (filemon input) or HTTPS HEC webhook
# (`webhook-presets splunk-hec`, shipped by ibounce in #257). Both
# paths land on the same sourcetype.
#
# KV_MODE=json is the load-bearing choice: ibounce emits well-formed
# OCSF JSON, one event per line. Splunk's auto-KV extraction will
# unpack every nested field into a dotted path (e.g.
# `unmapped.iam_jit.event_type`) which is exactly what the saved
# searches in this app reference.
#
# TRUNCATE=0 because some events (notably ANOMALY_DETECTED with a long
# matched-event list, or events with deep agent.process_tree blocks)
# can exceed Splunk's default 10000-byte line cap. Truncation would
# silently drop the iam_jit extension block from the parsed event.

[iam_jit:bounce:ocsf]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
TRUNCATE = 0
KV_MODE = json
TIME_PREFIX = "time"\s*:\s*
TIME_FORMAT = %s%3N
MAX_TIMESTAMP_LOOKAHEAD = 20
disabled = false
pulldown_type = true
category = Application

# Field aliases — surface the OCSF nested fields as flat top-level
# fields the dashboards + saved searches use. These match the alias
# names documented in docs/QUERYING-AUDIT-LOGS.md so an operator who
# already writes SPL by hand keeps the same vocabulary.
FIELDALIAS-user = actor.user.name AS user
FIELDALIAS-session_id = actor.session.uid AS session_id
FIELDALIAS-event_type = unmapped.iam_jit.event_type AS event_type
FIELDALIAS-decision_id = unmapped.iam_jit.decision_id AS decision_id
FIELDALIAS-mode = unmapped.iam_jit.mode AS mode
FIELDALIAS-profile = unmapped.iam_jit.profile AS profile
FIELDALIAS-verdict = unmapped.iam_jit.verdict AS verdict
FIELDALIAS-enforced = unmapped.iam_jit.enforced AS enforced
FIELDALIAS-agent_name = unmapped.iam_jit.agent.name AS agent_name
FIELDALIAS-agent_version = unmapped.iam_jit.agent.version AS agent_version
FIELDALIAS-agent_session = unmapped.iam_jit.agent.session_id AS agent_session_id
FIELDALIAS-product_name = metadata.product.name AS product_name
FIELDALIAS-product_vendor = metadata.product.vendor_name AS product_vendor
FIELDALIAS-product_version = metadata.product.version AS product_version
FIELDALIAS-operation = api.operation AS operation
FIELDALIAS-service = api.service.name AS service
FIELDALIAS-region = unmapped.iam_jit.ext.aws_region AS aws_region
FIELDALIAS-pattern = unmapped.iam_jit.pattern AS alert_pattern

# `dst_hostname` is what humans see when they ask "what was hit?".
FIELDALIAS-dst_hostname = dst_endpoint.hostname AS dst_hostname
