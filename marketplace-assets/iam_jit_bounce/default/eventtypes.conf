# iam-jit Bounce — eventtypes
#
# Eventtypes give operators a stable name to reference in SPL without
# re-typing the OCSF field selectors. Every saved search in this app
# uses one of these eventtypes — that way an operator who changes the
# emitter's event-type vocabulary (e.g. renames "ADMIN_ACTION") only
# has to update one stanza here, not 10 saved searches.
#
# All eventtypes inherit `sourcetype="iam_jit:bounce:ocsf"` as the
# base filter; the `search` line narrows further.

[iam_jit_event]
search = sourcetype="iam_jit:bounce:ocsf"
#tags = iam_jit

[iam_jit_decision]
search = sourcetype="iam_jit:bounce:ocsf" NOT event_type=*
description = A per-call proxy decision (allow / deny / bypass). Has no event_type marker; the verdict + status_id describe it.

[iam_jit_deny]
search = sourcetype="iam_jit:bounce:ocsf" verdict=deny
description = Deny decisions (both enforced + advisory). Use `enforced=true` to narrow to blocked calls.

[iam_jit_admin_action]
search = sourcetype="iam_jit:bounce:ocsf" event_type=ADMIN_ACTION
description = Synthetic event emitted when an operator runs a state-changing ibounce CLI command (mode swap, profile install, pause, rule edit, etc.).

[iam_jit_heartbeat]
search = sourcetype="iam_jit:bounce:ocsf" event_type=HEARTBEAT
description = Periodic liveness tick from the audit-export channel (#264). Absence triggers the heartbeat_gap rule.

[iam_jit_heartbeat_gap]
search = sourcetype="iam_jit:bounce:ocsf" alert_pattern=bouncer-uptime-gap
description = Alert event from the heartbeat_gap rule (#264). The audit channel went silent for longer than the configured threshold.

[iam_jit_burst_detected]
search = sourcetype="iam_jit:bounce:ocsf" (alert_pattern=admin-fallback-burst OR alert_pattern=high-risk-action-denied)
description = Alert event from a burst-shaped rule pattern. Indicates many high-signal events landed in a short window.

[iam_jit_audit_export_degraded]
search = sourcetype="iam_jit:bounce:ocsf" alert_pattern=audit-export-degraded
description = Alert event from the audit-export-degraded rule (#267). The audit channel itself is unhealthy — webhook backpressure, dropped events, or log write failures.

[iam_jit_audit_dropped]
search = sourcetype="iam_jit:bounce:ocsf" event_type=AUDIT_DROPPED
description = Synthetic event indicating the webhook pusher's bounded queue overflowed and dropped events.

[iam_jit_pause]
search = sourcetype="iam_jit:bounce:ocsf" event_type=PAUSE_END
description = A timed allow-grant window ended. Carries the window length + the operator who opened it.

[iam_jit_profile_install]
search = sourcetype="iam_jit:bounce:ocsf" event_type=PROFILE_INSTALL
description = An ibounce profile was installed or swapped. Carries the source URL + sha256 fingerprint.

[iam_jit_session_ended]
search = sourcetype="iam_jit:bounce:ocsf" event_type=SESSION_ENDED
description = A bouncer session ended (process exit, mode swap). Useful for cross-bouncer session correlation.

[iam_jit_anomaly_detected]
search = sourcetype="iam_jit:bounce:ocsf" event_type=ANOMALY_DETECTED
description = A pattern-matching rule fired. The matched rule name is in `alert_pattern`.
