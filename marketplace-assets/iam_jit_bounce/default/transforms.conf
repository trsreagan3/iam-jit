# iam-jit Bounce — field transforms
#
# The bulk of field surfacing happens via FIELDALIAS in props.conf
# (alias from `actor.user.name` to `user`, etc.). This file carries
# only the few extractions that need REGEX rather than alias:
#   * `arn` extraction from `resources{}.uid` (the resources field is
#     a JSON list; KV_MODE=json indexes the first entry as
#     `resources{}.uid` — we surface it as a flat `arn` field).
#   * `iam_jit_id` lookup-style transform to normalise the cross-
#     product event-type vocabulary into one canonical bucket.

[iam_jit_bounce_arn]
REGEX = "uid"\s*:\s*"(arn:aws[^"]+)"
FORMAT = arn::$1
WRITE_META = true

[iam_jit_bounce_resource_name]
REGEX = "name"\s*:\s*"([^"]+)"\s*,\s*"uid"\s*:\s*"arn:aws
FORMAT = resource_name::$1
WRITE_META = true
