name: cicd-eks-nodegroup-controller
description: |
  ABSTRACTED FROM REAL DEPLOY: a typical CI/CD role used by Buildkite
  / GitHub Actions to manage EKS nodegroups for a load-testing cluster.
  Multi-statement, multi-region, mix of narrow + wildcard resources.

  Shape pattern (no customer-identifiers preserved; all names
  generic):
    - eks:DescribeCluster on cluster wildcards (two regions)
    - eks:CreateNodegroup / DeleteNodegroup on specific named clusters
    - iam:PassRole / GetRole / ListAttachedRolePolicies on named EKS
      nodegroup roles (narrow, legitimate use of iam:PassRole)
    - ec2:RunInstances / CreateTags / DescribeSubnets on Resource:*
      (these APIs don't accept resource-level scoping; AWS-canonical)
    - elasticache:Delete* / Create* on specific replication-group ARNs

  This is the "narrow but complex" CI/CD pattern that often gets
  over-flagged by naive scorers because of (a) iam:PassRole presence
  and (b) Resource:* on ec2 APIs. The action+resource composition
  is the correct shape for what it does. Should score MEDIUM, not
  HIGH — score 5-6 reflects the legitimate need for human review
  on the iam:PassRole + ec2:RunInstances combo while not max-
  flagging an inherently scoped policy.

policy:
  Version: "2012-10-17"
  Statement:
    - Sid: DescribeCluster
      Effect: Allow
      Action: ["eks:DescribeCluster"]
      Resource:
        - "arn:aws:eks:us-east-1:111111111111:cluster/*"
        - "arn:aws:eks:us-west-2:111111111111:cluster/*"
    - Sid: CreateNodegroup
      Effect: Allow
      Action: ["eks:CreateNodegroup", "eks:DeleteNodegroup"]
      Resource:
        - "arn:aws:eks:us-east-1:111111111111:cluster/load-test-east"
        - "arn:aws:eks:us-west-2:111111111111:cluster/load-test-west"
    - Sid: PassRoleEKSNodegroupRole
      Effect: Allow
      Action: ["iam:PassRole", "iam:GetRole", "iam:ListAttachedRolePolicies"]
      Resource:
        - "arn:aws:iam::111111111111:role/load-test-east-eks-nodegroup"
        - "arn:aws:iam::111111111111:role/load-test-west-eks-nodegroup"
    - Sid: RunInstancesFromLaunchTemplate
      Effect: Allow
      Action:
        - "ec2:DescribeLaunchTemplateVersions"
        - "ec2:RunInstances"
        - "ec2:CreateTags"
        - "ec2:DescribeSubnets"
      Resource: "*"
    - Sid: ReadWriteRedisCluster
      Effect: Allow
      Action: ["elasticache:Delete*", "elasticache:Create*"]
      Resource:
        - "arn:aws:elasticache:us-east-1:111111111111:replicationgroup:core-redis-load-test"
        - "arn:aws:elasticache:us-west-2:111111111111:replicationgroup:core-redis-load-test"

request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 4

expected:
  score_min: 4
  score_max: 7
