name: broad-s3-read-wildcard-resource
description: |
  Read-only s3:ListAllMyBuckets on Resource:*. Read-only mitigates,
  but the wildcard resource means scope is everything in the
  account. Scores in the medium range (around 4) — under the
  default auto-approve threshold of 5 but flagged.

policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action: ["s3:ListAllMyBuckets"]
      Resource: ["*"]

request:
  spec:
    access_type: read-only
    duration:
      duration_hours: 1

expected:
  score_min: 3
  score_max: 5
  required_factors_containing: ["broad"]
