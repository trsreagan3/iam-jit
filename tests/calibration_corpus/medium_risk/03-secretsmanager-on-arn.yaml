name: secretsmanager-get-on-arn
description: |
  secretsmanager:GetSecretValue on a SPECIFIC ARN. The scorer
  rates this LOW because:
    - Single resource ARN (no wildcard scope)
    - Read-only access type
    - Specific action (no service-wildcard)

  Auto-approve is still REFUSED at runtime because secretsmanager
  is in the default `never_auto_approve_services` blocklist. That's
  the right separation: the scorer rates raw risk; the policy
  layer applies "we never auto-approve THIS service regardless."

  This example pins the scorer's low rating; the blocklist
  behavior is tested separately in auto_approve tests.

policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action: ["secretsmanager:GetSecretValue"]
      Resource:
        - "arn:aws:secretsmanager:us-east-1:123456789012:secret:prod/db-creds-AbCdEf"

request:
  spec:
    access_type: read-only
    duration:
      duration_hours: 1

expected:
  score_max: 3
  # Note: no required_factors_containing — the scorer doesn't
  # currently call out "secret" for narrow-resource reads. If a
  # future calibration changes that, update this expectation.
