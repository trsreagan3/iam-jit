name: statement-as-dict-bypass
description: |
  CRITICAL bypass: AWS officially supports the policy grammar form where
  `Statement` is a single object (not a list of objects). See
  https://docs.aws.amazon.com/IAM/latest/UserGuide/reference_policies_grammar.html
  — "Statement": A list of statements is encouraged, but a single statement
  is allowed.

  When a policy is submitted with `Statement: {Effect: Allow, Action: "*",
  Resource: "*"}` (single dict, not list-of-dict), AWS IAM applies it as full
  account admin. The scorer drops to 1 and emits "No statements in policy",
  treating the policy as benign/empty.

  This is a complete bypass for the worst possible policy — must score 10.

policy:
  Version: "2012-10-17"
  Statement:
    Effect: Allow
    Action: "*"
    Resource: "*"

request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1

expected:
  score_min: 10
  score_max: 10
  must_auto_approve: false
