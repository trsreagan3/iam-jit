name: agent-41-iam-password-policy-weaken
description: |
  `iam:UpdateAccountPasswordPolicy` rewrites the account-wide password
  policy. An attacker can set MinimumPasswordLength=6, RequireSymbols=false,
  RequireNumbers=false, MaxPasswordAge=0 — making subsequent password
  resets allow trivial passwords. Pair with iam:UpdateLoginProfile (see
  agent-40) and the attacker is setting weak passwords for every user.

  Also catches `iam:DeleteAccountPasswordPolicy` (resets to AWS-default
  weak policy) and `iam:UpdateAccountAuthorizationDetails`.

  Scorer fires sensitive-service-on-broad (iam + Resource:*) → floor 6.
  Not in catastrophic; not in high-impact-mutation.

  Real risk: 8 — silent control-plane weakening that affects every user
  in the account. Common evidence-evasion step in account-takeover
  playbooks; persists past the grant.
policy:
  Version: '2012-10-17'
  Statement:
    - Effect: Allow
      Action:
        - iam:UpdateAccountPasswordPolicy
      Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  must_auto_approve: false
