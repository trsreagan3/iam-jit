name: agent-615-cloudformation-gettemplate-secret-leak
description: |
  WHITE-BOX round 8: `cloudformation:GetTemplate` returns the raw
  CFN template — which frequently contains DBPassword parameters,
  AccessKeyId, hardcoded API tokens, and full deployment scripts.
  CFN templates are NOT supposed to be readable by every principal
  in the account.

  The scorer's `_SECRET_BEARING_READS` (line 176) is missing
  `cloudformation:GetTemplate` and `cloudformation:GetTemplateSummary`
  and `cloudformation:GetStackPolicy`.

  On `Resource: *`, this scores 4 — the broad-cross-resource-read
  fallback. Below the 5-threshold default; auto-approves.

  Source-code rule exploited: `_SECRET_BEARING_READS` (line 176) —
  CFN read-tier omitted.

  Research-doc pattern: §1.24 (`cloudformation:UpdateStack` — the
  read sibling is the recon half), Section 1.36 (CFN access via
  GetTemplate).

  Real risk: 7 — same tier as `lambda:GetFunction` (which IS in
  the set). Templates leak production credentials.

  Det score: 4.

  Proposed fix: add to `_SECRET_BEARING_READS`:
  `cloudformation:GetTemplate`, `cloudformation:GetTemplateSummary`,
  `cloudformation:GetStackPolicy`. Existing `_action_covers_any`
  glob path on broad resource will then floor at 7.

policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - "cloudformation:GetTemplate"
        - "cloudformation:GetTemplateSummary"
      Resource: "*"

request:
  spec:
    access_type: read-only
    duration:
      duration_hours: 1

expected:
  score_min: 6
  must_auto_approve: false
