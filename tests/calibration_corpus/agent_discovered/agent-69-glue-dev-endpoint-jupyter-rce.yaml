name: agent-69-glue-dev-endpoint-jupyter-rce
description: |
  Glue Dev Endpoints are persistent interactive Jupyter/Zeppelin
  notebook clusters with an attached IAM role. Functionally identical to
  sagemaker:CreateNotebookInstance (which IS in _CODE_EXECUTION_PRIMITIVES):
  the caller gets a browser-based notebook environment with the dev-
  endpoint role's credentials. Anything the role can do, the caller can
  do interactively.

  Relevant actions:
    - glue:CreateDevEndpoint — provision the notebook cluster
    - glue:UpdateDevEndpoint — modify existing endpoint config (incl. role)
    - glue:CreateSession (Glue 4.0 sessions API) — newer interactive
      Spark session under a role

  Combined with iam:PassRole on an admin/data-access role, this is RCE-
  as-that-role. The composition rule fires for sagemaker:CreateNotebook-
  Instance + PassRole; the analogous Glue path doesn't trigger because
  Glue dev endpoints aren't in _CODE_EXECUTION_PRIMITIVES.

  Scorer flow:
    - glue (sensitive service in round 1) on Resource:* → floor 6
    - state-changing-on-broad → 6
    - PassRole narrow → 4
  No composition rule fires (CreateDevEndpoint not in list). Max = 6.

  Real risk: 9 — full code-exec under the dev-endpoint role.

  Suggested fix: add glue:CreateDevEndpoint, glue:UpdateDevEndpoint,
  glue:CreateSession, glue:RunStatement (interactive statement
  execution in a session) to _CODE_EXECUTION_PRIMITIVES.
policy:
  Version: '2012-10-17'
  Statement:
    - Effect: Allow
      Action:
        - glue:CreateDevEndpoint
        - glue:UpdateDevEndpoint
        - glue:CreateSession
      Resource: '*'
    - Effect: Allow
      Action:
        - iam:PassRole
      Resource: arn:aws:iam::123456789012:role/glue-data-access-role
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 9
  must_auto_approve: false
