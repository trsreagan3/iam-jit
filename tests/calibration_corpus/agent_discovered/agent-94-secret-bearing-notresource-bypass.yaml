name: agent-94-secret-bearing-notresource-bypass
description: |
  The secret-bearing-reads composition rule (lines 1643-1655) requires
  `strict` to be True (strict-broad resource). But the policy-level
  `strict_broad` flag is computed only from the positive Resource list,
  not from NotResource. So a statement using NotResource (which the
  per-statement loop correctly treats as broad-equivalent) does not
  trigger the secret-bearing-reads composition rule.

  Code location: src/iam_jit/review.py
    - Line 1545: `strict_broad = any(_is_strict_wild_top(r) for r in
      resources_in_stmt)` — only positive Resource considered.
    - Line 1644: `if _canonical_action(action) in _SECRET_BEARING_READS_LC
      and strict:` — uses the policy-level strict flag.

  Attack: `ec2:GetConsoleOutput` (and similar boot-log readers) with
  NotResource excluding a single instance — effectively every instance
  in the account except one. Real risk 7 (boot-log secrets across the
  fleet). Scorer: 6.

  Same fix as agent-90: also consider NotResource (when non-wildcard)
  when computing `strict_broad`. Or, more thoroughly, refactor the
  policy-level pass to walk the same NotResource-promotion logic that
  the per-statement loop runs.
policy:
  Version: '2012-10-17'
  Statement:
    - Effect: Allow
      Action:
        - ec2:GetConsoleOutput
        - ec2:GetPasswordData
        - ssm:GetCommandInvocation
      NotResource:
        - arn:aws:ec2:us-east-1:123456789012:instance/i-known-empty
request:
  spec:
    access_type: read-only
    duration:
      duration_hours: 1
expected:
  score_min: 7
  must_auto_approve: false
