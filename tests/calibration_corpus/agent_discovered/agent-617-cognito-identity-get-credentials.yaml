name: agent-617-cognito-identity-get-credentials
description: |
  WHITE-BOX round 8: `cognito-identity:GetCredentialsForIdentity`
  mints temporary AWS credentials for whatever role is mapped to the
  Cognito identity pool. With `Resource: *` this is "mint creds
  for ANY identity pool's mapped role." When combined with a
  pool that maps to admin (common in dev), it's a single-call
  privilege-escalation.

  cognito-identity is in `_SENSITIVE_SERVICES` (line 70) so the
  sensitive-on-broad rule fires → score 6. Below the catastrophic
  tier the action deserves.

  Source-code rule exploited: `_CATASTROPHIC_ACTIONS` omits
  `cognito-identity:GetCredentialsForIdentity`. The companion
  `cognito-identity:SetIdentityPoolRoles` IS catastrophic (line
  771) — but that's the role-mapping-write half;
  `GetCredentialsForIdentity` is the actual creds-mint primitive.

  Research-doc pattern: §13.9 (cognito-idp/identity privesc chain).

  Real risk: 8 — direct creds-mint primitive.

  Det score: 6.

  Proposed fix: add `cognito-identity:GetCredentialsForIdentity`
  and `cognito-identity:GetOpenIdTokenForDeveloperIdentity` to
  `_CATASTROPHIC_ACTIONS`.

policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action: "cognito-identity:GetCredentialsForIdentity"
      Resource: "*"

request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1

expected:
  score_min: 8
  must_auto_approve: false
