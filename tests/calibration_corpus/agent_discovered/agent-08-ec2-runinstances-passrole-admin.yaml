name: agent-08-ec2-runinstances-passrole-admin
description: |
  EC2 RunInstances + iam:PassRole admin = boot an instance with an
  admin instance profile, then `curl 169.254.169.254` to harvest
  credentials. Classic instance-profile escalation path. Scorer
  flags EC2 Write on Resource:* (6) and narrow PassRole (4); does
  not connect the dots.
  Real risk: 9 — admin cred theft via instance metadata is one API
  call away.
policy:
  Version: '2012-10-17'
  Statement:
    - Effect: Allow
      Action:
        - ec2:RunInstances
        - ec2:CreateLaunchTemplate
        - ec2:CreateTags
      Resource: '*'
    - Effect: Allow
      Action: iam:PassRole
      Resource: arn:aws:iam::111111111111:role/EC2-AdminInstanceRole
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 9
  must_auto_approve: false
