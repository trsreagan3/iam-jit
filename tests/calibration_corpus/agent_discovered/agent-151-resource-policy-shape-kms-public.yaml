name: resource-policy-shape-kms-public
description: |
  KMS key policy shape with `Principal: "*"` granting `kms:Decrypt` +
  `kms:GenerateDataKey`. Anyone with the key ARN can decrypt every
  ciphertext encrypted under that key — wipes out the entire envelope-
  encryption boundary.

  Research: Section 4.6 ("KMS key policy `Principal: \"*\"` (or wide AWS
  account principal) — `kms:Decrypt` + `kms:GenerateDataKey` exposes all
  data encrypted under that key. AWS recommends never using `Resource: \"*\"`
  for `kms:Decrypt`...").

  Why the scorer underrates: scored 6 — `kms` is in sensitive services so
  the broad-service floor fires, but the scorer doesn't recognize that
  `Principal: "*"` on a KMS key policy turns the key into a public oracle.
  Same root cause as agent-148/149/150.
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Principal: "*"
      Action:
        - kms:Decrypt
        - kms:GenerateDataKey
        - kms:DescribeKey
      Resource: arn:aws:kms:us-east-1:123456789012:key/abcd1234-ab12-cd34-ef56-1234567890ab
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  must_auto_approve: false
