name: agent-09-ec2-getconsoleoutput-secret-leak
description: |
  ec2:GetConsoleOutput / GetConsoleScreenshot / GetLaunchTemplateData
  on Resource:* — all IAM-class "Read" but in practice leak secrets
  from boot logs and user-data scripts. cloud-init prints
  envvars (often containing AWS_SECRET_ACCESS_KEY, DB passwords, API
  tokens) to the serial console; GetConsoleOutput reads it. The
  scorer treats ec2 as non-sensitive and these as plain reads —
  result is 4/10 (just the cross-resource-read flag). For a
  read-only request this slips below the auto-approve threshold of
  5 in many tunings.
  Real risk: 7 — silent fleet-wide secret exfil from boot logs.
policy:
  Version: '2012-10-17'
  Statement:
    - Effect: Allow
      Action:
        - ec2:GetConsoleOutput
        - ec2:GetConsoleScreenshot
        - ec2:GetLaunchTemplateData
        - ec2:DescribeInstanceAttribute
      Resource: '*'
request:
  spec:
    access_type: read-only
    duration:
      duration_hours: 1
expected:
  score_min: 7
  must_auto_approve: false
