name: iam-updateloginprofile-password-takeover
description: |
  iam:UpdateLoginProfile on Resource:* — change any IAM user's console
  password. Account takeover: change the password on any IAM user
  (admin users included if there's no permissions boundary blocking).

  Scored 6. Should be 8.

policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action: "iam:UpdateLoginProfile"
      Resource: "*"

request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1

expected:
  score_min: 8
  must_auto_approve: false
