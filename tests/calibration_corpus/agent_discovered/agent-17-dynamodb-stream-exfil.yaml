name: agent-17-dynamodb-stream-exfil
description: |
  dynamodb:GetRecords + DescribeStream + ListStreams on Resource:*
  reads every change committed to every DynamoDB table — every user
  record written, every session token, every PII update. This is a
  silent CDC tap into the entire account's table fleet. Read-only,
  so the request slips below threshold 5 in many tunings.
  Real risk: 7 — bulk DB-change exfil, persistent until stream
  closes.
policy:
  Version: '2012-10-17'
  Statement:
    - Effect: Allow
      Action:
        - dynamodb:GetRecords
        - dynamodb:GetShardIterator
        - dynamodb:DescribeStream
        - dynamodb:ListStreams
      Resource: '*'
request:
  spec:
    access_type: read-only
    duration:
      duration_hours: 1
expected:
  score_min: 7
  must_auto_approve: false
