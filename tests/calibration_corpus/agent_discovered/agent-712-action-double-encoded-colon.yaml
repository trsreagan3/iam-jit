name: agent-712-action-double-encoded-colon
description: |
  WHITE-BOX round 9: an Action with the service-name colon URL-
  encoded (`iam%3APassRole` instead of `iam:PassRole`) bypasses
  the action catalog entirely. The scorer's `_canonical_action`
  splits on the FIRST literal `:`; with no literal colon, the
  whole string is the "service" and there's no action name to
  match against catalogs. Final score: 1.

  AWS IAM accepts URL-percent-encoded action names in SOME
  toolchains (e.g. when a policy document is round-tripped
  through a URL-encoded JSON parameter and the decoder isn't
  applied to action strings). Whether AWS itself decodes
  these at policy-eval time is documented inconsistently;
  Access Analyzer raises a finding.

  Source-code rule exploited: `_canonical_action` (line 1430-
  1444):

  ```python
  if ":" not in action:
      return action.lower()
  svc, _, name = action.partition(":")
  ```

  The `if ":" not in action` branch treats `iam%3Apassrole` as
  a single-token action — service-prefix-less, no catalog match.

  Real risk: 6-9 (if AWS decodes, this is admin-PassRole;
  otherwise it's a malformed-defect class). Gap = 5+.

  Det score: 1; expected ≥ 6 (treat as malformed action; floor 5;
  bump to 6 because malformed Allow on broad resource still
  enters the worst-case-malformed bucket).

  Research-doc pattern: §10 (parser grammar — character-encoding
  variants).

  Proposed fix: in `_norm_grammar_str` (or specifically in
  `_canonical_action`), URL-decode percent-encoded characters
  before splitting on `:`. Or detect %3A pattern and rewrite
  to literal `:`. Add a factor noting the malformedness.

policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action: "iam%3APassRole"
      Resource: "*"

request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1

expected:
  score_min: 6
  must_auto_approve: false
