name: agent-322-secretsmanager-rotate-overwrite
description: |
  BLACK-BOX Round 7. Research Sec 6.2 (Resource Exposure /
  modification) + Sec 1.6 (CreateAccessKey-class persistence).

  Secret-modification primitives `secretsmanager:RotateSecret`,
  `UpdateSecret`, `PutSecretValue`, `ReplicateSecretToRegions`
  are subtler than `GetSecretValue`:
  - `PutSecretValue` directly OVERWRITES the secret. Every consumer
    fetches the attacker-supplied value on next rotation poll.
  - `RotateSecret` with attacker-controlled rotation Lambda forces a
    custom-Lambda-driven rotate (research 1.18 lambda:UpdateFunctionCode
    sibling).
  - `ReplicateSecretToRegions` copies the secret to an attacker-
    accessible region; useful for cross-region exfil.

  Det score: 8 (sensitive-service + permissions-mgmt floor). Real
  risk: 9 — these are write primitives on production secrets, NOT
  just read.

  Scorer gap: the scorer treats secretsmanager Write actions as
  generic Write (no special class). The write-side primitives
  deserve the same treatment as `iam:UpdateAccessKey` /
  `iam:ResetServiceSpecificCredential` (credentials exposure).

  Suggested fix: add `secretsmanager:UpdateSecret`,
  `secretsmanager:PutSecretValue`, `secretsmanager:RotateSecret`,
  `secretsmanager:ReplicateSecretToRegions` to
  _HIGH_IMPACT_MUTATION_ACTIONS with a "credential-overwrite"
  semantic; floor at 8 on broad scope.

policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - "secretsmanager:RotateSecret"
        - "secretsmanager:UpdateSecret"
        - "secretsmanager:PutSecretValue"
        - "secretsmanager:ReplicateSecretToRegions"
      Resource: "*"

request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1

expected:
  score_min: 8
  must_auto_approve: false
