name: agent-47-rds-modify-master-password
description: |
  `rds:ModifyDBInstance` (and `rds:ModifyDBCluster`) accept a
  `MasterUserPassword` parameter that overwrites the database master
  password in one API call. An attacker with this permission on Resource:*
  can rotate the master credential of every RDS instance in the account
  to a value of their choosing — full database takeover.

  Also `rds:RestoreDBInstanceFromDBSnapshot` / `rds:RestoreDBClusterFromSnapshot`
  / `rds:RestoreDBInstanceToPointInTime` let the attacker spin up a NEW
  instance from a production snapshot with a different master password
  (one they know). The original prod DB stays untouched; the restored copy
  is the attacker's read-only DB they own.

  Scorer floors at 6 — generic Write on a sensitive-enough-to-fire-cross-
  resource pattern, but RDS isn't in _SENSITIVE_SERVICES and these aren't
  in _HIGH_IMPACT_MUTATION_ACTIONS or _CATASTROPHIC_ACTIONS.

  Real risk: 8 — single-call master-password rotation OR snapshot-restore
  with attacker's master password = full DB read/write. Persists past the
  JIT grant (the new password is known to the attacker; the restored DB
  remains in the account).
policy:
  Version: '2012-10-17'
  Statement:
    - Effect: Allow
      Action:
        - rds:ModifyDBInstance
        - rds:ModifyDBCluster
        - rds:RestoreDBInstanceFromDBSnapshot
        - rds:RestoreDBClusterFromSnapshot
        - rds:RestoreDBInstanceToPointInTime
      Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  must_auto_approve: false
