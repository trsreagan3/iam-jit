name: secretsmanager-getsecret-cross-account-any
description: |
  secretsmanager:GetSecretValue on `arn:aws:secretsmanager:*:*:secret:*` —
  fetch any secret in any account/region (subject to resource policy).

  Within the local account this returns ALL secrets. The scorer scores 1
  because Resource is non-"*". This is a clear cross-account-or-local
  secret-exfiltration pathway.

policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action: "secretsmanager:GetSecretValue"
      Resource: "arn:aws:secretsmanager:*:*:secret:*"

request:
  spec:
    access_type: read
    duration:
      duration_hours: 1

expected:
  score_min: 7
  must_auto_approve: false
