name: resource-policy-shape-secretsmanager-public
description: |
  Secrets Manager resource policy shape (`Effect: Allow` + `Principal: "*"`
  + `secretsmanager:GetSecretValue`) on a narrow secret ARN. Single API
  call publishes a production DB credential secret to the internet.

  Research: Section 4.8 ("Secrets Manager resource policy `Principal: \"*\"`
  with `secretsmanager:GetSecretValue` — Secret exfil"). Hacking-the-Cloud's
  Misconfigured Resource-Based Policies catalogue.

  Why the scorer underrates: the scorer scores this as if it were an
  identity-policy statement reading a single narrow secret (score 2). The
  `Principal: "*"` flag — the entire signal that flips this from
  "read a secret" to "make this secret world-readable" — is silently
  dropped because the scoring path doesn't branch on Principal.
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Principal: "*"
      Action: secretsmanager:GetSecretValue
      Resource: arn:aws:secretsmanager:us-east-1:123456789012:secret:prod-db-master-cred-AbCdEf
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 9
  must_auto_approve: false
