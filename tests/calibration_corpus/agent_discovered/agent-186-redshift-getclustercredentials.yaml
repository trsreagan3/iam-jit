name: redshift-getclustercredentials
description: |
  `redshift:GetClusterCredentials` + `redshift-serverless:GetCredentials`.
  These actions issue temporary DB credentials for any Redshift cluster /
  serverless workgroup — bypasses traditional DB-credential management
  entirely. CloudSplaining lists redshift:GetClusterCredentials as a
  credentials-exposure primitive (Section 6.5).

  Research: Section 6.1 ("Data Exfiltration — ...
  `redshift:GetClusterCredentials`.") and Section 6.5 ("Credentials
  Exposure — ... `redshift:GetClusterCredentials`,
  `sts:GetFederationToken`, `sts:GetSessionToken`...").

  Why the scorer underrates: scored 6 (sensitive-service-on-broad). The
  action is a credential-issuance primitive — it mints federated DB
  creds for any user the cluster's IAM auth recognizes. Should be in
  `_HIGH_IMPACT_MUTATION_ACTIONS` or `_SECRET_BEARING_READS` (it returns
  a secret).
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - redshift:GetClusterCredentials
        - redshift-serverless:GetCredentials
      Resource: "*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  must_auto_approve: false
