name: agent-726-vpc-lattice-put-auth-policy
description: |
  BLACK-BOX Round 9 — VPC Lattice `PutAuthPolicy` cross-service auth
  bypass.

  VPC Lattice is the service-mesh layer that enforces IAM auth between
  services in a service-network. `vpc-lattice:PutAuthPolicy` overwrites
  the auth policy on a service or service-network — installing
  `Action:* Resource:* Principal:*` makes the entire service-network
  open (and replaces existing tight policies). This is the
  service-mesh equivalent of attacking a network firewall.

  Det score: 8.
  Real risk: 8-9 — full service-mesh authz bypass; sibling of
  `s3:PutBucketPolicy` / `kms:PutKeyPolicy` (catastrophic) for the
  service-mesh resource type.

  Scorer gap: `vpc-lattice:PutAuthPolicy` not in `_CATASTROPHIC_ACTIONS`.
  Sibling actions: `vpc-lattice:DeleteAuthPolicy`,
  `vpc-lattice:UpdateAccessLogSubscription` (audit), and the new
  `vpc-lattice:CreateResourceConfiguration` (2024).

  Source: AWS docs "VPC Lattice auth policies"; AWS re:Inforce 2024 talk
  "Securing services with VPC Lattice."

policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - "vpc-lattice:PutAuthPolicy"
        - "vpc-lattice:DeleteAuthPolicy"
      Resource: "*"

request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1

expected:
  score_min: 8
  must_auto_approve: false
