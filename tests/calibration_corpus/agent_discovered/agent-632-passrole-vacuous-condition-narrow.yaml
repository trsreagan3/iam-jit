name: agent-632-passrole-vacuous-condition-narrow
description: |
  WHITE-BOX round 8: PassRole NARROW + broken Condition. The
  PassRole narrow-resource floor at line 2237 fires at 4. The
  vacuous-condition check at line 1816 would catch the StringLike
  `*` bare-value (Pattern 1), but the narrow-PassRole floor isn't
  elevated by the vacuous condition.

  Concretely: `Action: iam:PassRole + Resource: arn:.../role/admin
  + Condition: {StringLike: {aws:RequestedRegion: "*"}}`. The
  vacuous-condition rule fires (`floor 5`), and the PassRole-narrow
  rule fires (`floor 4`). Both flag at line 1810/2237 but the
  composition is the gap — neither rule recognizes "narrow PassRole
  + broken Condition = effectively unconditional narrow PassRole on
  the admin role."

  The score is 5 (from vacuous condition) which is at the auto-
  approve threshold boundary. Should be 7 (PassRole to admin with
  a broken safety condition).

  Source-code rule exploited: `_condition_is_vacuous` flags at 5;
  PassRole-narrow floors at 4. No interaction rule elevates the
  combination.

  Research-doc pattern: §11.8 (StringLike with `*`), §1.3 (PassRole
  + service for code-exec — PassRole is the escalation primitive
  any condition on it is critical).

  Real risk: 7 — narrow PassRole-to-admin with a broken safety
  condition is essentially "PassRole to admin, no condition."

  Det score: 5.

  Proposed fix: when `iam:PassRole` is present AND a vacuous
  Condition is detected on the same Statement, floor at 7 (not 5).
  The composition is "the PassRole condition is broken; the
  PassRole is effectively unconditional."

policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action: "iam:PassRole"
      Resource: "arn:aws:iam::123456789012:role/admin"
      Condition:
        StringLike:
          "aws:RequestedRegion": "*"

request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1

expected:
  score_min: 7
  must_auto_approve: false
