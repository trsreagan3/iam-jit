name: resource-policy-shape-ecr-public
description: |
  ECR repository policy shape with `Principal: "*"` granting
  `ecr:BatchGetImage` + `ecr:GetAuthorizationToken`. Anyone on the internet
  can pull the company's container images — full supply-chain inspection
  of production binaries, plus pre-image-poisoning recon.

  Research: Section 4.7 ("ECR repository policy with wildcard
  `ecr:GetAuthorizationToken` / `ecr:BatchGetImage` — Image pull / poisoning
  from any principal").

  Why the scorer underrates: scored 1 — same root cause as agent-148/149,
  the `Principal: "*"` flag isn't consulted by any scoring rule. ECR repo
  policies are the canonical "single API call to make all your images
  public" footgun, but they look like a narrow-resource read in identity-
  policy semantics.
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Principal: "*"
      Action:
        - ecr:BatchGetImage
        - ecr:GetAuthorizationToken
        - ecr:GetDownloadUrlForLayer
      Resource: arn:aws:ecr:us-east-1:123456789012:repository/prod-api-image
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  must_auto_approve: false
