name: case-insensitive-sts-assumerole-star
description: |
  STS:AssumeRole on Resource:*. Uppercase service prefix bypasses
  the sensitive-service set, scoring 4 instead of 6+.

policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action: "STS:AssumeRole"
      Resource: "*"

request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1

expected:
  score_min: 6
  must_auto_approve: false
