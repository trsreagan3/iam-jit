name: s3-getobject-cross-account-any-bucket
description: |
  s3:GetObject on `arn:aws:s3:::*/*` — read any object in any bucket in
  any account that the principal can reach (subject to bucket policy and
  Block Public Access). Equivalent to broad cross-account read of S3.

  Scored 1 ("scoped") because the Resource string is non-"*" — but the
  bucket name is wildcarded. This is full S3 read.

policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action: "s3:GetObject"
      Resource: "arn:aws:s3:::*/*"

request:
  spec:
    access_type: read
    duration:
      duration_hours: 1

expected:
  score_min: 6
  must_auto_approve: false
