name: cloudtrail-deletetrail-anti-forensics
description: |
  cloudtrail:DeleteTrail on Resource:* — permanently delete CloudTrail
  trails. Equivalent in effect to StopLogging but worse — trail config
  is gone, not just paused. Anti-forensics catastrophic.

  Scored 7. Should be 9+.

policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action: "cloudtrail:DeleteTrail"
      Resource: "*"

request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1

expected:
  score_min: 9
  must_auto_approve: false
