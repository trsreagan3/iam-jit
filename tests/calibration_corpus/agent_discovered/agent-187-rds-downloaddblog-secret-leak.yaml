name: rds-downloaddblog-secret-leak
description: |
  `rds:DownloadDBLogFilePortion` + `rds:DescribeDBLogFiles` on
  `Resource: *`. RDS DB engines write authentication failures, slow-query
  output, and (depending on engine config) statement logs to DB log
  files. Statement logs frequently contain plaintext credentials in
  queries like `SET PASSWORD = '...'`. Reading the log files is a
  credential-leak primitive equivalent to `secretsmanager:GetSecretValue`.

  Research: Section 6.1 ("Data Exfiltration — ... `rds:DownloadDB-
  LogFilePortion`...").

  Why the scorer underrates: scored 4 (cross-resource-read floor). RDS
  log download isn't in `_SECRET_BEARING_READS` — but the contents are
  log streams from a database that routinely carry secrets. Same tier
  as `logs:GetLogEvents` (which IS in secret-bearing-reads).
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - rds:DownloadDBLogFilePortion
        - rds:DescribeDBLogFiles
        - rds:DownloadCompleteDBLogFile
      Resource: "*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  must_auto_approve: false
