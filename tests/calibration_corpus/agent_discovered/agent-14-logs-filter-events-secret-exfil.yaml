name: agent-14-logs-filter-events-secret-exfil
description: |
  logs:FilterLogEvents / GetLogEvents / GetLogRecord on Resource:*
  reads every log group in the account. Application logs are notorious
  for leaking secrets: stack traces with connection strings, debug-
  level prints of auth headers, lambda execution logs with envvars,
  request bodies with API keys. The scorer treats CloudWatch Logs as
  a non-sensitive service with plain reads — 4/10 (just cross-resource
  read flag). For a read-only request this slips below threshold 5.
  Real risk: 7 — silent secret-from-log exfil across every service.
policy:
  Version: '2012-10-17'
  Statement:
    - Effect: Allow
      Action:
        - logs:FilterLogEvents
        - logs:GetLogEvents
        - logs:GetLogRecord
        - logs:StartQuery
      Resource: '*'
request:
  spec:
    access_type: read-only
    duration:
      duration_hours: 1
expected:
  score_min: 7
  must_auto_approve: false
