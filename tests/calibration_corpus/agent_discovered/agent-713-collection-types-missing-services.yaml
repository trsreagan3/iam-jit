name: agent-713-collection-types-missing-services
description: |
  WHITE-BOX round 9: the `collection_types` map at `_is_broad_resource`
  line 1503 enumerates per-service collection wildcards but is
  MISSING many high-impact services. The pattern
  `arn:aws:sqs:us-east-1:123456789012:queue/*` (note: SQS uses `:`
  in real ARNs, but the slashed form is accepted by some IAM
  parsers) is treated as narrow → score 6 instead of being
  recognized as a service-collection wildcard.

  Same gap applies to:
  - `sns:topic/*` (note: SNS topic ARNs use `:` separator)
  - `apigateway:.../apikeys/*` (leading slash — agent-702)
  - `events:rule/*`, `events:event-bus/*` (EventBridge)
  - `ecs:cluster/*`, `ecs:service/*`, `ecs:task-definition/*`
  - `eks:cluster/*`, `eks:nodegroup/*`
  - `ecr:repository/*`, `ecr-public:repository/*`
  - `cloudwatch:alarm/*`
  - `ssm:parameter/*` (already covered by SSM-as-secret? probably not)

  Sister to agent-702. agent-702 is `apigateway:CreateApiKey`
  which routes through `_SENSITIVE_SERVICES` (score 6 already).
  This fixture demonstrates the LIST of services that need
  `collection_types` entries.

  Source-code rule exploited: `_is_broad_resource` (line 1503-
  1517) `collection_types` enumeration.

  Real risk: pattern-dependent. For the SQS-with-slash-form: this
  is malformed (SQS uses `:` not `/`), but for the EventBridge /
  ECS / EKS forms the slash IS the real separator. Gap = 1-3
  depending on action.

  Det score: 6 (sensitive-service floor); expected ≥ 7 (collection
  wildcard on broad resource = full service control).

  Research-doc pattern: §10.7 (grammar — service-specific
  collection forms).

  Proposed fix: add entries to `collection_types` for:
  - `sqs`: ("queue",)
  - `sns`: ("topic",)
  - `events`: ("rule", "event-bus")
  - `ecs`: ("cluster", "service", "task-definition", "task")
  - `eks`: ("cluster", "nodegroup", "addon", "fargateprofile")
  - `ecr`: ("repository",)
  - `cloudwatch`: ("alarm",)
  - `apigateway`: handle leading-slash separately

policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - eks:DescribeCluster
        - eks:ListClusters
        - eks:AccessKubernetesApi
      Resource: "arn:aws:eks:us-east-1:123456789012:cluster/*"

request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1

expected:
  score_min: 7
  must_auto_approve: false
