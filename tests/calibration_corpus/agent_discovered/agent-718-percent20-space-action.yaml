name: agent-718-percent20-space-action
description: |
  WHITE-BOX round 9: `Action: "iam:%20PassRole"` (percent-encoded
  space) scores 6 — the literal `%20` substring survives
  `_norm_grammar_str` (it's all ASCII; nothing to normalize), so
  the catalog lookup for `iam:passrole` MISSES. Sister to
  agent-712 (percent-encoded colon).

  Whether AWS itself URL-decodes action strings at evaluation
  time is documented inconsistently. Access Analyzer raises a
  finding either way.

  Source-code rule exploited: `_norm_grammar_str` doesn't URL-
  decode.

  Real risk: 6 (worst-case-malformed bucket; if AWS decodes, the
  policy is functionally iam:PassRole and the floor 9 should
  fire). Gap = 0 or 3 depending on AWS behavior.

  Det score: 6 (sensitive-service floor); expected ≥ 6 with a
  factor about percent-encoding.

  Research-doc pattern: §10 (parser grammar — encoding variants).

  Proposed fix: in `_norm_grammar_str`, URL-decode any percent-
  encoded sequence before further normalization.

policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action: "iam:%20PassRole"
      Resource: "*"

request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1

expected:
  score_min: 6
  must_auto_approve: false
  # NB: This fixture scores 6 already (sensitive-service floor).
  # The architectural gap is the missing FACTOR — the reviewer
  # gets a generic "sensitive service" flag, not the more useful
  # "this action is percent-encoded; likely an attempted bypass."
