name: agent-514-codepipeline-passrole-composition
description: |
  BLACK-BOX Round 8. Research §1.34 (CodeBuild PassRole — sibling) + §9.12 (CodeDeploy /
  CodeCatalyst).

  `codepipeline:CreatePipeline` + `UpdatePipeline` defines a CI/CD pipeline whose stages
  run under a passed pipeline role. The build stage commonly runs CodeBuild → arbitrary
  shell. Pipeline role tends to be heavily privileged (deploy permissions). Combined with
  `iam:PassRole`, this is RCE-as-pipeline-role + persistent backdoor.

  Sibling pair: `codebuild:CreateProject + StartBuild + PassRole` IS recognized
  (composition fires, scores 9). `codepipeline:CreatePipeline + PassRole` is NOT — scores
  6 because `codepipeline:` actions are not in `_CODE_EXECUTION_PRIMITIVES`.

  Det score: 6.
  Real risk: 9 — RCE-as-pipeline-role plus persistent CI/CD backdoor.

  Scorer gap: `codepipeline:CreatePipeline` / `UpdatePipeline` not in
  `_CODE_EXECUTION_PRIMITIVES`.

  Proposed fix: add `codepipeline:CreatePipeline`, `codepipeline:UpdatePipeline`,
  `codepipeline:StartPipelineExecution`, `codepipeline:PutActionRevision` to
  `_CODE_EXECUTION_PRIMITIVES` — same shape as `codebuild:*` already in the set.

  Research-doc pattern: §1.34 + §9.12.

policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - "codepipeline:CreatePipeline"
        - "codepipeline:UpdatePipeline"
      Resource: "*"
    - Effect: Allow
      Action: "iam:PassRole"
      Resource: "arn:aws:iam::123456789012:role/PipelineServiceRole"

request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1

expected:
  score_min: 9
  must_auto_approve: false
