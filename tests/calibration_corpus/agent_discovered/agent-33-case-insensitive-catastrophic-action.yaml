name: agent-33-case-insensitive-catastrophic-action
description: |
  AWS IAM is documented to treat action names case-insensitively. The
  scorer's _CATASTROPHIC_ACTIONS set uses exact-string membership
  (`action in _CATASTROPHIC_ACTIONS`), and the per-statement loop only
  compares the literal action string the user wrote against the
  canonical-cased strings in the set.

  Result: an attacker who lowercases the action name — `iam:attachrolepolicy`
  on `arn:aws:iam::*:role/admin-deploy` — escapes the catastrophic floor
  AND the high-impact-mutation floor entirely. The narrow resource also
  escapes the sensitive-service-on-broad-resource rule, so the scorer
  falls all the way back to the narrow-write floor of 3... but only
  because policy_sentry happens to know the lowercase form; on actions
  whose name policy_sentry can't normalize, the score drops to 1.

  Real risk: 9 — `iam:AttachRolePolicy` (any case) on any role lets the
  caller attach `arn:aws:iam::aws:policy/AdministratorAccess` to that
  role, then assume it. Account compromise.
policy:
  Version: '2012-10-17'
  Statement:
    - Effect: Allow
      Action:
        - iam:attachrolepolicy
      Resource: arn:aws:iam::*:role/admin-deploy
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 9
  must_auto_approve: false
