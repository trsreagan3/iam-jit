name: agent-417-region-wildcard-on-secret
description: |
  WHITE-BOX round 7: `_is_broad_resource` (line 1136) checks
  `parts[4] == "*"` (account-segment wildcard) but does NOT check
  `parts[3] == "*"` (region-segment wildcard).

  `arn:aws:secretsmanager:*:123456789012:secret:db-cred-prod-*`
  matches the named secret pattern in EVERY region of the account.
  Combined with a bucket-name-wildcard in the resource-id (`prod-*`),
  this reads multiple secrets across multiple regions in one grant.

  The scorer flags the bucket-name-wildcard portion (high-risk-on-broad
  fires at line 2018, score 7) but does NOT additionally weight the
  region-wildcard, which makes the blast 17x wider (17 AWS regions
  currently).

  Source-code rule exploited: `_is_broad_resource` (line 1136) +
  `_is_strict_wildcard` (line 1750). Both inspect `parts[4]` (account)
  but not `parts[3]` (region). The region-wildcard with literal
  resource-id slips past entirely.

  Research-doc pattern: §13 — multi-region attack surface in ARN
  patterns.

  Real risk: 8 — multi-region secret read on prod credentials.

  Det score: 7. Gap is only 1 here on this specific case BUT a stricter
  fixture with literal-resource-id (e.g.
  `arn:aws:secretsmanager:*:123456789012:secret:exact-prod-cred-ABCDEF`)
  scores 2 (narrow-floor) when it should be at least 5 (cross-region
  blast). The fix should treat region-wildcard as broad.

  Proposed fix: In `_is_broad_resource` and `_is_strict_wildcard`,
  treat `parts[3] == "*"` (region) the same as `parts[4] == "*"`
  (account) for resources WHOSE SERVICE IS REGIONAL (most AWS
  services). The exemption is for global services (iam, organizations,
  account, cloudfront) where the region segment is empty by design.

policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action: "secretsmanager:GetSecretValue"
      Resource: "arn:aws:secretsmanager:*:123456789012:secret:db-cred-prod-ABCDEF"

request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1

expected:
  score_min: 5
  must_auto_approve: false
