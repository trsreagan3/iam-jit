name: guardduty-deletedetector-disable-threat-detection
description: |
  guardduty:DeleteDetector on Resource:* — delete GuardDuty detectors
  (the actual finding-producing component). Threat detection is now off,
  and re-creating the detector loses the historical findings/baselines.

  Scored 7. Should be 9+ alongside other forensics-destruction actions.

policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action: "guardduty:DeleteDetector"
      Resource: "*"

request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1

expected:
  score_min: 9
  must_auto_approve: false
