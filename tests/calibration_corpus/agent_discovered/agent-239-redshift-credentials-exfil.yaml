name: agent-239-redshift-credentials-exfil
description: |
  WHITE-BOX: Research Sec 6.5 + 6.1 (CloudSplaining credentials/exfil).
  redshift:GetClusterCredentials is the Redshift-data-API equivalent
  of sts:GetFederationToken: it issues temporary DB credentials with
  caller-chosen DbUser/DbGroups. An attacker with this action on
  Resource:* can mint DB superuser credentials for any cluster.

  Code location: review.py — redshift:* is not in any action set;
  `redshift` is not in _SENSITIVE_SERVICES.

  Real risk: 8 — DB credential minting; broad data exfil from every
  Redshift cluster.

  Suggested fix: add redshift:GetClusterCredentials to
  _CATASTROPHIC_ACTIONS (DB credential minting analogous to
  sts:GetFederationToken). Also add redshift-data:ExecuteStatement,
  redshift-data:BatchExecuteStatement to _DECEPTIVE_WRITE_ACTIONS
  (already there).

policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - "redshift:GetClusterCredentials"
        - "redshift:CreateClusterUser"
        - "redshift:JoinGroup"
      Resource: "*"

request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1

expected:
  score_min: 7
  must_auto_approve: false
