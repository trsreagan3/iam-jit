name: conditionkey-secretmanager-ifexists
description: |
  `secretsmanager:GetSecretValue` on `Resource: *` allegedly gated by
  `BoolIfExists: {aws:MultiFactorAuthPresent: "true"}`. The IfExists
  operator returns TRUE when the key is absent from the request context
  — which is exactly the case for service-to-service / role-chain
  invocations (no MFA assertion in those contexts). So the condition
  never blocks the actual attack path while looking like an MFA gate.

  Research: Section 11.5 ("`IfExists` chaining — `StringEqualsIfExists`,
  `BoolIfExists`, etc. evaluate true if the key is missing → can flip a
  Deny into a permit for unauthenticated/cross-service requests.").

  Why the scorer underrates: scored 7. Better than no condition, but
  still below where it should be — `IfExists` semantics specifically
  invert in the role-chain case which is THE attack vector for
  `secretsmanager:GetSecretValue` on a broad resource. Should be at
  least 8 (peer to no-condition).
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action: secretsmanager:GetSecretValue
      Resource: "*"
      Condition:
        BoolIfExists:
          aws:MultiFactorAuthPresent: "true"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  must_auto_approve: false
