name: agent-37-case-insensitive-secret-bearing-reads
description: |
  The _SECRET_BEARING_READS gate also uses canonical-cased exact string
  membership (`action in _SECRET_BEARING_READS`). Lowercasing the service
  portion of the action тАФ `LOGS:filterlogevents`, `ec2:getconsoleoutput`,
  `SSM:getcommandinvocation` тАФ escapes the floor-7 secret-bearing-read
  rule. The scorer falls back to the generic "broad cross-resource read"
  flag (4) and the read-only narrative.

  Real risk: 7 тАФ same as the canonical-cased equivalent (agent-09 /
  agent-14). The functional behaviour is identical; only the cosmetic
  casing changed.
policy:
  Version: '2012-10-17'
  Statement:
    - Effect: Allow
      Action:
        - LOGS:filterlogevents
        - logs:GETLOGEVENTS
        - ec2:getconsoleoutput
        - ec2:GETCONSOLESCREENSHOT
        - ec2:getpassworddata
        - ec2:getlaunchtemplatedata
      Resource: '*'
request:
  spec:
    access_type: read-only
    duration:
      duration_hours: 1
expected:
  score_min: 7
  must_auto_approve: false
