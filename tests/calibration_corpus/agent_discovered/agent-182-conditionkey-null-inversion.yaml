name: conditionkey-null-inversion
description: |
  `Condition: Null` operator inversion: `Null: {aws:MultiFactorAuthAge:
  "true"}` means "the request HAS NO MFA age" — exact opposite of likely
  intent ("require MFA"). The operator-name + value-name combination
  often confuses operators; the policy looks like it enforces MFA but
  actually rejects MFA'd requests.

  Research: Section 11.6 ("`Null` operator inversion —
  `\"Null\":{\"aws:MultiFactorAuthAge\":\"true\"}` = \"require absence of
  MFA\" — exact opposite of likely intent. Often written by hand and
  inverted.").

  Why the scorer underrates: scored 1 on a narrow PII-bucket
  `s3:GetObject`. The scorer sees a condition (which it credits as
  scoping) and a narrow resource — neither rule fires. The inverted
  semantics are invisible to the scorer.
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action: s3:GetObject
      Resource: arn:aws:s3:::corporate-pii-data/*
      Condition:
        Null:
          aws:MultiFactorAuthAge: "true"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 5
  must_auto_approve: false
