name: securityhub-disable-disable-threat-aggregation
description: |
  securityhub:DisableSecurityHub on Resource:* — disable Security Hub,
  the central finding aggregator across GuardDuty, Inspector, Config, IAM
  Access Analyzer, Macie, etc. Disabling discards aggregated findings.

  Scored 7. Should be 9+.

policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action: "securityhub:DisableSecurityHub"
      Resource: "*"

request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1

expected:
  score_min: 9
  must_auto_approve: false
