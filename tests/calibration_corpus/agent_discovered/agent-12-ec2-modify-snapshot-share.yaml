name: agent-12-ec2-modify-snapshot-share
description: |
  ec2:ModifySnapshotAttribute / ec2:ModifyImageAttribute on
  Resource:* — share any EBS snapshot or AMI with attacker AWS
  account (or make it public). Same exfil primitive as the RDS
  variant: the attacker then mounts the snapshot in their account
  and reads the raw disk. Scorer says 6.
  Real risk: 8 — disk-image exfil of any volume/AMI.
policy:
  Version: '2012-10-17'
  Statement:
    - Effect: Allow
      Action:
        - ec2:ModifySnapshotAttribute
        - ec2:ModifyImageAttribute
      Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  must_auto_approve: false
