name: iam-resetservicespecificcredential-cred-theft
description: |
  iam:ResetServiceSpecificCredential on Resource:* — reset service-
  specific credentials (CodeCommit HTTPS credentials, Keyspaces credentials,
  etc.) on any IAM user. Used for cred-theft persistence or replay.

  Scored 7. Should be 8.

policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action: "iam:ResetServiceSpecificCredential"
      Resource: "*"

request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1

expected:
  score_min: 8
  must_auto_approve: false
