name: real-backup-service
description: Backup service writing snapshots to one bucket.
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - s3:PutObject
    - s3:GetObject
    Resource: arn:aws:s3:::backups/*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_max: 7
