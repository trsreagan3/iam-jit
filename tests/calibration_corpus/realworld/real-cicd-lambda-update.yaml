name: real-cicd-lambda-update
description: 'Typical CI/CD role: deploy code to ONE specific Lambda. Narrow, single-resource. Should auto-approve.'
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - lambda:UpdateFunctionCode
    - lambda:UpdateFunctionConfiguration
    - lambda:GetFunction
    Resource: arn:aws:lambda:us-east-1:111111111111:function:my-app-api
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_max: 7
