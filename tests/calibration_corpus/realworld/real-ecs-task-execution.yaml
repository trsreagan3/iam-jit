name: real-ecs-task-execution
description: "ECS task execution role \u2014 pull container images, write logs. AWS-recommended minimal task role."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - ecr:GetAuthorizationToken
    - ecr:BatchCheckLayerAvailability
    - ecr:GetDownloadUrlForLayer
    - ecr:BatchGetImage
    Resource: '*'
  - Effect: Allow
    Action:
    - logs:CreateLogStream
    - logs:PutLogEvents
    Resource: arn:aws:logs:us-east-1:111111111111:log-group:/ecs/my-app:*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_max: 5
