name: composite-0042-42
source_policies:
- aws_managed/ElasticLoadBalancingFullAccess.yaml
- aws_managed/DynamoDBReplicationServiceRolePolicy.yaml
source_hash: 7d595e8e72fa66f2
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action: elasticloadbalancing:*
    Resource: '*'
  - Effect: Allow
    Action:
    - ec2:DescribeAccountAttributes
    - ec2:DescribeAddresses
    - ec2:DescribeInternetGateways
    - ec2:DescribeSecurityGroups
    - ec2:DescribeSubnets
    - ec2:DescribeVpcs
    - ec2:DescribeVpcClassicLink
    - ec2:DescribeInstances
    - ec2:DescribeNetworkInterfaces
    - ec2:DescribeClassicLinkInstances
    - ec2:DescribeRouteTables
    - ec2:DescribeCoipPools
    - ec2:GetCoipPoolUsage
    - ec2:GetSecurityGroupsForVpc
    - ec2:DescribeVpcPeeringConnections
    - ec2:DescribeAvailabilityZones
    - cognito-idp:DescribeUserPoolClient
    Resource: '*'
  - Effect: Allow
    Action: iam:CreateServiceLinkedRole
    Resource: '*'
    Condition:
      StringEquals:
        iam:AWSServiceName: elasticloadbalancing.amazonaws.com
  - Effect: Allow
    Action: arc-zonal-shift:*
    Resource: arn:aws:elasticloadbalancing:*:*:loadbalancer/*
  - Effect: Allow
    Action:
    - arc-zonal-shift:ListManagedResources
    - arc-zonal-shift:ListZonalShifts
    Resource: '*'
  - Sid: DynamoDBActionsNeededForSteadyStateReplication
    Effect: Allow
    Action:
    - dynamodb:GetItem
    - dynamodb:PutItem
    - dynamodb:UpdateItem
    - dynamodb:DeleteItem
    - dynamodb:DescribeTable
    - dynamodb:UpdateTable
    - dynamodb:Scan
    - dynamodb:DescribeStream
    - dynamodb:GetRecords
    - dynamodb:GetShardIterator
    - dynamodb:DescribeTimeToLive
    - dynamodb:UpdateTimeToLive
    - dynamodb:DescribeLimits
    - dynamodb:GetResourcePolicy
    - application-autoscaling:RegisterScalableTarget
    - application-autoscaling:DescribeScalableTargets
    - application-autoscaling:PutScalingPolicy
    - application-autoscaling:DescribeScalingPolicies
    - account:ListRegions
    Resource: '*'
  - Sid: DynamoDBReplicationServiceRolePolicy
    Effect: Allow
    Action:
    - iam:CreateServiceLinkedRole
    Resource: '*'
    Condition:
      StringEquals:
        iam:AWSServiceName:
        - dynamodb.application-autoscaling.amazonaws.com
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
    resource_constraints: []
  user: ci-bot
  justification: rotate signing key via CI pipeline
scores:
