  - 'Resource: `*` for elasticloadbalancing (broad cross-resource read/access)'
  - "`elasticloadbalancing:*` is a high-impact mutation on broad resource \u2014 single API call can rewrite every matching\
    \ resource in the account."
  - '`cognito-idp:DescribeUserPoolClient` on Resource: `*` touches sensitive service `cognito-idp`'
  - '`iam:CreateServiceLinkedRole` on Resource: `*` touches sensitive service `iam`'
  - 'State-changing action `iam:CreateServiceLinkedRole` on Resource: `*` (IAM access level: Permissions management)'
  - '`arc-zonal-shift:*` grants every action in `arc-zonal-shift`'
  - 'Resource: `*` for arc-zonal-shift (broad cross-resource read/access)'
  - 'State-changing action `dynamodb:PutItem` on Resource: `*` (IAM access level: Write)'
  - 'State-changing action `dynamodb:UpdateItem` on Resource: `*` (IAM access level: Write)'
  - 'Destructive action `dynamodb:DeleteItem` on Resource: `*` (blast radius = every resource in this account)'
  - 'State-changing action `dynamodb:UpdateTable` on Resource: `*` (IAM access level: Write)'
  - 'State-changing action `dynamodb:UpdateTimeToLive` on Resource: `*` (IAM access level: Write)'
  - 'State-changing action `application-autoscaling:RegisterScalableTarget` on Resource: `*` (IAM access level: Write)'
  - 'State-changing action `application-autoscaling:PutScalingPolicy` on Resource: `*` (IAM access level: Write)'
  - 'Resource: `*` for account, application-autoscaling, dynamodb (broad cross-resource read/access)'
  - '`dynamodb:Scan` on broad resource reads content that frequently contains secrets / sensitive data (boot logs, command
    output, log streams, message bodies).'
