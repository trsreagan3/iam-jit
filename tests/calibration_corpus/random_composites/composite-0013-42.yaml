name: composite-0013-42
source_policies:
- aws_managed/EC2FleetTimeShiftableServiceRolePolicy.yaml
- aws_managed/AWSCloudMapRegisterInstanceAccess.yaml
- aws_managed/BedrockAgentCoreRuntimeIdentityServiceRolePolicy.yaml
- aws_managed/ComprehendDataAccessRolePolicy.yaml
source_hash: dcb2556899551db1
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - ec2:DescribeImages
    - ec2:DescribeSubnets
    - ec2:DescribeInstances
    - ec2:RunInstances
    - ec2:CreateFleet
    Resource:
    - '*'
  - Effect: Allow
    Action:
    - iam:PassRole
    Resource:
    - '*'
    Condition:
      StringEquals:
        iam:PassedToService:
        - ec2.amazonaws.com
        - ec2.amazonaws.com.cn
  - Effect: Allow
    Action:
    - ec2:CreateTags
    Resource:
    - arn:aws:ec2:*:*:instance/*
    - arn:aws:ec2:*:*:spot-instances-request/*
  - Effect: Allow
    Action:
    - ec2:TerminateInstances
    Resource: '*'
    Condition:
      StringLike:
        ec2:ResourceTag/aws:ec2:fleet-id: '*'
  - Effect: Allow
    Action:
    - route53:GetHostedZone
    - route53:ListHostedZonesByName
    - route53:ChangeResourceRecordSets
    - route53:CreateHealthCheck
    - route53:GetHealthCheck
    - route53:DeleteHealthCheck
    - route53:UpdateHealthCheck
    - servicediscovery:Get*
    - servicediscovery:List*
    - servicediscovery:RegisterInstance
    - servicediscovery:DeregisterInstance
    - servicediscovery:DiscoverInstances
    - servicediscovery:DiscoverInstancesRevision
    - ec2:DescribeInstances
    Resource:
    - '*'
  - Sid: AllowWorkloadIdentityAccess
    Effect: Allow
    Action:
    - bedrock-agentcore:GetWorkloadAccessToken
    - bedrock-agentcore:GetWorkloadAccessTokenForJWT
    - bedrock-agentcore:GetWorkloadAccessTokenForUserId
    Resource:
    - arn:aws:bedrock-agentcore:*:*:workload-identity-directory/default
    - arn:aws:bedrock-agentcore:*:*:workload-identity-directory/default/workload-identity/*
  - Effect: Allow
    Action:
    - s3:GetObject
    - s3:ListBucket
    - s3:PutObject
    Resource:
    - arn:aws:s3:::*Comprehend*
    - arn:aws:s3:::*comprehend*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 4
    resource_constraints: []
  user: dev-alice
  justification: debug staging incident PROD-1417
