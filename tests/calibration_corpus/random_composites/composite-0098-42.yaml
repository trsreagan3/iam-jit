name: composite-0098-42
source_policies:
- aws_managed/Route53RecoveryReadinessServiceRolePolicy.yaml
- aws_managed/AmazonRDSEnhancedMonitoringRole.yaml
- aws_managed/AmazonInspector2ManagedTelemetryPolicy.yaml
- aws_managed/AWSBatchServiceEventTargetRole.yaml
source_hash: c72b7b449bded37c
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - dynamodb:DescribeReservedCapacity
    - dynamodb:DescribeReservedCapacityOfferings
    Resource: arn:aws:dynamodb:*:*:*
  - Effect: Allow
    Action:
    - dynamodb:DescribeTable
    - dynamodb:DescribeTimeToLive
    Resource: arn:aws:dynamodb:*:*:table/*
  - Effect: Allow
    Action:
    - iam:CreateServiceLinkedRole
    Resource: arn:aws:iam::*:role/aws-service-role/servicequotas.amazonaws.com/AWSServiceRoleForServiceQuotas
    Condition:
      StringLike:
        iam:AWSServiceName: servicequotas.amazonaws.com
  - Effect: Allow
    Action:
    - lambda:GetFunctionConcurrency
    - lambda:GetFunctionConfiguration
    - lambda:GetProvisionedConcurrencyConfig
    - lambda:ListProvisionedConcurrencyConfigs
    - lambda:ListAliases
    - lambda:ListVersionsByFunction
    Resource: arn:aws:lambda:*:*:function:*
  - Effect: Allow
    Action:
    - rds:DescribeDBClusters
    Resource: arn:aws:rds:*:*:cluster:*
  - Effect: Allow
    Action:
    - rds:DescribeDBInstances
    Resource: arn:aws:rds:*:*:db:*
  - Effect: Allow
    Action:
    - route53:ListResourceRecordSets
    Resource: arn:aws:route53:::hostedzone/*
  - Effect: Allow
    Action:
    - route53:GetHealthCheck
    - route53:GetHealthCheckStatus
    Resource: arn:aws:route53:::healthcheck/*
  - Effect: Allow
    Action:
    - servicequotas:RequestServiceQuotaIncrease
    Resource: arn:aws:servicequotas:*:*:*
  - Effect: Allow
    Action:
    - sns:GetTopicAttributes
    - sns:ListSubscriptionsByTopic
    Resource: arn:aws:sns:*:*:*
  - Effect: Allow
    Action:
    - sqs:GetQueueAttributes
    - sqs:GetQueueUrl
    Resource: arn:aws:sqs:*:*:*
  - Effect: Allow
    Action:
    - apigateway:GET
    - application-autoscaling:DescribeScalableTargets
    - application-autoscaling:DescribeScalingPolicies
    - autoscaling:DescribeAccountLimits
    - autoscaling:DescribeAutoScalingGroups
    - autoscaling:DescribeAutoScalingInstances
    - autoscaling:DescribeLifecycleHooks
    - autoscaling:DescribeLoadBalancers
    - autoscaling:DescribeLoadBalancerTargetGroups
    - autoscaling:DescribeNotificationConfigurations
    - autoscaling:DescribePolicies
    - cloudwatch:GetMetricData
    - cloudwatch:DescribeAlarms
    - dynamodb:DescribeLimits
    - dynamodb:ListGlobalTables
    - dynamodb:ListTables
    - ec2:DescribeAvailabilityZones
    - ec2:DescribeCustomerGateways
    - ec2:DescribeInstances
    - ec2:DescribeSubnets
    - ec2:DescribeVolumes
    - ec2:DescribeVpcs
    - ec2:DescribeVpnConnections
    - ec2:DescribeVpnGateways
    - ec2:GetEbsEncryptionByDefault
    - ec2:GetEbsDefaultKmsKeyId
    - elasticloadbalancing:DescribeInstanceHealth
    - elasticloadbalancing:DescribeLoadBalancerAttributes
    - elasticloadbalancing:DescribeLoadBalancers
    - elasticloadbalancing:DescribeTargetGroups
    - elasticloadbalancing:DescribeTargetHealth
    - kafka:DescribeCluster
    - kafka:DescribeConfigurationRevision
    - lambda:ListEventSourceMappings
    - lambda:ListFunctions
    - rds:DescribeAccountAttributes
    - route53:GetHostedZone
    - servicequotas:ListAWSDefaultServiceQuotas
    - servicequotas:ListRequestedServiceQuotaChangeHistory
    - servicequotas:ListServiceQuotas
    - servicequotas:ListServices
    - sns:GetEndpointAttributes
    - sns:GetSubscriptionAttributes
    Resource: '*'
  - Sid: EnableCreationAndManagementOfRDSCloudwatchLogGroups
    Effect: Allow
    Action:
    - logs:CreateLogGroup
    - logs:PutRetentionPolicy
    Resource:
    - arn:aws:logs:*:*:log-group:RDS*
  - Sid: EnableCreationAndManagementOfRDSCloudwatchLogStreams
    Effect: Allow
    Action:
    - logs:CreateLogStream
    - logs:PutLogEvents
    - logs:DescribeLogStreams
    - logs:GetLogEvents
    Resource:
    - arn:aws:logs:*:*:log-group:RDS*:log-stream:*
  - Sid: PermissionsForInspector2Telemetry
    Effect: Allow
    Action:
    - inspector2-telemetry:StartSession
    - inspector2-telemetry:StopSession
    - inspector2-telemetry:SendTelemetry
    - inspector2-telemetry:NotifyHeartbeat
    Resource: '*'
  - Effect: Allow
    Action:
    - batch:SubmitJob
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
    resource_constraints: []
  user: auditor-erin
  justification: SOC 2 controls evidence collection
scores:
  det_score: 8
  det_factors:
  - '`iam:CreateServiceLinkedRole` on Resource: `*` touches sensitive service `iam`'
  - 'State-changing action `iam:CreateServiceLinkedRole` on Resource: `*` (IAM access level: Permissions management)'
  - 'Resource: `*` for lambda (broad cross-resource read/access)'
  - 'State-changing action `servicequotas:RequestServiceQuotaIncrease` on Resource: `*` (IAM access level: Write)'
  - 'Resource: `*` for servicequotas (broad cross-resource read/access)'
  - 'Resource: `*` for sns (broad cross-resource read/access)'
  - 'Resource: `*` for sqs (broad cross-resource read/access)'
  - 'Resource: `*` for apigateway, application-autoscaling, autoscaling, cloudwatch, dynamodb, ec2, elasticloadbalancing,
    kafka, lambda, rds, route53, servicequotas, sns (broad cross-resource read/access)'
  - 'State-changing action `logs:CreateLogGroup` on Resource: `*` (IAM access level: Write)'
  - 'State-changing action `logs:PutRetentionPolicy` on Resource: `*` (IAM access level: Write)'
  - 'Resource: `*` for logs (broad cross-resource read/access)'
  - 'State-changing action `logs:CreateLogStream` on Resource: `*` (IAM access level: Write)'
  - 'State-changing action `logs:PutLogEvents` on Resource: `*` (IAM access level: Write)'
  - 'State-changing action `inspector2-telemetry:StartSession` on Resource: `*` (IAM access level: Write)'
  - 'Destructive action `inspector2-telemetry:StopSession` on Resource: `*` (blast radius = every resource in this account)'
  - 'State-changing action `inspector2-telemetry:SendTelemetry` on Resource: `*` (IAM access level: Write)'
  - 'State-changing action `inspector2-telemetry:NotifyHeartbeat` on Resource: `*` (IAM access level: Write)'
  - 'Resource: `*` for inspector2-telemetry (broad cross-resource read/access)'
  - 'State-changing action `batch:SubmitJob` on Resource: `*` (IAM access level: Write)'
  - 'Resource: `*` for batch (broad cross-resource read/access)'
  - 'Code-execution primitive on broad resource: batch:SubmitJob. Deploys attacker-controlled code that runs under whatever
    role the matched resources use. Even without explicit PassRole, the existing roles of matched resources become the attack
    target.'
  - '`logs:GetLogEvents` on broad resource reads content that frequently contains secrets / sensitive data (boot logs, command
    output, log streams, message bodies).'
  opus_score: null
  opus_factors: null
  opus_reasoning: null
  gap_classification: pending
