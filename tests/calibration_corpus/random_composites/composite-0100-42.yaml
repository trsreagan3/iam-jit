policy:
  Version: '2012-10-17'
  Statement:
  - Sid: Stmt1480452973134
    Action:
    - ec2:CreateNetworkInterface
    - ec2:DeleteNetworkInterface
    - ec2:DescribeNetworkInterfaces
    - ec2:ModifyNetworkInterfaceAttribute
    - ec2:DescribeSecurityGroups
    - ec2:DescribeSubnets
    - ec2:DescribeVpcs
    - elasticloadbalancing:AddListenerCertificates
    - elasticloadbalancing:RemoveListenerCertificates
    Effect: Allow
    Resource: '*'
  - Sid: Stmt1480452973135
    Effect: Allow
    Action:
    - acm:DescribeCertificate
    Resource: '*'
  - Sid: Stmt1480452973136
    Effect: Allow
    Action: cloudwatch:PutMetricData
    Resource: '*'
    Condition:
      StringEquals:
        cloudwatch:namespace: AWS/ES
  - Sid: Stmt1480452973198
    Effect: Allow
    Action:
    - ec2:CreateVpcEndpoint
    - ec2:ModifyVpcEndpoint
    Resource:
    - arn:aws:ec2:*:*:vpc/*
    - arn:aws:ec2:*:*:security-group/*
    - arn:aws:ec2:*:*:subnet/*
    - arn:aws:ec2:*:*:route-table/*
  - Sid: Stmt1480452973199
    Effect: Allow
    Action: ec2:CreateVpcEndpoint
    Resource: arn:aws:ec2:*:*:vpc-endpoint/*
    Condition:
      StringEquals:
        aws:RequestTag/OpenSearchManaged: 'true'
  - Sid: Stmt1480452973200
    Effect: Allow
    Action:
    - ec2:ModifyVpcEndpoint
    - ec2:DeleteVpcEndpoints
    Resource: arn:aws:ec2:*:*:vpc-endpoint/*
    Condition:
      StringEquals:
        aws:ResourceTag/OpenSearchManaged: 'true'
  - Sid: Stmt1480452973201
    Effect: Allow
    Action:
    - ec2:DescribeVpcEndpoints
    Resource: '*'
  - Sid: Stmt1480452973149
    Effect: Allow
    Action:
    - ec2:AssignIpv6Addresses
    Resource: arn:aws:ec2:*:*:network-interface/*
  - Sid: Stmt1480452973150
    Effect: Allow
    Action:
    - ec2:UnAssignIpv6Addresses
    Resource: arn:aws:ec2:*:*:network-interface/*
  - Sid: Stmt1480452973202
    Effect: Allow
    Action:
    - ec2:CreateTags
    Resource: arn:aws:ec2:*:*:vpc-endpoint/*
    Condition:
      StringEquals:
        ec2:CreateAction: CreateVpcEndpoint
  - Action:
    - iam:CreateRole
    - iam:DeleteRole
    - iam:GetRole
    Effect: Allow
    Resource:
    - arn:aws:iam::*:role/stacksets-exec-*
  - Action:
    - iam:DetachRolePolicy
    - iam:AttachRolePolicy
    Effect: Allow
    Resource:
    - arn:aws:iam::*:role/stacksets-exec-*
    Condition:
      StringEquals:
        iam:PolicyARN: arn:aws:iam::aws:policy/AdministratorAccess
  - Sid: AwsOrganizationsAccess
    Effect: Allow
    Action:
    - organizations:DescribeOrganization
    - organizations:ListAccounts
    - organizations:ListAWSServiceAccessForOrganization
    - organizations:ListParents
    Resource: '*'
  - Sid: AmazonManagedServiceForPrometheusAccess
    Effect: Allow
    Action:
    - aps:ListWorkspaces
    - aps:QueryMetrics
    Resource: '*'
request:
