policy:
  Version: '2012-10-17'
  Statement:
  - Sid: AllowOperatorAgentSpaceActions
    Effect: Allow
    Action:
    - aidevops:GetAgentSpace
    - aidevops:GetAssociation
    - aidevops:ListAssociations
    - aidevops:CreateBacklogTask
    - aidevops:GetBacklogTask
    - aidevops:UpdateBacklogTask
    - aidevops:ListBacklogTasks
    - aidevops:ListJournalRecords
    - aidevops:DiscoverTopology
    - aidevops:ListGoals
    - aidevops:UpdateGoal
    - aidevops:ListRecommendations
    - aidevops:ListExecutions
    - aidevops:GetRecommendation
    - aidevops:UpdateRecommendation
    - aidevops:CreateKnowledgeItem
    - aidevops:ListKnowledgeItems
    - aidevops:ListKnowledgeItemVersions
    - aidevops:GetKnowledgeItem
    - aidevops:UpdateKnowledgeItem
    - aidevops:DeleteKnowledgeItem
    - aidevops:ListPendingMessages
    - aidevops:InitiateChatForCase
    - aidevops:EndChatForCase
    - aidevops:DescribeSupportLevel
    - aidevops:ListChats
    - aidevops:CreateChat
    - aidevops:SendMessage
    - aidevops:DescribeServices
    Resource: arn:aws:aidevops:*:*:agentspace/${aws:PrincipalTag/AgentSpaceId}
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: AllowOperatorAccountActions
    Effect: Allow
    Action:
    - aidevops:GetAccountUsage
    Resource: '*'
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: AllowSupportOperatorActions
    Effect: Allow
    Action:
    - support:DescribeCases
    - support:DescribeServices
    - support:InitiateChatForCase
    - support:DescribeSupportLevel
    Resource: '*'
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Effect: Allow
    Action:
    - rds:CrossRegionCommunication
    Resource: '*'
  - Effect: Allow
    Action:
    - ec2:AllocateAddress
    - ec2:AssociateAddress
    - ec2:AuthorizeSecurityGroupIngress
    - ec2:CreateCoipPoolPermission
    - ec2:CreateLocalGatewayRouteTablePermission
    - ec2:CreateNetworkInterface
    - ec2:CreateSecurityGroup
    - ec2:DeleteCoipPoolPermission
    - ec2:DeleteLocalGatewayRouteTablePermission
    - ec2:DeleteNetworkInterface
    - ec2:DeleteSecurityGroup
    - ec2:DescribeAddresses
    - ec2:DescribeAvailabilityZones
    - ec2:DescribeCoipPools
    - ec2:DescribeInternetGateways
    - ec2:DescribeLocalGatewayRouteTablePermissions
    - ec2:DescribeLocalGatewayRouteTables
    - ec2:DescribeLocalGatewayRouteTableVpcAssociations
    - ec2:DescribeLocalGateways
    - ec2:DescribeSecurityGroups
    - ec2:DescribeSubnets
    - ec2:DescribeVpcAttribute
    - ec2:DescribeVpcs
    - ec2:DisassociateAddress
    - ec2:ModifyNetworkInterfaceAttribute
    - ec2:ReleaseAddress
    - ec2:RevokeSecurityGroupIngress
    Resource: '*'
  - Effect: Allow
    Action:
    - logs:CreateLogGroup
    Resource:
    - arn:aws:logs:*:*:log-group:/aws/rds/*
  - Effect: Allow
    Action:
    - logs:CreateLogStream
    - logs:PutLogEvents
    - logs:DescribeLogStreams
    Resource:
    - arn:aws:logs:*:*:log-group:/aws/rds/*:log-stream:*
  - Effect: Allow
    Action:
    - cloudwatch:PutMetricData
    Resource: '*'
    Condition:
      StringEquals:
        cloudwatch:namespace:
        - AWS/DocDB-Preview
        - AWS/Neptune-Preview
        - AWS/RDS-Preview
        - AWS/Usage
  - Effect: Allow
    Action:
    - secretsmanager:GetRandomPassword
    Resource: '*'
  - Effect: Allow
    Action:
    - secretsmanager:DeleteSecret
    - secretsmanager:DescribeSecret
    - secretsmanager:PutSecretValue
    - secretsmanager:RotateSecret
    - secretsmanager:UpdateSecret
    - secretsmanager:UpdateSecretVersionStage
    - secretsmanager:ListSecretVersionIds
    Resource:
    - arn:aws:secretsmanager:*:*:secret:rds-preview-us-east-2!*
    Condition:
      StringLike:
        secretsmanager:ResourceTag/aws:secretsmanager:owningService: rds-preview-us-east-2
  - Effect: Allow
    Action: secretsmanager:TagResource
    Resource: arn:aws:secretsmanager:*:*:secret:rds-preview-us-east-2!*
    Condition:
      ForAllValues:StringEquals:
        aws:TagKeys:
        - aws:rds:primaryDBInstanceArn
        - aws:rds:primaryDBClusterArn
      StringLike:
        secretsmanager:ResourceTag/aws:secretsmanager:owningService: rds-preview-us-east-2
  - Sid: S3ExpressReadOnlySessionObjectAccess
    Effect: Allow
    Action: s3express:CreateSession
    Resource: '*'
    Condition:
      StringEquals:
        s3express:SessionMode: ReadOnly
  - Sid: S3ExpressReadOnlyControlPlaneAccess
    Effect: Allow
    Action:
    - s3express:GetBucketPolicy
    - s3express:GetEncryptionConfiguration
    - s3express:GetLifecycleConfiguration
    - s3express:GetAccessPoint
    - s3express:GetAccessPointPolicy
    - s3express:GetAccessPointScope
    - s3express:ListAllMyDirectoryBuckets
    - s3express:ListAccessPointsForDirectoryBuckets
    - s3express:ListTagsForResource
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
    resource_constraints: []
  user: dev-bob
  justification: 'reproduce customer ticket #4422 locally'
scores:
  det_score: 8
  det_factors:
  - "Resource `arn:aws:aidevops:*:*:agentspace/${aws:PrincipalTag/AgentSpaceId}` interpolates an attacker-controllable tag\
    \ (`${{aws:PrincipalTag/...}}` or `${{aws:RequestTag/...}}` or `${{aws:ResourceTag/...}}`). If the caller has `iam:TagRole`\
    \ / `iam:TagUser` on themselves (common in ABAC patterns), they can rewrite the tag to construct any resource ARN \u2014\
    \ the Resource scope is illusory."
