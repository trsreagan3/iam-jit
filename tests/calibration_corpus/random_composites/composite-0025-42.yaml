  - 'Destructive action `secretsmanager:DeleteSecret` on Resource: `*` (blast radius = every resource in this account)'
  - "`secretsmanager:UpdateSecret` is a high-impact mutation on broad resource \u2014 single API call can rewrite every matching\
    \ resource in the account."
  - '`ssm:GetServiceSetting` on Resource: `*` touches sensitive service `ssm`'
  - '`ssm:UpdateServiceSetting` on Resource: `*` touches sensitive service `ssm`'
