name: composite-0015-42
source_policies:
- aws_managed/AWSMigrationHubOrchestratorConsoleFullAccess.yaml
- aws_managed/QBusinessServiceRolePolicy.yaml
- aws_managed/AWSTransformApplicationDeploymentPolicy.yaml
source_hash: a333de58e596827e
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: MHO
    Effect: Allow
    Action:
    - migrationhub-orchestrator:*
    Resource: '*'
  - Sid: ListAllMyBuckets
    Effect: Allow
    Action:
    - s3:ListAllMyBuckets
    Resource: arn:aws:s3:::*
  - Sid: S3MHO
    Effect: Allow
    Action:
    - s3:GetObject
    - s3:GetBucketAcl
    - s3:GetBucketLocation
    - s3:ListBucket
    - s3:ListBucketVersions
    - s3:PutObject
    Resource:
    - arn:aws:s3:::migrationhub-orchestrator-*
    - arn:aws:s3:::migrationhub-orchestrator-*/*
  - Sid: ListSecrets
    Effect: Allow
    Action:
    - secretsmanager:ListSecrets
    Resource: '*'
  - Sid: Configuration
    Effect: Allow
    Action:
    - discovery:DescribeConfigurations
    - discovery:ListConfigurations
    - discovery:GetDiscoverySummary
    Resource: '*'
  - Sid: GetHomeRegion
    Effect: Allow
    Action:
    - mgh:GetHomeRegion
    Resource: '*'
  - Sid: EC2Describe
    Effect: Allow
    Action:
    - ec2:DescribeInstances
    - ec2:DescribeVpcs
    Resource: '*'
  - Sid: KMS
    Effect: Allow
    Action:
    - kms:ListKeys
    - kms:ListAliases
    Resource: '*'
  - Sid: IAMListProfileRole
    Effect: Allow
    Action:
    - iam:ListInstanceProfiles
    - iam:ListRoles
    Resource: '*'
  - Sid: ECS
    Effect: Allow
    Action:
    - ecs:ListClusters
    Resource: '*'
  - Sid: Account
    Effect: Allow
    Action:
    - account:ListRegions
    Resource: '*'
  - Sid: CreateServiceRole
    Effect: Allow
    Action:
    - iam:CreateServiceLinkedRole
    Resource: '*'
    Condition:
      StringEquals:
        iam:AWSServiceName: migrationhub-orchestrator.amazonaws.com
  - Sid: GetRole
    Effect: Allow
    Action:
    - iam:GetRole
    Resource: arn:aws:iam::*:role/aws-service-role/migrationhub-orchestrator.amazonaws.com/AWSServiceRoleForMigrationHubOrchestrator*
  - Sid: QBusinessPutMetricDataPermission
    Effect: Allow
    Action:
    - cloudwatch:PutMetricData
    Resource: '*'
    Condition:
      StringEquals:
        cloudwatch:namespace: AWS/QBusiness
  - Sid: QBusinessCreateLogGroupPermission
    Effect: Allow
    Action:
    - logs:CreateLogGroup
    Resource:
    - arn:aws:logs:*:*:log-group:/aws/qbusiness/*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: QBusinessDescribeLogGroupsPermission
    Effect: Allow
    Action:
    - logs:DescribeLogGroups
    Resource: '*'
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: QBusinessLogStreamPermission
    Effect: Allow
    Action:
    - logs:DescribeLogStreams
    - logs:CreateLogStream
    - logs:PutLogEvents
    Resource:
    - arn:aws:logs:*:*:log-group:/aws/qbusiness/*:log-stream:*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Effect: Allow
    Action:
    - cloudformation:DescribeStacks
    - cloudformation:DescribeStackEvents
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
    Resource:
    - arn:aws:cloudformation:*:*:stack/AWSTransform*
  - Effect: Allow
    Action:
    - cloudformation:CreateStack
    Condition:
      StringEquals:
        aws:RequestTag/CreatedBy: AWSTransform
        aws:ResourceAccount: ${aws:PrincipalAccount}
    Resource: arn:aws:cloudformation:*:*:stack/AWSTransform*
  - Effect: Allow
    Action:
    - cloudformation:DeleteStack
    Condition:
      StringEquals:
        aws:ResourceTag/CreatedBy: AWSTransform
        aws:ResourceAccount: ${aws:PrincipalAccount}
    Resource: arn:aws:cloudformation:*:*:stack/AWSTransform*
  - Effect: Allow
    Action:
    - cloudformation:UpdateStack
    Condition:
      StringEquals:
        aws:RequestTag/CreatedBy: AWSTransform
        aws:ResourceTag/CreatedBy: AWSTransform
        aws:ResourceAccount: ${aws:PrincipalAccount}
    Resource: arn:aws:cloudformation:*:*:stack/AWSTransform*
  - Effect: Allow
    Action:
    - ec2:DescribeVpcs
    - ec2:DescribeSubnets
    - ec2:DescribeSecurityGroups
    - ec2:DescribeImages
    - ec2:DescribeInstances
    - ec2:DescribeRouteTables
    - ec2:DescribeInternetGateways
    Resource: '*'
  - Effect: Deny
    Action:
    - ec2:CreateTags
    - ec2:DeleteTags
    Resource: arn:aws:ec2:*:*:instance/*
    Condition:
      ForAnyValue:StringNotEquals:
        aws:TagKeys:
        - Name
        - CreatedBy
        - ApplicationName
        - TransformationType
        - aws:cloudformation:stack-name
        - aws:cloudformation:logical-id
        - aws:cloudformation:stack-id
  - Effect: Allow
    Action:
    - ec2:CreateTags
    - ec2:DeleteTags
    Condition:
      ForAnyValue:StringEquals:
        aws:CalledVia: cloudformation.amazonaws.com
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
    Resource: arn:aws:ec2:*:*:instance/*
  - Effect: Allow
    Action:
    - ec2:RunInstances
    Condition:
      ForAnyValue:StringEquals:
        aws:CalledVia: cloudformation.amazonaws.com
    Resource:
    - arn:aws:ec2:*::image/*
  - Effect: Allow
    Action:
    - ec2:RunInstances
    Condition:
      ForAnyValue:StringEquals:
        aws:CalledVia: cloudformation.amazonaws.com
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
    Resource:
    - arn:aws:ec2:*:*:subnet/*
    - arn:aws:ec2:*:*:security-group/*
    - arn:aws:ec2:*:*:network-interface/*
    - arn:aws:ec2:*:*:instance/*
    - arn:aws:ec2:*:*:volume/*
  - Effect: Allow
    Action:
    - iam:GetRole
    - iam:GetInstanceProfile
    - iam:GetRolePolicy
    - iam:ListRolePolicies
    - iam:ListAttachedRolePolicies
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
    Resource:
    - arn:aws:iam::*:role/AWSTransform-Deploy-Builder-Instance-Role
    - arn:aws:iam::*:instance-profile/AWSTransform-Deploy-Builder-Instance-Role
    - arn:aws:iam::*:role/AWSTransform-Deploy-App-Instance-Role
    - arn:aws:iam::*:instance-profile/AWSTransform-Deploy-App-Instance-Role
  - Effect: Allow
    Action:
    - iam:PassRole
    Condition:
      StringEquals:
        iam:PassedToService: ec2.amazonaws.com
        aws:ResourceAccount: ${aws:PrincipalAccount}
    Resource:
    - arn:aws:iam::*:role/AWSTransform-Deploy-Builder-Instance-Role
    - arn:aws:iam::*:role/AWSTransform-Deploy-App-Instance-Role
  - Effect: Allow
    Action:
    - ssm:GetParameters
    Resource: arn:aws:ssm:*::parameter/aws/service/ami-amazon-linux-latest*
  - Effect: Allow
    Action:
    - ec2:TerminateInstances
    - ec2:StopInstances
    - ec2:StartInstances
    - ec2:ModifyInstanceAttribute
    Condition:
      StringEquals:
        aws:ResourceTag/CreatedBy: AWSTransform
        aws:ResourceAccount: ${aws:PrincipalAccount}
      ForAnyValue:StringEquals:
        aws:CalledVia: cloudformation.amazonaws.com
    Resource: arn:aws:ec2:*:*:instance/*
  - Effect: Allow
    Action:
    - ssm:SendCommand
    Resource:
    - arn:aws:ssm:*:*:document/AWS-RunRemoteScript
  - Effect: Allow
    Action:
    - ssm:SendCommand
    Resource: arn:aws:ec2:*:*:instance/*
    Condition:
      StringEquals:
        aws:ResourceTag/CreatedBy: AWSTransform
  - Effect: Allow
    Action:
    - ssm:DescribeInstanceInformation
    - ssm:GetCommandInvocation
    Resource:
    - arn:aws:ssm:*:*:*
    - arn:aws:ec2:*:*:instance/*
  - Effect: Allow
    Action:
    - s3:GetBucketLocation
    - s3:PutObject
    - s3:ListMultipartUploadParts
    - s3:ListBucketMultipartUploads
    - s3:AbortMultipartUpload
    - s3:PutBucketTagging
    Resource:
    - arn:aws:s3:::aws-transform-deployment-bucket-*
    - arn:aws:s3:::aws-transform-deployment-bucket-*/*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Effect: Allow
    Action:
    - s3:ListAllMyBuckets
    Resource: '*'
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Effect: Allow
    Action:
    - kms:Decrypt
    - kms:GenerateDataKey
    Resource: arn:aws:kms:*:*:key/*
    Condition:
      StringEquals:
        aws:ResourceTag/CreatedFor: AWSTransform
        aws:ResourceAccount: ${aws:PrincipalAccount}
      StringLike:
        kms:EncryptionContext:aws-transform: '*'
        kms:ViaService: s3.*.amazonaws.com
  - Effect: Allow
    Action:
    - kms:CreateGrant
    Resource: arn:aws:kms:*:*:key/*
    Condition:
      Bool:
        kms:GrantIsForAWSResource: 'true'
      StringLike:
        kms:ViaService:
        - ec2.*.amazonaws.com
        kms:EncryptionContext:aws:ebs:id: '*'
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
        kms:GrantConstraintType: EncryptionContextSubset
      ForAllValues:StringEquals:
        kms:GrantOperations:
        - Decrypt
  - Effect: Allow
    Action:
    - kms:GenerateDataKeyWithoutPlaintext
    Resource: arn:aws:kms:*:*:key/*
    Condition:
      StringLike:
        kms:ViaService: ec2.*.amazonaws.com
        kms:EncryptionContext:aws:ebs:id: '*'
  - Effect: Allow
    Action:
    - kms:DescribeKey
    Resource: arn:aws:kms:*:*:key/*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
    resource_constraints: []
  user: ci-bot
  justification: deploy via terraform-cloud agent
