name: composite-0070-42
source_policies:
- aws_managed/AmazonTranscribeReadOnlyAccess.yaml
- aws_managed/AmazonSSMManagedInstanceCore.yaml
- aws_managed/AWSFMAdminFullAccess.yaml
- aws_managed/AmazonESFullAccess.yaml
source_hash: 9841658c42b75f0f
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - transcribe:Get*
    - transcribe:List*
    Resource: '*'
  - Effect: Allow
    Action:
    - ssm:DescribeAssociation
    - ssm:GetDeployablePatchSnapshotForInstance
    - ssm:GetDocument
    - ssm:DescribeDocument
    - ssm:GetManifest
    - ssm:GetParameter
    - ssm:GetParameters
    - ssm:ListAssociations
    - ssm:ListInstanceAssociations
    - ssm:PutInventory
    - ssm:PutComplianceItems
    - ssm:PutConfigurePackageResult
    - ssm:UpdateAssociationStatus
    - ssm:UpdateInstanceAssociationStatus
    - ssm:UpdateInstanceInformation
    Resource: '*'
  - Effect: Allow
    Action:
    - ssmmessages:CreateControlChannel
    - ssmmessages:CreateDataChannel
    - ssmmessages:OpenControlChannel
    - ssmmessages:OpenDataChannel
    Resource: '*'
  - Effect: Allow
    Action:
    - ec2messages:AcknowledgeMessage
    - ec2messages:DeleteMessage
    - ec2messages:FailMessage
    - ec2messages:GetEndpoint
    - ec2messages:GetMessages
    - ec2messages:SendReply
    Resource: '*'
  - Effect: Allow
    Action:
    - fms:*
    - waf:*
    - waf-regional:*
    - elasticloadbalancing:SetWebACL
    - firehose:ListDeliveryStreams
    - organizations:DescribeAccount
    - organizations:DescribeOrganization
    - organizations:ListRoots
    - organizations:ListChildren
    - organizations:ListAccounts
    - organizations:ListAccountsForParent
    - organizations:ListOrganizationalUnitsForParent
    - shield:GetSubscriptionState
    - route53resolver:ListFirewallRuleGroups
    - route53resolver:GetFirewallRuleGroup
    - wafv2:ListRuleGroups
    - wafv2:ListAvailableManagedRuleGroups
    - wafv2:CheckCapacity
    - wafv2:PutLoggingConfiguration
    - wafv2:ListAvailableManagedRuleGroupVersions
    - network-firewall:DescribeRuleGroup
    - network-firewall:DescribeRuleGroupMetadata
    - network-firewall:ListRuleGroups
    - ec2:DescribeAvailabilityZones
    - ec2:DescribeRegions
    Resource: '*'
  - Effect: Allow
    Action:
    - s3:PutBucketPolicy
    - s3:GetBucketPolicy
    Resource:
    - arn:aws:s3:::aws-waf-logs-*
  - Effect: Allow
    Action: iam:CreateServiceLinkedRole
    Resource: '*'
    Condition:
      StringEquals:
        iam:AWSServiceName:
        - fms.amazonaws.com
  - Effect: Allow
    Action:
    - organizations:EnableAWSServiceAccess
    - organizations:ListDelegatedAdministrators
    - organizations:RegisterDelegatedAdministrator
    - organizations:DeregisterDelegatedAdministrator
    Resource: '*'
    Condition:
      StringEquals:
        organizations:ServicePrincipal:
        - fms.amazonaws.com
  - Action:
    - es:*
    Effect: Allow
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
    resource_constraints: []
  user: dev-alice
  justification: debug staging incident PROD-1417
