name: composite-0027-42
source_policies:
- aws_managed/AWSLambdaVPCAccessExecutionRole.yaml
- aws_managed/AWSForWordPressPluginPolicy.yaml
- aws_managed/AmazonCodeGuruProfilerReadOnlyAccess.yaml
source_hash: 28c2ebed31e433de
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: AWSLambdaVPCAccessExecutionPermissions
    Effect: Allow
    Action:
    - logs:CreateLogGroup
    - logs:CreateLogStream
    - logs:PutLogEvents
    - ec2:CreateNetworkInterface
    - ec2:DescribeNetworkInterfaces
    - ec2:DescribeSubnets
    - ec2:DeleteNetworkInterface
    - ec2:AssignPrivateIpAddresses
    - ec2:UnassignPrivateIpAddresses
    Resource: '*'
  - Sid: Permissions1
    Effect: Allow
    Action:
    - polly:SynthesizeSpeech
    - polly:DescribeVoices
    - translate:TranslateText
    Resource: '*'
  - Sid: Permissions2
    Effect: Allow
    Action:
    - s3:ListBucket
    - s3:GetBucketAcl
    - s3:GetBucketPolicy
    - s3:PutObject
    - s3:DeleteObject
    - s3:CreateBucket
    - s3:PutObjectAcl
    Resource:
    - arn:aws:s3:::audio_for_wordpress*
    - arn:aws:s3:::audio-for-wordpress*
  - Sid: Permissions3
    Effect: Allow
    Action:
    - acm:AddTagsToCertificate
    - acm:DescribeCertificate
    - acm:RequestCertificate
    - cloudformation:CreateStack
    - cloudfront:ListDistributions
    Resource: '*'
    Condition:
      StringEquals:
        aws:RequestedRegion: us-east-1
  - Sid: Permissions4
    Effect: Allow
    Action:
    - acm:DeleteCertificate
    - cloudformation:DeleteStack
    - cloudformation:DescribeStackEvents
    - cloudformation:DescribeStackResources
    - cloudformation:UpdateStack
    - cloudfront:CreateDistribution
    - cloudfront:CreateInvalidation
    - cloudfront:DeleteDistribution
    - cloudfront:GetDistribution
    - cloudfront:GetInvalidation
    - cloudfront:TagResource
    - cloudfront:UpdateDistribution
    Resource: '*'
    Condition:
      StringEquals:
        aws:ResourceTag/createdBy: AWSForWordPressPlugin
  - Action:
    - codeguru:Get*
    - codeguru-profiler:BatchGet*
    - codeguru-profiler:Describe*
    - codeguru-profiler:Get*
    - codeguru-profiler:List*
    - iam:ListRoles
    - iam:ListUsers
    Effect: Allow
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 4
    resource_constraints: []
  user: dev-alice
  justification: debug staging incident PROD-1417
