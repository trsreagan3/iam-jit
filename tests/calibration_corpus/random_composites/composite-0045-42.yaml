policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - codepipeline:ListPipelineExecutions
    - codepipeline:ListPipelines
    - codepipeline:GetPipeline
    - codepipeline:GetPipelineState
    - codepipeline:GetPipelineExecution
    - proton:GetAccountRoles
    - proton:GetAccountSettings
    - proton:GetEnvironment
    - proton:GetEnvironmentAccountConnection
    - proton:GetEnvironmentTemplate
    - proton:GetEnvironmentTemplateMajorVersion
    - proton:GetEnvironmentTemplateMinorVersion
    - proton:GetEnvironmentTemplateVersion
    - proton:GetRepository
    - proton:GetRepositorySyncStatus
    - proton:GetResourcesSummary
    - proton:GetService
    - proton:GetServiceInstance
    - proton:GetServiceTemplate
    - proton:GetServiceTemplateMajorVersion
    - proton:GetServiceTemplateMinorVersion
    - proton:GetServiceTemplateVersion
    - proton:GetTemplateSyncConfig
    - proton:GetTemplateSyncStatus
    - proton:ListEnvironmentAccountConnections
    - proton:ListEnvironmentOutputs
    - proton:ListEnvironmentProvisionedResources
    - proton:ListEnvironments
    - proton:ListEnvironmentTemplateMajorVersions
    - proton:ListEnvironmentTemplateMinorVersions
    - proton:ListEnvironmentTemplates
    - proton:ListEnvironmentTemplateVersions
    - proton:ListRepositories
    - proton:ListRepositorySyncDefinitions
    - proton:ListServiceInstanceOutputs
    - proton:ListServiceInstanceProvisionedResources
    - proton:ListServiceInstances
    - proton:ListServicePipelineOutputs
    - proton:ListServicePipelineProvisionedResources
    - proton:ListServices
    - proton:ListServiceTemplateMajorVersions
    - proton:ListServiceTemplateMinorVersions
    - proton:ListServiceTemplates
    - proton:ListServiceTemplateVersions
    - proton:ListTagsForResource
    Resource: '*'
  - Sid: AWSServicesAccess
    Action:
    - codebuild:StartBuild
    - codebuild:StopBuild
    - codebuild:StartBuildBatch
    - codebuild:StopBuildBatch
    - codebuild:RetryBuild
    - codebuild:RetryBuildBatch
    - codebuild:BatchGet*
    - codebuild:GetResourcePolicy
    - codebuild:DescribeTestCases
    - codebuild:DescribeCodeCoverages
    - codebuild:List*
    - codecommit:GetBranch
    - codecommit:GetCommit
    - codecommit:GetRepository
    - codecommit:ListBranches
    - cloudwatch:GetMetricStatistics
    - events:DescribeRule
    - events:ListTargetsByRule
    - events:ListRuleNamesByTarget
    - logs:GetLogEvents
    - s3:GetBucketLocation
    - s3:ListAllMyBuckets
    Effect: Allow
    Resource: '*'
  - Sid: SSMParameterWriteAccess
    Effect: Allow
    Action:
    - ssm:PutParameter
    Resource: arn:aws:ssm:*:*:parameter/CodeBuild/*
  - Sid: SSMStartSessionAccess
    Effect: Allow
    Action:
    - ssm:StartSession
    Resource: arn:aws:ecs:*:*:task/*/*
  - Sid: SSMOpenDataChannelAccess
    Effect: Allow
    Action:
    - ssmmessages:OpenDataChannel
    Resource: arn:aws:ssm:*:*:session/*
  - Sid: CodeStarConnectionsUserAccess
    Effect: Allow
    Action:
    - codestar-connections:ListConnections
    - codestar-connections:GetConnection
    Resource:
    - arn:aws:codestar-connections:*:*:connection/*
    - arn:aws:codeconnections:*:*:connection/*
  - Sid: CodeStarNotificationsReadWriteAccess
    Effect: Allow
    Action:
    - codestar-notifications:CreateNotificationRule
    - codestar-notifications:DescribeNotificationRule
    - codestar-notifications:UpdateNotificationRule
    - codestar-notifications:Subscribe
    - codestar-notifications:Unsubscribe
    Resource: '*'
    Condition:
      ArnLike:
        codestar-notifications:NotificationsForResource: arn:aws:codebuild:*:*:project/*
  - Sid: CodeStarNotificationsListAccess
    Effect: Allow
    Action:
    - codestar-notifications:ListNotificationRules
    - codestar-notifications:ListEventTypes
    - codestar-notifications:ListTargets
    - codestar-notifications:ListTagsforResource
    Resource: '*'
  - Sid: SNSTopicListAccess
    Effect: Allow
    Action:
    - sns:ListTopics
    - sns:GetTopicAttributes
    Resource: '*'
  - Sid: CodeStarNotificationsChatbotAccess
    Effect: Allow
    Action:
    - chatbot:DescribeSlackChannelConfigurations
    - chatbot:ListMicrosoftTeamsChannelConfigurations
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 4
    resource_constraints: []
  user: agent-claude
  justification: background reconciliation loop
