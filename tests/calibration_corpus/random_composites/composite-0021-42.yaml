name: composite-0021-42
source_policies:
- aws_managed/AWSDeviceFarmFullAccess.yaml
- aws_managed/AWSForWordPressPluginPolicy.yaml
- aws_managed/CloudWatchLambdaInsightsExecutionRolePolicy.yaml
source_hash: 21b827fff8ca4099
policy:
  Version: '2012-10-17'
  Statement:
  - Action:
    - devicefarm:*
    Effect: Allow
    Resource: '*'
  - Sid: Permissions1
    Effect: Allow
    Action:
    - polly:SynthesizeSpeech
    - polly:DescribeVoices
    - translate:TranslateText
    Resource: '*'
  - Sid: Permissions2
    Effect: Allow
    Action:
    - s3:ListBucket
    - s3:GetBucketAcl
    - s3:GetBucketPolicy
    - s3:PutObject
    - s3:DeleteObject
    - s3:CreateBucket
    - s3:PutObjectAcl
    Resource:
    - arn:aws:s3:::audio_for_wordpress*
    - arn:aws:s3:::audio-for-wordpress*
  - Sid: Permissions3
    Effect: Allow
    Action:
    - acm:AddTagsToCertificate
    - acm:DescribeCertificate
    - acm:RequestCertificate
    - cloudformation:CreateStack
    - cloudfront:ListDistributions
    Resource: '*'
    Condition:
      StringEquals:
        aws:RequestedRegion: us-east-1
  - Sid: Permissions4
    Effect: Allow
    Action:
    - acm:DeleteCertificate
    - cloudformation:DeleteStack
    - cloudformation:DescribeStackEvents
    - cloudformation:DescribeStackResources
    - cloudformation:UpdateStack
    - cloudfront:CreateDistribution
    - cloudfront:CreateInvalidation
    - cloudfront:DeleteDistribution
    - cloudfront:GetDistribution
    - cloudfront:GetInvalidation
    - cloudfront:TagResource
    - cloudfront:UpdateDistribution
    Resource: '*'
    Condition:
      StringEquals:
        aws:ResourceTag/createdBy: AWSForWordPressPlugin
  - Effect: Allow
    Action: logs:CreateLogGroup
    Resource: '*'
  - Effect: Allow
    Action:
    - logs:CreateLogStream
    - logs:PutLogEvents
    Resource: arn:aws:logs:*:*:log-group:/aws/lambda-insights:*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 8
    resource_constraints: []
  user: dev-alice
  justification: debug staging incident PROD-1417
