  - '`iam:ListRoles` on Resource: `*` touches sensitive service `iam`'
  - 'Resource: `*` for cloudtrail (broad cross-resource read/access)'
  - 'Resource: `*` for cloudwatch (broad cross-resource read/access)'
  - '`iam:GetInstanceProfile` on Resource: `*` touches sensitive service `iam`'
  - 'State-changing action `ec2:RebootInstances` on Resource: `*` (IAM access level: Write)'
  - 'State-changing action `ec2:StartInstances` on Resource: `*` (IAM access level: Write)'
  - 'Destructive action `ec2:StopInstances` on Resource: `*` (blast radius = every resource in this account)'
  - 'Destructive action `ec2:TerminateInstances` on Resource: `*` (blast radius = every resource in this account)'
  - 'Resource: `*` for ec2 (broad cross-resource read/access)'
  - "Action-name wildcard `waf:Get*` on broad resource \u2014 matches multiple waf APIs at once"
  - "Action-name wildcard `waf:List*` on broad resource \u2014 matches multiple waf APIs at once"
  - "Action-name wildcard `waf-regional:Get*` on broad resource \u2014 matches multiple waf-regional APIs at once"
  - "Action-name wildcard `waf-regional:List*` on broad resource \u2014 matches multiple waf-regional APIs at once"
  - '`organizations:DescribeOrganization` on Resource: `*` touches sensitive service `organizations`'
  opus_score: null
  opus_factors: null
  opus_reasoning: null
  gap_classification: pending
