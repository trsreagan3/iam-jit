name: composite-0069-42
source_policies:
- aws_managed/ROSASRESupportPolicy.yaml
- aws_managed/AWSFMMemberReadOnlyAccess.yaml
source_hash: ab720b897c0a2934
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: ReadPermissions
    Effect: Allow
    Action:
    - ec2:DescribeAvailabilityZones
    - ec2:DescribeRegions
    - sts:DecodeAuthorizationMessage
    Resource: '*'
  - Sid: Route53
    Effect: Allow
    Action:
    - route53:GetHostedZone
    - route53:GetHostedZoneCount
    - route53:ListHostedZones
    - route53:ListHostedZonesByName
    - route53:ListResourceRecordSets
    Resource:
    - '*'
  - Sid: DecribeIAMRoles
    Effect: Allow
    Action:
    - iam:GetRole
    - iam:ListRoles
    Resource:
    - '*'
  - Sid: EC2DescribeInstance
    Effect: Allow
    Action:
    - ec2:DescribeInstances
    - ec2:DescribeInstanceStatus
    - ec2:DescribeIamInstanceProfileAssociations
    - ec2:DescribeReservedInstances
    - ec2:DescribeScheduledInstances
    Resource:
    - '*'
  - Sid: VPCNetwork
    Effect: Allow
    Action:
    - ec2:DescribeDhcpOptions
    - ec2:DescribeNetworkInterfaces
    - ec2:DescribeSubnets
    - ec2:DescribeRouteTables
    Resource:
    - '*'
  - Sid: Cloudtrail
    Effect: Allow
    Action:
    - cloudtrail:DescribeTrails
    - cloudtrail:LookupEvents
    Resource:
    - '*'
  - Sid: Cloudwatch
    Effect: Allow
    Action:
    - cloudwatch:GetMetricData
    - cloudwatch:GetMetricStatistics
    - cloudwatch:ListMetrics
    Resource:
    - '*'
  - Sid: DescribeVolumes
    Effect: Allow
    Action:
    - ec2:DescribeVolumes
    - ec2:DescribeVolumesModifications
    - ec2:DescribeVolumeStatus
    Resource:
    - '*'
  - Sid: DescribeLoadBalancers
    Effect: Allow
    Action:
    - elasticloadbalancing:DescribeAccountLimits
    - elasticloadbalancing:DescribeInstanceHealth
    - elasticloadbalancing:DescribeListenerCertificates
    - elasticloadbalancing:DescribeListeners
    - elasticloadbalancing:DescribeLoadBalancerAttributes
    - elasticloadbalancing:DescribeLoadBalancerPolicies
    - elasticloadbalancing:DescribeLoadBalancerPolicyTypes
    - elasticloadbalancing:DescribeLoadBalancers
    - elasticloadbalancing:DescribeRules
    - elasticloadbalancing:DescribeSSLPolicies
    - elasticloadbalancing:DescribeTags
    - elasticloadbalancing:DescribeTargetGroupAttributes
    - elasticloadbalancing:DescribeTargetGroups
    - elasticloadbalancing:DescribeTargetHealth
    Resource:
    - '*'
  - Sid: DescribeVPC
    Effect: Allow
    Action:
    - ec2:DescribeVpcEndpointConnections
    - ec2:DescribeVpcEndpoints
    Resource:
    - '*'
  - Sid: DescribeSecurityGroups
    Effect: Allow
    Action:
    - ec2:DescribeSecurityGroupReferences
    - ec2:DescribeSecurityGroupRules
    - ec2:DescribeSecurityGroups
    - ec2:DescribeStaleSecurityGroups
    Resource: '*'
  - Sid: DescribeAddressesAttribute
    Effect: Allow
    Action: ec2:DescribeAddressesAttribute
    Resource: arn:aws:ec2:*:*:elastic-ip/*
  - Sid: DescribeInstance
    Effect: Allow
    Action:
    - iam:GetInstanceProfile
    Resource: arn:aws:iam::*:instance-profile/*
    Condition:
      StringEquals:
        aws:ResourceTag/red-hat-managed: 'true'
  - Sid: DescribeSpotFleetInstances
    Effect: Allow
    Action: ec2:DescribeSpotFleetInstances
    Resource: arn:aws:ec2:*:*:spot-fleet-request/*
    Condition:
      StringEquals:
        aws:ResourceTag/red-hat-managed: 'true'
  - Sid: DescribeVolumeAttribute
    Effect: Allow
    Action: ec2:DescribeVolumeAttribute
    Resource: arn:aws:ec2:*:*:volume/*
    Condition:
      StringEquals:
        aws:ResourceTag/red-hat-managed: 'true'
  - Sid: ManageInstanceLifecycle
    Effect: Allow
    Action:
    - ec2:RebootInstances
    - ec2:StartInstances
    - ec2:StopInstances
    - ec2:TerminateInstances
    Resource: arn:aws:ec2:*:*:instance/*
    Condition:
      StringEquals:
        aws:ResourceTag/red-hat-managed: 'true'
  - Action:
    - fms:GetAdminAccount
    - waf:Get*
    - waf:List*
    - waf-regional:Get*
    - waf-regional:List*
    - organizations:DescribeOrganization
    Effect: Allow
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
    resource_constraints: []
  user: auditor-erin
  justification: SOC 2 controls evidence collection
