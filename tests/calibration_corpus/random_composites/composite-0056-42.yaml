name: composite-0056-42
source_policies:
- aws_managed/AmazonRedshiftFullAccess.yaml
- aws_managed/AWSSystemsManagerJustInTimeAccessTokenPolicy.yaml
- aws_managed/AWSQuickSetupStartStopInstancesExecutionPolicy.yaml
source_hash: fb6425a0c9d657f8
policy:
  Version: '2012-10-17'
  Statement:
  - Action:
    - redshift:*
    - redshift-serverless:*
    - ec2:DescribeAccountAttributes
    - ec2:DescribeAddresses
    - ec2:DescribeAvailabilityZones
    - ec2:DescribeSecurityGroups
    - ec2:DescribeSubnets
    - ec2:DescribeVpcs
    - ec2:DescribeInternetGateways
    - sns:CreateTopic
    - sns:Get*
    - sns:List*
    - cloudwatch:Describe*
    - cloudwatch:Get*
    - cloudwatch:List*
    - cloudwatch:PutMetricAlarm
    - cloudwatch:EnableAlarmActions
    - cloudwatch:DisableAlarmActions
    - tag:GetResources
    - tag:UntagResources
    - tag:GetTagValues
    - tag:GetTagKeys
    - tag:TagResources
    Effect: Allow
    Resource: '*'
  - Effect: Allow
    Action: iam:CreateServiceLinkedRole
    Resource: arn:aws:iam::*:role/aws-service-role/redshift.amazonaws.com/AWSServiceRoleForRedshift
    Condition:
      StringLike:
        iam:AWSServiceName: redshift.amazonaws.com
  - Sid: DataAPIPermissions
    Action:
    - redshift-data:ExecuteStatement
    - redshift-data:CancelStatement
    - redshift-data:ListStatements
    - redshift-data:GetStatementResult
    - redshift-data:DescribeStatement
    - redshift-data:ListDatabases
    - redshift-data:ListSchemas
    - redshift-data:ListTables
    - redshift-data:DescribeTable
    Effect: Allow
    Resource: '*'
  - Sid: SecretsManagerListPermissions
    Action:
    - secretsmanager:ListSecrets
    Effect: Allow
    Resource: '*'
  - Sid: SecretsManagerCreateGetPermissions
    Action:
    - secretsmanager:CreateSecret
    - secretsmanager:GetSecretValue
    - secretsmanager:TagResource
    Effect: Allow
    Resource: '*'
    Condition:
      StringLike:
        secretsmanager:ResourceTag/RedshiftDataFullAccess: '*'
  - Sid: SsmStartSession
    Effect: Allow
    Action:
    - ssm:StartSession
    Resource:
    - arn:aws:ec2:*:*:instance/*
    - arn:aws:ssm:*:*:managed-instance/*
    - arn:aws:ssm:*:*:document/SSM-SessionManagerRunShell
  - Sid: TerminateAndResumeSessionAndOpenDataChannel
    Effect: Allow
    Action:
    - ssm:TerminateSession
    - ssm:ResumeSession
    - ssmmessages:OpenDataChannel
    Resource: arn:aws:ssm:*:*:session/*
  - Sid: GuiConnect
    Effect: Allow
    Action:
    - ssm-guiconnect:CancelConnection
    - ssm-guiconnect:GetConnection
    - ssm-guiconnect:StartConnection
    Resource: '*'
  - Sid: SessionManagerKmsPermission
    Effect: Allow
    Action:
    - kms:GenerateDataKey
    Resource: arn:aws:kms:*:*:key/*
    Condition:
      StringEquals:
        aws:ResourceTag/SystemsManagerJustInTimeNodeAccessManaged: 'true'
  - Sid: RdpKmsPermission
    Effect: Allow
    Action:
    - kms:CreateGrant
    Resource: arn:aws:kms:*:*:key/*
    Condition:
      StringEquals:
        aws:ResourceTag/SystemsManagerJustInTimeNodeAccessManaged: 'true'
      StringLike:
        kms:ViaService: ssm-guiconnect.*.amazonaws.com
      Bool:
        aws:ViaAWSService: 'true'
  - Sid: RdpStartSession
    Effect: Allow
    Action:
    - ssm:StartSession
    Resource:
    - arn:aws:ec2:*:*:instance/*
    - arn:aws:ssm:*:*:managed-instance/*
    - arn:aws:ssm:*:*:document/AWS-StartPortForwardingSession
    Condition:
      StringEquals:
        aws:CalledViaFirst: ssm-guiconnect.amazonaws.com
  - Sid: SsmRdpSsoSetup
    Effect: Allow
    Action:
    - sso:ListDirectoryAssociations*
    - identitystore:DescribeUser
    - ssm:GetCommandInvocation
    Resource: '*'
    Condition:
      StringEquals:
        aws:CalledViaFirst: ssm-guiconnect.amazonaws.com
  - Sid: SsmRdpSsoSetupSendCommand
    Effect: Allow
    Action:
    - ssm:SendCommand
    Resource:
    - arn:aws:ec2:*:*:instance/*
    - arn:aws:ssm:*:*:managed-instance/*
    - arn:aws:ssm:*:*:document/AWSSSO-CreateSSOUser
    Condition:
      StringEquals:
        aws:CalledViaFirst: ssm-guiconnect.amazonaws.com
  - Effect: Allow
    Action:
    - ec2:DescribeInstances
    - ec2:DescribeInstanceStatus
    - ec2:DescribeRegions
    - ec2:DescribeTags
    Resource: '*'
  - Effect: Allow
    Action:
    - ec2:StartInstances
    - ec2:StopInstances
    Resource: arn:aws:ec2:*:*:instance/*
  - Effect: Allow
    Action:
    - ssm:GetCalendarState
    Resource: arn:aws:ssm:*:*:document/AWSQuickSetup-ChangeCalendar*
  - Effect: Allow
    Action:
    - ssm:StartAssociationsOnce
    - ssm:StartAutomationExecution
    Resource:
    - arn:aws:ssm:*:*:association/*
    - arn:aws:ssm:*:*:document/AWSQuickSetupType-Scheduler-ApplyInstanceState
    - arn:aws:ssm:*:*:automation-execution/*
    - arn:aws:ssm:*:*:automation-definition/AWSQuickSetupType-Scheduler-ApplyInstanceState*
  - Effect: Allow
    Action: iam:PassRole
    Resource:
    - arn:aws:iam::*:role/AWS-QuickSetup*
    Condition:
      StringEquals:
        iam:PassedToService:
        - ssm.amazonaws.com
      ArnLike:
        iam:AssociatedResourceARN:
        - arn:aws:ssm:*::document/AWSQuickSetupType-Scheduler-ApplyInstanceState
        - arn:aws:ssm:*:*:association/*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 8
    resource_constraints: []
  user: dev-bob
  justification: 'reproduce customer ticket #4422 locally'
