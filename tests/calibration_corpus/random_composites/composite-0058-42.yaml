name: composite-0058-42
source_policies:
- aws_managed/AmazonGuardDutyReadOnlyAccess.yaml
- aws_managed/AWSSystemsManagerJustInTimeAccessTokenPolicy.yaml
- aws_managed/AWSCloudTrail_FullAccess.yaml
source_hash: 10b1dc65e1686bd5
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - guardduty:Describe*
    - guardduty:Get*
    - guardduty:List*
    Resource: '*'
  - Effect: Allow
    Action:
    - organizations:ListDelegatedAdministrators
    - organizations:ListAWSServiceAccessForOrganization
    - organizations:DescribeOrganizationalUnit
    - organizations:DescribeAccount
    - organizations:DescribeOrganization
    - organizations:ListAccounts
    Resource: '*'
  - Sid: SsmStartSession
    Effect: Allow
    Action:
    - ssm:StartSession
    Resource:
    - arn:aws:ec2:*:*:instance/*
    - arn:aws:ssm:*:*:managed-instance/*
    - arn:aws:ssm:*:*:document/SSM-SessionManagerRunShell
  - Sid: TerminateAndResumeSessionAndOpenDataChannel
    Effect: Allow
    Action:
    - ssm:TerminateSession
    - ssm:ResumeSession
    - ssmmessages:OpenDataChannel
    Resource: arn:aws:ssm:*:*:session/*
  - Sid: GuiConnect
    Effect: Allow
    Action:
    - ssm-guiconnect:CancelConnection
    - ssm-guiconnect:GetConnection
    - ssm-guiconnect:StartConnection
    Resource: '*'
  - Sid: SessionManagerKmsPermission
    Effect: Allow
    Action:
    - kms:GenerateDataKey
    Resource: arn:aws:kms:*:*:key/*
    Condition:
      StringEquals:
        aws:ResourceTag/SystemsManagerJustInTimeNodeAccessManaged: 'true'
  - Sid: RdpKmsPermission
    Effect: Allow
    Action:
    - kms:CreateGrant
    Resource: arn:aws:kms:*:*:key/*
    Condition:
      StringEquals:
        aws:ResourceTag/SystemsManagerJustInTimeNodeAccessManaged: 'true'
      StringLike:
        kms:ViaService: ssm-guiconnect.*.amazonaws.com
      Bool:
        aws:ViaAWSService: 'true'
  - Sid: RdpStartSession
    Effect: Allow
    Action:
    - ssm:StartSession
    Resource:
    - arn:aws:ec2:*:*:instance/*
    - arn:aws:ssm:*:*:managed-instance/*
    - arn:aws:ssm:*:*:document/AWS-StartPortForwardingSession
    Condition:
      StringEquals:
        aws:CalledViaFirst: ssm-guiconnect.amazonaws.com
  - Sid: SsmRdpSsoSetup
    Effect: Allow
    Action:
    - sso:ListDirectoryAssociations*
    - identitystore:DescribeUser
    - ssm:GetCommandInvocation
    Resource: '*'
    Condition:
      StringEquals:
        aws:CalledViaFirst: ssm-guiconnect.amazonaws.com
  - Sid: SsmRdpSsoSetupSendCommand
    Effect: Allow
    Action:
    - ssm:SendCommand
    Resource:
    - arn:aws:ec2:*:*:instance/*
    - arn:aws:ssm:*:*:managed-instance/*
    - arn:aws:ssm:*:*:document/AWSSSO-CreateSSOUser
    Condition:
      StringEquals:
        aws:CalledViaFirst: ssm-guiconnect.amazonaws.com
  - Effect: Allow
    Action:
    - sns:AddPermission
    - sns:CreateTopic
    - sns:SetTopicAttributes
    - sns:GetTopicAttributes
    Resource:
    - arn:aws:sns:*:*:aws-cloudtrail-logs*
  - Effect: Allow
    Action:
    - sns:ListTopics
    Resource: '*'
  - Effect: Allow
    Action:
    - s3:CreateBucket
    - s3:PutBucketPolicy
    - s3:PutBucketPublicAccessBlock
    Resource:
    - arn:aws:s3:::aws-cloudtrail-logs*
  - Effect: Allow
    Action:
    - s3:ListAllMyBuckets
    - s3:GetBucketLocation
    - s3:GetBucketPolicy
    Resource: '*'
  - Effect: Allow
    Action: cloudtrail:*
    Resource: '*'
  - Effect: Allow
    Action:
    - logs:CreateLogGroup
    Resource:
    - arn:aws:logs:*:*:log-group:aws-cloudtrail-logs*
  - Effect: Allow
    Action:
    - iam:ListRoles
    - iam:GetRolePolicy
    - iam:GetUser
    Resource: '*'
  - Effect: Allow
    Action:
    - iam:PassRole
    Resource: '*'
    Condition:
      StringEquals:
        iam:PassedToService: cloudtrail.amazonaws.com
  - Effect: Allow
    Action:
    - kms:CreateKey
    - kms:CreateAlias
    - kms:ListKeys
    - kms:ListAliases
    Resource: '*'
  - Effect: Allow
    Action:
    - lambda:ListFunctions
    Resource: '*'
  - Effect: Allow
    Action:
    - dynamodb:ListGlobalTables
    - dynamodb:ListTables
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 2
    resource_constraints: []
  user: ci-bot
  justification: deploy via terraform-cloud agent
