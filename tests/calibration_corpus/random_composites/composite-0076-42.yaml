name: composite-0076-42
source_policies:
- aws_managed/AWSMigrationHubRefactorSpacesFullAccess.yaml
- aws_managed/AWSLambda_FullAccess.yaml
- aws_managed/AmazonHoneycodeServiceRolePolicy.yaml
- aws_managed/AmazonAppFlowFullAccess.yaml
source_hash: 624bad834280f939
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: RefactorSpaces
    Effect: Allow
    Action:
    - refactor-spaces:*
    Resource: '*'
  - Sid: EC2Describe
    Effect: Allow
    Action:
    - ec2:DescribeNetworkInterfaces
    - ec2:DescribeRouteTables
    - ec2:DescribeSecurityGroups
    - ec2:DescribeSubnets
    - ec2:DescribeVpcEndpointServiceConfigurations
    - ec2:DescribeVpcs
    - ec2:DescribeTransitGatewayVpcAttachments
    - ec2:DescribeTransitGateways
    - ec2:DescribeTags
    - ec2:DescribeAccountAttributes
    - ec2:DescribeInternetGateways
    Resource: '*'
  - Sid: RequestTagTransitGatewayCreate
    Effect: Allow
    Action:
    - ec2:CreateTransitGateway
    - ec2:CreateSecurityGroup
    - ec2:CreateTransitGatewayVpcAttachment
    Resource: '*'
    Condition:
      'Null':
        aws:RequestTag/refactor-spaces:environment-id: 'false'
  - Sid: ResourceTagTransitGatewayCreate
    Effect: Allow
    Action:
    - ec2:CreateTransitGateway
    - ec2:CreateSecurityGroup
    - ec2:CreateTransitGatewayVpcAttachment
    Resource: '*'
    Condition:
      'Null':
        aws:ResourceTag/refactor-spaces:environment-id: 'false'
  - Sid: VpcEndpointServiceConfigurationCreate
    Effect: Allow
    Action:
    - ec2:CreateVpcEndpointServiceConfiguration
    Resource: '*'
  - Sid: EC2NetworkingModify
    Effect: Allow
    Action:
    - ec2:DeleteTransitGateway
    - ec2:AuthorizeSecurityGroupIngress
    - ec2:RevokeSecurityGroupIngress
    - ec2:DeleteSecurityGroup
    - ec2:DeleteTransitGatewayVpcAttachment
    - ec2:CreateRoute
    - ec2:DeleteRoute
    - ec2:DeleteTags
    Resource: '*'
    Condition:
      'Null':
        aws:ResourceTag/refactor-spaces:environment-id: 'false'
  - Sid: VpcEndpointServiceConfigurationDelete
    Effect: Allow
    Action: ec2:DeleteVpcEndpointServiceConfigurations
    Resource: '*'
    Condition:
      'Null':
        aws:ResourceTag/refactor-spaces:application-id: 'false'
  - Sid: ELBLoadBalancerCreate
    Effect: Allow
    Action:
    - elasticloadbalancing:AddTags
    - elasticloadbalancing:CreateLoadBalancer
    Resource: arn:*:elasticloadbalancing:*:*:loadbalancer/net/refactor-spaces-nlb-*
    Condition:
      'Null':
        aws:RequestTag/refactor-spaces:application-id: 'false'
  - Sid: ELBDescribe
    Effect: Allow
    Action:
    - elasticloadbalancing:DescribeLoadBalancers
    - elasticloadbalancing:DescribeTags
    - elasticloadbalancing:DescribeTargetHealth
    - elasticloadbalancing:DescribeTargetGroups
    - elasticloadbalancing:DescribeListeners
    Resource: '*'
  - Sid: ELBModify
    Effect: Allow
    Action:
    - elasticloadbalancing:RegisterTargets
    - elasticloadbalancing:CreateLoadBalancerListeners
    - elasticloadbalancing:CreateListener
    - elasticloadbalancing:DeleteListener
    - elasticloadbalancing:DeleteTargetGroup
    Resource: '*'
    Condition:
      StringLike:
        aws:ResourceTag/refactor-spaces:route-id:
        - '*'
  - Sid: ELBLoadBalancerDelete
    Effect: Allow
    Action: elasticloadbalancing:DeleteLoadBalancer
    Resource: arn:*:elasticloadbalancing:*:*:loadbalancer/net/refactor-spaces-nlb-*
  - Sid: ELBListenerCreate
    Effect: Allow
    Action:
    - elasticloadbalancing:AddTags
    - elasticloadbalancing:CreateListener
    Resource:
    - arn:*:elasticloadbalancing:*:*:loadbalancer/net/refactor-spaces-nlb-*
    - arn:*:elasticloadbalancing:*:*:listener/net/refactor-spaces-nlb-*
    Condition:
      'Null':
        aws:RequestTag/refactor-spaces:route-id: 'false'
  - Sid: ELBListenerDelete
    Effect: Allow
    Action: elasticloadbalancing:DeleteListener
    Resource: arn:*:elasticloadbalancing:*:*:listener/net/refactor-spaces-nlb-*
  - Sid: ELBTargetGroupModify
    Effect: Allow
    Action:
    - elasticloadbalancing:DeleteTargetGroup
    - elasticloadbalancing:RegisterTargets
    Resource: arn:*:elasticloadbalancing:*:*:targetgroup/refactor-spaces-tg-*
  - Sid: ELBTargetGroupCreate
    Effect: Allow
    Action:
    - elasticloadbalancing:AddTags
    - elasticloadbalancing:CreateTargetGroup
    Resource: arn:*:elasticloadbalancing:*:*:targetgroup/refactor-spaces-tg-*
    Condition:
      'Null':
        aws:RequestTag/refactor-spaces:route-id: 'false'
  - Sid: APIGatewayModify
    Effect: Allow
    Action:
    - apigateway:GET
    - apigateway:DELETE
    - apigateway:PATCH
    - apigateway:POST
    - apigateway:PUT
    - apigateway:UpdateRestApiPolicy
    Resource:
    - arn:aws:apigateway:*::/restapis
    - arn:aws:apigateway:*::/restapis/*
    - arn:aws:apigateway:*::/vpclinks
    - arn:aws:apigateway:*::/vpclinks/*
    - arn:aws:apigateway:*::/tags
    - arn:aws:apigateway:*::/tags/*
    Condition:
      'Null':
        aws:ResourceTag/refactor-spaces:application-id: 'false'
  - Sid: APIGatewayVpcLinksGet
    Effect: Allow
    Action: apigateway:GET
    Resource:
    - arn:aws:apigateway:*::/vpclinks
    - arn:aws:apigateway:*::/vpclinks/*
  - Sid: OrganizationDescribe
    Effect: Allow
    Action:
    - organizations:DescribeOrganization
    Resource: '*'
  - Sid: CloudformationStackCreate
    Effect: Allow
    Action:
    - cloudformation:CreateStack
    Resource: '*'
  - Sid: CloudformationStackTag
    Effect: Allow
    Action:
    - cloudformation:TagResource
    Resource: arn:aws:cloudformation:*:*:stack/*
  - Sid: CreateRefactorSpacesSLR
    Effect: Allow
    Action: iam:CreateServiceLinkedRole
    Resource: '*'
    Condition:
      StringEquals:
        iam:AWSServiceName: refactor-spaces.amazonaws.com
  - Sid: CreateELBSLR
    Effect: Allow
    Action: iam:CreateServiceLinkedRole
    Resource: '*'
    Condition:
      StringEquals:
        iam:AWSServiceName: elasticloadbalancing.amazonaws.com
  - Effect: Allow
    Action:
    - cloudformation:DescribeStacks
    - cloudformation:ListStackResources
    - cloudwatch:ListMetrics
    - cloudwatch:GetMetricData
    - ec2:DescribeSecurityGroups
    - ec2:DescribeSubnets
    - ec2:DescribeVpcs
    - kms:DescribeKey
    - kms:ListAliases
    - iam:GetPolicy
    - iam:GetPolicyVersion
    - iam:GetRole
    - iam:GetRolePolicy
    - iam:ListAttachedRolePolicies
    - iam:ListRolePolicies
    - iam:ListRoles
    - lambda:*
    - logs:DescribeLogGroups
    - states:DescribeStateMachine
    - states:ListStateMachines
    - tag:GetResources
    - xray:GetTraceSummaries
    - xray:BatchGetTraces
    Resource: '*'
  - Effect: Allow
    Action: iam:PassRole
    Resource: '*'
    Condition:
      StringEquals:
        iam:PassedToService: lambda.amazonaws.com
  - Effect: Allow
    Action:
    - logs:DescribeLogStreams
    - logs:GetLogEvents
    - logs:FilterLogEvents
    - logs:StartLiveTail
    - logs:StopLiveTail
    Resource: arn:aws:logs:*:*:log-group:/aws/lambda/*
  - Effect: Allow
    Action: iam:CreateServiceLinkedRole
    Resource: arn:aws:iam::*:role/aws-service-role/lambda.amazonaws.com/AWSServiceRoleForLambda
    Condition:
      StringEquals:
        iam:AWSServiceName: lambda.amazonaws.com
  - Action:
    - sso:GetManagedApplicationInstance
    Resource: '*'
    Effect: Allow
  - Effect: Allow
    Action: appflow:*
    Resource: '*'
  - Sid: ListRolesForRedshift
    Effect: Allow
    Action: iam:ListRoles
    Resource: '*'
  - Sid: KMSListAccess
    Effect: Allow
    Action:
    - kms:ListKeys
    - kms:DescribeKey
    - kms:ListAliases
    Resource: '*'
  - Sid: KMSGrantAccess
    Effect: Allow
    Action:
    - kms:CreateGrant
    Resource: '*'
    Condition:
      StringLike:
        kms:ViaService: appflow.*.amazonaws.com
      Bool:
        kms:GrantIsForAWSResource: 'true'
  - Sid: KMSListGrantAccess
    Effect: Allow
    Action:
    - kms:ListGrants
    Resource: '*'
    Condition:
      StringLike:
        kms:ViaService: appflow.*.amazonaws.com
  - Sid: S3ReadAccess
    Effect: Allow
    Action:
    - s3:ListAllMyBuckets
    - s3:ListBucket
    - s3:GetBucketLocation
    - s3:GetBucketPolicy
    Resource: '*'
  - Sid: S3PutBucketPolicyAccess
    Effect: Allow
    Action:
    - s3:PutBucketPolicy
    Resource: arn:aws:s3:::appflow-*
  - Sid: SecretsManagerCreateSecretAccess
    Effect: Allow
    Action: secretsmanager:CreateSecret
    Resource: '*'
    Condition:
      StringLike:
        secretsmanager:Name: appflow!*
      ForAnyValue:StringEquals:
        aws:CalledVia:
        - appflow.amazonaws.com
  - Sid: SecretsManagerPutResourcePolicyAccess
    Effect: Allow
    Action:
    - secretsmanager:PutResourcePolicy
    Resource: '*'
    Condition:
      ForAnyValue:StringEquals:
        aws:CalledVia:
        - appflow.amazonaws.com
      StringEqualsIgnoreCase:
        secretsmanager:ResourceTag/aws:secretsmanager:owningService: appflow
  - Sid: LambdaListFunctions
    Effect: Allow
    Action:
    - lambda:ListFunctions
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
    resource_constraints: []
  user: sre-carol
  justification: scale-out emergency for us-east-1 outage
