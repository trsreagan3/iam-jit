  - '`bedrock:InvokeModel` on Resource: `*` touches sensitive service `bedrock`'
  - '`bedrock:InvokeModelWithResponseStream` on Resource: `*` touches sensitive service `bedrock`'
  - 'State-changing action `aoss:APIAccessAll` on Resource: `*` (IAM access level: Write)'
  - 'Resource: `*` for aoss (broad cross-resource read/access)'
  - "Resource `arn:aws:s3:::${aws:PrincipalTag/DomainBucketName}` interpolates an attacker-controllable tag (`${{aws:PrincipalTag/...}}`\
    \ or `${{aws:RequestTag/...}}` or `${{aws:ResourceTag/...}}`). If the caller has `iam:TagRole` / `iam:TagUser` on themselves\
    \ (common in ABAC patterns), they can rewrite the tag to construct any resource ARN \u2014 the Resource scope is illusory."
