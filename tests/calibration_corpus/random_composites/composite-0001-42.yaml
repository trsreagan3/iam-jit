name: composite-0001-42
source_policies:
- aws_managed/AWSApplicationAutoscalingLambdaConcurrencyPolicy.yaml
- aws_managed/AWSRoboMakerServicePolicy.yaml
- aws_managed/AWSPrivateCAPrivilegedUser.yaml
source_hash: 5af88ff9214c2891
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - lambda:PutProvisionedConcurrencyConfig
    - lambda:GetProvisionedConcurrencyConfig
    - lambda:DeleteProvisionedConcurrencyConfig
    - cloudwatch:PutMetricAlarm
    - cloudwatch:DescribeAlarms
    - cloudwatch:DeleteAlarms
    Resource:
    - '*'
  - Action:
    - ec2:CreateNetworkInterfacePermission
    - ec2:DescribeNetworkInterfaces
    - ec2:DeleteNetworkInterface
    - ec2:DescribeSubnets
    - ec2:DescribeVpcs
    - ec2:DescribeSecurityGroups
    - greengrass:CreateDeployment
    - greengrass:CreateGroupVersion
    - greengrass:CreateFunctionDefinition
    - greengrass:CreateFunctionDefinitionVersion
    - greengrass:GetDeploymentStatus
    - greengrass:GetGroup
    - greengrass:GetGroupVersion
    - greengrass:GetCoreDefinitionVersion
    - greengrass:GetFunctionDefinitionVersion
    - greengrass:GetAssociatedRole
    - lambda:CreateFunction
    - robomaker:CreateSimulationJob
    - robomaker:CancelSimulationJob
    Effect: Allow
    Resource: '*'
  - Action:
    - robomaker:TagResource
    Effect: Allow
    Resource: arn:aws:robomaker:*:*:simulation-job/*
  - Action:
    - lambda:UpdateFunctionCode
    - lambda:GetFunction
    - lambda:UpdateFunctionConfiguration
    - lambda:DeleteFunction
    - lambda:ListVersionsByFunction
    - lambda:GetAlias
    - lambda:UpdateAlias
    - lambda:CreateAlias
    - lambda:DeleteAlias
    Effect: Allow
    Resource: arn:aws:lambda:*:*:function:aws-robomaker-*
  - Effect: Allow
    Action: iam:PassRole
    Resource: '*'
    Condition:
      StringEquals:
        iam:PassedToService:
        - lambda.amazonaws.com
        - robomaker.amazonaws.com
  - Effect: Allow
    Action:
    - acm-pca:IssueCertificate
    Resource: arn:aws:acm-pca:*:*:certificate-authority/*
    Condition:
      ArnLike:
        acm-pca:TemplateArn:
        - arn:aws:acm-pca:*:*:template/*CACertificate*/V*
  - Effect: Deny
    Action:
    - acm-pca:IssueCertificate
    Resource: arn:aws:acm-pca:*:*:certificate-authority/*
    Condition:
      ArnNotLike:
        acm-pca:TemplateArn:
        - arn:aws:acm-pca:*:*:template/*CACertificate*/V*
  - Effect: Allow
    Action:
    - acm-pca:RevokeCertificate
    - acm-pca:GetCertificate
    - acm-pca:ListPermissions
    Resource: arn:aws:acm-pca:*:*:certificate-authority/*
  - Effect: Allow
    Action:
    - acm-pca:ListCertificateAuthorities
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
    resource_constraints: []
  user: dev-bob
  justification: 'reproduce customer ticket #4422 locally'
