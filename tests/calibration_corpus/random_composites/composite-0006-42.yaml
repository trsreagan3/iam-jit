name: composite-0006-42
source_policies:
- aws_managed/AWSXrayWriteOnlyAccess.yaml
- aws_managed/AWSS3OnOutpostsServiceRolePolicy.yaml
- aws_managed/AWSGlueDataBrewServiceRole.yaml
source_hash: 4470ef790cfaa8db
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - xray:PutTraceSegments
    - xray:PutTelemetryRecords
    - xray:GetSamplingRules
    - xray:GetSamplingTargets
    - xray:GetSamplingStatisticSummaries
    Resource:
    - '*'
  - Effect: Allow
    Action:
    - ec2:DescribeSubnets
    - ec2:DescribeSecurityGroups
    - ec2:DescribeNetworkInterfaces
    - ec2:DescribeVpcs
    - ec2:DescribeCoipPools
    - ec2:GetCoipPoolUsage
    - ec2:DescribeAddresses
    - ec2:DescribeLocalGatewayRouteTableVpcAssociations
    Resource: '*'
    Sid: DescribeVpcResources
  - Effect: Allow
    Action:
    - ec2:CreateNetworkInterface
    Resource:
    - arn:aws:ec2:*:*:subnet/*
    - arn:aws:ec2:*:*:security-group/*
    Sid: CreateNetworkInterface
  - Effect: Allow
    Action:
    - ec2:CreateNetworkInterface
    Resource:
    - arn:aws:ec2:*:*:network-interface/*
    Condition:
      StringEquals:
        aws:RequestTag/CreatedBy: S3 On Outposts
    Sid: CreateTagsForCreateNetworkInterface
  - Effect: Allow
    Action:
    - ec2:AllocateAddress
    Resource:
    - arn:aws:ec2:*:*:ipv4pool-ec2/*
    Sid: AllocateIpAddress
  - Effect: Allow
    Action:
    - ec2:AllocateAddress
    Resource:
    - arn:aws:ec2:*:*:elastic-ip/*
    Condition:
      StringEquals:
        aws:RequestTag/CreatedBy: S3 On Outposts
    Sid: CreateTagsForAllocateIpAddress
  - Effect: Allow
    Action:
    - ec2:ModifyNetworkInterfaceAttribute
    - ec2:CreateNetworkInterfacePermission
    - ec2:DeleteNetworkInterface
    - ec2:DeleteNetworkInterfacePermission
    - ec2:DisassociateAddress
    - ec2:ReleaseAddress
    - ec2:AssociateAddress
    Resource: '*'
    Condition:
      StringEquals:
        aws:ResourceTag/CreatedBy: S3 On Outposts
    Sid: ReleaseVpcResources
  - Effect: Allow
    Action:
    - ec2:CreateTags
    Resource: '*'
    Condition:
      StringEquals:
        ec2:CreateAction:
        - CreateNetworkInterface
        - AllocateAddress
        aws:RequestTag/CreatedBy:
        - S3 On Outposts
    Sid: CreateTags
  - Sid: GlueDataPermissions
    Effect: Allow
    Action:
    - glue:GetDatabases
    - glue:GetPartitions
    - glue:GetTable
    - glue:GetTables
    - glue:GetConnection
    Resource:
    - '*'
  - Sid: GluePIIPermissions
    Effect: Allow
    Action:
    - glue:BatchGetCustomEntityTypes
    - glue:GetCustomEntityType
    Resource:
    - '*'
  - Sid: S3PublicDatasetAccess
    Effect: Allow
    Action:
    - s3:ListBucket
    - s3:GetObject
    Resource:
    - arn:aws:s3:::databrew-public-datasets-*
  - Sid: EC2NetworkingPermissions
    Effect: Allow
    Action:
    - ec2:DescribeVpcEndpoints
    - ec2:DescribeRouteTables
    - ec2:DescribeNetworkInterfaces
    - ec2:DescribeSecurityGroups
    - ec2:DescribeSubnets
    - ec2:DescribeVpcAttribute
    - ec2:CreateNetworkInterface
    Resource:
    - '*'
  - Sid: EC2DeleteGlueNetworkInterfacePermissions
    Effect: Allow
    Action: ec2:DeleteNetworkInterface
    Condition:
      StringLike:
        aws:ResourceTag/aws-glue-service-resource: '*'
    Resource:
    - '*'
  - Sid: EC2GlueTaggingPermissions
    Effect: Allow
    Action:
    - ec2:CreateTags
    - ec2:DeleteTags
    Condition:
      ForAllValues:StringEquals:
        aws:TagKeys:
        - aws-glue-service-resource
    Resource:
    - arn:aws:ec2:*:*:network-interface/*
    - arn:aws:ec2:*:*:security-group/*
  - Sid: GlueDatabrewLogGroupPermissions
    Effect: Allow
    Action:
    - logs:CreateLogGroup
    - logs:CreateLogStream
    - logs:PutLogEvents
    Resource:
    - arn:aws:logs:*:*:log-group:/aws-glue-databrew/*
  - Sid: LakeFormationPermissions
    Effect: Allow
    Action:
    - lakeformation:GetDataAccess
    Resource: '*'
  - Sid: SecretsManagerPermissions
    Effect: Allow
    Action:
    - secretsmanager:GetSecretValue
    Resource: arn:aws:secretsmanager:*:*:secret:databrew!default-*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
    resource_constraints: []
  user: dev-bob
  justification: 'reproduce customer ticket #4422 locally'
