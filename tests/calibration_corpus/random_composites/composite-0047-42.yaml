name: composite-0047-42
source_policies:
- aws_managed/AWSPanoramaServiceLinkedRolePolicy.yaml
- aws_managed/AWSIQFullAccess.yaml
- aws_managed/AmazonEC2ImageReferencesAccessPolicy.yaml
- aws_managed/AmazonMSKReadOnlyAccess.yaml
source_hash: 310d15018c126c30
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: PanoramaIoTThingAccess
    Effect: Allow
    Action:
    - iot:CreateThing
    - iot:DeleteThing
    - iot:DeleteThingShadow
    - iot:DescribeThing
    - iot:GetThingShadow
    - iot:UpdateThing
    - iot:UpdateThingShadow
    Resource:
    - arn:aws:iot:*:*:thing/panorama*
  - Sid: PanoramaIoTCertificateAccess
    Effect: Allow
    Action:
    - iot:AttachThingPrincipal
    - iot:DetachThingPrincipal
    - iot:UpdateCertificate
    - iot:DeleteCertificate
    - iot:AttachPrincipalPolicy
    - iot:DetachPrincipalPolicy
    Resource:
    - arn:aws:iot:*:*:thing/panorama*
    - arn:aws:iot:*:*:cert/*
  - Sid: PanoramaIoTCreateCertificateAccess
    Effect: Allow
    Action:
    - iot:CreateKeysAndCertificate
    Resource:
    - '*'
  - Sid: PanoramaIoTCreatePolicyAndVersionAccess
    Effect: Allow
    Action:
    - iot:CreatePolicy
    - iot:CreatePolicyVersion
    - iot:AttachPolicy
    Resource:
    - arn:aws:iot:*:*:policy/panorama*
  - Sid: PanoramaIoTJobAccess
    Effect: Allow
    Action:
    - iot:DescribeJobExecution
    - iot:CreateJob
    - iot:DeleteJob
    Resource:
    - arn:aws:iot:*:*:job/panorama*
    - arn:aws:iot:*:*:thing/panorama*
  - Sid: PanoramaIoTEndpointAccess
    Effect: Allow
    Action:
    - iot:DescribeEndpoint
    Resource:
    - '*'
  - Sid: PanoramaReadOnlyAccess
    Effect: Allow
    Action:
    - panorama:Describe*
    - panorama:List*
    Resource:
    - '*'
  - Sid: SecretsManagerPermissions
    Effect: Allow
    Action:
    - secretsmanager:GetSecretValue
    - secretsmanager:DescribeSecret
    - secretsmanager:CreateSecret
    - secretsmanager:ListSecretVersionIds
    - secretsmanager:DeleteSecret
    Resource:
    - arn:aws:secretsmanager:*:*:secret:panorama*
    - arn:aws:secretsmanager:*:*:secret:Panorama*
  - Action:
    - iq:*
    - iq-permission:*
    Effect: Allow
    Resource: '*'
  - Effect: Allow
    Action: iam:CreateServiceLinkedRole
    Resource: '*'
    Condition:
      StringEquals:
        iam:AWSServiceName:
        - permission.iq.amazonaws.com
        - contract.iq.amazonaws.com
  - Effect: Allow
    Action: ec2:DescribeImageReferences
    Resource: '*'
  - Effect: Allow
    Action:
    - ec2:DescribeInstances
    - ec2:DescribeLaunchTemplates
    - ec2:DescribeLaunchTemplateVersions
    - ssm:DescribeParameters
    - ssm:GetParameters
    - imagebuilder:ListImageRecipes
    - imagebuilder:ListContainerRecipes
    - imagebuilder:GetContainerRecipe
    Resource: '*'
    Condition:
      ForAnyValue:StringEquals:
        aws:CalledVia:
        - ec2-images.amazonaws.com
  - Action:
    - kafka:Describe*
    - kafka:List*
    - kafka:Get*
    - ec2:DescribeNetworkInterfaces
    - ec2:DescribeSecurityGroups
    - ec2:DescribeSubnets
    - ec2:DescribeVpcs
    - kms:DescribeKey
    Effect: Allow
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
    resource_constraints: []
  user: agent-claude
  justification: background reconciliation loop
