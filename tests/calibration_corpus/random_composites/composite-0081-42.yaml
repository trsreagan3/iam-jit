name: composite-0081-42
source_policies:
- aws_managed/AlexaForBusinessFullAccess.yaml
- aws_managed/AWSSystemsManagerEnableConfigRecordingExecutionPolicy.yaml
- aws_managed/AmazonElasticFileSystemServiceRolePolicy.yaml
source_hash: d53c0f4a1c512a76
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - a4b:*
    - kms:DescribeKey
    Resource: '*'
  - Action:
    - iam:CreateServiceLinkedRole
    Effect: Allow
    Resource: '*'
    Condition:
      StringLike:
        iam:AWSServiceName:
        - '*a4b.amazonaws.com'
  - Effect: Allow
    Action:
    - iam:DeleteServiceLinkedRole
    - iam:GetServiceLinkedRoleDeletionStatus
    Resource: arn:aws:iam::*:role/aws-service-role/*a4b.amazonaws.com/AWSServiceRoleForAlexaForBusiness*
  - Effect: Allow
    Action:
    - secretsmanager:GetSecretValue
    - secretsmanager:DeleteSecret
    - secretsmanager:UpdateSecret
    Resource: arn:aws:secretsmanager:*:*:secret:A4B*
  - Effect: Allow
    Action: secretsmanager:CreateSecret
    Resource: '*'
    Condition:
      StringLike:
        secretsmanager:Name: A4B*
  - Sid: S3BucketCreatePermissions
    Effect: Allow
    Action:
    - s3:CreateBucket
    - s3:PutBucketPublicAccessBlock
    - s3:ListBucket
    - s3:PutBucketPolicy
    - s3:PutEncryptionConfiguration
    Resource:
    - arn:aws:s3:::aws-quick-setup-config-recording-*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: SNSTopicsListPermissions
    Effect: Allow
    Action:
    - sns:ListTopics
    Resource: '*'
  - Sid: DefaultSNSTopicCreatePermissions
    Effect: Allow
    Action:
    - sns:CreateTopic
    Resource: arn:aws:sns:*:*:ConfigRecording-Default-Topic
  - Sid: ConfigureAndStartConfigurationRecorderPermissions
    Effect: Allow
    Action:
    - config:DescribeConfigurationRecorders
    - config:DescribeDeliveryChannels
    - config:PutConfigurationRecorder
    - config:PutDeliveryChannel
    - config:StartConfigurationRecorder
    Resource: '*'
  - Sid: GetAndPassConfigSLRPermissions
    Effect: Allow
    Action:
    - iam:GetRole
    - iam:PassRole
    Resource:
    - arn:aws:iam::*:role/aws-service-role/config.amazonaws.com/AWSServiceRoleForConfig
    - arn:aws:iam::*:role/AWSServiceRoleForConfig
  - Sid: CreateConfigSLRPermissions
    Effect: Allow
    Action:
    - iam:CreateServiceLinkedRole
    Resource:
    - arn:aws:iam::*:role/aws-service-role/config.amazonaws.com/AWSServiceRoleForConfig
    Condition:
      StringEquals:
        iam:AWSServiceName: config.amazonaws.com
  - Effect: Allow
    Action:
    - backup-storage:MountCapsule
    - ec2:CreateNetworkInterface
    - ec2:DeleteNetworkInterface
    - ec2:DescribeSecurityGroups
    - ec2:DescribeSubnets
    - ec2:DescribeNetworkInterfaceAttribute
    - ec2:ModifyNetworkInterfaceAttribute
    - tag:GetResources
    Resource: '*'
  - Effect: Allow
    Action:
    - kms:DescribeKey
    Resource: arn:aws:kms:*:*:key/*
  - Effect: Allow
    Action:
    - backup:CreateBackupVault
    - backup:PutBackupVaultAccessPolicy
    Resource:
    - arn:aws:backup:*:*:backup-vault:aws/efs/automatic-backup-vault
  - Effect: Allow
    Action:
    - backup:CreateBackupPlan
    - backup:CreateBackupSelection
    Resource:
    - arn:aws:backup:*:*:backup-plan:*
  - Effect: Allow
    Action:
    - iam:CreateServiceLinkedRole
    Resource: '*'
    Condition:
      StringEquals:
        iam:AWSServiceName:
        - backup.amazonaws.com
  - Effect: Allow
    Action:
    - iam:PassRole
    Resource:
    - arn:aws:iam::*:role/aws-service-role/backup.amazonaws.com/AWSServiceRoleForBackup
    Condition:
      StringLike:
        iam:PassedToService: backup.amazonaws.com
  - Effect: Allow
    Action:
    - elasticfilesystem:DescribeFileSystems
    - elasticfilesystem:CreateReplicationConfiguration
    - elasticfilesystem:DescribeReplicationConfigurations
    - elasticfilesystem:DeleteReplicationConfiguration
    - elasticfilesystem:ReplicationRead
    - elasticfilesystem:ReplicationWrite
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 4
    resource_constraints: []
  user: contractor-frank
  justification: 60-day integration project read access
