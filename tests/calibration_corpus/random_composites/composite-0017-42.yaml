name: composite-0017-42
source_policies:
- aws_managed/AWSSystemsManagerForSAPFullAccess.yaml
- aws_managed/AWSMarketplacePurchaseOrdersServiceRolePolicy.yaml
- aws_managed/ElementalActivationsGenerateLicenses.yaml
- aws_managed/AmazonNimbleStudio-LaunchProfileWorker.yaml
source_hash: ee216decf5a43bcc
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: AwsSsmForSapPermissions
    Effect: Allow
    Action:
    - ssm-sap:*
    Resource: arn:*:ssm-sap:*:*:*
  - Sid: AwsSsmForSapServiceRoleCreationPermission
    Effect: Allow
    Action:
    - iam:CreateServiceLinkedRole
    Resource:
    - arn:aws:iam::*:role/aws-service-role/ssm-sap.amazonaws.com/AWSServiceRoleForAWSSSMForSAP
    Condition:
      StringEquals:
        iam:AWSServiceName: ssm-sap.amazonaws.com
  - Sid: Ec2StartStopPermission
    Effect: Allow
    Action:
    - ec2:StartInstances
    - ec2:StopInstances
    Resource: arn:aws:ec2:*:*:instance/*
    Condition:
      StringEqualsIgnoreCase:
        ec2:resourceTag/SSMForSAPManaged: 'True'
  - Sid: AllowPurchaseOrderActions
    Effect: Allow
    Action:
    - purchase-orders:ViewPurchaseOrders
    - purchase-orders:ModifyPurchaseOrders
    Resource:
    - '*'
  - Effect: Allow
    Action:
    - elemental-activations:Get*
    - elemental-activations:GenerateLicenses
    - elemental-activations:StartFileUpload
    - elemental-activations:CompleteFileUpload
    Resource: '*'
  - Effect: Allow
    Action:
    - ec2:DescribeNetworkInterfaces
    - ec2:DescribeSecurityGroups
    - fsx:DescribeFileSystems
    - ds:DescribeDirectories
    Resource:
    - '*'
    Condition:
      StringEquals:
        aws:CalledViaLast: nimble.amazonaws.com
    Sid: GetLaunchProfileInitializationDependencies
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 8
    resource_constraints: []
  user: agent-claude
  justification: scoped-tool execution for end-user task
scores:
  det_score: 8
  det_factors:
  - '`ssm-sap:*` grants every action in `ssm-sap`'
  - 'Resource: `*` for ssm-sap (broad cross-resource read/access)'
  - '`iam:CreateServiceLinkedRole` on Resource: `*` touches sensitive service `iam`'
  - 'State-changing action `iam:CreateServiceLinkedRole` on Resource: `*` (IAM access level: Permissions management)'
  - 'State-changing action `ec2:StartInstances` on Resource: `*` (IAM access level: Write)'
  - 'Destructive action `ec2:StopInstances` on Resource: `*` (blast radius = every resource in this account)'
  - 'Resource: `*` for ec2 (broad cross-resource read/access)'
  - 'State-changing action `purchase-orders:ModifyPurchaseOrders` on Resource: `*` (IAM access level: Write)'
  - 'Resource: `*` for purchase-orders (broad cross-resource read/access)'
  - "Action-name wildcard `elemental-activations:Get*` on broad resource \u2014 matches multiple elemental-activations APIs\
    \ at once"
  - 'State-changing action `elemental-activations:GenerateLicenses` on Resource: `*` (IAM access level: Write)'
  - 'State-changing action `elemental-activations:StartFileUpload` on Resource: `*` (IAM access level: Write)'
  - 'State-changing action `elemental-activations:CompleteFileUpload` on Resource: `*` (IAM access level: Write)'
  - 'Resource: `*` for elemental-activations (broad cross-resource read/access)'
