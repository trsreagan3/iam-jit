name: composite-0040-42
source_policies:
- aws_managed/AmazonEC2ReadOnlyAccess.yaml
- aws_managed/AWSKeyManagementServiceCustomKeyStoresServiceRolePolicy.yaml
- aws_managed/AWSDataExchangeDataGrantReceiverFullAccess.yaml
source_hash: 2af1ca70f2a4aee0
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - ec2:Describe*
    - ec2:GetSecurityGroupsForVpc
    Resource: '*'
  - Effect: Allow
    Action: elasticloadbalancing:Describe*
    Resource: '*'
  - Effect: Allow
    Action:
    - cloudwatch:ListMetrics
    - cloudwatch:GetMetricStatistics
    - cloudwatch:Describe*
    Resource: '*'
  - Effect: Allow
    Action: autoscaling:Describe*
    Resource: '*'
  - Effect: Allow
    Action:
    - cloudhsm:Describe*
    - ec2:CreateNetworkInterface
    - ec2:AuthorizeSecurityGroupIngress
    - ec2:CreateSecurityGroup
    - ec2:DescribeSecurityGroups
    - ec2:RevokeSecurityGroupEgress
    - ec2:DeleteSecurityGroup
    - ec2:DescribeVpcs
    - ec2:DescribeNetworkAcls
    - ec2:DescribeNetworkInterfaces
    Resource: '*'
  - Sid: DataExchangeReadOnlyActions
    Effect: Allow
    Action:
    - dataexchange:GetDataSet
    - dataexchange:ListDataSets
    - dataexchange:GetRevision
    - dataexchange:ListDataSetRevisions
    - dataexchange:GetAsset
    - dataexchange:ListRevisionAssets
    - dataexchange:SendApiAsset
    Resource: '*'
  - Sid: DataExchangeExportActions
    Effect: Allow
    Action:
    - dataexchange:CreateJob
    - dataexchange:StartJob
    - dataexchange:CancelJob
    Resource: '*'
    Condition:
      StringEquals:
        dataexchange:JobType:
        - EXPORT_ASSETS_TO_S3
        - EXPORT_ASSET_TO_SIGNED_URL
        - EXPORT_REVISIONS_TO_S3
  - Sid: DataExchangeEventActionActions
    Effect: Allow
    Action:
    - dataexchange:CreateEventAction
    - dataexchange:UpdateEventAction
    - dataexchange:DeleteEventAction
    - dataexchange:GetEventAction
    - dataexchange:ListEventActions
    Resource: '*'
  - Sid: DataExchangeDataGrantActions
    Effect: Allow
    Action:
    - dataexchange:AcceptDataGrant
    - dataexchange:ListReceivedDataGrants
    - dataexchange:GetReceivedDataGrant
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 8
    resource_constraints: []
  user: ci-bot
  justification: rotate signing key via CI pipeline
