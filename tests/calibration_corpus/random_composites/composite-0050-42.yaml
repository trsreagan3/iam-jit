source_hash: 10ac8caf20e956cf
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - glue:*
    - redshift:DescribeClusters
    - redshift:DescribeClusterSubnetGroups
    - iam:ListRoles
    - iam:ListRolePolicies
    - iam:GetRole
    - iam:GetRolePolicy
    - iam:ListAttachedRolePolicies
    - ec2:DescribeSecurityGroups
    - ec2:DescribeSubnets
    - ec2:DescribeVpcs
    - ec2:DescribeVpcEndpoints
    - ec2:DescribeRouteTables
    - ec2:DescribeVpcAttribute
    - ec2:DescribeKeyPairs
    - ec2:DescribeInstances
    - ec2:DescribeImages
    - ec2:CreateNetworkInterface
    - ec2:AttachNetworkInterface
    - ec2:ModifyNetworkInterfaceAttribute
    - ec2:DeleteNetworkInterface
    - ec2:DescribeAvailabilityZones
    - ec2:DescribeInternetGateways
    - ec2:DescribeNetworkInterfaces
    - rds:DescribeDBInstances
    - s3:ListAllMyBuckets
    - s3:ListBucket
    - s3:GetBucketAcl
    - s3:GetBucketLocation
    - cloudformation:DescribeStacks
    - cloudformation:GetTemplateSummary
    - dynamodb:ListTables
    - kms:ListAliases
    - kms:DescribeKey
    - sagemaker:ListNotebookInstances
    - cloudformation:ListStacks
    - cloudwatch:GetMetricData
    - cloudwatch:ListDashboards
    Resource:
    - '*'
  - Effect: Allow
    Action:
    - s3:GetObject
    - s3:PutObject
    Resource:
    - arn:aws:s3:::*/*aws-glue-*/*
    - arn:aws:s3:::aws-glue-*
  - Effect: Allow
    Action:
    - s3:CreateBucket
    Resource:
    - arn:aws:s3:::aws-glue-*
  - Effect: Allow
    Action:
    - logs:GetLogEvents
    Resource:
    - arn:aws:logs:*:*:/aws-glue/*
  - Effect: Allow
    Action:
    - cloudformation:CreateStack
    - cloudformation:DeleteStack
    Resource: arn:aws:cloudformation:*:*:stack/aws-glue*/*
  - Effect: Allow
    Action:
    - sagemaker:CreatePresignedNotebookInstanceUrl
    - sagemaker:CreateNotebookInstance
    - sagemaker:DeleteNotebookInstance
    - sagemaker:DescribeNotebookInstance
    - sagemaker:StartNotebookInstance
    - sagemaker:StopNotebookInstance
    - sagemaker:UpdateNotebookInstance
    - sagemaker:ListTags
    Resource: arn:aws:sagemaker:*:*:notebook-instance/aws-glue-*
  - Effect: Allow
    Action:
    - sagemaker:DescribeNotebookInstanceLifecycleConfig
    - sagemaker:CreateNotebookInstanceLifecycleConfig
    - sagemaker:DeleteNotebookInstanceLifecycleConfig
    - sagemaker:ListNotebookInstanceLifecycleConfigs
    Resource: arn:aws:sagemaker:*:*:notebook-instance-lifecycle-config/aws-glue-*
  - Effect: Allow
    Action:
    - ec2:RunInstances
    Resource:
    - arn:aws:ec2:*:*:instance/*
    - arn:aws:ec2:*:*:key-pair/*
    - arn:aws:ec2:*:*:image/*
    - arn:aws:ec2:*:*:security-group/*
    - arn:aws:ec2:*:*:network-interface/*
    - arn:aws:ec2:*:*:subnet/*
    - arn:aws:ec2:*:*:volume/*
  - Effect: Allow
    Action:
    - ec2:TerminateInstances
    - ec2:CreateTags
    - ec2:DeleteTags
    Resource:
    - arn:aws:ec2:*:*:instance/*
    Condition:
      StringLike:
        ec2:ResourceTag/aws:cloudformation:stack-id: arn:aws:cloudformation:*:*:stack/aws-glue-*/*
      StringEquals:
        ec2:ResourceTag/aws:cloudformation:logical-id: ZeppelinInstance
  - Effect: Allow
    Action:
    - tag:GetResources
    Resource:
    - '*'
    Condition:
      ForAllValues:StringLike:
        aws:TagKeys:
        - aws-glue-*
  - Action:
    - iam:PassRole
    Effect: Allow
    Resource: arn:aws:iam::*:role/AWSGlueServiceRole*
    Condition:
      StringLike:
        iam:PassedToService:
        - glue.amazonaws.com
  - Action:
    - iam:PassRole
    Effect: Allow
    Resource: arn:aws:iam::*:role/AWSGlueServiceNotebookRole*
    Condition:
      StringLike:
        iam:PassedToService:
        - ec2.amazonaws.com
  - Action:
    - iam:PassRole
    Effect: Allow
    Resource: arn:aws:iam::*:role/AWSGlueServiceSageMakerNotebookRole*
    Condition:
      StringLike:
        iam:PassedToService:
        - sagemaker.amazonaws.com
  - Action:
    - iam:PassRole
    Effect: Allow
    Resource:
    - arn:aws:iam::*:role/service-role/AWSGlueServiceRole*
    Condition:
      StringLike:
        iam:PassedToService:
        - glue.amazonaws.com
  - Effect: Allow
    Action:
    - iotwireless:List*
    - iotwireless:Get*
    Resource: '*'
  - Effect: Allow
    Action:
    - pi:GetResourceMetrics
    Resource: '*'
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
    resource_constraints: []
  user: dev-bob
  justification: 'reproduce customer ticket #4422 locally'
