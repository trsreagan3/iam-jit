name: composite-0066-42
source_policies:
- aws_managed/AWSBatchServiceRolePolicyForSageMaker.yaml
- aws_managed/AWSCostAndUsageReportAutomationPolicy.yaml
source_hash: cff0a073eb28bbfb
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - sagemaker:CreateTrainingJob
    - sagemaker:DescribeTrainingJob
    - sagemaker:StopTrainingJob
    - sagemaker:ListTags
    - sagemaker:DeleteTrainingJob
    Resource: arn:aws:sagemaker:*:*:training-job/AWSBatch*
  - Effect: Allow
    Action:
    - sagemaker:CreateTrainingJob
    Resource:
    - arn:aws:sagemaker:*:*:training-plan/*
    - arn:aws:sagemaker:*:*:reserved-capacity/*
  - Effect: Allow
    Action:
    - sagemaker:AddTags
    Resource: arn:aws:sagemaker:*:*:training-job/AWSBatch*
    Condition:
      StringEquals:
        sagemaker:TaggingAction: CreateTrainingJob
  - Effect: Allow
    Action:
    - sagemaker:ListTrainingJobs
    - sagemaker:Search
    Resource: '*'
  - Effect: Allow
    Action: iam:PassRole
    Resource: '*'
    Condition:
      StringEquals:
        iam:PassedToService:
        - sagemaker.amazonaws.com
  - Effect: Allow
    Action:
    - organizations:DescribeOrganization
    Resource: '*'
  - Effect: Allow
    Action:
    - s3:GetBucketTagging
    - s3:PutBucketTagging
    - s3:GetBucketPolicy
    - s3:PutBucketPolicy
    - s3:ListBucket
    - s3:CreateBucket
    Resource: arn:aws:s3:::aws-map-cur-bucket-*
  - Effect: Allow
    Action:
    - cur:PutReportDefinition
    - cur:DeleteReportDefinition
    - cur:DescribeReportDefinitions
    Resource: arn:aws:cur:*:*:definition/map-migrated-report
  - Effect: Allow
    Action: cur:DescribeReportDefinitions
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
    resource_constraints: []
  user: agent-claude
  justification: scoped-tool execution for end-user task
