  - Sid: CloudWatchPolicyStatement
    Effect: Allow
    Action:
    - cloudwatch:PutMetricData
    Resource:
    - '*'
    Condition:
      StringEquals:
        cloudwatch:namespace:
        - AWS/EMRServerless
        - AWS/Usage
