name: composite-0064-42
source_policies:
- aws_managed/AWSGlueDataBrewServiceRole.yaml
- aws_managed/AWSResourceExplorerFullAccess.yaml
- aws_managed/AWSSSOServiceRolePolicy.yaml
source_hash: ad5bf0b8fad7a0b2
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: GlueDataPermissions
    Effect: Allow
    Action:
    - glue:GetDatabases
    - glue:GetPartitions
    - glue:GetTable
    - glue:GetTables
    - glue:GetConnection
    Resource:
    - '*'
  - Sid: GluePIIPermissions
    Effect: Allow
    Action:
    - glue:BatchGetCustomEntityTypes
    - glue:GetCustomEntityType
    Resource:
    - '*'
  - Sid: S3PublicDatasetAccess
    Effect: Allow
    Action:
    - s3:ListBucket
    - s3:GetObject
    Resource:
    - arn:aws:s3:::databrew-public-datasets-*
  - Sid: EC2NetworkingPermissions
    Effect: Allow
    Action:
    - ec2:DescribeVpcEndpoints
    - ec2:DescribeRouteTables
    - ec2:DescribeNetworkInterfaces
    - ec2:DescribeSecurityGroups
    - ec2:DescribeSubnets
    - ec2:DescribeVpcAttribute
    - ec2:CreateNetworkInterface
    Resource:
    - '*'
  - Sid: EC2DeleteGlueNetworkInterfacePermissions
    Effect: Allow
    Action: ec2:DeleteNetworkInterface
    Condition:
      StringLike:
        aws:ResourceTag/aws-glue-service-resource: '*'
    Resource:
    - '*'
  - Sid: EC2GlueTaggingPermissions
    Effect: Allow
    Action:
    - ec2:CreateTags
    - ec2:DeleteTags
    Condition:
      ForAllValues:StringEquals:
        aws:TagKeys:
        - aws-glue-service-resource
    Resource:
    - arn:aws:ec2:*:*:network-interface/*
    - arn:aws:ec2:*:*:security-group/*
  - Sid: GlueDatabrewLogGroupPermissions
    Effect: Allow
    Action:
    - logs:CreateLogGroup
    - logs:CreateLogStream
    - logs:PutLogEvents
    Resource:
    - arn:aws:logs:*:*:log-group:/aws-glue-databrew/*
  - Sid: LakeFormationPermissions
    Effect: Allow
    Action:
    - lakeformation:GetDataAccess
    Resource: '*'
  - Sid: SecretsManagerPermissions
    Effect: Allow
    Action:
    - secretsmanager:GetSecretValue
    Resource: arn:aws:secretsmanager:*:*:secret:databrew!default-*
  - Sid: ResourceExplorerConsoleFullAccess
    Effect: Allow
    Action:
    - resource-explorer-2:*
    - ec2:DescribeRegions
    - ram:ListResources
    - ram:GetResourceShares
    - organizations:DescribeOrganization
    Resource: '*'
  - Sid: ResourceExplorerSLRAccess
    Effect: Allow
    Action:
    - iam:CreateServiceLinkedRole
    Resource: '*'
    Condition:
      StringEquals:
        iam:AWSServiceName:
        - resource-explorer-2.amazonaws.com
  - Sid: IAMRoleProvisioningActions
    Effect: Allow
    Action:
    - iam:AttachRolePolicy
    - iam:CreateRole
    - iam:PutRolePolicy
    - iam:UpdateRole
    - iam:UpdateRoleDescription
    - iam:UpdateAssumeRolePolicy
    - iam:PutRolePermissionsBoundary
    - iam:DeleteRolePermissionsBoundary
    Resource:
    - arn:aws:iam::*:role/aws-reserved/sso.amazonaws.com/*
    Condition:
      StringNotEquals:
        aws:PrincipalOrgMasterAccountId: ${aws:PrincipalAccount}
  - Sid: IAMRoleReadActions
    Effect: Allow
    Action:
    - iam:GetRole
    - iam:ListRoles
    Resource:
    - '*'
  - Sid: IAMRoleCleanupActions
    Effect: Allow
    Action:
    - iam:DeleteRole
    - iam:DeleteRolePolicy
    - iam:DetachRolePolicy
    - iam:ListRolePolicies
    - iam:ListAttachedRolePolicies
    Resource:
    - arn:aws:iam::*:role/aws-reserved/sso.amazonaws.com/*
  - Sid: IAMSLRCleanupActions
    Effect: Allow
    Action:
    - iam:DeleteServiceLinkedRole
    - iam:GetServiceLinkedRoleDeletionStatus
    - iam:DeleteRole
    - iam:GetRole
    Resource:
    - arn:aws:iam::*:role/aws-service-role/sso.amazonaws.com/AWSServiceRoleForSSO
  - Sid: IAMSAMLProviderCreationAction
    Effect: Allow
    Action:
    - iam:CreateSAMLProvider
    Resource:
    - arn:aws:iam::*:saml-provider/AWSSSO_*
    Condition:
      StringNotEquals:
        aws:PrincipalOrgMasterAccountId: ${aws:PrincipalAccount}
  - Sid: IAMSAMLProviderUpdateAction
    Effect: Allow
    Action:
    - iam:UpdateSAMLProvider
    Resource:
    - arn:aws:iam::*:saml-provider/AWSSSO_*
  - Sid: IAMSAMLProviderCleanupActions
    Effect: Allow
    Action:
    - iam:DeleteSAMLProvider
    - iam:GetSAMLProvider
    Resource:
    - arn:aws:iam::*:saml-provider/AWSSSO_*
  - Effect: Allow
    Action:
    - organizations:DescribeAccount
    - organizations:DescribeOrganization
    - organizations:ListAccounts
    - organizations:ListDelegatedAdministrators
    - organizations:ListAWSServiceAccessForOrganization
    Resource:
    - '*'
  - Sid: AllowUnauthAppForDirectory
    Effect: Allow
    Action:
    - ds:UnauthorizeApplication
    Resource:
    - '*'
  - Sid: AllowDescribeForDirectory
    Effect: Allow
    Action:
    - ds:DescribeDirectories
    - ds:DescribeTrusts
    Resource:
    - '*'
  - Sid: AllowDescribeAndListOperationsOnIdentitySource
    Effect: Allow
    Action:
    - identitystore:DescribeUser
    - identitystore:DescribeGroup
    - identitystore:ListGroups
    - identitystore:ListUsers
    Resource:
    - '*'
  - Sid: AllowDeleteSyncProfile
    Effect: Allow
    Action:
    - identity-sync:DeleteSyncProfile
    Resource:
    - arn:aws:identity-sync:*:*:profile/*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
    resource_constraints: []
  user: contractor-frank
  justification: 60-day integration project read access
