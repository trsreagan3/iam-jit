    in EVERY AWS account (account segment wildcarded). The literal resource-name portion doesn''t narrow the scope cross-account.'
  - 'State-changing action `ram:CreateResourceShare` on Resource: `*` (IAM access level: Permissions management)'
  - 'Resource: `*` for ram (broad cross-resource read/access)'
  - "`ram:CreateResourceShare` is a high-impact mutation on broad resource \u2014 single API call can rewrite every matching\
    \ resource in the account."
  - 'State-changing action `ram:AssociateResourceShare` on Resource: `*` (IAM access level: Permissions management)'
  - "`ram:AssociateResourceShare` is a high-impact mutation on broad resource \u2014 single API call can rewrite every matching\
    \ resource in the account."
  - 'State-changing action `ram:AcceptResourceShareInvitation` on Resource: `*` (IAM access level: Permissions management)'
  - 'Destructive action `ram:DeleteResourceShare` on Resource: `*` (blast radius = every resource in this account)'
  - 'State-changing action `aws-marketplace:PutResourcePolicy` on Resource: `*` (IAM access level: Permissions management)'
  - 'Destructive action `aws-marketplace:DeleteResourcePolicy` on Resource: `*` (blast radius = every resource in this account)'
  - 'Resource: `*` for aws-marketplace (broad cross-resource read/access)'
  - 'Resource: `*` for aps (broad cross-resource read/access)'
