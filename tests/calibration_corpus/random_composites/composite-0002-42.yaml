name: composite-0002-42
source_policies:
- aws_managed/MultiPartyApprovalFullAccess.yaml
- aws_managed/AmazonS3TablesReadOnlyAccess.yaml
- aws_managed/AWSConfigMultiAccountSetupPolicy.yaml
source_hash: 834b6c0ff360769d
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: MpaFullAccess
    Effect: Allow
    Action:
    - mpa:*
    Resource: '*'
  - Sid: OrganizationsAccess
    Effect: Allow
    Action:
    - organizations:ListDelegatedAdministrators
    - organizations:DescribeOrganization
    Resource: '*'
  - Sid: SSOCreateApplication
    Effect: Allow
    Action:
    - sso:CreateApplication
    Resource:
    - arn:aws:sso:::instance/*
    - arn:aws:sso::aws:applicationProvider/mpa
  - Sid: SSOApplicationManagement
    Effect: Allow
    Action:
    - sso:DescribeApplication
    - sso:PutApplicationAssignmentConfiguration
    - sso:PutApplicationGrant
    - sso:PutApplicationAuthenticationMethod
    - sso:PutApplicationAccessScope
    - sso:DeleteApplication
    Resource: '*'
    Condition:
      StringEqualsIfExists:
        aws:CalledViaLast: mpa.amazonaws.com
  - Sid: SSOManagementAccess
    Effect: Allow
    Action:
    - sso:DescribeInstance
    - sso:DescribeRegisteredRegions
    - sso:GetSharedSsoConfiguration
    - sso-directory:DescribeUsers
    - sso-directory:SearchUsers
    - sso:ListInstances
    Resource: '*'
  - Sid: AllowKmsAccessViaIdentityCenter
    Effect: Allow
    Action:
    - kms:Decrypt
    Resource: '*'
    Condition:
      ArnLike:
        kms:EncryptionContext:aws:sso:instance-arn: arn:*:sso:::instance/*
      StringLike:
        kms:ViaService: sso.*.amazonaws.com
  - Sid: AllowKmsAccessViaIdentityStore
    Effect: Allow
    Action:
    - kms:Decrypt
    Resource: '*'
    Condition:
      ArnLike:
        kms:EncryptionContext:aws:identitystore:identitystore-arn: arn:*:identitystore::*:identitystore/*
      StringLike:
        kms:ViaService: identitystore.*.amazonaws.com
  - Effect: Allow
    Action:
    - s3tables:Get*
    - s3tables:List*
    Resource: '*'
  - Effect: Allow
    Action:
    - config:PutConfigRule
    - config:DeleteConfigRule
    Resource: arn:aws:config:*:*:config-rule/aws-service-rule/config-multiaccountsetup.amazonaws.com/*
  - Effect: Allow
    Action:
    - config:DescribeConfigurationRecorders
    Resource: '*'
  - Effect: Allow
    Action:
    - organizations:ListAccounts
    - organizations:DescribeOrganization
    - organizations:ListAWSServiceAccessForOrganization
    - organizations:DescribeAccount
    Resource: '*'
  - Effect: Allow
    Action:
    - config:PutConformancePack
    - config:DeleteConformancePack
    Resource: arn:aws:config:*:*:conformance-pack/aws-service-conformance-pack/config-multiaccountsetup.amazonaws.com/*
  - Effect: Allow
    Action:
    - config:DescribeConformancePackStatus
    Resource: '*'
  - Effect: Allow
    Action:
    - iam:GetRole
    Resource: arn:aws:iam::*:role/aws-service-role/config-conforms.amazonaws.com/AWSServiceRoleForConfigConforms
  - Effect: Allow
    Action:
    - iam:CreateServiceLinkedRole
    Resource: arn:aws:iam::*:role/aws-service-role/config-conforms.amazonaws.com/AWSServiceRoleForConfigConforms
    Condition:
      StringLike:
        iam:AWSServiceName: config-conforms.amazonaws.com
  - Action: iam:PassRole
    Resource: '*'
    Effect: Allow
    Condition:
      StringEquals:
        iam:PassedToService: ssm.amazonaws.com
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 2
    resource_constraints: []
  user: contractor-frank
  justification: 60-day integration project read access
