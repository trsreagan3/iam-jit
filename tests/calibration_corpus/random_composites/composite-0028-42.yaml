name: composite-0028-42
source_policies:
- aws_managed/AmazonRoute53DomainsReadOnlyAccess.yaml
- aws_managed/AIDevOpsAgentFullAccess.yaml
- aws_managed/AppIntegrationsServiceLinkedRolePolicy.yaml
- aws_managed/AWSTransferReadOnlyAccess.yaml
- aws_managed/AmazonMachineLearningManageRealTimeEndpointOnlyAccess.yaml
source_hash: 8fe53eb6c9dbfc44
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - route53domains:Get*
    - route53domains:List*
    Resource:
    - '*'
  - Sid: AIDevOpsAgentSpaceAccess
    Effect: Allow
    Action:
    - aidevops:CreateAgentSpace
    - aidevops:DeleteAgentSpace
    - aidevops:GetAgentSpace
    - aidevops:ListAgentSpaces
    - aidevops:UpdateAgentSpace
    Resource: '*'
  - Sid: AIDevOpsServiceAccess
    Effect: Allow
    Action:
    - aidevops:DeregisterService
    - aidevops:GetService
    - aidevops:ListServices
    - aidevops:RegisterService
    - aidevops:SearchServiceAccessibleResource
    Resource: '*'
  - Sid: AIDevOpsAssociationAccess
    Effect: Allow
    Action:
    - aidevops:AssociateService
    - aidevops:DisassociateService
    - aidevops:GetAssociation
    - aidevops:ListAssociations
    - aidevops:UpdateAssociation
    - aidevops:ValidateAwsAssociations
    Resource: '*'
  - Sid: AIDevOpsWebhookAccess
    Effect: Allow
    Action:
    - aidevops:ListWebhooks
    Resource: '*'
  - Sid: AIDevOpsOperatorAppAccess
    Effect: Allow
    Action:
    - aidevops:DisableOperatorApp
    - aidevops:EnableOperatorApp
    - aidevops:GetOperatorApp
    - aidevops:UpdateOperatorAppIdpConfig
    Resource: '*'
  - Sid: AIDevOpsKnowledgeAccess
    Effect: Allow
    Action:
    - aidevops:CreateKnowledgeItem
    - aidevops:DeleteKnowledgeItem
    - aidevops:GetKnowledgeItem
    - aidevops:ListKnowledgeItems
    - aidevops:ListKnowledgeItemVersions
    - aidevops:UpdateKnowledgeItem
    Resource: '*'
  - Sid: AIDevOpsBacklogAccess
    Effect: Allow
    Action:
    - aidevops:CreateBacklogTask
    - aidevops:GetBacklogTask
    - aidevops:ListBacklogTasks
    - aidevops:ListGoals
    - aidevops:UpdateBacklogTask
    - aidevops:UpdateGoal
    Resource: '*'
  - Sid: AIDevOpsRecommendationAccess
    Effect: Allow
    Action:
    - aidevops:GetRecommendation
    - aidevops:ListRecommendations
    - aidevops:UpdateRecommendation
    Resource: '*'
  - Sid: AIDevOpsAgentChatAccess
    Effect: Allow
    Action:
    - aidevops:CreateChat
    - aidevops:ListChats
    - aidevops:ListPendingMessages
    - aidevops:SendMessage
    Resource: '*'
  - Sid: AIDevOpsJournalAccess
    Effect: Allow
    Action:
    - aidevops:ListExecutions
    - aidevops:ListJournalRecords
    Resource: '*'
  - Sid: AIDevOpsTopologyAccess
    Effect: Allow
    Action:
    - aidevops:DiscoverTopology
    Resource: '*'
  - Sid: AIDevOpsSupportAccess
    Effect: Allow
    Action:
    - aidevops:DescribeServices
    - aidevops:DescribeSupportLevel
    - aidevops:EndChatForCase
    - aidevops:InitiateChatForCase
    Resource: '*'
  - Sid: AIDevOpsUsageAccess
    Effect: Allow
    Action:
    - aidevops:GetAccountUsage
    Resource: '*'
  - Sid: AIDevOpsTaggingAccess
    Effect: Allow
    Action:
    - aidevops:ListTagsForResource
    - aidevops:TagResource
    - aidevops:UntagResource
    Resource: '*'
  - Sid: AIDevOpsVendedLogs
    Effect: Allow
    Action:
    - aidevops:AllowVendedLogDeliveryForResource
    Resource: '*'
  - Effect: Allow
    Action:
    - cloudwatch:PutMetricData
    Resource: '*'
    Condition:
      StringEquals:
        cloudwatch:namespace: AWS/AppIntegrations
  - Effect: Allow
    Action:
    - appflow:DescribeConnectorEntity
    - appflow:ListConnectorEntities
    Resource: '*'
  - Effect: Allow
    Action:
    - appflow:DescribeConnectorProfiles
    - appflow:UseConnectorProfile
    Resource: arn:aws:appflow:*:*:connector-profile/*
  - Effect: Allow
    Action:
    - appflow:DeleteFlow
    - appflow:DescribeFlow
    - appflow:DescribeFlowExecutionRecords
    - appflow:StartFlow
    - appflow:StopFlow
    - appflow:UpdateFlow
    Condition:
      StringEquals:
        aws:ResourceTag/AppIntegrationsManaged: 'true'
    Resource: arn:aws:appflow:*:*:flow/FlowCreatedByAppIntegrations-*
  - Effect: Allow
    Action:
    - appflow:TagResource
    Condition:
      ForAllValues:StringEquals:
        aws:TagKeys:
        - AppIntegrationsManaged
    Resource: arn:aws:appflow:*:*:flow/FlowCreatedByAppIntegrations-*
  - Effect: Allow
    Action:
    - transfer:DescribeUser
    - transfer:DescribeServer
    - transfer:ListUsers
    - transfer:ListServers
    - transfer:TestIdentityProvider
    - transfer:ListTagsForResource
    Resource: '*'
  - Effect: Allow
    Action:
    - machinelearning:CreateRealtimeEndpoint
    - machinelearning:DeleteRealtimeEndpoint
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
    resource_constraints: []
  user: ci-bot
  justification: deploy via terraform-cloud agent
