name: composite-0099-42
source_policies:
- aws_managed/AWSElasticBeanstalkMaintenance.yaml
- aws_managed/AmazonGuardDutyFullAccess_v2.yaml
- aws_managed/AWSElasticDisasterRecoveryNetworkReplicationPolicy.yaml
- aws_managed/AmazonInspector2ManagedTelemetryPolicy.yaml
source_hash: 79b7891fd7b4406d
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: AllowCloudformationChangeSetOperationsOnElasticBeanstalkStacks
    Effect: Allow
    Action:
    - cloudformation:CreateChangeSet
    - cloudformation:DescribeChangeSet
    - cloudformation:ExecuteChangeSet
    - cloudformation:DeleteChangeSet
    - cloudformation:ListChangeSets
    - cloudformation:DescribeStacks
    - cloudformation:TagResource
    - cloudformation:UntagResource
    Resource:
    - arn:aws:cloudformation:*:*:stack/awseb-*
    - arn:aws:cloudformation:*:*:stack/eb-*
  - Sid: AllowElasticBeanstalkStacksUpdateExecuteSuccessfully
    Effect: Allow
    Action: elasticloadbalancing:DescribeLoadBalancers
    Resource: '*'
  - Sid: GuardDutyFullAccess
    Effect: Allow
    Action: guardduty:*
    Resource: '*'
  - Sid: CreateGuardDutyServiceLinkedRole
    Effect: Allow
    Action: iam:CreateServiceLinkedRole
    Resource: '*'
    Condition:
      StringEquals:
        iam:AWSServiceName:
        - guardduty.amazonaws.com
        - malware-protection.guardduty.amazonaws.com
  - Sid: GuardDutyOrganizationsReadOnly
    Effect: Allow
    Action:
    - organizations:ListAWSServiceAccessForOrganization
    - organizations:DescribeOrganizationalUnit
    - organizations:DescribeAccount
    - organizations:DescribeOrganization
    - organizations:ListAccounts
    Resource: '*'
  - Sid: GuardDutyOrganizationsAdminAccess
    Effect: Allow
    Action:
    - organizations:EnableAWSServiceAccess
    - organizations:DisableAWSServiceAccess
    - organizations:RegisterDelegatedAdministrator
    - organizations:DeregisterDelegatedAdministrator
    - organizations:ListDelegatedAdministrators
    Resource: '*'
    Condition:
      StringEquals:
        organizations:ServicePrincipal:
        - guardduty.amazonaws.com
        - malware-protection.guardduty.amazonaws.com
  - Sid: GuardDutyIamRoleAccess
    Effect: Allow
    Action: iam:GetRole
    Resource: arn:aws:iam::*:role/*AWSServiceRoleForAmazonGuardDutyMalwareProtection
  - Sid: AllowPassRoleToMalwareProtection
    Effect: Allow
    Action:
    - iam:PassRole
    Resource: arn:aws:iam::*:role/*
    Condition:
      StringEquals:
        iam:PassedToService:
        - malware-protection-plan.guardduty.amazonaws.com
        - malware-protection.guardduty.amazonaws.com
  - Sid: DRSNetworkReplicationPolicy1
    Effect: Allow
    Action:
    - ec2:DescribeVpcAttribute
    - ec2:DescribeInternetGateways
    - ec2:DescribeVpcs
    - ec2:DescribeSubnets
    - ec2:DescribeNetworkAcls
    - ec2:DescribeSecurityGroups
    - ec2:DescribeRouteTables
    - ec2:DescribeAvailabilityZones
    - ec2:DescribeDhcpOptions
    - ec2:DescribeInstances
    - ec2:DescribeManagedPrefixLists
    - ec2:GetManagedPrefixListEntries
    - ec2:GetManagedPrefixListAssociations
    Resource: '*'
  - Sid: PermissionsForInspector2Telemetry
    Effect: Allow
    Action:
    - inspector2-telemetry:StartSession
    - inspector2-telemetry:StopSession
    - inspector2-telemetry:SendTelemetry
    - inspector2-telemetry:NotifyHeartbeat
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 4
    resource_constraints: []
  user: auditor-erin
  justification: SOC 2 controls evidence collection
