policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - panorama:*
    Resource: '*'
  - Effect: Allow
    Action:
    - s3:PutObject
    - s3:PutObjectAcl
    - s3:DeleteObject
    - s3:GetObject
    - s3:ListBucket
    Resource: '*'
    Condition:
      ArnLike:
        s3:DataAccessPointArn: arn:aws:s3:*:*:accesspoint/panorama*
  - Effect: Allow
    Action:
    - secretsmanager:GetSecretValue
    - secretsmanager:DescribeSecret
    - secretsmanager:ListSecretVersionIds
    - secretsmanager:PutSecretValue
    - secretsmanager:UpdateSecret
    Resource:
    - arn:aws:secretsmanager:*:*:secret:panorama*
    - arn:aws:secretsmanager:*:*:secret:Panorama*
  - Effect: Allow
    Action:
    - iam:PassRole
    Resource: '*'
    Condition:
      StringEquals:
        iam:PassedToService: panorama.amazonaws.com
  - Effect: Allow
    Action:
    - logs:Describe*
    - logs:Get*
    - logs:List*
    - logs:StartQuery
    - logs:StopQuery
    - logs:TestMetricFilter
    - logs:FilterLogEvents
    Resource:
    - arn:aws:logs:*:*:log-group:/aws/panorama_device*:log-stream:*
    - arn:aws:logs:*:*:log-group:/aws/panorama/devices/*
  - Effect: Allow
    Action:
    - logs:DescribeLogGroups
    Resource:
    - arn:aws:logs:*:*:log-group:*
  - Effect: Allow
    Action:
    - cloudwatch:ListMetrics
    - cloudwatch:GetMetricData
    - cloudwatch:GetMetricStatistics
    Resource: '*'
  - Effect: Allow
    Action: iam:ListRoles
    Resource: '*'
  - Effect: Allow
    Action: iam:CreateServiceLinkedRole
    Resource: '*'
    Condition:
      StringEquals:
        iam:AWSServiceName: panorama.amazonaws.com
  - Effect: Allow
    Action:
    - ecr:GetAuthorizationToken
    - ecr:BatchCheckLayerAvailability
    - ecr:GetDownloadUrlForLayer
    - ecr:GetRepositoryPolicy
    - ecr:DescribeRepositories
    - ecr:ListImages
    - ecr:DescribeImages
    - ecr:BatchGetImage
    - ecr:GetLifecyclePolicy
    - ecr:GetLifecyclePolicyPreview
    - ecr:ListTagsForResource
    - ecr:DescribeImageScanFindings
    Resource: '*'
  - Sid: ECR
    Effect: Allow
    Action:
    - ecr:GetAuthorizationToken
    - ecr:BatchCheckLayerAvailability
    - ecr:InitiateLayerUpload
    - ecr:UploadLayerPart
    - ecr:CompleteLayerUpload
    - ecr:PutImage
    - ecr:BatchGetImage
    - ecr:BatchImportUpstreamImage
    - ecr:GetDownloadUrlForLayer
    - ecr:GetImageCopyStatus
    Resource: '*'
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: SecretsManager
    Effect: Allow
    Action:
    - secretsmanager:GetSecretValue
    Resource: arn:aws:secretsmanager:*:*:secret:ecr-pullthroughcache/*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
    resource_constraints: []
  user: contractor-frank
  justification: 60-day integration project read access
