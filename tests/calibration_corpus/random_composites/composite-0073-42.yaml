name: composite-0073-42
source_policies:
- aws_managed/AWSGlueConsoleFullAccess.yaml
- aws_managed/AWSPanoramaServiceLinkedRolePolicy.yaml
- aws_managed/AWSHealthImagingFullAccess.yaml
- aws_managed/AWSIoTDeviceDefenderUpdateCACertMitigationAction.yaml
- aws_managed/AmazonECSInfrastructureRolePolicyForServiceConnectTransportLayerSecurity.yaml
source_hash: f8300a707b55734f
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: BaseAppPermissions
    Effect: Allow
    Action:
    - glue:*
    - redshift:DescribeClusters
    - redshift:DescribeClusterSubnetGroups
    - iam:ListRoles
    - iam:ListUsers
    - iam:ListGroups
    - iam:ListRolePolicies
    - iam:GetRole
    - iam:GetRolePolicy
    - iam:ListAttachedRolePolicies
    - ec2:DescribeSecurityGroups
    - ec2:DescribeSubnets
    - ec2:DescribeVpcs
    - ec2:DescribeVpcEndpoints
    - ec2:DescribeRouteTables
    - ec2:DescribeVpcAttribute
    - ec2:DescribeKeyPairs
    - ec2:DescribeInstances
    - ec2:DescribeImages
    - rds:DescribeDBInstances
    - rds:DescribeDBClusters
    - rds:DescribeDBSubnetGroups
    - s3:ListAllMyBuckets
    - s3:ListBucket
    - s3:GetBucketAcl
    - s3:GetBucketLocation
    - cloudformation:ListStacks
    - cloudformation:DescribeStacks
    - cloudformation:GetTemplateSummary
    - dynamodb:ListTables
    - kms:ListAliases
    - kms:DescribeKey
    - cloudwatch:GetMetricData
    - cloudwatch:ListDashboards
    - databrew:ListRecipes
    - databrew:ListRecipeVersions
    - databrew:DescribeRecipe
    Resource:
    - '*'
  - Effect: Allow
    Action:
    - s3:GetObject
    - s3:PutObject
    Resource:
    - arn:aws:s3:::aws-glue-*/*
    - arn:aws:s3:::*/*aws-glue-*/*
    - arn:aws:s3:::aws-glue-*
  - Effect: Allow
    Action:
    - tag:GetResources
    Resource:
    - '*'
  - Effect: Allow
    Action:
    - s3:CreateBucket
    Resource:
    - arn:aws:s3:::aws-glue-*
  - Effect: Allow
    Action:
    - logs:GetLogEvents
    Resource:
    - arn:aws:logs:*:*:/aws-glue/*
  - Effect: Allow
    Action:
    - cloudformation:CreateStack
    - cloudformation:DeleteStack
    Resource: arn:aws:cloudformation:*:*:stack/aws-glue*/*
  - Effect: Allow
    Action:
    - ec2:RunInstances
    Resource:
    - arn:aws:ec2:*:*:instance/*
    - arn:aws:ec2:*:*:key-pair/*
    - arn:aws:ec2:*:*:image/*
    - arn:aws:ec2:*:*:security-group/*
    - arn:aws:ec2:*:*:network-interface/*
    - arn:aws:ec2:*:*:subnet/*
    - arn:aws:ec2:*:*:volume/*
  - Effect: Allow
    Action:
    - ec2:TerminateInstances
    - ec2:CreateTags
    - ec2:DeleteTags
    Resource:
    - arn:aws:ec2:*:*:instance/*
    Condition:
      StringLike:
        ec2:ResourceTag/aws:cloudformation:stack-id: arn:aws:cloudformation:*:*:stack/aws-glue-*/*
      StringEquals:
        ec2:ResourceTag/aws:cloudformation:logical-id: ZeppelinInstance
  - Action:
    - iam:PassRole
    Effect: Allow
    Resource: arn:aws:iam::*:role/AWSGlueServiceRole*
    Condition:
      StringLike:
        iam:PassedToService:
        - glue.amazonaws.com
  - Action:
    - iam:PassRole
    Effect: Allow
    Resource: arn:aws:iam::*:role/AWSGlueServiceNotebookRole*
    Condition:
      StringLike:
        iam:PassedToService:
        - ec2.amazonaws.com
  - Action:
    - iam:PassRole
    Effect: Allow
    Resource:
    - arn:aws:iam::*:role/service-role/AWSGlueServiceRole*
    Condition:
      StringLike:
        iam:PassedToService:
        - glue.amazonaws.com
  - Sid: PanoramaIoTThingAccess
    Effect: Allow
    Action:
    - iot:CreateThing
    - iot:DeleteThing
    - iot:DeleteThingShadow
    - iot:DescribeThing
    - iot:GetThingShadow
    - iot:UpdateThing
    - iot:UpdateThingShadow
    Resource:
    - arn:aws:iot:*:*:thing/panorama*
  - Sid: PanoramaIoTCertificateAccess
    Effect: Allow
    Action:
    - iot:AttachThingPrincipal
    - iot:DetachThingPrincipal
    - iot:UpdateCertificate
    - iot:DeleteCertificate
    - iot:AttachPrincipalPolicy
    - iot:DetachPrincipalPolicy
    Resource:
    - arn:aws:iot:*:*:thing/panorama*
    - arn:aws:iot:*:*:cert/*
  - Sid: PanoramaIoTCreateCertificateAccess
    Effect: Allow
    Action:
    - iot:CreateKeysAndCertificate
    Resource:
    - '*'
  - Sid: PanoramaIoTCreatePolicyAndVersionAccess
    Effect: Allow
    Action:
    - iot:CreatePolicy
    - iot:CreatePolicyVersion
    - iot:AttachPolicy
    Resource:
    - arn:aws:iot:*:*:policy/panorama*
  - Sid: PanoramaIoTJobAccess
    Effect: Allow
    Action:
    - iot:DescribeJobExecution
    - iot:CreateJob
    - iot:DeleteJob
    Resource:
    - arn:aws:iot:*:*:job/panorama*
    - arn:aws:iot:*:*:thing/panorama*
  - Sid: PanoramaIoTEndpointAccess
    Effect: Allow
    Action:
    - iot:DescribeEndpoint
    Resource:
    - '*'
  - Sid: PanoramaReadOnlyAccess
    Effect: Allow
    Action:
    - panorama:Describe*
    - panorama:List*
    Resource:
    - '*'
  - Sid: SecretsManagerPermissions
    Effect: Allow
    Action:
    - secretsmanager:GetSecretValue
    - secretsmanager:DescribeSecret
    - secretsmanager:CreateSecret
    - secretsmanager:ListSecretVersionIds
    - secretsmanager:DeleteSecret
    Resource:
    - arn:aws:secretsmanager:*:*:secret:panorama*
    - arn:aws:secretsmanager:*:*:secret:Panorama*
  - Effect: Allow
    Action:
    - medical-imaging:*
    Resource: '*'
  - Effect: Allow
    Action: iam:PassRole
    Resource: '*'
    Condition:
      StringEquals:
        iam:PassedToService: medical-imaging.amazonaws.com
  - Effect: Allow
    Action:
    - iot:UpdateCACertificate
    Resource:
    - '*'
  - Sid: CreateSecret
    Effect: Allow
    Action: secretsmanager:CreateSecret
    Resource: arn:aws:secretsmanager:*:*:secret:ecs-sc!*
    Condition:
      ArnLike:
        aws:RequestTag/AmazonECSCreated:
        - arn:aws:ecs:*:*:service/*/*
        - arn:aws:ecs:*:*:task-set/*/*
      StringEquals:
        aws:RequestTag/AmazonECSManaged: 'true'
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: TagOnCreateSecret
    Effect: Allow
    Action: secretsmanager:TagResource
    Resource: arn:aws:secretsmanager:*:*:secret:ecs-sc!*
    Condition:
      ArnLike:
        aws:RequestTag/AmazonECSCreated:
        - arn:aws:ecs:*:*:service/*/*
        - arn:aws:ecs:*:*:task-set/*/*
      StringEquals:
        aws:RequestTag/AmazonECSManaged: 'true'
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: RotateTLSCertificateSecret
    Effect: Allow
    Action:
    - secretsmanager:UpdateSecret
    - secretsmanager:GetSecretValue
    - secretsmanager:PutSecretValue
    - secretsmanager:DeleteSecret
    - secretsmanager:RotateSecret
    - secretsmanager:UpdateSecretVersionStage
    Resource: arn:aws:secretsmanager:*:*:secret:ecs-sc!*
    Condition:
      StringEquals:
        secretsmanager:ResourceTag/aws:secretsmanager:owningService: ecs-sc
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: DescribeTLSCertificateSecret
    Effect: Allow
    Action:
    - secretsmanager:DescribeSecret
    Resource: arn:aws:secretsmanager:*:*:secret:ecs-sc!*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: ManagePrivateCertificateAuthority
    Effect: Allow
    Action:
    - acm-pca:GetCertificate
    - acm-pca:GetCertificateAuthorityCertificate
    - acm-pca:DescribeCertificateAuthority
    Resource: '*'
    Condition:
      StringEquals:
        aws:ResourceTag/AmazonECSManaged: 'true'
  - Sid: ManagePrivateCertificateAuthorityForIssuingEndEntityCertificate
    Effect: Allow
    Action:
    - acm-pca:IssueCertificate
    Resource: '*'
    Condition:
      StringEquals:
        aws:ResourceTag/AmazonECSManaged: 'true'
        acm-pca:TemplateArn: arn:aws:acm-pca:::template/EndEntityCertificate/V1
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
    resource_constraints: []
  user: ci-bot
  justification: deploy via terraform-cloud agent
