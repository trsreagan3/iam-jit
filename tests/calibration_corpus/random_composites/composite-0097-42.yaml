name: composite-0097-42
source_policies:
- aws_managed/AWS-SSM-DiagnosisAutomation-AdministrationRolePolicy.yaml
- aws_managed/AWSDeepRacerCloudFormationAccessPolicy.yaml
- aws_managed/AmazonEKSWorkerNodeMinimalPolicy.yaml
source_hash: e2c4e45674604224
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: AllowReadOnlyAccessSSMResource
    Effect: Allow
    Action:
    - ssm:DescribeAutomationExecutions
    - ssm:DescribeAutomationStepExecutions
    - ssm:GetAutomationExecution
    Resource: '*'
  - Sid: AllowExecuteSSMAutomation
    Effect: Allow
    Action:
    - ssm:StartAutomationExecution
    Resource:
    - arn:aws:ssm:*:*:document/AWS-*UnmanagedEC2*
    - arn:aws:ssm:*:*:automation-execution/*
    - arn:aws:ssm:*:*:automation-definition/AWS-*UnmanagedEC2*:*
  - Sid: AllowKMSOperations
    Effect: Allow
    Action:
    - kms:Decrypt
    - kms:GenerateDataKey
    Resource: arn:aws:kms:*:*:key/*
    Condition:
      StringEquals:
        aws:ResourceTag/SystemsManagerManaged: 'true'
      ArnLike:
        kms:EncryptionContext:aws:s3:arn: arn:aws:s3:::do-not-delete-ssm-diagnosis-*
      StringLike:
        kms:ViaService: s3.*.amazonaws.com
      Bool:
        aws:ViaAWSService: 'true'
  - Sid: AllowAssumeDiagnosisExecutionRoleWithinAccount
    Effect: Allow
    Action: sts:AssumeRole
    Resource: arn:aws:iam::*:role/AWS-SSM-DiagnosisExecutionRole*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: AllowPassRoleOnSelfToSsm
    Effect: Allow
    Action: iam:PassRole
    Resource: arn:aws:iam::*:role/AWS-SSM-DiagnosisAdminRole*
    Condition:
      StringEquals:
        iam:PassedToService: ssm.amazonaws.com
  - Sid: AllowReadWriteToSsmDiagnosisBucketInSameAccount
    Effect: Allow
    Action:
    - s3:PutObject
    - s3:GetObject
    - s3:DeleteObject
    Resource: arn:aws:s3:::do-not-delete-ssm-diagnosis-*/actions/*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: AllowListBucketOnSsmDiagnosisBucketInSameAccount
    Effect: Allow
    Action:
    - s3:ListBucket
    Resource: arn:aws:s3:::do-not-delete-ssm-diagnosis-*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Effect: Allow
    Action:
    - cloudformation:*
    Resource: '*'
  - Effect: Allow
    Action:
    - ec2:AllocateAddress
    - ec2:AttachInternetGateway
    - ec2:AssociateRouteTable
    - ec2:AuthorizeSecurityGroupEgress
    - ec2:AuthorizeSecurityGroupIngress
    - ec2:CreateInternetGateway
    - ec2:CreateNatGateway
    - ec2:CreateNetworkAcl
    - ec2:CreateNetworkAclEntry
    - ec2:CreateRoute
    - ec2:CreateRouteTable
    - ec2:CreateSecurityGroup
    - ec2:CreateSubnet
    - ec2:CreateTags
    - ec2:CreateVpc
    - ec2:CreateVpcEndpoint
    - ec2:DeleteInternetGateway
    - ec2:DeleteNatGateway
    - ec2:DeleteNetworkAcl
    - ec2:DeleteNetworkAclEntry
    - ec2:DeleteRoute
    - ec2:DeleteRouteTable
    - ec2:DeleteSecurityGroup
    - ec2:DeleteSubnet
    - ec2:DeleteTags
    - ec2:DeleteVpc
    - ec2:DeleteVpcEndpoints
    - ec2:DescribeAddresses
    - ec2:DescribeInternetGateways
    - ec2:DescribeNatGateways
    - ec2:DescribeNetworkAcls
    - ec2:DescribeRouteTables
    - ec2:DescribeSecurityGroups
    - ec2:DescribeSubnets
    - ec2:DescribeTags
    - ec2:DescribeVpcEndpoints
    - ec2:DescribeVpcs
    - ec2:DetachInternetGateway
    - ec2:DisassociateRouteTable
    - ec2:ModifySubnetAttribute
    - ec2:ModifyVpcAttribute
    - ec2:ReleaseAddress
    - ec2:ReplaceNetworkAclAssociation
    - ec2:RevokeSecurityGroupEgress
    - ec2:RevokeSecurityGroupIngress
    Resource: '*'
  - Effect: Allow
    Action:
    - iam:PassRole
    Resource: arn:aws:iam::*:role/service-role/AWSDeepRacerLambdaAccessRole
    Condition:
      StringLikeIfExists:
        iam:PassedToService: lambda.amazonaws.com
  - Effect: Allow
    Action:
    - lambda:CreateFunction
    - lambda:GetFunction
    - lambda:DeleteFunction
    - lambda:TagResource
    - lambda:UpdateFunctionCode
    Resource:
    - arn:aws:lambda:*:*:function:*DeepRacer*
    - arn:aws:lambda:*:*:function:*Deepracer*
    - arn:aws:lambda:*:*:function:*deepracer*
  - Effect: Allow
    Action:
    - s3:PutBucketPolicy
    - s3:CreateBucket
    - s3:ListBucket
    - s3:GetBucketAcl
    - s3:DeleteBucket
    Resource:
    - arn:aws:s3:::*DeepRacer*
    - arn:aws:s3:::*Deepracer*
    - arn:aws:s3:::*deepracer*
  - Effect: Allow
    Action:
    - robomaker:CreateSimulationApplication
    - robomaker:CreateSimulationApplicationVersion
    - robomaker:DeleteSimulationApplication
    - robomaker:DescribeSimulationApplication
    - robomaker:ListSimulationApplications
    - robomaker:TagResource
    - robomaker:UpdateSimulationApplication
    Resource:
    - arn:aws:robomaker:*:*:/createSimulationApplication
    - arn:aws:robomaker:*:*:simulation-application/deepracer*
  - Sid: WorkerNodePermissions
    Effect: Allow
    Action:
    - eks-auth:AssumeRoleForPodIdentity
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
    resource_constraints: []
  user: dev-bob
  justification: 'reproduce customer ticket #4422 locally'
