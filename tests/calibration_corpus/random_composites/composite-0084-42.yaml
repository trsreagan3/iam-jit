  - 'State-changing action `events:PutTargets` on Resource: `*` (IAM access level: Write)'
  - 'Destructive action `events:RemoveTargets` on Resource: `*` (blast radius = every resource in this account)'
  - 'Resource: `*` for autoscaling, tag (broad cross-resource read/access)'
