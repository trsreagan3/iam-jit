name: composite-0084-42
source_policies:
- aws_managed/IAMCreateRootUserPassword.yaml
- aws_managed/AWSVPCFlowLogsServiceRolePolicy.yaml
source_hash: 42dba43c4747e0fe
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: DenyAllOtherActionsOnAnyResource
    Effect: Deny
    NotAction:
    - iam:CreateLoginProfile
    - iam:GetLoginProfile
    Resource: '*'
  - Sid: DenyCreatingPasswordOnNonRootUserResource
    Effect: Deny
    Action:
    - iam:CreateLoginProfile
    - iam:GetLoginProfile
    NotResource: arn:aws:iam::*:root
  - Sid: AllowPutRuleOnSpecificSourcesAndDetailTypes
    Effect: Allow
    Action: events:PutRule
    Resource:
    - arn:aws:events:*:*:rule/VPCFlowLogsEC2TagsManagedRule
    - arn:aws:events:*:*:rule/VPCFlowLogsASGTagsManagedRule
    Condition:
      ForAllValues:StringEquals:
        events:source:
        - aws.tag
        - aws.autoscaling
        events:detail-type:
        - AWS API Call via CloudTrail
        - Tag Change on Resource
      'Null':
        events:source: 'false'
        events:detail-type: 'false'
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: AllowOtherOperationsOnRulesManagedByVPCFlowLogs
    Effect: Allow
    Action:
    - events:DeleteRule
    - events:DescribeRule
    - events:PutTargets
    - events:RemoveTargets
    Resource:
    - arn:aws:events:*:*:rule/VPCFlowLogsEC2TagsManagedRule
    - arn:aws:events:*:*:rule/VPCFlowLogsASGTagsManagedRule
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: AllowDescribeTagsOnAllEC2Resources
    Effect: Allow
    Action:
    - tag:GetResources
    - autoscaling:DescribeTags
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
    resource_constraints: []
  user: contractor-frank
  justification: 60-day integration project read access
