name: composite-0074-42
source_policies:
- aws_managed/AWSVendorInsightsAssessorFullAccess.yaml
- aws_managed/AmazonECSInfrastructureRolePolicyForManagedInstances.yaml
- aws_managed/KafkaServiceRolePolicy.yaml
source_hash: 228112a47b02049d
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - vendor-insights:GetProfileAccessTerms
    - vendor-insights:ListEntitledSecurityProfiles
    - vendor-insights:GetEntitledSecurityProfileSnapshot
    - vendor-insights:ListEntitledSecurityProfileSnapshots
    Resource: '*'
  - Effect: Allow
    Action:
    - aws-marketplace:CreateAgreementRequest
    - aws-marketplace:GetAgreementRequest
    - aws-marketplace:AcceptAgreementRequest
    - aws-marketplace:CancelAgreementRequest
    - aws-marketplace:ListAgreementRequests
    - aws-marketplace:SearchAgreements
    - aws-marketplace:CancelAgreement
    Resource: '*'
    Condition:
      ForAnyValue:StringEquals:
        aws-marketplace:AgreementType: VendorInsightsAgreement
  - Effect: Allow
    Action:
    - artifact:GetReport
    - artifact:GetReportMetadata
    - artifact:GetTermForReport
    - artifact:ListReports
    Resource: arn:aws:artifact:*::report/*
  - Sid: CreateLaunchTemplateForManagedInstances
    Effect: Allow
    Action:
    - ec2:CreateLaunchTemplate
    Resource:
    - arn:aws:ec2:*:*:launch-template/*
    Condition:
      StringEquals:
        aws:RequestTag/AmazonECSManaged: 'true'
  - Sid: CreateLaunchTemplateVersionsForManagedInstances
    Effect: Allow
    Action:
    - ec2:CreateLaunchTemplateVersion
    - ec2:ModifyLaunchTemplate
    Resource:
    - arn:aws:ec2:*:*:launch-template/*
    Condition:
      StringEquals:
        ec2:ManagedResourceOperator: ecs.amazonaws.com
  - Sid: ProvisionEC2InstancesForManagedInstances
    Effect: Allow
    Action:
    - ec2:CreateFleet
    Resource:
    - arn:aws:ec2:*:*:fleet/*
    - arn:aws:ec2:*:*:instance/*
    - arn:aws:ec2:*:*:network-interface/*
    - arn:aws:ec2:*:*:launch-template/*
    - arn:aws:ec2:*:*:volume/*
    Condition:
      StringEquals:
        aws:RequestTag/AmazonECSManaged: 'true'
  - Sid: CreateFleetForSupportingResources
    Effect: Allow
    Action:
    - ec2:CreateFleet
    Resource:
    - arn:aws:ec2:*:*:subnet/*
    - arn:aws:ec2:*:*:security-group/*
    - arn:aws:ec2:*::image/*
  - Sid: RunInstancesForManagedInstances
    Effect: Allow
    Action:
    - ec2:RunInstances
    Resource:
    - arn:aws:ec2:*:*:instance/*
    - arn:aws:ec2:*:*:volume/*
    - arn:aws:ec2:*:*:network-interface/*
    Condition:
      StringEquals:
        aws:RequestTag/AmazonECSManaged: 'true'
  - Sid: RunInstancesForECSManagedLaunchTemplates
    Effect: Allow
    Action:
    - ec2:RunInstances
    Resource:
    - arn:aws:ec2:*:*:launch-template/*
    Condition:
      StringEquals:
        ec2:ResourceTag/AmazonECSManaged: 'true'
  - Sid: RunInstancesForSupportingResources
    Effect: Allow
    Action:
    - ec2:RunInstances
    Resource:
    - arn:aws:ec2:*:*:subnet/*
    - arn:aws:ec2:*:*:security-group/*
    - arn:aws:ec2:*::image/*
    - arn:aws:resource-groups:*:*:group/*
  - Sid: TagOnCreateEC2ResourcesForManagedInstances
    Effect: Allow
    Action:
    - ec2:CreateTags
    Resource:
    - arn:aws:ec2:*:*:fleet/*
    - arn:aws:ec2:*:*:launch-template/*
    - arn:aws:ec2:*:*:network-interface/*
    - arn:aws:ec2:*:*:instance/*
    - arn:aws:ec2:*:*:volume/*
    Condition:
      StringEquals:
        ec2:CreateAction:
        - CreateFleet
        - CreateLaunchTemplate
        - RunInstances
  - Sid: PassInstanceRoleForManagedInstances
    Effect: Allow
    Action:
    - iam:PassRole
    Resource:
    - arn:aws:iam::*:role/ecsInstanceRole*
    Condition:
      StringLike:
        iam:PassedToService: ec2.*
  - Sid: CreateServiceLinkedRoleForEC2Spot
    Effect: Allow
    Action:
    - iam:CreateServiceLinkedRole
    Resource:
    - arn:aws:iam::*:role/aws-service-role/spot.amazonaws.com/AWSServiceRoleForEC2Spot
  - Sid: DescribeEC2ResourcesManagedByECS
    Effect: Allow
    Action:
    - ec2:DescribeInstances
    - ec2:DescribeInstanceTypes
    - ec2:DescribeLaunchTemplates
    - ec2:DescribeNetworkInterfaces
    - ec2:DescribeInstanceTypeOfferings
    - ec2:DescribeAvailabilityZones
    - ec2:DescribeSecurityGroups
    - ec2:DescribeSubnets
    - ec2:DescribeVpcs
    - ec2:DescribeCapacityReservations
    Resource: '*'
  - Sid: ListResourceGroupResources
    Effect: Allow
    Action:
    - resource-groups:ListGroupResources
    - cloudformation:DescribeStacks
    - cloudformation:ListStackResources
    - tag:GetResources
    Resource: '*'
  - Effect: Allow
    Action:
    - ec2:CreateNetworkInterface
    - ec2:DescribeNetworkInterfaces
    - ec2:CreateNetworkInterfacePermission
    - ec2:AttachNetworkInterface
    - ec2:DeleteNetworkInterface
    - ec2:DetachNetworkInterface
    - ec2:DescribeVpcEndpoints
    - acm-pca:GetCertificateAuthorityCertificate
    - secretsmanager:ListSecrets
    Resource: '*'
  - Effect: Allow
    Action:
    - ec2:ModifyVpcEndpoint
    Resource: arn:*:ec2:*:*:subnet/*
  - Effect: Allow
    Action:
    - ec2:DeleteVpcEndpoints
    - ec2:ModifyVpcEndpoint
    Resource: arn:*:ec2:*:*:vpc-endpoint/*
    Condition:
      StringEquals:
        ec2:ResourceTag/AWSMSKManaged: 'true'
      StringLike:
        ec2:ResourceTag/ClusterArn: '*'
  - Effect: Allow
    Action:
    - secretsmanager:GetResourcePolicy
    - secretsmanager:PutResourcePolicy
    - secretsmanager:DeleteResourcePolicy
    - secretsmanager:DescribeSecret
    Resource: '*'
    Condition:
      ArnLike:
        secretsmanager:SecretId: arn:*:secretsmanager:*:*:secret:AmazonMSK_*
  - Effect: Allow
    Action:
    - ec2:AssignIpv6Addresses
    - ec2:UnassignIpv6Addresses
    - ec2:ModifyNetworkInterfaceAttribute
    Resource: arn:*:ec2:*:*:network-interface/*
    Condition:
      StringEquals:
        ec2:ResourceTag/AWSMSKManaged: 'true'
      StringLike:
        ec2:ResourceTag/ClusterArn: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
    resource_constraints: []
  user: dev-bob
  justification: 'reproduce customer ticket #4422 locally'
