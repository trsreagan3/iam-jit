  - 'Resource: `*` for applicationinsights (broad cross-resource read/access)'
  - 'State-changing action `lambda:UpdateAlias` on Resource: `*` (IAM access level: Write)'
  - 'Resource: `*` for cloudwatch, lambda (broad cross-resource read/access)'
  - 'Resource: `*` for s3 (broad cross-resource read/access)'
  - 'State-changing action `lambda:InvokeFunction` on Resource: `*` (IAM access level: Write)'
