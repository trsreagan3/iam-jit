name: composite-0055-42
source_policies:
- aws_managed/AWSAutoScalingPlansEC2AutoScalingPolicy.yaml
- aws_managed/CloudWatchApplicationInsightsReadOnlyAccess.yaml
- aws_managed/AWSCodeDeployRoleForLambdaLimited.yaml
source_hash: 7e8c4188f3c883aa
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - cloudwatch:GetMetricData
    - autoscaling:DescribeAutoScalingGroups
    - autoscaling:DescribeScheduledActions
    - autoscaling:BatchPutScheduledUpdateGroupAction
    - autoscaling:BatchDeleteScheduledAction
    Resource: '*'
  - Effect: Allow
    Action:
    - applicationinsights:Describe*
    - applicationinsights:List*
    Resource: '*'
  - Action:
    - cloudwatch:DescribeAlarms
    - lambda:UpdateAlias
    - lambda:GetAlias
    - lambda:GetProvisionedConcurrencyConfig
    Resource: '*'
    Effect: Allow
  - Action:
    - s3:GetObject
    - s3:GetObjectVersion
    Resource: arn:aws:s3:::*/CodeDeploy/*
    Effect: Allow
  - Action:
    - s3:GetObject
    - s3:GetObjectVersion
    Resource: '*'
    Condition:
      StringEquals:
        s3:ExistingObjectTag/UseWithCodeDeploy: 'true'
    Effect: Allow
  - Action:
    - lambda:InvokeFunction
    Resource: arn:aws:lambda:*:*:function:CodeDeployHook_*
    Effect: Allow
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 8
    resource_constraints: []
  user: agent-claude
  justification: scoped-tool execution for end-user task
