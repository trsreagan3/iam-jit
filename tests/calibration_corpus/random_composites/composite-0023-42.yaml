name: composite-0023-42
source_policies:
- aws_managed/AmazonRoute53AutoNamingReadOnlyAccess.yaml
- aws_managed/AWSPurchaseOrdersServiceRolePolicy.yaml
- aws_managed/AmazonSSMReadOnlyAccess.yaml
- aws_managed/AWSAppConfigServiceRolePolicy.yaml
- aws_managed/NovaActServiceRolePolicy.yaml
source_hash: 88341996e2b08448
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - servicediscovery:Get*
    - servicediscovery:List*
    Resource:
    - '*'
  - Effect: Allow
    Action:
    - account:GetAccountInformation
    - account:GetContactInformation
    - aws-portal:*Billing
    - consolidatedbilling:GetAccountBillingRole
    - invoicing:GetInvoicePDF
    - invoicing:ListInvoiceUnits
    - payments:GetPaymentInstrument
    - payments:ListPaymentPreferences
    - purchase-orders:AddPurchaseOrder
    - purchase-orders:DeletePurchaseOrder
    - purchase-orders:GetPurchaseOrder
    - purchase-orders:ListPurchaseOrderInvoices
    - purchase-orders:ListPurchaseOrders
    - purchase-orders:ListTagsForResource
    - purchase-orders:ModifyPurchaseOrders
    - purchase-orders:TagResource
    - purchase-orders:UntagResource
    - purchase-orders:UpdatePurchaseOrder
    - purchase-orders:UpdatePurchaseOrderStatus
    - purchase-orders:ViewPurchaseOrders
    - tax:ListTaxRegistrations
    Resource: '*'
  - Effect: Allow
    Action:
    - ssm:Describe*
    - ssm:Get*
    - ssm:List*
    Resource: '*'
  - Sid: CloudWatchPutExperimentMetrics
    Effect: Allow
    Action:
    - cloudwatch:PutMetricData
    Resource: '*'
    Condition:
      StringEquals:
        cloudwatch:namespace: AWS/AppConfig
  - Sid: AllowPublishCloudWatchMetrics
    Effect: Allow
    Action:
    - cloudwatch:PutMetricData
    Resource: '*'
    Condition:
      StringEquals:
        cloudwatch:namespace: AWS/NovaAct
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 8
    resource_constraints: []
  user: ci-bot
  justification: rotate signing key via CI pipeline
