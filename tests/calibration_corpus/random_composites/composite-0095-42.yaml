name: composite-0095-42
source_policies:
- aws_managed/AWSCloudTrail_ReadOnlyAccess.yaml
- aws_managed/AmazonGrafanaRedshiftAccess.yaml
- aws_managed/AmazonECSInstanceRolePolicyForManagedInstances.yaml
- aws_managed/CloudWatchLogsReadOnlyAccess.yaml
source_hash: 9801e0ec3351b815
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - cloudtrail:Get*
    - cloudtrail:Describe*
    - cloudtrail:List*
    - cloudtrail:LookupEvents
    Resource: '*'
  - Effect: Allow
    Action:
    - redshift:DescribeClusters
    - redshift-data:GetStatementResult
    - redshift-data:DescribeStatement
    - secretsmanager:ListSecrets
    Resource: '*'
  - Effect: Allow
    Action:
    - redshift-data:DescribeTable
    - redshift-data:ExecuteStatement
    - redshift-data:ListTables
    - redshift-data:ListSchemas
    Resource: '*'
    Condition:
      'Null':
        aws:ResourceTag/GrafanaDataSource: 'false'
  - Effect: Allow
    Action: redshift:GetClusterCredentials
    Resource:
    - arn:aws:redshift:*:*:dbname:*/*
    - arn:aws:redshift:*:*:dbuser:*/redshift_data_api_user
  - Effect: Allow
    Action:
    - secretsmanager:GetSecretValue
    Resource: '*'
    Condition:
      'Null':
        secretsmanager:ResourceTag/RedshiftQueryOwner: 'false'
  - Sid: ECSAgentDiscoverPollEndpointPermissions
    Effect: Allow
    Action:
    - ecs:DiscoverPollEndpoint
    Resource: '*'
  - Sid: ECSAgentRegisterPermissions
    Effect: Allow
    Action:
    - ecs:RegisterContainerInstance
    Resource: arn:aws:ecs:*:*:cluster/*
  - Sid: ECSAgentPollPermissions
    Effect: Allow
    Action:
    - ecs:Poll
    Resource: arn:aws:ecs:*:*:container-instance/*
  - Sid: ECSAgentTelemetryPermissions
    Effect: Allow
    Action:
    - ecs:StartTelemetrySession
    - ecs:PutSystemLogEvents
    Resource: arn:aws:ecs:*:*:container-instance/*
  - Sid: ECSAgentStateChangePermissions
    Effect: Allow
    Action:
    - ecs:SubmitAttachmentStateChanges
    - ecs:SubmitTaskStateChange
    Resource: arn:aws:ecs:*:*:cluster/*
  - Sid: CloudWatchLogsReadOnlyAccess
    Effect: Allow
    Action:
    - logs:Describe*
    - logs:Get*
    - logs:List*
    - logs:StartQuery
    - logs:StopQuery
    - logs:TestMetricFilter
    - logs:FilterLogEvents
    - logs:StartLiveTail
    - logs:StopLiveTail
    - cloudwatch:GenerateQuery
    - cloudwatch:GenerateQueryResultsSummary
    - observabilityadmin:ListS3TableIntegrations
    - observabilityadmin:GetS3TableIntegration
    - observabilityadmin:ListTelemetryPipelines
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
    resource_constraints: []
  user: contractor-frank
  justification: 60-day integration project read access
