name: composite-0090-42
source_policies:
- aws_managed/AwsGlueSessionUserRestrictedPolicy.yaml
- aws_managed/ElementalActivationsDownloadSoftwareAccess.yaml
- aws_managed/AWSThinkboxDeadlineSpotEventPluginWorkerPolicy.yaml
source_hash: 2621469ca142eb01
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: AllowSessionActions
    Effect: Allow
    Action:
    - glue:CreateSession
    Resource:
    - arn:aws:glue:*:*:session/*
    Condition:
      StringEquals:
        aws:RequestTag/owner: ${aws:userid}
      ForAnyValue:StringEquals:
        aws:TagKeys:
        - owner
  - Sid: AllowGlueTaggingAction
    Effect: Allow
    Action:
    - glue:TagResource
    Resource: arn:aws:glue:*:*:session/*
    Condition:
      StringEquals:
        aws:ResourceTag/owner: ${aws:userid}
        aws:RequestTag/owner: ${aws:userid}
  - Sid: AllowCompletionActions
    Effect: Allow
    Action:
    - glue:StartCompletion
    - glue:GetCompletion
    Resource:
    - arn:aws:glue:*:*:completion/*
  - Sid: AllowGlueActions
    Effect: Allow
    Action:
    - glue:RunStatement
    - glue:GetStatement
    - glue:ListStatements
    - glue:CancelStatement
    - glue:StopSession
    - glue:DeleteSession
    - glue:GetSession
    Resource:
    - arn:aws:glue:*:*:session/*
    Condition:
      StringEquals:
        aws:ResourceTag/owner: ${aws:userid}
  - Sid: AllowListSessions
    Effect: Allow
    Action:
    - glue:ListSessions
    Resource:
    - '*'
  - Sid: DenyTagActions
    Effect: Deny
    Action:
    - glue:UntagResource
    - tag:TagResources
    - tag:UntagResources
    Resource:
    - arn:aws:glue:*:*:session/*
    Condition:
      ForAnyValue:StringEquals:
        aws:TagKeys:
        - owner
  - Sid: AllowPassRoleActions
    Effect: Allow
    Action:
    - iam:PassRole
    Resource:
    - arn:aws:iam::*:role/service-role/AwsGlueSessionServiceRoleUserRestricted*
    Condition:
      StringLike:
        iam:PassedToService:
        - glue.amazonaws.com
  - Effect: Allow
    Action:
    - elemental-activations:Get*
    - elemental-activations:Download*
    Resource: '*'
  - Effect: Allow
    Action:
    - ec2:DescribeInstances
    - ec2:DescribeTags
    Resource:
    - '*'
  - Effect: Allow
    Action:
    - ec2:TerminateInstances
    Resource:
    - arn:aws:ec2:*:*:instance/*
    Condition:
      StringEquals:
        ec2:ResourceTag/DeadlineTrackedAWSResource: SpotEventPlugin
  - Effect: Allow
    Action:
    - ec2:TerminateInstances
    Resource:
    - arn:aws:ec2:*:*:instance/*
    Condition:
      StringEquals:
        ec2:ResourceTag/DeadlineResourceTracker: SpotEventPlugin
  - Effect: Allow
    Action:
    - sqs:GetQueueUrl
    - sqs:SendMessage
    Resource:
    - arn:aws:sqs:*:*:DeadlineAWSComputeNodeState*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 2
    resource_constraints: []
  user: agent-claude
  justification: background reconciliation loop
