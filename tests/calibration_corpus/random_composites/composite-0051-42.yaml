name: composite-0051-42
source_policies:
- aws_managed/AmazonS3ObjectLambdaExecutionRolePolicy.yaml
- aws_managed/AWSChatbotServiceLinkedRolePolicy.yaml
- aws_managed/AWSSystemsManagerEnableConfigRecordingExecutionPolicy.yaml
source_hash: 5e3f5f666006acd4
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - logs:CreateLogGroup
    - logs:CreateLogStream
    - logs:PutLogEvents
    - s3-object-lambda:WriteGetObjectResponse
    Resource: '*'
  - Action:
    - sns:ListSubscriptionsByTopic
    - sns:ListTopics
    - sns:Unsubscribe
    - sns:Subscribe
    - sns:ListSubscriptions
    Effect: Allow
    Resource: '*'
  - Effect: Allow
    Action:
    - logs:PutLogEvents
    - logs:CreateLogStream
    - logs:DescribeLogStreams
    - logs:CreateLogGroup
    - logs:DescribeLogGroups
    Resource: arn:aws:logs:*:*:log-group:/aws/chatbot/*
  - Sid: S3BucketCreatePermissions
    Effect: Allow
    Action:
    - s3:CreateBucket
    - s3:PutBucketPublicAccessBlock
    - s3:ListBucket
    - s3:PutBucketPolicy
    - s3:PutEncryptionConfiguration
    Resource:
    - arn:aws:s3:::aws-quick-setup-config-recording-*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: SNSTopicsListPermissions
    Effect: Allow
    Action:
    - sns:ListTopics
    Resource: '*'
  - Sid: DefaultSNSTopicCreatePermissions
    Effect: Allow
    Action:
    - sns:CreateTopic
    Resource: arn:aws:sns:*:*:ConfigRecording-Default-Topic
  - Sid: ConfigureAndStartConfigurationRecorderPermissions
    Effect: Allow
    Action:
    - config:DescribeConfigurationRecorders
    - config:DescribeDeliveryChannels
    - config:PutConfigurationRecorder
    - config:PutDeliveryChannel
    - config:StartConfigurationRecorder
    Resource: '*'
  - Sid: GetAndPassConfigSLRPermissions
    Effect: Allow
    Action:
    - iam:GetRole
    - iam:PassRole
    Resource:
    - arn:aws:iam::*:role/aws-service-role/config.amazonaws.com/AWSServiceRoleForConfig
    - arn:aws:iam::*:role/AWSServiceRoleForConfig
  - Sid: CreateConfigSLRPermissions
    Effect: Allow
    Action:
    - iam:CreateServiceLinkedRole
    Resource:
    - arn:aws:iam::*:role/aws-service-role/config.amazonaws.com/AWSServiceRoleForConfig
    Condition:
      StringEquals:
        iam:AWSServiceName: config.amazonaws.com
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
    resource_constraints: []
  user: ci-bot
  justification: deploy via terraform-cloud agent
