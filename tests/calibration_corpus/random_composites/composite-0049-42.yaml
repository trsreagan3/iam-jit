name: composite-0049-42
source_policies:
- aws_managed/AmazonGrafanaCloudWatchAccess.yaml
- aws_managed/AWSSecurityHubReadOnlyAccess.yaml
- aws_managed/AmazonEKSNetworkingPolicy.yaml
- aws_managed/Route53ResolverServiceRolePolicy.yaml
source_hash: 456dde631ac9cfd4
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - cloudwatch:DescribeAlarmsForMetric
    - cloudwatch:DescribeAlarmHistory
    - cloudwatch:DescribeAlarms
    - cloudwatch:ListMetrics
    - cloudwatch:GetMetricStatistics
    - cloudwatch:GetMetricData
    - cloudwatch:GetInsightRuleReport
    Resource: '*'
  - Effect: Allow
    Action:
    - logs:DescribeLogGroups
    - logs:GetLogGroupFields
    - logs:StartQuery
    - logs:StopQuery
    - logs:GetQueryResults
    - logs:GetLogEvents
    Resource: '*'
  - Effect: Allow
    Action:
    - ec2:DescribeTags
    - ec2:DescribeInstances
    - ec2:DescribeRegions
    Resource: '*'
  - Effect: Allow
    Action: tag:GetResources
    Resource: '*'
  - Effect: Allow
    Action:
    - oam:ListSinks
    - oam:ListAttachedLinks
    Resource: '*'
  - Sid: AWSSecurityHubReadOnlyAccess
    Effect: Allow
    Action:
    - securityhub:Get*
    - securityhub:List*
    - securityhub:BatchGet*
    - securityhub:Describe*
    Resource: '*'
  - Effect: Allow
    Action: ec2:CreateNetworkInterface
    Resource: '*'
    Condition:
      StringEquals:
        aws:RequestTag/eks:eks-cluster-name: ${aws:PrincipalTag/eks:eks-cluster-name}
      StringLike:
        aws:RequestTag/eks:kubernetes-cni-node-name: '*'
      ForAllValues:StringEquals:
        aws:TagKeys:
        - eks:eks-cluster-name
        - eks:kubernetes-cni-node-name
  - Effect: Allow
    Action: ec2:CreateNetworkInterface
    Resource:
    - arn:aws:ec2:*:*:security-group/*
    - arn:aws:ec2:*:*:subnet/*
  - Effect: Allow
    Action: ec2:CreateTags
    Resource: '*'
    Condition:
      StringEquals:
        ec2:CreateAction: CreateNetworkInterface
  - Effect: Allow
    Action:
    - ec2:AttachNetworkInterface
    - ec2:DetachNetworkInterface
    - ec2:UnassignPrivateIpAddresses
    - ec2:UnassignIpv6Addresses
    - ec2:AssignPrivateIpAddresses
    - ec2:AssignIpv6Addresses
    Resource: '*'
    Condition:
      StringEquals:
        aws:ResourceTag/eks:eks-cluster-name: ${aws:PrincipalTag/eks:eks-cluster-name}
  - Effect: Allow
    Action: ec2:ModifyNetworkInterfaceAttribute
    Resource:
    - arn:aws:ec2:*:*:network-interface/*
    - arn:aws:ec2:*:*:instance/*
    Condition:
      StringEquals:
        aws:ResourceTag/eks:eks-cluster-name: ${aws:PrincipalTag/eks:eks-cluster-name}
  - Action:
    - logs:CreateLogDelivery
    - logs:GetLogDelivery
    - logs:UpdateLogDelivery
    - logs:DeleteLogDelivery
    - logs:ListLogDeliveries
    - logs:DescribeResourcePolicies
    - logs:DescribeLogGroups
    - s3:GetBucketPolicy
    Effect: Allow
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 8
    resource_constraints: []
  user: auditor-erin
  justification: SOC 2 controls evidence collection
