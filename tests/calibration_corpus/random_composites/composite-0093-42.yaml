  - 'Code-execution primitive on broad resource: dms:CreateReplicationInstance, dms:CreateReplicationTask. Deploys attacker-controlled
    code that runs under whatever role the matched resources use. Even without explicit PassRole, the existing roles of matched
    resources become the attack target.'
  - 'Code-execution-via-role composition: dms:CreateReplicationInstance (+ 1 more) combined with iam:PassRole = RCE as the
    passed role. Single-statement scoring underweights this; the composition is full account-compromise tier.'
  - '`s3:GetObject` on broad resource reads content that frequently contains secrets / sensitive data (boot logs, command
    output, log streams, message bodies).'
