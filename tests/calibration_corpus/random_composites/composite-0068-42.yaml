name: composite-0068-42
source_policies:
- aws_managed/AmazonSSMMaintenanceWindowRole.yaml
- aws_managed/SageMakerStudioDomainServiceRolePolicy.yaml
- aws_managed/AmazonEMRFullAccessPolicy_v2.yaml
source_hash: e0b4c9b8d6e2dd20
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - ssm:GetAutomationExecution
    - ssm:GetParameters
    - ssm:ListCommands
    - ssm:SendCommand
    - ssm:StartAutomationExecution
    Resource:
    - '*'
  - Effect: Allow
    Action:
    - lambda:InvokeFunction
    Resource:
    - arn:aws:lambda:*:*:function:SSM*
    - arn:aws:lambda:*:*:function:*:SSM*
  - Effect: Allow
    Action:
    - states:DescribeExecution
    - states:StartExecution
    Resource:
    - arn:aws:states:*:*:stateMachine:SSM*
    - arn:aws:states:*:*:execution:SSM*
  - Effect: Allow
    Action:
    - resource-groups:ListGroups
    - resource-groups:ListGroupResources
    Resource:
    - '*'
  - Effect: Allow
    Action:
    - tag:GetResources
    Resource:
    - '*'
  - Sid: SSMGetParameterStatement
    Effect: Allow
    Action:
    - ssm:GetParameter
    Resource:
    - arn:aws:ssm:*:*:parameter/amazon/datazone/profiles/*
  - Sid: UseKMSKeyPermissionsStatement
    Effect: Allow
    Action:
    - kms:Decrypt
    Resource: '*'
    Condition:
      StringEquals:
        aws:ResourceTag/EnableKeyForAmazonDataZone: 'true'
      'Null':
        aws:ResourceTag/EnableKeyForAmazonDataZone: 'false'
      StringLike:
        kms:ViaService: ssm.*.amazonaws.com
        kms:EncryptionContext:PARAMETER_ARN: arn:aws:ssm:*:*:parameter/amazon/datazone/profiles*
  - Sid: RunJobFlowExplicitlyWithEMRManagedTag
    Effect: Allow
    Action:
    - elasticmapreduce:RunJobFlow
    Resource: '*'
    Condition:
      StringEquals:
        aws:RequestTag/for-use-with-amazon-emr-managed-policies: 'true'
  - Sid: ElasticMapReduceActions
    Effect: Allow
    Action:
    - elasticmapreduce:AddInstanceFleet
    - elasticmapreduce:AddInstanceGroups
    - elasticmapreduce:AddJobFlowSteps
    - elasticmapreduce:AddTags
    - elasticmapreduce:CancelSteps
    - elasticmapreduce:CreateEditor
    - elasticmapreduce:CreatePersistentAppUI
    - elasticmapreduce:CreateSecurityConfiguration
    - elasticmapreduce:DeleteEditor
    - elasticmapreduce:DeleteSecurityConfiguration
    - elasticmapreduce:DescribeCluster
    - elasticmapreduce:DescribeEditor
    - elasticmapreduce:DescribeJobFlows
    - elasticmapreduce:DescribePersistentAppUI
    - elasticmapreduce:DescribeSecurityConfiguration
    - elasticmapreduce:DescribeStep
    - elasticmapreduce:DescribeReleaseLabel
    - elasticmapreduce:GetBlockPublicAccessConfiguration
    - elasticmapreduce:GetManagedScalingPolicy
    - elasticmapreduce:GetAutoTerminationPolicy
    - elasticmapreduce:GetPersistentAppUIPresignedURL
    - elasticmapreduce:ListBootstrapActions
    - elasticmapreduce:ListClusters
    - elasticmapreduce:ListEditors
    - elasticmapreduce:ListInstanceFleets
    - elasticmapreduce:ListInstanceGroups
    - elasticmapreduce:ListInstances
    - elasticmapreduce:ListSecurityConfigurations
    - elasticmapreduce:ListSteps
    - elasticmapreduce:ListSupportedInstanceTypes
    - elasticmapreduce:ModifyCluster
    - elasticmapreduce:ModifyInstanceFleet
    - elasticmapreduce:ModifyInstanceGroups
    - elasticmapreduce:OpenEditorInConsole
    - elasticmapreduce:PutAutoScalingPolicy
    - elasticmapreduce:PutBlockPublicAccessConfiguration
    - elasticmapreduce:PutManagedScalingPolicy
    - elasticmapreduce:RemoveAutoScalingPolicy
    - elasticmapreduce:RemoveManagedScalingPolicy
    - elasticmapreduce:RemoveTags
    - elasticmapreduce:SetTerminationProtection
    - elasticmapreduce:StartEditor
    - elasticmapreduce:StopEditor
    - elasticmapreduce:TerminateJobFlows
    - elasticmapreduce:ViewEventsFromAllClustersInConsole
    Resource: '*'
  - Sid: ViewMetricsInEMRConsole
    Effect: Allow
    Action:
    - cloudwatch:GetMetricStatistics
    Resource: '*'
  - Sid: PassRoleForElasticMapReduce
    Effect: Allow
    Action: iam:PassRole
    Resource: arn:aws:iam::*:role/EMR_DefaultRole_V2
    Condition:
      StringLike:
        iam:PassedToService: elasticmapreduce.amazonaws.com*
  - Sid: PassRoleForEC2
    Effect: Allow
    Action: iam:PassRole
    Resource: arn:aws:iam::*:role/EMR_EC2_DefaultRole
    Condition:
      StringLike:
        iam:PassedToService: ec2.amazonaws.com*
  - Sid: PassRoleForAutoScaling
    Effect: Allow
    Action: iam:PassRole
    Resource: arn:aws:iam::*:role/EMR_AutoScaling_DefaultRole
    Condition:
      StringLike:
        iam:PassedToService: application-autoscaling.amazonaws.com*
  - Sid: ElasticMapReduceServiceLinkedRole
    Effect: Allow
    Action: iam:CreateServiceLinkedRole
    Resource: arn:aws:iam::*:role/aws-service-role/elasticmapreduce.amazonaws.com*/AWSServiceRoleForEMRCleanup*
    Condition:
      StringEquals:
        iam:AWSServiceName:
        - elasticmapreduce.amazonaws.com
        - elasticmapreduce.amazonaws.com.cn
  - Sid: ConsoleUIActions
    Effect: Allow
    Action:
    - ec2:DescribeAccountAttributes
    - ec2:DescribeAvailabilityZones
    - ec2:DescribeImages
    - ec2:DescribeKeyPairs
    - ec2:DescribeNatGateways
    - ec2:DescribeRouteTables
    - ec2:DescribeSecurityGroups
    - ec2:DescribeSubnets
    - ec2:DescribeVpcs
    - ec2:DescribeVpcEndpoints
    - s3:ListAllMyBuckets
    - iam:ListRoles
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
    resource_constraints: []
  user: auditor-erin
  justification: SOC 2 controls evidence collection
