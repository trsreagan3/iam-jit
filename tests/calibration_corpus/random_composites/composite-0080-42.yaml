policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - ec2:DescribeInstances
    - ec2:DescribeInstanceStatus
    - ec2:DescribeRegions
    - ec2:DescribeTags
    Resource: '*'
  - Effect: Allow
    Action:
    - ec2:StartInstances
    - ec2:StopInstances
    Resource: arn:aws:ec2:*:*:instance/*
  - Effect: Allow
    Action:
    - ssm:GetCalendarState
    Resource: arn:aws:ssm:*:*:document/AWSQuickSetup-ChangeCalendar*
  - Effect: Allow
    Action:
    - ssm:StartAssociationsOnce
    - ssm:StartAutomationExecution
    Resource:
    - arn:aws:ssm:*:*:association/*
    - arn:aws:ssm:*:*:document/AWSQuickSetupType-Scheduler-ApplyInstanceState
    - arn:aws:ssm:*:*:automation-execution/*
    - arn:aws:ssm:*:*:automation-definition/AWSQuickSetupType-Scheduler-ApplyInstanceState*
  - Effect: Allow
    Action: iam:PassRole
    Resource:
    - arn:aws:iam::*:role/AWS-QuickSetup*
    Condition:
      StringEquals:
        iam:PassedToService:
        - ssm.amazonaws.com
      ArnLike:
        iam:AssociatedResourceARN:
        - arn:aws:ssm:*::document/AWSQuickSetupType-Scheduler-ApplyInstanceState
        - arn:aws:ssm:*:*:association/*
  - Sid: VisualEditor1
    Effect: Allow
    Action: iam:PassRole
    Resource: arn:aws:iam::*:role/idt-*
    Condition:
      StringEquals:
        iam:PassedToService:
        - iot.amazonaws.com
        - lambda.amazonaws.com
        - greengrass.amazonaws.com
  - Sid: VisualEditor2
    Effect: Allow
    Action:
    - lambda:CreateFunction
    - iot:DeleteCertificate
    - lambda:DeleteFunction
    - execute-api:Invoke
    - iot:UpdateCertificate
    Resource:
    - arn:aws:execute-api:us-east-1:098862408343:9xpmnvs5h4/prod/POST/metrics
    - arn:aws:lambda:*:*:function:idt-*
    - arn:aws:iot:*:*:cert/*
  - Sid: VisualEditor3
    Effect: Allow
    Action:
    - iot:CreateThing
    - iot:DeleteThing
    Resource:
    - arn:aws:iot:*:*:thing/idt-*
    - arn:aws:iot:*:*:cert/*
  - Sid: VisualEditor4
    Effect: Allow
    Action:
    - iot:AttachPolicy
    - iot:DetachPolicy
    - iot:DeletePolicy
    Resource:
    - arn:aws:iot:*:*:policy/idt-*
    - arn:aws:iot:*:*:cert/*
  - Sid: VisualEditor5
    Effect: Allow
    Action:
    - iot:CreateJob
    - iot:DescribeJob
    - iot:DescribeJobExecution
    - iot:DeleteJob
    Resource:
    - arn:aws:iot:*:*:thing/idt-*
    - arn:aws:iot:*:*:job/*
  - Sid: VisualEditor6
    Effect: Allow
    Action:
    - iot:DescribeEndpoint
    - greengrass:*
    - iam:ListAttachedRolePolicies
    - iot:CreatePolicy
    - iot:GetThingShadow
    - iot:CreateKeysAndCertificate
    - iot:ListThings
    - iot:UpdateThingShadow
    - iot:CreateCertificateFromCsr
    - iot-device-tester:SendMetrics
    - iot-device-tester:SupportedVersion
    - iot-device-tester:LatestIdt
    - iot-device-tester:CheckVersion
    - iot-device-tester:DownloadTestSuite
    Resource: '*'
  - Sid: VisualEditor7
    Effect: Allow
    Action:
    - iot:DetachThingPrincipal
    - iot:AttachThingPrincipal
    Resource:
    - arn:aws:iot:*:*:thing/idt-*
    - arn:aws:iot:*:*:cert/*
  - Sid: VisualEditor8
    Effect: Allow
    Action:
    - s3:PutObject
    - s3:DeleteObjectVersion
    - s3:ListBucketVersions
    - s3:CreateBucket
    - s3:DeleteObject
    - s3:DeleteBucket
    Resource: arn:aws:s3:::idt*
  - Sid: DescribeNetworkStatement
    Effect: Allow
    Action:
    - ec2:DescribeSubnets
    - ec2:DescribeVpcs
    - ec2:DescribeNetworkInterfaces
    Resource: '*'
  - Sid: CreateEniInSubnetStatement
    Effect: Allow
    Action:
    - ec2:CreateNetworkInterface
    Resource:
    - arn:aws:ec2:*:*:subnet/*
    - arn:aws:ec2:*:*:security-group/*
  - Sid: CreateEniStatement
    Effect: Allow
    Action:
    - ec2:CreateNetworkInterface
    Resource: arn:aws:ec2:*:*:network-interface/*
    Condition:
      'Null':
        aws:RequestTag/AmazonTimestreamInfluxDBManaged: 'false'
  - Sid: CreateTagWithEniStatement
    Effect: Allow
    Action:
    - ec2:CreateTags
    Resource: arn:aws:ec2:*:*:network-interface/*
    Condition:
      'Null':
        aws:RequestTag/AmazonTimestreamInfluxDBManaged: 'false'
      StringEquals:
        ec2:CreateAction:
        - CreateNetworkInterface
  - Sid: ManageEniStatement
    Effect: Allow
    Action:
    - ec2:CreateNetworkInterfacePermission
    - ec2:DeleteNetworkInterface
    Resource: arn:aws:ec2:*:*:network-interface/*
    Condition:
      'Null':
        aws:ResourceTag/AmazonTimestreamInfluxDBManaged: 'false'
  - Sid: PutCloudWatchMetricsStatement
    Effect: Allow
    Action:
    - cloudwatch:PutMetricData
    Condition:
      StringEquals:
        cloudwatch:namespace:
        - AWS/Timestream/InfluxDB
        - AWS/Usage
    Resource:
    - '*'
  - Sid: ManageSecretStatement
    Effect: Allow
    Action:
    - secretsmanager:CreateSecret
    - secretsmanager:DeleteSecret
    Resource:
    - arn:aws:secretsmanager:*:*:secret:READONLY-InfluxDB-auth-parameters-*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Effect: Allow
    Action:
    - secretsmanager:PutResourcePolicy
    Resource: arn:aws:secretsmanager:*:*:secret:quicksight!*
    Condition:
      StringEquals:
        secretsmanager:ResourceTag/aws:secretsmanager:owningService: quicksight
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Effect: Allow
    Action:
    - secretsmanager:CreateSecret
    Resource: arn:aws:secretsmanager:*:*:secret:quicksight!*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
      StringLike:
        secretsmanager:Name: quicksight!*
request:
  spec:
    access_type: read-write
    duration:
