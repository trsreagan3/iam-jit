name: composite-0041-42
source_policies:
- aws_managed/AmazonEKSServicePolicy.yaml
- aws_managed/AmazonECSComputeServiceRolePolicy.yaml
source_hash: 51618473c5057853
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - ec2:CreateNetworkInterface
    - ec2:CreateNetworkInterfacePermission
    - ec2:DeleteNetworkInterface
    - ec2:DescribeInstances
    - ec2:DescribeNetworkInterfaces
    - ec2:DetachNetworkInterface
    - ec2:DescribeSecurityGroups
    - ec2:DescribeSubnets
    - ec2:DescribeVpcs
    - ec2:ModifyNetworkInterfaceAttribute
    - iam:ListAttachedRolePolicies
    - eks:UpdateClusterVersion
    - ec2:GetSecurityGroupsForVpc
    Resource: '*'
  - Effect: Allow
    Action:
    - ec2:CreateTags
    - ec2:DeleteTags
    Resource:
    - arn:aws:ec2:*:*:vpc/*
    - arn:aws:ec2:*:*:subnet/*
  - Effect: Allow
    Action:
    - ec2:CreateTags
    Resource:
    - arn:aws:ec2:*:*:network-interface/*
    Condition:
      StringLike:
        aws:RequestTag/Name: eks-cluster-*
  - Effect: Allow
    Action: route53:AssociateVPCWithHostedZone
    Resource: '*'
  - Effect: Allow
    Action: logs:CreateLogGroup
    Resource: '*'
  - Effect: Allow
    Action:
    - logs:CreateLogStream
    - logs:DescribeLogStreams
    Resource: arn:aws:logs:*:*:log-group:/aws/eks/*:*
  - Effect: Allow
    Action: logs:PutLogEvents
    Resource: arn:aws:logs:*:*:log-group:/aws/eks/*:*:*
  - Effect: Allow
    Action: iam:CreateServiceLinkedRole
    Resource: arn:aws:iam::*:role/aws-service-role/eks.amazonaws.com/AWSServiceRoleForAmazonEKS
    Condition:
      StringLike:
        iam:AWSServiceName: eks.amazonaws.com
  - Sid: ReadOnlyPermissionsForInstanceManagement
    Effect: Allow
    Action:
    - ec2:DescribeInstances
    - ec2:DescribeInstanceStatus
    - ec2:DescribeNetworkInterfaces
    - ec2:DescribeFleets
    Resource: '*'
  - Sid: ReadOnlyPermissionsForInstanceEventWindows
    Effect: Allow
    Action:
    - ec2:DescribeInstanceEventWindows
    Resource: '*'
  - Sid: ReadOnlyPermissionsForLaunchTemplates
    Effect: Allow
    Action:
    - ec2:DescribeLaunchTemplates
    - ec2:DescribeLaunchTemplateVersions
    Resource: '*'
  - Sid: DeleteManagedLaunchTemplate
    Effect: Allow
    Action:
    - ec2:DeleteLaunchTemplate
    - ec2:DeleteLaunchTemplateVersions
    Resource: arn:aws:ec2:*:*:launch-template/*
    Condition:
      StringEquals:
        ec2:ManagedResourceOperator: ecs.amazonaws.com
  - Sid: TerminateManagedInstances
    Effect: Allow
    Action:
    - ec2:TerminateInstances
    Resource: arn:aws:ec2:*:*:instance/*
    Condition:
      StringEquals:
        ec2:ManagedResourceOperator: ecs.amazonaws.com
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 8
    resource_constraints: []
  user: agent-claude
  justification: background reconciliation loop
