name: s3-cross-region-replication-role
description: |
  AWS S3 cross-region replication service role. The replication role
  needs to read from the source bucket and write to the destination
  bucket — it's a data-plane mover. AWS docs prescribe this exact set
  of actions on resource-scoped ARNs.

  Expected score: MEDIUM (4-6). Contains write actions (ReplicateObject,
  ReplicateDelete) but they're scoped to the destination bucket and the
  source bucket is read-only-scoped. The dangerous bit is that it CAN
  delete objects in the destination via ReplicateDelete (mirroring
  source deletes), but blast radius is bounded to two named buckets.

  CALIBRATION GAP: scored 6, expected 1-5 (off by one above the
  expected range, AND the risk_factors mis-state the scoping).
  Reason: scorer's "State-changing action X on Resource: *" messages
  fire for `s3:ReplicateObject` etc, but the policy's actual Resource
  is `arn:aws:s3:::myorg-dest-bucket-eu/*` — a scoped per-bucket prefix,
  NOT account-wildcard. The Write-access-level rule appears to ignore
  the Resource field when generating the explanation string.
  Recommendation for next round: the IAM-Write-classification factor
  should use the actual Resource set in its explanation; an explicitly
  scoped destination bucket is materially less risky than `Resource: *`
  and the score should reflect that.

  SOURCE: https://docs.aws.amazon.com/AmazonS3/latest/userguide/replication-permissions-overview.html

policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - "s3:GetReplicationConfiguration"
        - "s3:ListBucket"
      Resource:
        - "arn:aws:s3:::myorg-source-bucket"
    - Effect: Allow
      Action:
        - "s3:GetObjectVersionForReplication"
        - "s3:GetObjectVersionAcl"
        - "s3:GetObjectVersionTagging"
      Resource:
        - "arn:aws:s3:::myorg-source-bucket/*"
    - Effect: Allow
      Action:
        - "s3:ReplicateObject"
        - "s3:ReplicateDelete"
        - "s3:ReplicateTags"
      Resource:
        - "arn:aws:s3:::myorg-dest-bucket-eu/*"

request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 24

expected:
  score_min: 1
  score_max: 5
