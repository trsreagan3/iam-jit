name: secretsmanager-broad-write
description: |
  Broad write access to Secrets Manager: an attacker with this role can
  read every secret AND mutate them (PutSecretValue rotates the value,
  invalidating the legitimate consumer's cached creds and substituting
  attacker-controlled creds). Wildcard resource = all secrets in account.

  Expected score: HIGH (7-10). Secrets Manager wildcard write is one of
  the AWS-documented privilege-escalation patterns (Rhino Sec #19-ish).
  Should never auto-approve.

  SOURCE: https://docs.aws.amazon.com/secretsmanager/latest/userguide/auth-and-access_iam-policies.html
  (action set reflects the user-guide's "actions you can use" reference)

policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - "secretsmanager:GetSecretValue"
        - "secretsmanager:PutSecretValue"
        - "secretsmanager:UpdateSecret"
        - "secretsmanager:CreateSecret"
        - "secretsmanager:DeleteSecret"
        - "secretsmanager:RestoreSecret"
        - "secretsmanager:ListSecrets"
        - "secretsmanager:DescribeSecret"
      Resource: "*"

request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1

expected:
  score_min: 6
  score_max: 10
  must_auto_approve: false
