name: cross-account-assume-role-no-externalid
description: |
  The dangerous variant of cross-account AssumeRole: trusts a role in
  ANOTHER account but does NOT require an External ID. Vulnerable to
  the "confused deputy" attack — if the partner is a SaaS multi-tenant
  service, an attacker who is a customer of that SaaS could trick it
  into assuming the wrong customer's role.

  Expected score: MEDIUM-HIGH (5-7). Cross-account without external ID
  is a documented anti-pattern but doesn't cross into "full admin"
  territory. Should route to human review.

  SOURCE: https://aws.amazon.com/blogs/security/how-to-use-trust-policies-with-iam-roles/
  (page describes the missing-external-ID pattern as the failure mode
  the external-ID condition was designed to prevent)

policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Principal:
        AWS: "arn:aws:iam::222222222222:role/PartnerVendorRole"
      Action: "sts:AssumeRole"

request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1

expected:
  score_min: 4
  score_max: 8
