name: cross-account-assume-role-with-externalid
description: |
  Canonical cross-account AssumeRole trust policy with sts:ExternalId
  condition — the AWS-recommended pattern for SaaS vendors (the
  "confused deputy" mitigation). Allows a specific role in a partner
  account to assume this role only when it presents the agreed external
  ID.

  Expected score: MEDIUM (3-5). Cross-account trust IS a real attack
  surface (compromise of the partner account, leaked external ID), but
  the External ID + named-principal scoping is the documented best
  practice. Should be reviewable but not panic-flagged.

  CALIBRATION GAP: scored 7, expected 1-6.
  Reason: scorer flags cross-account trust at +7 regardless of whether
  an sts:ExternalId condition is present. Compare vs.
  09-cross-account-assume-role-no-externalid.yaml — same score for
  policies with very different real-world risk. The whole reason
  External ID exists is to mitigate confused-deputy; not differentiating
  between the WITH and WITHOUT cases throws away that signal.
  Recommendation: when Principal.AWS is an external account ARN AND
  Condition contains sts:ExternalId equality on a non-empty value,
  reduce the cross-account contribution by ~3 points.

  SOURCE: https://aws.amazon.com/blogs/security/how-to-use-trust-policies-with-iam-roles/

policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Principal:
        AWS: "arn:aws:iam::222222222222:role/PartnerVendorRole"
      Action: "sts:AssumeRole"
      Condition:
        StringEquals:
          "sts:ExternalId": "myorg-unique-shared-secret-phrase"

request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1

expected:
  score_min: 1
  score_max: 6
