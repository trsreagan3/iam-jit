name: iam-passrole-scoped-to-named-role
description: |
  Properly-scoped iam:PassRole — limited to a SINGLE specific role ARN
  AND further restricted by iam:PassedToService condition to a single
  service (lambda.amazonaws.com). This is the AWS-recommended pattern
  for "let this principal launch Lambda functions with one specific
  execution role."

  Expected score: LOW-MEDIUM (3-5). Compare vs. high_risk/03-iam-passrole-
  wildcard.yaml which scores 9+. The whole point of the PassedToService
  condition is to mitigate the privilege-escalation surface; properly-
  scoped should NOT be scored the same as wildcard.

  SOURCE: https://docs.aws.amazon.com/IAM/latest/UserGuide/access_policies_iam-condition-keys.html

policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action: "iam:PassRole"
      Resource: "arn:aws:iam::111111111111:role/myorg-lambda-exec-role"
      Condition:
        StringEquals:
          "iam:PassedToService": "lambda.amazonaws.com"

request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1

expected:
  score_min: 1
  score_max: 5
