name: aws-self-manage-credentials
description: |
  AWS reference policy: "Allow users to manage their own credentials."
  Lets a user rotate their own access keys, MFA device, password, and
  signing certs — but ONLY their own (resource scoped to
  arn:aws:iam::*:user/${aws:username}).

  Expected score: LOW-MEDIUM (3-5). Touches the iam: namespace
  (sensitive service) but every write action is bounded to the
  caller's own principal via aws:username variable substitution. This
  is the AWS-recommended pattern for letting end-users manage their
  own MFA without admin intervention. Should auto-approve at default
  threshold.

  SOURCE: https://docs.aws.amazon.com/IAM/latest/UserGuide/reference_policies_examples_iam_credentials_self-manage.html

policy:
  Version: "2012-10-17"
  Statement:
    - Sid: AllowViewAccountInfo
      Effect: Allow
      Action:
        - "iam:GetAccountSummary"
        - "iam:ListVirtualMFADevices"
      Resource: "*"
    - Sid: AllowManageOwnVirtualMFADevice
      Effect: Allow
      Action:
        - "iam:CreateVirtualMFADevice"
        - "iam:DeleteVirtualMFADevice"
      Resource: "arn:aws:iam::*:mfa/${aws:username}"
    - Sid: AllowManageOwnUserMFA
      Effect: Allow
      Action:
        - "iam:DeactivateMFADevice"
        - "iam:GetUser"
        - "iam:ListMFADevices"
        - "iam:ResyncMFADevice"
        - "iam:EnableMFADevice"
      Resource: "arn:aws:iam::*:user/${aws:username}"
    - Sid: AllowManageOwnPasswords
      Effect: Allow
      Action:
        - "iam:ChangePassword"
        - "iam:GetUser"
      Resource: "arn:aws:iam::*:user/${aws:username}"
    - Sid: AllowManageOwnAccessKeys
      Effect: Allow
      Action:
        - "iam:CreateAccessKey"
        - "iam:DeleteAccessKey"
        - "iam:GetAccessKeyLastUsed"
        - "iam:ListAccessKeys"
        - "iam:UpdateAccessKey"
      Resource: "arn:aws:iam::*:user/${aws:username}"
    - Sid: AllowManageOwnSigningCertificates
      Effect: Allow
      Action:
        - "iam:DeleteSigningCertificate"
        - "iam:ListSigningCertificates"
        - "iam:UpdateSigningCertificate"
        - "iam:UploadSigningCertificate"
      Resource: "arn:aws:iam::*:user/${aws:username}"

request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 24

expected:
  score_min: 1
  score_max: 5
