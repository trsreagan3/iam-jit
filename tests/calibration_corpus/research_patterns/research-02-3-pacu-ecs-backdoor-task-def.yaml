name: research-02-3-pacu-ecs-backdoor-task-def
description: |
  Reference: IAM-BYPASS-RESEARCH.md §2.3 (Pacu ecs__backdoor_task_def)

  ecs:DescribeTaskDefinition, ecs:RegisterTaskDefinition.

  Expected behavior: persistence + privesc — high risk.

  Source: https://github.com/RhinoSecurityLabs/pacu/wiki/Module-Details
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - ecs:DescribeTaskDefinition
        - ecs:RegisterTaskDefinition
      Resource: "*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  must_auto_approve: false
