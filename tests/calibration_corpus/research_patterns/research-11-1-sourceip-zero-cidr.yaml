name: research-11-1-sourceip-zero-cidr
description: |
  Reference: IAM-BYPASS-RESEARCH.md §11.1 (Sysdig: IAM misconfiguration)

  aws:SourceIp: "0.0.0.0/0" defeats the condition — acts as no
  restriction. Common typo / default.

  Expected behavior: effectively no condition — same as unscoped — high risk.

  Source: https://www.sysdig.com/blog/iam-security-misconfiguration
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action: "*"
      Resource: "*"
      Condition:
        IpAddress:
          aws:SourceIp: "0.0.0.0/0"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 9
  must_auto_approve: false
