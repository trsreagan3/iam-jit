name: research-10-8-unicode-homoglyph-arn
description: |
  Reference: IAM-BYPASS-RESEARCH.md §10.8 (AWS IAM grammar)

  Some characters render identical to ASCII but bypass exact-match
  checks; AWS lower-cases certain ARN components but not paths.
  # NB: encoded with a Cyrillic 'а' (U+0430) in place of ASCII 'a' in
  # the bucket name.

  Expected behavior: parser should reject homoglyph or treat the
  resource as not-the-real bucket — moderate risk.

  Source: https://docs.aws.amazon.com/IAM/latest/UserGuide/reference_policies_grammar.html
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action: s3:GetObject
      Resource: "arn:aws:s3:::prod-dаta/*"
request:
  spec:
    access_type: read-only
    duration:
      duration_hours: 1
expected:
  score_min: 5
  must_auto_approve: false
