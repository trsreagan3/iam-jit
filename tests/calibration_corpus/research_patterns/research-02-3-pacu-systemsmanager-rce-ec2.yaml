name: research-02-3-pacu-systemsmanager-rce-ec2
description: |
  Reference: IAM-BYPASS-RESEARCH.md §2.3 (Pacu systemsmanager__rce_ec2)

  ssm:CreateAssociation, ssm:SendCommand, iam:PassRole.

  Expected behavior: fleet-wide RCE — critical.

  Source: https://github.com/RhinoSecurityLabs/pacu/wiki/Module-Details
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - ssm:CreateAssociation
        - ssm:SendCommand
        - iam:PassRole
      Resource: "*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 9
  must_auto_approve: false
