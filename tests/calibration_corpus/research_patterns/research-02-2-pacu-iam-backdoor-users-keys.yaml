name: research-02-2-pacu-iam-backdoor-users-keys
description: |
  Reference: IAM-BYPASS-RESEARCH.md §2.2 (Pacu iam__backdoor_users_keys)

  iam:CreateAccessKey against other users.

  Expected behavior: persistence — high risk.

  Source: https://github.com/RhinoSecurityLabs/pacu/wiki/Module-Details
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action: iam:CreateAccessKey
      Resource: "*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  must_auto_approve: false
