name: research-10-9-duplicate-keys
description: |
  Reference: IAM-BYPASS-RESEARCH.md §10.9 (AWS IAM grammar)

  JSON spec doesn't define duplicate-key behavior. AWS keeps the last
  value; some tools take the first. A policy with two Resource keys
  can be parsed differently by scorer vs AWS.
  # NB: YAML mapping does not allow duplicate keys per spec; encoded
  # via a Statement that combines an "intended" narrow resource and
  # an additional broad statement so parser ambiguity is documented.

  Expected behavior: parser should match AWS' last-key semantics.

  Source: https://docs.aws.amazon.com/IAM/latest/UserGuide/reference_policies_grammar.html
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action: s3:GetObject
      Resource: "arn:aws:s3:::safe-bucket/*"
    - Effect: Allow
      Action: s3:GetObject
      Resource: "*"
request:
  spec:
    access_type: read-only
    duration:
      duration_hours: 1
expected:
  score_min: 6
  must_auto_approve: false
