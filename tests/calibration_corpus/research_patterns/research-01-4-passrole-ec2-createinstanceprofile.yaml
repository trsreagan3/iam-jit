name: research-01-4-passrole-ec2-createinstanceprofile
description: |
  Reference: IAM-BYPASS-RESEARCH.md §1.4 (PMapper ec2_edges)

  Same as 1.3 but for roles that don't yet have an instance profile
  attached. Attacker constructs the profile, attaches the role, launches
  the instance.

  Expected behavior: privilege escalation chain — high risk.

  Source: https://raw.githubusercontent.com/nccgroup/PMapper/master/principalmapper/graphing/ec2_edges.py
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - iam:PassRole
        - iam:CreateInstanceProfile
        - iam:AddRoleToInstanceProfile
        - ec2:RunInstances
      Resource: "*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  must_auto_approve: false
