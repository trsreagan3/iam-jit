name: research-07-5-aa-missing-version
description: |
  Reference: IAM-BYPASS-RESEARCH.md §7.5 (AWS IAM Access Analyzer validation checks)

  MISSING_VERSION — policy without explicit Version: "2012-10-17"
  defaults to legacy semantics. Policy variables like ${aws:username}
  become inert.

  Expected behavior: inert variables, wider grant than intended — moderate risk.

  Source: https://docs.aws.amazon.com/IAM/latest/UserGuide/access-analyzer-reference-policy-checks.html
policy:
  Statement:
    - Effect: Allow
      Action: s3:GetObject
      Resource: arn:aws:s3:::bucket-${aws:username}/*
request:
  spec:
    access_type: read-only
    duration:
      duration_hours: 1
expected:
  score_min: 6
  must_auto_approve: false
