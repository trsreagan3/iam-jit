name: research-03-17-cg-secrets-in-the-cloud
description: |
  Reference: IAM-BYPASS-RESEARCH.md §3.17 (CloudGoat secrets_in_the_cloud)

  Limited IAM user → enumerate to find role → assume → Secrets Manager.

  Expected behavior: enumeration chain to credential access — high risk.

  Source: https://github.com/RhinoSecurityLabs/cloudgoat
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - iam:ListRoles
        - iam:GetRole
        - sts:AssumeRole
        - secretsmanager:GetSecretValue
      Resource: "*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  must_auto_approve: false
