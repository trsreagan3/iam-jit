name: research-04-12-role-trust-account-root-no-mfa
description: |
  Reference: IAM-BYPASS-RESEARCH.md §4.12 (HackingTheCloud)

  IAM role trust with "Principal":{"AWS":"arn:aws:iam::ACCOUNT:root"}
  and no MFA / no external ID. Any principal in the named account,
  including freshly created ones, can assume.

  Expected behavior: account-wide assumable, no MFA — high risk.

  Source: HackingTheCloud
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Principal:
        AWS: "arn:aws:iam::111122223333:root"
      Action: sts:AssumeRole
      Resource: "*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 6
  must_auto_approve: false
