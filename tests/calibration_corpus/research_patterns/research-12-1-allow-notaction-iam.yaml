name: research-12-1-allow-notaction-iam
description: |
  Reference: IAM-BYPASS-RESEARCH.md §12.1 (AWS NotAction docs)

  Allow + NotAction:["iam:*"] + Resource:"*" — grants every action
  across every AWS service except iam:*. Every new service auto-allowed
  forever.

  Expected behavior: near-admin grant — critical.

  Source: https://docs.aws.amazon.com/IAM/latest/UserGuide/reference_policies_elements_notaction.html
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      NotAction:
        - "iam:*"
      Resource: "*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 9
  must_auto_approve: false
