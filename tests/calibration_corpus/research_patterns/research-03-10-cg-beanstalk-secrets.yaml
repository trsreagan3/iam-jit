name: research-03-10-cg-beanstalk-secrets
description: |
  Reference: IAM-BYPASS-RESEARCH.md §3.10 (CloudGoat beanstalk_secrets)

  Beanstalk env vars expose secondary credentials; the EB instance
  profile has admin-adjacent privileges.

  Expected behavior: credential exposure via env vars — moderate risk.

  Source: https://github.com/RhinoSecurityLabs/cloudgoat
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - elasticbeanstalk:DescribeConfigurationSettings
        - elasticbeanstalk:DescribeEnvironments
      Resource: "*"
request:
  spec:
    access_type: read-only
    duration:
      duration_hours: 1
expected:
  score_min: 4
  must_auto_approve: false
