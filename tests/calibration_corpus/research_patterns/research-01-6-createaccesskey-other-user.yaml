name: research-01-6-createaccesskey-other-user
description: |
  Reference: IAM-BYPASS-RESEARCH.md §1.6 (Rhino #4)

  Create programmatic credentials for any user with <2 existing keys.
  Long-lived AKIA credentials become persistence.

  Expected behavior: privilege escalation + persistence — high risk.

  Source: https://github.com/RhinoSecurityLabs/pacu/wiki/Module-Details
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action: iam:CreateAccessKey
      Resource: "*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  must_auto_approve: false
