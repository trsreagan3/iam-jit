name: research-11-9-forallvalues-vacuous
description: |
  Reference: IAM-BYPASS-RESEARCH.md §11.9 (Sysdig)

  ForAnyValue:StringLike succeeds if any request key matches.
  ForAllValues:StringLike succeeds if all values match (vacuously
  true if list is empty). ForAllValues with no values in request
  context = condition passes → effectively unrestricted.

  Expected behavior: vacuous-true condition — high risk.

  Source: https://www.sysdig.com/blog/iam-security-misconfiguration
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action: "*"
      Resource: "*"
      Condition:
        "ForAllValues:StringLike":
          "aws:TagKeys": "Project"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  must_auto_approve: false
