name: research-07-5-aa-star-in-action
description: |
  Reference: IAM-BYPASS-RESEARCH.md §7.5 (AWS IAM Access Analyzer validation checks)

  STAR_IN_ACTION — wildcard action.

  Expected behavior: wildcard-action grant — critical.

  Source: https://docs.aws.amazon.com/IAM/latest/UserGuide/access-analyzer-reference-policy-checks.html
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action: "*"
      Resource: "*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 10
  must_auto_approve: false
