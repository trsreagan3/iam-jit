name: research-02-2-pacu-lambda-backdoor-new-sec-groups
description: |
  Reference: IAM-BYPASS-RESEARCH.md §2.2 (Pacu lambda__backdoor_new_sec_groups)

  EventBridge rule + Lambda adds backdoor SG ingress on any new SG.

  Expected behavior: network persistence — high risk.

  Source: https://github.com/RhinoSecurityLabs/pacu/wiki/Module-Details
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - lambda:CreateFunction
        - events:PutRule
        - ec2:AuthorizeSecurityGroupIngress
      Resource: "*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  must_auto_approve: false
