name: research-03-14-cg-sns-secrets-sqs-static
description: |
  Reference: IAM-BYPASS-RESEARCH.md §3.14 (CloudGoat sns_secrets / sqs_flag_shop / static)

  Resource-based policy misuse: SNS topic subscription leaking API keys;
  S3 supply-chain (overwrite JS) attacks.

  Expected behavior: supply-chain / data exfil — high risk.

  Source: https://github.com/RhinoSecurityLabs/cloudgoat
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - sns:Subscribe
        - sns:Receive
        - sqs:ReceiveMessage
        - s3:PutObject
      Resource: "*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 6
  must_auto_approve: false
