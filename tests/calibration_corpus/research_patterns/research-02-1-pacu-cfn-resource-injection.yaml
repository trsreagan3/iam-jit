name: research-02-1-pacu-cfn-resource-injection
description: |
  Reference: IAM-BYPASS-RESEARCH.md §2.1 (Pacu cfn__resource_injection)

  Resource Injection in CloudFormation templates.

  Expected behavior: resource-injection privesc — high risk.

  Source: https://github.com/RhinoSecurityLabs/pacu/wiki/Module-Details
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - s3:PutBucketNotification
        - lambda:CreateFunction
        - iam:CreateRole
      Resource: "*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  must_auto_approve: false
