name: research-02-1-pacu-iam-privesc-scan
description: |
  Reference: IAM-BYPASS-RESEARCH.md §2.1 (Pacu iam__privesc_scan)

  Automates Rhino's privesc paths. Required actions: iam:GetUser,
  iam:ListAttachedUserPolicies, iam:GetUserPolicy, plus whichever
  path it abuses.

  Expected behavior: enumeration baseline — moderate risk.

  Source: https://github.com/RhinoSecurityLabs/pacu/wiki/Module-Details
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - iam:GetUser
        - iam:ListAttachedUserPolicies
        - iam:GetUserPolicy
      Resource: "*"
request:
  spec:
    access_type: read-only
    duration:
      duration_hours: 1
expected:
  score_min: 4
  must_auto_approve: false
