name: research-10-7-question-mark-glob
description: |
  Reference: IAM-BYPASS-RESEARCH.md §10.7 (AWS IAM grammar)

  ? matches any single character; * matches zero-or-more. Scorers that
  only treat * as wildcard miss ?-based patterns.

  Expected behavior: parser should handle ? as wildcard.

  Source: https://docs.aws.amazon.com/IAM/latest/UserGuide/reference_policies_grammar.html
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action: "s3:GetObjec?"
      Resource: "arn:aws:s3:::prod-?ata/*"
request:
  spec:
    access_type: read-only
    duration:
      duration_hours: 1
expected:
  score_min: 6
  must_auto_approve: false
