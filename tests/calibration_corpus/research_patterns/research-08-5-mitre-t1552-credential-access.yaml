name: research-08-5-mitre-t1552-credential-access
description: |
  Reference: IAM-BYPASS-RESEARCH.md §8.5 (MITRE T1552 + T1555)

  Credential Access: Cloud Instance Metadata API, Container API, env
  vars, S3-stored configs; secretsmanager:GetSecretValue, ssm:GetParameter
  (SecureString).

  Expected behavior: broad credential access — high risk.

  Source: https://aws-samples.github.io/threat-technique-catalog-for-aws/Techniques/T1552.005.html
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - secretsmanager:GetSecretValue
        - ssm:GetParameter
        - ssm:GetParameters
        - ssm:GetParametersByPath
      Resource: "*"
request:
  spec:
    access_type: read-only
    duration:
      duration_hours: 1
expected:
  score_min: 7
  must_auto_approve: false
