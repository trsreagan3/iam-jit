name: research-04-2-s3-bucket-policy-public-get
description: |
  Reference: IAM-BYPASS-RESEARCH.md §4.2 (HackingTheCloud / Datadog Security Labs)

  S3 bucket policy with Principal:"*" granting s3:GetObject. Public read
  — data exfil. Common via misuse of "all authenticated users" or
  NotPrincipal-everything-else.

  Expected behavior: public read of S3 — high data-exposure risk.

  Source: https://securitylabs.datadoghq.com/cloud-security-atlas/vulnerabilities/s3-bucket-public-policy/
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Principal: "*"
      Action: s3:GetObject
      Resource: arn:aws:s3:::example-bucket/*
request:
  spec:
    access_type: read-only
    duration:
      duration_hours: 1
expected:
  score_min: 8
  must_auto_approve: false
