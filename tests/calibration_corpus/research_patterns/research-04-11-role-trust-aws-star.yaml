name: research-04-11-role-trust-aws-star
description: |
  Reference: IAM-BYPASS-RESEARCH.md §4.11 (HackingTheCloud)

  IAM role trust policy with "Principal":{"AWS":"*"}. Anyone in any
  AWS account can sts:AssumeRole. Mitigated only by an external ID
  condition.

  Expected behavior: globally assumable role — critical.

  Source: https://hackingthe.cloud/aws/exploitation/Misconfigured_Resource-Based_Policies/
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Principal:
        AWS: "*"
      Action: sts:AssumeRole
      Resource: "*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 9
  must_auto_approve: false
