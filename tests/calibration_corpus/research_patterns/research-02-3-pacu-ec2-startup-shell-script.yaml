name: research-02-3-pacu-ec2-startup-shell-script
description: |
  Reference: IAM-BYPASS-RESEARCH.md §2.3 (Pacu ec2__startup_shell_script)

  Stop/modify-userdata/start cycle for code execution.

  Expected behavior: privilege escalation via user-data — high risk.

  Source: https://github.com/RhinoSecurityLabs/pacu/wiki/Module-Details
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - ec2:StopInstances
        - ec2:ModifyInstanceAttribute
        - ec2:StartInstances
      Resource: "*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  must_auto_approve: false
