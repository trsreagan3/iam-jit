name: research-07-5-aa-invalid-arn-prefix-region
description: |
  Reference: IAM-BYPASS-RESEARCH.md §7.5 (AWS IAM Access Analyzer validation checks)

  INVALID_ARN_PREFIX_REGION — typo'd ARNs that evaluate-true.
  # NB: encoded with an invalid partition / region segment in the ARN.

  Expected behavior: typo'd ARN that evaluates broader than intended — moderate risk.

  Source: https://docs.aws.amazon.com/IAM/latest/UserGuide/access-analyzer-reference-policy-checks.html
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action: s3:GetObject
      Resource: arn:aws:s3:us-easst-1::example-bucket/*
request:
  spec:
    access_type: read-only
    duration:
      duration_hours: 1
expected:
  score_min: 4
  must_auto_approve: false
