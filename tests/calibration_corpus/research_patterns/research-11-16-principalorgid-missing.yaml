name: research-11-16-principalorgid-missing
description: |
  Reference: IAM-BYPASS-RESEARCH.md §11.16 (Sysdig)

  Common pattern: bucket policy with Principal:"*" +
  Condition.StringEquals.aws:PrincipalOrgID:"o-xxx". Without the
  condition, the bucket is public.
  # NB: encoded as the public bucket policy missing the OrgID condition.

  Expected behavior: public bucket — critical.

  Source: https://www.sysdig.com/blog/iam-security-misconfiguration
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Principal: "*"
      Action: s3:GetObject
      Resource: "arn:aws:s3:::company-bucket/*"
request:
  spec:
    access_type: read-only
    duration:
      duration_hours: 1
expected:
  score_min: 9
  must_auto_approve: false
