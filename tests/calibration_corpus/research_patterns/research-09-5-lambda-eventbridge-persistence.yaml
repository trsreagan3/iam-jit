name: research-09-5-lambda-eventbridge-persistence
description: |
  Reference: IAM-BYPASS-RESEARCH.md §9.5 (Pacu lambda__backdoor_new_*)

  Pacu's lambda__backdoor_new_* modules: events:PutRule +
  events:PutTargets + lambda:CreateFunction + lambda:AddPermission.
  Trigger pattern: source: aws.iam + detail-type: AWS API Call via
  CloudTrail + eventName: CreateUser/CreateRole. Persistent automatic
  backdooring of every new principal.

  Expected behavior: deep persistence — critical.

  Source: https://github.com/RhinoSecurityLabs/pacu/wiki/Module-Details
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - events:PutRule
        - events:PutTargets
        - lambda:CreateFunction
        - lambda:AddPermission
      Resource: "*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 9
  must_auto_approve: false
