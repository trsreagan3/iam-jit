name: research-13-8-s3-object-lambda-prefix
description: |
  Reference: IAM-BYPASS-RESEARCH.md §13.8

  s3:PutObject vs s3-object-lambda:PutObject. Object Lambda has its
  own action prefix; bypasses scorers that only look at s3:.

  Expected behavior: object-lambda grant — high risk if scorer misses.

  Source: AWS S3 Object Lambda docs
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - s3-object-lambda:GetObject
        - s3-object-lambda:PutObject
        - s3-object-lambda:ListBucket
      Resource: "*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  must_auto_approve: false
