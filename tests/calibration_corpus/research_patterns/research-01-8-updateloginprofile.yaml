name: research-01-8-updateloginprofile
description: |
  Reference: IAM-BYPASS-RESEARCH.md §1.8 (Rhino #6)

  Overwrite an existing console password and authenticate as the target.

  Expected behavior: privilege escalation primitive — high risk.

  Source: Rhino #6; PMapper iam_edges
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action: iam:UpdateLoginProfile
      Resource: "*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  must_auto_approve: false
