name: research-11-5-ifexists-chaining
description: |
  Reference: IAM-BYPASS-RESEARCH.md §11.5 (Sysdig)

  StringEqualsIfExists, BoolIfExists, etc. evaluate true if the key
  is missing → can flip a Deny into a permit for unauthenticated/
  cross-service requests.

  Expected behavior: condition spuriously passes — high risk.

  Source: https://www.sysdig.com/blog/iam-security-misconfiguration
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action: "*"
      Resource: "*"
      Condition:
        StringEqualsIfExists:
          aws:PrincipalOrgID: "o-validorg"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  must_auto_approve: false
