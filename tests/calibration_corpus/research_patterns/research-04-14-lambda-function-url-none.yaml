name: research-04-14-lambda-function-url-none
description: |
  Reference: IAM-BYPASS-RESEARCH.md §4.14 (HackingTheCloud)

  Lambda function URL with AuthType: NONE — public HTTP endpoint
  backed by Lambda execution role.
  # NB: abstract pattern, encoded the simplest concrete form — the
  # IAM action to create the function-URL config with NONE.

  Expected behavior: public-internet endpoint backed by role — high risk.

  Source: HackingTheCloud
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - lambda:CreateFunctionUrlConfig
        - lambda:UpdateFunctionUrlConfig
      Resource: "*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  must_auto_approve: false
