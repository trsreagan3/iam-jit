name: research-04-8-secretsmanager-public
description: |
  Reference: IAM-BYPASS-RESEARCH.md §4.8 (HackingTheCloud)

  Secrets Manager resource policy Principal:"*" with
  secretsmanager:GetSecretValue. Secret exfil.

  Expected behavior: public secret read — critical.

  Source: https://hackingthe.cloud/aws/exploitation/Misconfigured_Resource-Based_Policies/
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Principal: "*"
      Action: secretsmanager:GetSecretValue
      Resource: arn:aws:secretsmanager:us-east-1:111122223333:secret:example-*
request:
  spec:
    access_type: read-only
    duration:
      duration_hours: 1
expected:
  score_min: 9
  must_auto_approve: false
