name: research-02-5-pacu-sns-subscribe
description: |
  Reference: IAM-BYPASS-RESEARCH.md §2.5 (Pacu sns__subscribe)

  sns:Subscribe to exfil messages.

  Expected behavior: data exfil — moderate risk.

  Source: https://github.com/RhinoSecurityLabs/pacu/wiki/Module-Details
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action: sns:Subscribe
      Resource: "*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 5
  must_auto_approve: false
