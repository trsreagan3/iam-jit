name: research-08-3-mitre-t1548-temporary-elevated
description: |
  Reference: IAM-BYPASS-RESEARCH.md §8.3 (MITRE T1548.005)

  Temporary Elevated Cloud Access — sts:AssumeRole JIT abuse. All
  paths in Section 1 map here.

  Expected behavior: privilege escalation primitive — high risk.

  Source: https://attack.mitre.org/tactics/TA0004/
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action: sts:AssumeRole
      Resource: "*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  must_auto_approve: false
