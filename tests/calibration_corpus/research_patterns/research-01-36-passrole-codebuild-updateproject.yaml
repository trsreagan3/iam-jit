name: research-01-36-passrole-codebuild-updateproject
description: |
  Reference: IAM-BYPASS-RESEARCH.md §1.36 (PMapper codebuild_edges)

  Repoint an existing CodeBuild project's role.

  Expected behavior: privilege escalation primitive — high risk.

  Source: PMapper codebuild_edges
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - iam:PassRole
        - codebuild:UpdateProject
        - codebuild:StartBuild
      Resource: "*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  must_auto_approve: false
