name: research-01-60-bedrock-agentcore-identity-confusion
description: |
  Reference: IAM-BYPASS-RESEARCH.md §1.60 (CloudGoat agentcore_identity_confusion)

  Manage Bedrock AgentCore code interpreters in a way that gives access
  to other agents' sensitive data and knowledge-bases.
  # NB: abstract pattern, encoded the simplest concrete form — wide
  # bedrock-agentcore:* on shared resources.

  Expected behavior: cross-tenant data exposure — high risk.

  Source: CloudGoat agentcore_identity_confusion
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action: bedrock-agentcore:*
      Resource: "*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  must_auto_approve: false
