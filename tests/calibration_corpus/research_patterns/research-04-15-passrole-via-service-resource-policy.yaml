name: research-04-15-passrole-via-service-resource-policy
description: |
  Reference: IAM-BYPASS-RESEARCH.md §4.15 (HackingTheCloud / Endgame)

  Some services accept a role ARN via resource configuration without
  the invoker needing iam:PassRole (e.g., older Step Functions, Glue
  triggers) — a common scoper miss.
  # NB: abstract pattern, encoded the simplest concrete form — Step
  # Functions update with role ARN.

  Expected behavior: hidden PassRole-equivalent — high risk.

  Source: HackingTheCloud / Endgame
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - states:UpdateStateMachine
        - states:CreateStateMachine
        - glue:UpdateTrigger
      Resource: "*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  must_auto_approve: false
