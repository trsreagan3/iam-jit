name: research-02-3-pacu-cognito-attack
description: |
  Reference: IAM-BYPASS-RESEARCH.md §2.3 (Pacu cognito__attack)

  cognito-idp:AdminCreateUser, cognito-identity:GetCredentialsForIdentity.

  Expected behavior: identity-pool credential issuance — high risk.

  Source: https://github.com/RhinoSecurityLabs/pacu/wiki/Module-Details
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - cognito-idp:AdminCreateUser
        - cognito-identity:GetCredentialsForIdentity
      Resource: "*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  must_auto_approve: false
