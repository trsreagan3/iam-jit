name: research-02-7-pacu-iam-enum-roles-users
description: |
  Reference: IAM-BYPASS-RESEARCH.md §2.7 (Pacu iam__enum_roles / iam__enum_users)

  Abuse the trust-policy validation error oracle: AWS returns different
  errors for valid vs invalid role/user names in another account.

  Expected behavior: cross-account recon — moderate risk.

  Source: https://github.com/RhinoSecurityLabs/pacu/wiki/Module-Details
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action: iam:UpdateAssumeRolePolicy
      Resource: "*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  must_auto_approve: false
