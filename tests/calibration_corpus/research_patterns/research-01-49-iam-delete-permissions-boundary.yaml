name: research-01-49-iam-delete-permissions-boundary
description: |
  Reference: IAM-BYPASS-RESEARCH.md §1.49 (HackingTheCloud paths 10, 12)

  Delete the permissions boundary, removing the ceiling on effective
  permissions.

  Expected behavior: privilege escalation primitive — high risk.

  Source: HackingTheCloud paths 10, 12
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - iam:DeleteRolePermissionsBoundary
        - iam:DeleteUserPermissionsBoundary
      Resource: "*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  must_auto_approve: false
