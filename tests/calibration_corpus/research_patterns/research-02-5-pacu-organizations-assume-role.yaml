name: research-02-5-pacu-organizations-assume-role
description: |
  Reference: IAM-BYPASS-RESEARCH.md §2.5 (Pacu organizations__assume_role)

  sts:AssumeRole, organizations:ListAccounts; tries default role names
  (OrganizationAccountAccessRole) in every member account.

  Expected behavior: org-wide lateral movement — critical.

  Source: https://github.com/RhinoSecurityLabs/pacu/wiki/Module-Details
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - sts:AssumeRole
        - organizations:ListAccounts
      Resource: "*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  must_auto_approve: false
