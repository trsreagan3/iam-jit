name: research-06-5-cloudsplaining-credentials-exposure
description: |
  Reference: IAM-BYPASS-RESEARCH.md §6.5 (CloudSplaining Credentials Exposure)

  iam:CreateAccessKey, iam:UpdateAccessKey, iam:CreateLoginProfile,
  iam:UpdateLoginProfile, iam:CreateServiceSpecificCredential,
  iam:ResetServiceSpecificCredential, iam:UploadSSHPublicKey,
  redshift:GetClusterCredentials, sts:GetFederationToken,
  sts:GetSessionToken, chime:CreateApiKey.

  Expected behavior: broad credential issuance — high risk.

  Source: https://github.com/salesforce/cloudsplaining/blob/master/docs/index.md
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - iam:CreateAccessKey
        - iam:UpdateAccessKey
        - iam:CreateLoginProfile
        - iam:UpdateLoginProfile
        - iam:CreateServiceSpecificCredential
        - iam:ResetServiceSpecificCredential
        - iam:UploadSSHPublicKey
        - redshift:GetClusterCredentials
        - sts:GetFederationToken
        - sts:GetSessionToken
        - chime:CreateApiKey
      Resource: "*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  must_auto_approve: false
