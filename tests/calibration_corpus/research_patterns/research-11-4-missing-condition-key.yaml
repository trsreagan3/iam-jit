name: research-11-4-missing-condition-key
description: |
  Reference: IAM-BYPASS-RESEARCH.md §11.4 (Sysdig)

  If a condition key is absent from the request context, standard
  operators evaluate the condition as not met → for Allow, the allow
  does not apply; for Deny, the deny does not apply. A Deny statement
  gated on a key that the request doesn't carry does not block.
  # NB: encoded as a Deny statement gated on a key (aws:MultiFactorAuthPresent)
  # that may not be present in the request.

  Expected behavior: Deny silently doesn't apply — high risk.

  Source: https://www.sysdig.com/blog/iam-security-misconfiguration
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action: "*"
      Resource: "*"
    - Effect: Deny
      Action: iam:*
      Resource: "*"
      Condition:
        BoolIfExists:
          aws:MultiFactorAuthPresent: "false"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  must_auto_approve: false
