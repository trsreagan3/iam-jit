name: research-10-5-condition-operator-case
description: |
  Reference: IAM-BYPASS-RESEARCH.md §10.5 (AWS IAM grammar)

  Condition is {operator: {key: value-or-list}}. Operators are
  case-insensitive in evaluation but case-preserving in storage —
  scorers comparing operators with == against "StringEquals" may miss
  "stringequals".

  Expected behavior: parser should normalize case — if not, condition
  is missed entirely, granting wider access.

  Source: https://docs.aws.amazon.com/IAM/latest/UserGuide/reference_policies_grammar.html
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action: s3:GetObject
      Resource: "*"
      Condition:
        stringequals:
          aws:PrincipalAccount: "111122223333"
request:
  spec:
    access_type: read-only
    duration:
      duration_hours: 1
expected:
  score_min: 5
  must_auto_approve: false
