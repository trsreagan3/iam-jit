name: research-12-3-allow-notprincipal
description: |
  Reference: IAM-BYPASS-RESEARCH.md §12.3 (AWS NotPrincipal docs)

  Allow + NotPrincipal — grants the resource to everyone except listed
  principals, including principals outside the account. AWS docs
  explicitly warn against this. Tools commonly miss because NotPrincipal
  is rare.

  Expected behavior: globally permissive — critical.

  Source: https://docs.aws.amazon.com/IAM/latest/UserGuide/reference_policies_elements_notprincipal.html
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      NotPrincipal:
        AWS:
          - "arn:aws:iam::111122223333:root"
      Action: "s3:*"
      Resource: "arn:aws:s3:::example-bucket/*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 9
  must_auto_approve: false
