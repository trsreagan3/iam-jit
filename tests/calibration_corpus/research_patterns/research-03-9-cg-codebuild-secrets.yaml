name: research-03-9-cg-codebuild-secrets
description: |
  Reference: IAM-BYPASS-RESEARCH.md §3.9 (CloudGoat codebuild_secrets)

  CodeBuild env vars containing IAM keys; CodeBuild service role
  over-privileged.

  Expected behavior: credential exposure via CodeBuild — high risk.

  Source: https://github.com/RhinoSecurityLabs/cloudgoat
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - codebuild:BatchGetProjects
        - codebuild:ListProjects
        - codebuild:StartBuild
      Resource: "*"
request:
  spec:
    access_type: read-only
    duration:
      duration_hours: 1
expected:
  score_min: 5
  must_auto_approve: false
