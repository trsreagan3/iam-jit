name: research-01-45-passrole-ecs-runtask
description: |
  Reference: IAM-BYPASS-RESEARCH.md §1.45 (HackingTheCloud path 23)

  Launch a Fargate task with command overrides and a privileged task role.

  Expected behavior: privilege escalation primitive — high risk.

  Source: https://hackingthe.cloud/aws/exploitation/iam_privilege_escalation/
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - iam:PassRole
        - ecs:RunTask
      Resource: "*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  must_auto_approve: false
