name: research-02-4-pacu-ebs-download-snapshots
description: |
  Reference: IAM-BYPASS-RESEARCH.md §2.4 (Pacu ebs__download_snapshots)

  ec2:DescribeSnapshots, ebs:GetSnapshotBlock (EBS direct API).

  Expected behavior: data exfil from disk snapshots — high risk.

  Source: https://github.com/RhinoSecurityLabs/pacu/wiki/Module-Details
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - ec2:DescribeSnapshots
        - ebs:GetSnapshotBlock
      Resource: "*"
request:
  spec:
    access_type: read-only
    duration:
      duration_hours: 1
expected:
  score_min: 7
  must_auto_approve: false
