name: research-01-50-iam-put-permissions-boundary
description: |
  Reference: IAM-BYPASS-RESEARCH.md §1.50 (HackingTheCloud paths 32, 34)

  Replace boundary with a less-restrictive policy.

  Expected behavior: privilege escalation primitive — high risk.

  Source: HackingTheCloud paths 32, 34
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - iam:PutRolePermissionsBoundary
        - iam:PutUserPermissionsBoundary
      Resource: "*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  must_auto_approve: false
