name: research-02-3-pacu-api-gateway-create-api-keys
description: |
  Reference: IAM-BYPASS-RESEARCH.md §2.3 (Pacu api_gateway__create_api_keys)

  apigateway:CreateApiKey.

  Expected behavior: persistence / API key extraction — moderate risk.

  Source: https://github.com/RhinoSecurityLabs/pacu/wiki/Module-Details
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action: apigateway:CreateApiKey
      Resource: "*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 5
  must_auto_approve: false
