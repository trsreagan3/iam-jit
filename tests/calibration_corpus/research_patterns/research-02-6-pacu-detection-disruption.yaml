name: research-02-6-pacu-detection-disruption
description: |
  Reference: IAM-BYPASS-RESEARCH.md §2.6 (Pacu detection__disruption)

  cloudtrail:StopLogging, guardduty:DeleteDetector,
  config:DeleteConfigRule.

  Expected behavior: defense evasion — critical.

  Source: https://github.com/RhinoSecurityLabs/pacu/wiki/Module-Details
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - cloudtrail:StopLogging
        - guardduty:DeleteDetector
        - config:DeleteConfigRule
      Resource: "*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 9
  must_auto_approve: false
