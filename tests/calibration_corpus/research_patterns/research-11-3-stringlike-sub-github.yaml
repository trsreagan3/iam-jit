name: research-11-3-stringlike-sub-github
description: |
  Reference: IAM-BYPASS-RESEARCH.md §11.3 (Sysdig)

  OIDC trust policies (GitHub Actions, GitLab) often use StringLike
  "repo:org/*" instead of StringEquals "repo:org/repo:ref:refs/heads/main"
  — anyone with a fork or branch can claim the JWT.

  Expected behavior: federated trust takeover — high risk.

  Source: https://www.sysdig.com/blog/iam-security-misconfiguration
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Principal:
        Federated: "arn:aws:iam::111122223333:oidc-provider/token.actions.githubusercontent.com"
      Action: sts:AssumeRoleWithWebIdentity
      Resource: "*"
      Condition:
        StringLike:
          "token.actions.githubusercontent.com:sub": "repo:my-org/*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  must_auto_approve: false
