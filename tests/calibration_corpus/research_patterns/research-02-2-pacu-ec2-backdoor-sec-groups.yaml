name: research-02-2-pacu-ec2-backdoor-sec-groups
description: |
  Reference: IAM-BYPASS-RESEARCH.md §2.2 (Pacu ec2__backdoor_ec2_sec_groups)

  Direct ec2:AuthorizeSecurityGroupIngress for backdoor.

  Expected behavior: network exposure — high risk.

  Source: https://github.com/RhinoSecurityLabs/pacu/wiki/Module-Details
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action: ec2:AuthorizeSecurityGroupIngress
      Resource: "*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 6
  must_auto_approve: false
