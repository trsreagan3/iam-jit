name: research-05-5-scarleteel-node-role
description: |
  Reference: IAM-BYPASS-RESEARCH.md §5.5 (Sysdig SCARLETEEL 2023-2024)

  Wide s3:GetObject / lambda:GetFunction on node role; cross-account
  trust policies the attacker repurposed; S3-compatible 3rd-party
  endpoints used for exfil to evade CloudTrail.

  Expected behavior: data exfil chain on EKS node role — high risk.

  Source: https://www.sysdig.com/blog/scarleteel-2-0
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - s3:GetObject
        - lambda:GetFunction
        - lambda:ListFunctions
        - sts:AssumeRole
      Resource: "*"
request:
  spec:
    access_type: read-only
    duration:
      duration_hours: 1
expected:
  score_min: 7
  must_auto_approve: false
