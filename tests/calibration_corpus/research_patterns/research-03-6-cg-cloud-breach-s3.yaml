name: research-03-6-cg-cloud-breach-s3
description: |
  Reference: IAM-BYPASS-RESEARCH.md §3.6 (CloudGoat cloud_breach_s3)

  Reverse-proxy SSRF → EC2 IMDS → role creds → S3 (the Capital One pattern).
  # NB: encoded as the wide S3 read grant on an EC2 role.

  Expected behavior: data exfil pathway — high risk.

  Source: https://github.com/RhinoSecurityLabs/cloudgoat
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - s3:ListAllMyBuckets
        - s3:GetObject
        - s3:ListBucket
      Resource: "*"
request:
  spec:
    access_type: read-only
    duration:
      duration_hours: 1
expected:
  score_min: 7
  must_auto_approve: false
