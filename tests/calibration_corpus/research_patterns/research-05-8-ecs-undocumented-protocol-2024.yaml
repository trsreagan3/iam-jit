name: research-05-8-ecs-undocumented-protocol-2024
description: |
  Reference: IAM-BYPASS-RESEARCH.md §5.8 (Aviatrix ECS 2024)

  ECS task isolation gap allowed cross-task IAM token theft via
  undocumented agent protocol.
  # NB: abstract pattern, encoded the simplest concrete form — wide
  # ECS task/container access.

  Expected behavior: cross-task token theft — high risk.

  Source: https://aviatrix.ai/threat-research-center/amazon-ecs-2024-privilege-escalation-iam-hijacking/
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - ecs:DescribeTasks
        - ecs:DescribeContainerInstances
        - ecs:ListTasks
      Resource: "*"
request:
  spec:
    access_type: read-only
    duration:
      duration_hours: 1
expected:
  score_min: 5
  must_auto_approve: false
