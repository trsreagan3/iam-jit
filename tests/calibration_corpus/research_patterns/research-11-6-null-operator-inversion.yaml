name: research-11-6-null-operator-inversion
description: |
  Reference: IAM-BYPASS-RESEARCH.md §11.6 (Sysdig)

  "Null":{"aws:MultiFactorAuthAge":"true"} = "require absence of MFA"
  — exact opposite of likely intent. Often written by hand and inverted.

  Expected behavior: inverted MFA condition — high risk.

  Source: https://www.sysdig.com/blog/iam-security-misconfiguration
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action: "*"
      Resource: "*"
      Condition:
        "Null":
          aws:MultiFactorAuthAge: "true"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  must_auto_approve: false
