name: research-01-23-passrole-cfn-createstack
description: |
  Reference: IAM-BYPASS-RESEARCH.md §1.23 (Rhino #21)

  Provide a CFN template that creates a backdoor user / policy and is
  executed under a privileged role passed via --role-arn.

  Expected behavior: privilege escalation primitive — high risk.

  Source: https://raw.githubusercontent.com/nccgroup/PMapper/master/principalmapper/graphing/cloudformation_edges.py
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - iam:PassRole
        - cloudformation:CreateStack
      Resource: "*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  must_auto_approve: false
