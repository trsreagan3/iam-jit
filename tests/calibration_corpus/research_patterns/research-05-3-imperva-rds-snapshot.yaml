name: research-05-3-imperva-rds-snapshot
description: |
  Reference: IAM-BYPASS-RESEARCH.md §5.3 (Imperva 2019)

  Long-lived AKIA on internal instance with rds:DescribeDB* and
  s3:GetObject on snapshot bucket; snapshot not encrypted with a
  customer-restricted KMS key; shared snapshot ACLs not constrained.

  Expected behavior: DB snapshot read across accounts — high risk.

  Source: https://www.helpnetsecurity.com/2019/10/11/imperva-security-incident-details/
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - rds:DescribeDBSnapshots
        - rds:DescribeDBInstances
        - s3:GetObject
      Resource: "*"
request:
  spec:
    access_type: read-only
    duration:
      duration_hours: 1
expected:
  score_min: 7
  must_auto_approve: false
