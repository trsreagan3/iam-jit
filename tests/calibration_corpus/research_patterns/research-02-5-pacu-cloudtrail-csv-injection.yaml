name: research-02-5-pacu-cloudtrail-csv-injection
description: |
  Reference: IAM-BYPASS-RESEARCH.md §2.5 (Pacu cloudtrail__csv_injection)

  cloudtrail:CreateTrail, ec2:RunInstances; inject formula payloads
  into CloudTrail downloads that admins import to Excel.

  Expected behavior: client-side admin compromise — moderate risk.

  Source: https://github.com/RhinoSecurityLabs/pacu/wiki/Module-Details
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - cloudtrail:CreateTrail
        - ec2:RunInstances
      Resource: "*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 6
  must_auto_approve: false
