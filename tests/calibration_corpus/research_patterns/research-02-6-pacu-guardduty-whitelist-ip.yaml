  Statement:
    - Effect: Allow
      Action: guardduty:CreateThreatIntelSet
      Resource: "*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  must_auto_approve: false
