name: research-02-6-pacu-guardduty-whitelist-ip
description: |
  Reference: IAM-BYPASS-RESEARCH.md §2.6 (Pacu guardduty__whitelist_ip)

  guardduty:CreateThreatIntelSet to mark attacker IPs as trusted.

  Expected behavior: defense evasion — high risk.

  Source: https://github.com/RhinoSecurityLabs/pacu/wiki/Module-Details
policy:
