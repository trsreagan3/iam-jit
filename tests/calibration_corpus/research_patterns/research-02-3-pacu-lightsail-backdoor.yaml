name: research-02-3-pacu-lightsail-backdoor
description: |
  Reference: IAM-BYPASS-RESEARCH.md §2.3 (Pacu lightsail__*)

  Lightsail backdoors via key-pair manipulation (often forgotten service).

  Expected behavior: persistence in alt-compute service — moderate risk.

  Source: https://github.com/RhinoSecurityLabs/pacu/wiki/Module-Details
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action:
        - lightsail:CreateKeyPair
        - lightsail:CreateInstanceAccessDetails
        - lightsail:GetKeyPair
        - lightsail:ImportKeyPair
      Resource: "*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 6
  must_auto_approve: false
