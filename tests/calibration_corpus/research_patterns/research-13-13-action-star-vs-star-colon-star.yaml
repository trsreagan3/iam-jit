name: research-13-13-action-star-vs-star-colon-star
description: |
  Reference: IAM-BYPASS-RESEARCH.md §13.13

  Action:"*" vs Action:"*:*". * is wildcard for entire action-string.
  *:* is technically invalid but AWS may parse permissively. Scorers
  should treat any single * as full wildcard.
  # NB: encoded the unusual "*:*" form.

  Expected behavior: full wildcard — critical.

  Source: AWS IAM grammar docs
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action: "*:*"
      Resource: "*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 10
  must_auto_approve: false
