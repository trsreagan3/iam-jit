name: research-03-2-cg-iam-privesc-by-rollback
description: |
  Reference: IAM-BYPASS-RESEARCH.md §3.2 (CloudGoat iam_privesc_by_rollback)

  iam:SetDefaultPolicyVersion on a policy with stale, more-permissive
  prior versions.

  Expected behavior: privilege escalation primitive — high risk.

  Source: https://github.com/RhinoSecurityLabs/cloudgoat
policy:
  Version: "2012-10-17"
  Statement:
    - Effect: Allow
      Action: iam:SetDefaultPolicyVersion
      Resource: "*"
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  must_auto_approve: false
