name: adv-lambda-update-code
description: UpdateFunctionCode on one specific Lambda. Sounds narrow but = arbitrary code execution in that Lambda's IAM
  role. If the role has any prod access, this is RCE.
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action: lambda:UpdateFunctionCode
    Resource: arn:aws:lambda:us-east-1:111111111111:function:prod-api
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 5
  must_auto_approve: false
