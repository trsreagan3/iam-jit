name: adv-guardduty-disable
description: "guardduty:UpdateDetector with Enable=false \u2014 disable threat detection. Catastrophic for incident response."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - guardduty:UpdateDetector
    - guardduty:DeleteDetector
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  must_auto_approve: false
