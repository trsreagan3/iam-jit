name: adv-readonly-with-kms-decrypt
description: Read-only flag with kms:Decrypt on wildcard key. Decrypt is IAM-classified Read so this passes the mismatch check,
  but decrypting arbitrary data is a data-confidentiality breach.
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action: kms:Decrypt
    Resource: '*'
request:
  spec:
    access_type: read-only
    duration:
      duration_hours: 1
expected:
  score_min: 6
  must_auto_approve: false
