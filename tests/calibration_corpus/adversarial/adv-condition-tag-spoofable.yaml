name: adv-condition-tag-spoofable
description: Wildcard action guarded by a tag condition the caller can set themselves via CreateTags. Defense-in-depth fails
  if the caller can manipulate the condition keys.
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - ec2:*
    Resource: '*'
    Condition:
      StringEquals:
        aws:RequestTag/Owner: team-a
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 6
  must_auto_approve: false
