name: adv-delete-log-groups
description: logs:DeleteLogGroup on Resource:*. Evidence destruction for everything logged in CloudWatch.
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action: logs:DeleteLogGroup
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  must_auto_approve: false
