name: adv-organizations-everything
description: "organizations:* \u2014 full multi-account control."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action: organizations:*
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 9
  must_auto_approve: false
