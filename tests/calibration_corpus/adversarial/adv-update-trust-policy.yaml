name: adv-update-trust-policy
description: "UpdateAssumeRolePolicy on Resource:* \u2014 rewrite trust on any role to let attacker's principal assume it.\
  \ Catastrophic."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - iam:UpdateAssumeRolePolicy
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 9
  must_auto_approve: false
