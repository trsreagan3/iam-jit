name: adv-leave-organization
description: "organizations:LeaveOrganization \u2014 account leaves its org, loses SCP governance, disconnects from consolidated\
  \ billing. Irreversible without org-admin intervention."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action: organizations:LeaveOrganization
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 9
  must_auto_approve: false
