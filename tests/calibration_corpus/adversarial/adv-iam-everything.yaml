name: adv-iam-everything
description: "iam:* on Resource:* \u2014 full IAM service control = full account compromise."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action: iam:*
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 9
  must_auto_approve: false
