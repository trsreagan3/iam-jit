name: adv-secrets-bulk-read
description: secretsmanager:GetSecretValue on Resource:*. Read every secret in the account (DB connection strings, API keys,
  OAuth tokens). Data-breach primitive.
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action: secretsmanager:GetSecretValue
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  must_auto_approve: false
