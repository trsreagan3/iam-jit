name: adv-close-account
description: "account:CloseAccount \u2014 close the AWS account entirely. Catastrophic, irreversible."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action: account:CloseAccount
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 9
  must_auto_approve: false
