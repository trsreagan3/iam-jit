name: adv-readonly-with-delete
description: "access_type=read-only but policy contains s3:DeleteObject. An honest-looking 'read-only' request that actually\
  \ destroys data. Scorer must catch the mismatch (\u22657)."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - s3:DeleteObject
    - s3:DeleteObjectVersion
    Resource: arn:aws:s3:::any/*
request:
  spec:
    access_type: read-only
    duration:
      duration_hours: 1
expected:
  score_min: 7
  must_auto_approve: false
