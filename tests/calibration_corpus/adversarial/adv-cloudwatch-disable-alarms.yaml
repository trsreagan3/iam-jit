name: adv-cloudwatch-disable-alarms
description: "DisableAlarmActions on Resource:* \u2014 disable every CW alarm in the account. Combine with destructive activity\
  \ to suppress detection."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - cloudwatch:DisableAlarmActions
    - cloudwatch:DeleteAlarms
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  must_auto_approve: false
