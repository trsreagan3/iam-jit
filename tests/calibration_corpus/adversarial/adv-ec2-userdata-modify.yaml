name: adv-ec2-userdata-modify
description: ModifyInstanceAttribute lets attacker change userData script = arbitrary code on next instance restart. Single-instance
  scope is still RCE.
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action: ec2:ModifyInstanceAttribute
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 5
  must_auto_approve: false
