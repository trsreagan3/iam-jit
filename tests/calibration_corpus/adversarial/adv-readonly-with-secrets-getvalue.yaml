name: adv-readonly-with-secrets-getvalue
description: "Read-only flag with secretsmanager:GetSecretValue. The action is IAM-classified as Read, so this is technically\
  \ compliant \u2014 but reading secrets is itself a data-exfil concern."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action: secretsmanager:GetSecretValue
    Resource: '*'
request:
  spec:
    access_type: read-only
    duration:
      duration_hours: 1
expected:
  score_min: 6
  must_auto_approve: false
