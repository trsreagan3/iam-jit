name: aws-managed-SageMakerStudioQueryExecutionRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/service-role/SageMakerStudioQueryExecutionRolePolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=7; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: GlueGetConnectionOnCatalog
    Effect: Allow
    Action:
    - glue:GetConnection
    Resource:
    - arn:aws:glue:*:*:catalog
  - Sid: GlueGetConnectionsForProject
    Effect: Allow
    Action:
    - glue:GetConnection
    - glue:GetConnections
    - glue:GetTags
    Resource: arn:aws:glue:*:*:connection/*
    Condition:
      'Null':
        aws:ResourceTag/AmazonDataZoneProject: 'false'
  - Sid: S3GetObjectForAthenaSpillBucket
    Effect: Allow
    Action:
    - s3:GetObject
    Resource:
    - arn:aws:s3:::*/dzd*/*/dev/sys/athena/*
    Condition:
      StringEquals:
        aws:PrincipalTag/SageMakerStudioQueryExecutionRole: 'true'
  - Sid: S3ListBucketOwnershipCheckForAthenaSpillBucket
    Effect: Allow
    Action:
    - s3:ListBucket
    Resource:
    - arn:aws:s3:::amazon-sagemaker-*
    Condition:
      StringEquals:
        aws:PrincipalTag/SageMakerStudioQueryExecutionRole: 'true'
  - Sid: InvokeFunctionPermissionsForAthenaCatalogLambda
    Effect: Allow
    Action: lambda:InvokeFunction
    Resource: arn:aws:lambda:*:*:function:*
    Condition:
      StringEquals:
        aws:PrincipalTag/SageMakerStudioQueryExecutionRole: 'true'
        aws:ResourceTag/federated_athena_datacatalog: 'true'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 6
  score_max: 8
