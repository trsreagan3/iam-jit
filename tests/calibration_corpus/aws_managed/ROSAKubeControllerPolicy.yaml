name: aws-managed-ROSAKubeControllerPolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/service-role/ROSAKubeControllerPolicy\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: ReadPermissions
    Effect: Allow
    Action:
    - ec2:DescribeAvailabilityZones
    - ec2:DescribeInstances
    - ec2:DescribeRouteTables
    - ec2:DescribeSecurityGroups
    - ec2:DescribeSubnets
    - ec2:DescribeVpcs
    - elasticloadbalancing:DescribeLoadBalancers
    - elasticloadbalancing:DescribeLoadBalancerAttributes
    - elasticloadbalancing:DescribeListeners
    - elasticloadbalancing:DescribeTargetGroups
    - elasticloadbalancing:DescribeTargetGroupAttributes
    - elasticloadbalancing:DescribeTargetHealth
    - elasticloadbalancing:DescribeLoadBalancerPolicies
    Resource:
    - '*'
  - Sid: KMSDescribeKey
    Effect: Allow
    Action:
    - kms:DescribeKey
    Resource:
    - '*'
    Condition:
      StringEquals:
        aws:ResourceTag/red-hat: 'true'
  - Sid: LoadBalanacerManagement
    Effect: Allow
    Action:
    - elasticloadbalancing:AddTags
    - elasticloadbalancing:ConfigureHealthCheck
    - elasticloadbalancing:CreateLoadBalancerPolicy
    - elasticloadbalancing:DeleteLoadBalancer
    - elasticloadbalancing:DeregisterInstancesFromLoadBalancer
    - elasticloadbalancing:ModifyLoadBalancerAttributes
    - elasticloadbalancing:RegisterInstancesWithLoadBalancer
    - elasticloadbalancing:SetLoadBalancerPoliciesForBackendServer
    Resource:
    - '*'
  - Sid: CreateTargetGroup
    Effect: Allow
    Action:
    - elasticloadbalancing:CreateTargetGroup
    Resource:
    - '*'
    Condition:
      StringEquals:
        aws:RequestTag/red-hat-managed: 'true'
  - Sid: LoadBalanacerManagementResourceTag
    Effect: Allow
    Action:
    - elasticloadbalancing:DeleteListener
    - elasticloadbalancing:RegisterTargets
    - elasticloadbalancing:ModifyTargetGroup
    - elasticloadbalancing:DeleteTargetGroup
    - elasticloadbalancing:ApplySecurityGroupsToLoadBalancer
    - elasticloadbalancing:CreateLoadBalancerListeners
    - elasticloadbalancing:DeleteLoadBalancerListeners
    - elasticloadbalancing:AttachLoadBalancerToSubnets
    - elasticloadbalancing:DetachLoadBalancerFromSubnets
    - elasticloadbalancing:ModifyListener
    - elasticloadbalancing:SetLoadBalancerPoliciesOfListener
    Resource:
    - '*'
    Condition:
      StringEquals:
        aws:ResourceTag/red-hat-managed: 'true'
  - Sid: CreateListeners
    Effect: Allow
    Action:
    - elasticloadbalancing:CreateListener
    Resource:
    - '*'
    Condition:
      StringEquals:
        aws:RequestTag/red-hat-managed: 'true'
        aws:ResourceTag/red-hat-managed: 'true'
  - Sid: CreateSecurityGroup
    Effect: Allow
    Action:
    - ec2:CreateSecurityGroup
    Resource:
    - arn:aws:ec2:*:*:security-group/*
    Condition:
      StringEquals:
        aws:RequestTag/red-hat-managed: 'true'
  - Sid: CreateSecurityGroupVpc
    Effect: Allow
    Action:
    - ec2:CreateSecurityGroup
    Resource:
    - arn:aws:ec2:*:*:vpc/*
  - Sid: CreateLoadBalancer
    Effect: Allow
    Action:
    - elasticloadbalancing:CreateLoadBalancer
    Resource:
    - arn:aws:elasticloadbalancing:*:*:loadbalancer/*
    Condition:
      StringEquals:
        aws:RequestTag/red-hat-managed: 'true'
  - Sid: ModifySecurityGroup
    Effect: Allow
    Action:
    - ec2:AuthorizeSecurityGroupIngress
    - ec2:RevokeSecurityGroupIngress
    - ec2:DeleteSecurityGroup
    Resource:
    - arn:aws:ec2:*:*:security-group/*
    Condition:
      StringEquals:
        aws:ResourceTag/red-hat-managed: 'true'
  - Sid: CreateTagsSecurityGroups
    Effect: Allow
    Action:
    - ec2:CreateTags
    Resource:
    - arn:aws:ec2:*:*:security-group/*
    Condition:
      StringEquals:
        ec2:CreateAction: CreateSecurityGroup
  - Sid: ManageTargetGroup
    Effect: Allow
    Action:
    - elasticloadbalancing:ModifyTargetGroupAttributes
    - elasticloadbalancing:DeregisterTargets
    Resource:
    - arn:aws:elasticloadbalancing:*:*:targetgroup/*
    Condition:
      StringEquals:
        aws:ResourceTag/red-hat-managed: 'true'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
