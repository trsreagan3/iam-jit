name: aws-managed-AWSVPCFlowLogsServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AWSVPCFlowLogsServiceRolePolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=4; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: AllowPutRuleOnSpecificSourcesAndDetailTypes
    Effect: Allow
    Action: events:PutRule
    Resource:
    - arn:aws:events:*:*:rule/VPCFlowLogsEC2TagsManagedRule
    - arn:aws:events:*:*:rule/VPCFlowLogsASGTagsManagedRule
    Condition:
      ForAllValues:StringEquals:
        events:source:
        - aws.tag
        - aws.autoscaling
        events:detail-type:
        - AWS API Call via CloudTrail
        - Tag Change on Resource
      'Null':
        events:source: 'false'
        events:detail-type: 'false'
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: AllowOtherOperationsOnRulesManagedByVPCFlowLogs
    Effect: Allow
    Action:
    - events:DeleteRule
    - events:DescribeRule
    - events:PutTargets
    - events:RemoveTargets
    Resource:
    - arn:aws:events:*:*:rule/VPCFlowLogsEC2TagsManagedRule
    - arn:aws:events:*:*:rule/VPCFlowLogsASGTagsManagedRule
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: AllowDescribeTagsOnAllEC2Resources
    Effect: Allow
    Action:
    - tag:GetResources
    - autoscaling:DescribeTags
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 3
  score_max: 5
