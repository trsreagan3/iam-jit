name: aws-managed-AmazonNimbleStudio-StudioUser
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AmazonNimbleStudio-StudioUser\nAWS description: (none)\n\
  Generated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule\
  \ refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Statement:
  - Effect: Allow
    Action:
    - ds:CreateComputer
    - ec2:DescribeSubnets
    - ec2:CreateNetworkInterfacePermission
    - ec2:DescribeNetworkInterfaces
    - ec2:DeleteNetworkInterfacePermission
    - ec2:DeleteNetworkInterface
    - ec2:CreateNetworkInterface
    - ec2:DescribeSecurityGroups
    - fsx:DescribeFileSystems
    - ds:DescribeDirectories
    Resource:
    - '*'
    Condition:
      StringEquals:
        aws:CalledViaLast: nimble.amazonaws.com
  - Effect: Allow
    Action:
    - sso-directory:DescribeUsers
    - sso-directory:SearchUsers
    - identitystore:DescribeUser
    - identitystore:ListUsers
    Resource:
    - '*'
  - Effect: Allow
    Action:
    - nimble:ListLaunchProfiles
    Resource: '*'
    Condition:
      StringEquals:
        nimble:requesterPrincipalId: ${nimble:principalId}
  - Effect: Allow
    Action:
    - nimble:ListStudioMembers
    - nimble:GetStudioMember
    - nimble:ListEulas
    - nimble:ListEulaAcceptances
    - nimble:GetFeatureMap
    - nimble:PutStudioLogEvents
    Resource: '*'
  - Effect: Allow
    Action:
    - nimble:DeleteStreamingSession
    - nimble:GetStreamingSession
    - nimble:StartStreamingSession
    - nimble:StopStreamingSession
    - nimble:CreateStreamingSessionStream
    - nimble:GetStreamingSessionStream
    - nimble:ListStreamingSessions
    - nimble:ListStreamingSessionBackups
    - nimble:GetStreamingSessionBackup
    Resource: '*'
    Condition:
      StringEquals:
        nimble:ownedBy: ${nimble:requesterPrincipalId}
  Version: '2012-10-17'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
