name: aws-managed-AWSSecurityAgentWebAppPolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/service-role/AWSSecurityAgentWebAppPolicy\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
