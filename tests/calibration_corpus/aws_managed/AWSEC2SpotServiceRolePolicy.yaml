name: aws-managed-AWSEC2SpotServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AWSEC2SpotServiceRolePolicy\nAWS\
  \ description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score\
  \ against future rule refactors. Current det_score=9; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - ec2:DescribeInstances
    - ec2:StartInstances
    - ec2:StopInstances
    - ec2:RunInstances
    Resource:
    - '*'
  - Effect: Deny
    Action:
    - ec2:RunInstances
    Resource:
    - arn:aws:ec2:*:*:instance/*
    Condition:
      StringNotEquals:
        ec2:InstanceMarketType: spot
  - Effect: Allow
    Action:
    - iam:PassRole
    Resource:
    - '*'
    Condition:
      StringEquals:
        iam:PassedToService:
        - ec2.amazonaws.com
        - ec2.amazonaws.com.cn
  - Effect: Allow
    Action:
    - ec2:CreateTags
    Resource: '*'
    Condition:
      StringEquals:
        ec2:CreateAction: RunInstances
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  score_max: 10
