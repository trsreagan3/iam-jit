name: aws-managed-AmazonConnectSynchronizationServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AmazonConnectSynchronizationServiceRolePolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: AllowConnectActions
    Effect: Allow
    Action:
    - connect:Create*
    - connect:BatchCreate*
    - connect:Update*
    - connect:BatchUpdate*
    - connect:Delete*
    - connect:BatchDelete*
    - connect:Describe*
    - connect:BatchDescribe*
    - connect:List*
    - connect:Search*
    - connect:Associate*
    - connect:Disassociate*
    - connect:Get*
    - connect:BatchGet*
    - connect:Import*
    - connect:TagResource
    - connect:UntagResource
    Resource: '*'
  - Sid: DisallowedConnectActions
    Effect: Deny
    Action:
    - connect:Start*
    - connect:Stop*
    - connect:Resume*
    - connect:Suspend*
    - connect:*Contact
    - connect:SearchContacts
    - connect:*ContactAttributes*
    - connect:*RealtimeContact*
    - connect:*AnalyticsData*
    - connect:*MetricData*
    - connect:*UserData*
    - connect:*ContactEvaluation
    - connect:*AttachedFile*
    - connect:UpdateContactSchedule
    - connect:UpdateContactRoutingData
    - connect:ListContactReferences
    - connect:CreateParticipant
    - connect:CreatePersistentContactAssociation
    - connect:CreateInstance
    - connect:DeleteInstance
    - connect:ListInstances
    - connect:ReplicateInstance
    - connect:GetFederationToken
    - connect:ClaimPhoneNumber
    - connect:ImportPhoneNumber
    - connect:ReleasePhoneNumber
    - connect:SearchAvailablePhoneNumbers
    - connect:CreateTrafficDistributionGroup
    - connect:DeleteTrafficDistributionGroup
    - connect:GetTrafficDistribution
    - connect:UpdateTrafficDistribution
    Resource: '*'
  - Sid: AllowPutMetricsForConnectNamespace
    Effect: Allow
    Action: cloudwatch:PutMetricData
    Resource: '*'
    Condition:
      StringEquals:
        cloudwatch:namespace: AWS/Connect
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
