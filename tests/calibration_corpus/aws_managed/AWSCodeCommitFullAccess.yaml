name: aws-managed-AWSCodeCommitFullAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AWSCodeCommitFullAccess\nAWS description: (none)\n\
  Generated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule\
  \ refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - codecommit:*
    Resource: '*'
  - Sid: CloudWatchEventsCodeCommitRulesAccess
    Effect: Allow
    Action:
    - events:DeleteRule
    - events:DescribeRule
    - events:DisableRule
    - events:EnableRule
    - events:PutRule
    - events:PutTargets
    - events:RemoveTargets
    - events:ListTargetsByRule
    Resource: arn:aws:events:*:*:rule/codecommit*
  - Sid: SNSTopicAndSubscriptionAccess
    Effect: Allow
    Action:
    - sns:CreateTopic
    - sns:DeleteTopic
    - sns:Subscribe
    - sns:Unsubscribe
    - sns:SetTopicAttributes
    Resource: arn:aws:sns:*:*:codecommit*
  - Sid: SNSTopicAndSubscriptionReadAccess
    Effect: Allow
    Action:
    - sns:ListTopics
    - sns:ListSubscriptionsByTopic
    - sns:GetTopicAttributes
    Resource: '*'
  - Sid: LambdaReadOnlyListAccess
    Effect: Allow
    Action:
    - lambda:ListFunctions
    Resource: '*'
  - Sid: IAMReadOnlyListAccess
    Effect: Allow
    Action:
    - iam:ListUsers
    Resource: '*'
  - Sid: IAMReadOnlyConsoleAccess
    Effect: Allow
    Action:
    - iam:ListAccessKeys
    - iam:ListSSHPublicKeys
    - iam:ListServiceSpecificCredentials
    Resource: arn:aws:iam::*:user/${aws:username}
  - Sid: IAMUserSSHKeys
    Effect: Allow
    Action:
    - iam:DeleteSSHPublicKey
    - iam:GetSSHPublicKey
    - iam:ListSSHPublicKeys
    - iam:UpdateSSHPublicKey
    - iam:UploadSSHPublicKey
    Resource: arn:aws:iam::*:user/${aws:username}
  - Sid: IAMSelfManageServiceSpecificCredentials
    Effect: Allow
    Action:
    - iam:CreateServiceSpecificCredential
    - iam:UpdateServiceSpecificCredential
    - iam:DeleteServiceSpecificCredential
    - iam:ResetServiceSpecificCredential
    Resource: arn:aws:iam::*:user/${aws:username}
  - Sid: CodeStarNotificationsReadWriteAccess
    Effect: Allow
    Action:
    - codestar-notifications:CreateNotificationRule
    - codestar-notifications:DescribeNotificationRule
    - codestar-notifications:UpdateNotificationRule
    - codestar-notifications:DeleteNotificationRule
    - codestar-notifications:Subscribe
    - codestar-notifications:Unsubscribe
    Resource: '*'
    Condition:
      ArnLike:
        codestar-notifications:NotificationsForResource: arn:aws:codecommit:*:*:*
  - Sid: CodeStarNotificationsListAccess
    Effect: Allow
    Action:
    - codestar-notifications:ListNotificationRules
    - codestar-notifications:ListTargets
    - codestar-notifications:ListTagsforResource
    - codestar-notifications:ListEventTypes
    Resource: '*'
  - Sid: CodeStarNotificationsSNSTopicCreateAccess
    Effect: Allow
    Action:
    - sns:CreateTopic
    - sns:SetTopicAttributes
    Resource: arn:aws:sns:*:*:codestar-notifications*
  - Sid: AmazonCodeGuruReviewerFullAccess
    Effect: Allow
    Action:
    - codeguru-reviewer:AssociateRepository
    - codeguru-reviewer:DescribeRepositoryAssociation
    - codeguru-reviewer:ListRepositoryAssociations
    - codeguru-reviewer:DisassociateRepository
    - codeguru-reviewer:DescribeCodeReview
    - codeguru-reviewer:ListCodeReviews
    Resource: '*'
  - Sid: AmazonCodeGuruReviewerSLRCreation
    Action: iam:CreateServiceLinkedRole
    Effect: Allow
    Resource: arn:aws:iam::*:role/aws-service-role/codeguru-reviewer.amazonaws.com/AWSServiceRoleForAmazonCodeGuruReviewer
    Condition:
      StringLike:
        iam:AWSServiceName: codeguru-reviewer.amazonaws.com
  - Sid: CloudWatchEventsManagedRules
    Effect: Allow
    Action:
    - events:PutRule
    - events:PutTargets
    - events:DeleteRule
    - events:RemoveTargets
    Resource: '*'
    Condition:
      StringEquals:
        events:ManagedBy: codeguru-reviewer.amazonaws.com
  - Sid: CodeStarNotificationsChatbotAccess
    Effect: Allow
    Action:
    - chatbot:DescribeSlackChannelConfigurations
    - chatbot:ListMicrosoftTeamsChannelConfigurations
    Resource: '*'
  - Sid: CodeStarConnectionsReadOnlyAccess
    Effect: Allow
    Action:
    - codestar-connections:ListConnections
    - codestar-connections:GetConnection
    Resource: arn:aws:codestar-connections:*:*:connection/*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
