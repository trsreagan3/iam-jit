name: aws-managed-AmazonPrometheusFullAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AmazonPrometheusFullAccess\nAWS description: (none)\n\
  Generated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule\
  \ refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: AllPrometheusActions
    Effect: Allow
    Action:
    - aps:*
    Resource: '*'
  - Sid: DescribeCluster
    Effect: Allow
    Action:
    - eks:DescribeCluster
    - ec2:DescribeSubnets
    - ec2:DescribeSecurityGroups
    Condition:
      ForAnyValue:StringEquals:
        aws:CalledVia:
        - aps.amazonaws.com
    Resource: '*'
  - Sid: CreateServiceLinkedRole
    Effect: Allow
    Action: iam:CreateServiceLinkedRole
    Resource: arn:aws:iam::*:role/aws-service-role/scraper.aps.amazonaws.com/AWSServiceRoleForAmazonPrometheusScraper*
    Condition:
      StringEquals:
        iam:AWSServiceName: scraper.aps.amazonaws.com
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
