name: aws-managed-AWSEC2FleetServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AWSEC2FleetServiceRolePolicy\nAWS\
  \ description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score\
  \ against future rule refactors. Current det_score=9; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - ec2:DescribeImages
    - ec2:DescribeSubnets
    - ec2:RequestSpotInstances
    - ec2:DescribeInstanceStatus
    - ec2:RunInstances
    Resource:
    - '*'
  - Sid: EC2SpotManagement
    Effect: Allow
    Action:
    - iam:CreateServiceLinkedRole
    Resource: '*'
    Condition:
      StringEquals:
        iam:AWSServiceName: spot.amazonaws.com
  - Effect: Allow
    Action:
    - iam:PassRole
    Resource:
    - '*'
    Condition:
      StringEquals:
        iam:PassedToService:
        - ec2.amazonaws.com
        - ec2.amazonaws.com.cn
  - Effect: Allow
    Action:
    - ec2:CreateTags
    Resource:
    - arn:aws:ec2:*:*:instance/*
    - arn:aws:ec2:*:*:spot-instances-request/*
  - Effect: Allow
    Action:
    - ec2:CreateTags
    Resource:
    - arn:aws:ec2:*:*:volume/*
    Condition:
      StringEquals:
        ec2:CreateAction: RunInstances
  - Effect: Allow
    Action:
    - ec2:TerminateInstances
    Resource: '*'
    Condition:
      StringLike:
        ec2:ResourceTag/aws:ec2:fleet-id: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  score_max: 10
