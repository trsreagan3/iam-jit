name: aws-managed-AWSQuickSetupEnableDHMCExecutionPolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AWSQuickSetupEnableDHMCExecutionPolicy\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=9; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - iam:CreateRole
    - iam:GetRole
    Resource: arn:aws:iam::*:role/AWS-QuickSetup-SSM-DefaultEC2MgmtRole-*
  - Effect: Allow
    Action: iam:PassRole
    Resource: arn:aws:iam::*:role/AWS-QuickSetup-SSM-DefaultEC2MgmtRole-*
    Condition:
      StringEquals:
        iam:PassedToService: ssm.amazonaws.com
  - Effect: Allow
    Action:
    - iam:AttachRolePolicy
    Resource: arn:aws:iam::*:role/AWS-QuickSetup-SSM-DefaultEC2MgmtRole-*
    Condition:
      ArnEquals:
        iam:PolicyARN: arn:aws:iam::aws:policy/AmazonSSMManagedEC2InstanceDefaultPolicy
  - Effect: Allow
    Action:
    - ssm:GetServiceSetting
    - ssm:UpdateServiceSetting
    Resource: arn:aws:ssm:*:*:servicesetting/ssm/managed-instance/default-ec2-instance-management-role
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  score_max: 10
