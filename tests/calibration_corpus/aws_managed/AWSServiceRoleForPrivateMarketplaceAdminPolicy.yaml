name: aws-managed-AWSServiceRoleForPrivateMarketplaceAdminPolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AWSServiceRoleForPrivateMarketplaceAdminPolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=6; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: PrivateMarketplaceCatalogDescribePermissions
    Effect: Allow
    Action:
    - aws-marketplace:DescribeEntity
    Resource:
    - arn:aws:aws-marketplace:*:*:AWSMarketplace/Experience/*
    - arn:aws:aws-marketplace:*:*:AWSMarketplace/Audience/*
    - arn:aws:aws-marketplace:*:*:AWSMarketplace/ProcurementPolicy/*
    - arn:aws:aws-marketplace:*:*:AWSMarketplace/BrandingSettings/*
  - Sid: PrivateMarketplaceCatalogDescribeChangeSetPermissions
    Effect: Allow
    Action:
    - aws-marketplace:DescribeChangeSet
    Resource: '*'
  - Sid: PrivateMarketplaceCatalogListPermissions
    Effect: Allow
    Action:
    - aws-marketplace:ListEntities
    - aws-marketplace:ListChangeSets
    Resource: '*'
  - Sid: PrivateMarketplaceStartChangeSetPermissions
    Effect: Allow
    Action:
    - aws-marketplace:StartChangeSet
    Condition:
      StringEquals:
        catalog:ChangeType:
        - AssociateAudience
        - DisassociateAudience
    Resource:
    - arn:aws:aws-marketplace:*:*:AWSMarketplace/Experience/*
    - arn:aws:aws-marketplace:*:*:AWSMarketplace/ChangeSet/*
  - Sid: PrivateMarketplaceOrganizationPermissions
    Effect: Allow
    Action:
    - organizations:DescribeAccount
    - organizations:DescribeOrganizationalUnit
    - organizations:ListDelegatedAdministrators
    - organizations:ListChildren
    Resource:
    - '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 5
  score_max: 7
