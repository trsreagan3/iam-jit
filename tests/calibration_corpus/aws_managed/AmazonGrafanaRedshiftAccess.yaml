name: aws-managed-AmazonGrafanaRedshiftAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/service-role/AmazonGrafanaRedshiftAccess\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - redshift:DescribeClusters
    - redshift-data:GetStatementResult
    - redshift-data:DescribeStatement
    - secretsmanager:ListSecrets
    Resource: '*'
  - Effect: Allow
    Action:
    - redshift-data:DescribeTable
    - redshift-data:ExecuteStatement
    - redshift-data:ListTables
    - redshift-data:ListSchemas
    Resource: '*'
    Condition:
      'Null':
        aws:ResourceTag/GrafanaDataSource: 'false'
  - Effect: Allow
    Action: redshift:GetClusterCredentials
    Resource:
    - arn:aws:redshift:*:*:dbname:*/*
    - arn:aws:redshift:*:*:dbuser:*/redshift_data_api_user
  - Effect: Allow
    Action:
    - secretsmanager:GetSecretValue
    Resource: '*'
    Condition:
      'Null':
        secretsmanager:ResourceTag/RedshiftQueryOwner: 'false'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
