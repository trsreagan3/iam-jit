name: aws-managed-AmazonOpenSearchServiceCognitoAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AmazonOpenSearchServiceCognitoAccess\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - cognito-idp:DescribeUserPool
    - cognito-idp:CreateUserPoolClient
    - cognito-idp:DeleteUserPoolClient
    - cognito-idp:UpdateUserPoolClient
    - cognito-idp:DescribeUserPoolClient
    - cognito-idp:AdminInitiateAuth
    - cognito-idp:AdminUserGlobalSignOut
    - cognito-idp:ListUserPoolClients
    - cognito-identity:DescribeIdentityPool
    - cognito-identity:UpdateIdentityPool
    - cognito-identity:GetIdentityPoolRoles
    Resource:
    - arn:aws:cognito-identity:*:*:identitypool/*
    - arn:aws:cognito-idp:*:*:userpool/*
  - Effect: Allow
    Action: iam:PassRole
    Resource: arn:aws:iam::*:role/*
    Condition:
      StringLike:
        iam:PassedToService:
        - cognito-identity.amazonaws.com
        - cognito-identity-us-gov.amazonaws.com
  - Effect: Allow
    Action: cognito-identity:SetIdentityPoolRoles
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
