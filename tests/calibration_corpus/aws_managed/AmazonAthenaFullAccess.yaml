name: aws-managed-AmazonAthenaFullAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AmazonAthenaFullAccess\nAWS description: (none)\n\
  Generated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule\
  \ refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: BaseAthenaPermissions
    Effect: Allow
    Action:
    - athena:*
    Resource:
    - '*'
  - Sid: BaseGluePermissions
    Effect: Allow
    Action:
    - glue:CreateDatabase
    - glue:DeleteDatabase
    - glue:GetCatalog
    - glue:GetCatalogs
    - glue:GetDatabase
    - glue:GetDatabases
    - glue:UpdateDatabase
    - glue:CreateTable
    - glue:DeleteTable
    - glue:BatchDeleteTable
    - glue:UpdateTable
    - glue:GetTable
    - glue:GetTables
    - glue:BatchCreatePartition
    - glue:CreatePartition
    - glue:DeletePartition
    - glue:BatchDeletePartition
    - glue:UpdatePartition
    - glue:GetPartition
    - glue:GetPartitions
    - glue:BatchGetPartition
    - glue:StartColumnStatisticsTaskRun
    - glue:GetColumnStatisticsTaskRun
    - glue:GetColumnStatisticsTaskRuns
    - glue:GetCatalogImportStatus
    Resource:
    - '*'
  - Sid: BaseQueryResultsPermissions
    Effect: Allow
    Action:
    - s3:GetBucketLocation
    - s3:GetObject
    - s3:ListBucket
    - s3:ListBucketMultipartUploads
    - s3:ListMultipartUploadParts
    - s3:AbortMultipartUpload
    - s3:CreateBucket
    - s3:PutObject
    - s3:PutBucketPublicAccessBlock
    Resource:
    - arn:aws:s3:::aws-athena-query-results-*
  - Sid: BaseAthenaExamplesPermissions
    Effect: Allow
    Action:
    - s3:GetObject
    - s3:ListBucket
    Resource:
    - arn:aws:s3:::athena-examples*
  - Sid: BaseS3BucketPermissions
    Effect: Allow
    Action:
    - s3:ListBucket
    - s3:GetBucketLocation
    - s3:ListAllMyBuckets
    Resource:
    - '*'
  - Sid: BaseSNSPermissions
    Effect: Allow
    Action:
    - sns:ListTopics
    - sns:GetTopicAttributes
    Resource:
    - '*'
  - Sid: BaseCloudWatchPermissions
    Effect: Allow
    Action:
    - cloudwatch:PutMetricAlarm
    - cloudwatch:DescribeAlarms
    - cloudwatch:DeleteAlarms
    - cloudwatch:GetMetricData
    Resource:
    - '*'
  - Sid: BaseLakeFormationPermissions
    Effect: Allow
    Action:
    - lakeformation:GetDataAccess
    Resource:
    - '*'
  - Sid: BaseDataZonePermissions
    Effect: Allow
    Action:
    - datazone:ListDomains
    - datazone:ListProjects
    - datazone:ListAccountEnvironments
    Resource:
    - '*'
  - Sid: BasePricingPermissions
    Effect: Allow
    Action:
    - pricing:GetProducts
    Resource:
    - '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
