name: aws-managed-AWSBackupServiceRolePolicyForS3Backup
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AWSBackupServiceRolePolicyForS3Backup\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=7; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: CloudWatchGetMetricDataPermissions
    Effect: Allow
    Action: cloudwatch:GetMetricData
    Resource: '*'
  - Sid: EventBridgePermissionsForAwsBackupManagedRule
    Effect: Allow
    Action:
    - events:DeleteRule
    - events:PutTargets
    - events:DescribeRule
    - events:EnableRule
    - events:PutRule
    - events:RemoveTargets
    - events:ListTargetsByRule
    - events:DisableRule
    Resource:
    - arn:aws:events:*:*:rule/AwsBackupManagedRule*
  - Sid: EventBridgeListRulesPermissions
    Effect: Allow
    Action: events:ListRules
    Resource: '*'
  - Sid: KmsPermissions
    Effect: Allow
    Action:
    - kms:Decrypt
    - kms:DescribeKey
    Resource: '*'
    Condition:
      StringLike:
        kms:ViaService: s3.*.amazonaws.com
  - Sid: S3BucketPermissions
    Effect: Allow
    Action:
    - s3:GetBucketTagging
    - s3:GetInventoryConfiguration
    - s3:ListBucketVersions
    - s3:ListBucket
    - s3:GetBucketVersioning
    - s3:GetBucketLocation
    - s3:GetBucketAcl
    - s3:PutInventoryConfiguration
    - s3:GetBucketNotification
    - s3:PutBucketNotification
    Resource: arn:aws:s3:::*
  - Sid: S3ObjectPermissions
    Effect: Allow
    Action:
    - s3:GetObjectAcl
    - s3:GetObject
    - s3:GetObjectVersionTagging
    - s3:GetObjectVersionAcl
    - s3:GetObjectTagging
    - s3:GetObjectVersion
    Resource: arn:aws:s3:::*/*
  - Sid: S3ListBucketPermissions
    Effect: Allow
    Action: s3:ListAllMyBuckets
    Resource: '*'
  - Sid: RecoveryPointTaggingPermissions
    Effect: Allow
    Action:
    - backup:TagResource
    Resource: arn:aws:backup:*:*:recovery-point:*
    Condition:
      StringEquals:
        aws:PrincipalAccount: ${aws:ResourceAccount}
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 6
  score_max: 8
