name: aws-managed-AWSFaultInjectionSimulatorSSMAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/service-role/AWSFaultInjectionSimulatorSSMAccess\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action: iam:PassRole
    Resource: arn:aws:iam::*:role/*
    Condition:
      StringEquals:
        iam:PassedToService: ssm.amazonaws.com
