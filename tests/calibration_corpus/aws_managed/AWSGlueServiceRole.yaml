name: aws-managed-AWSGlueServiceRole
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - glue:*
    - s3:GetBucketLocation
    - s3:ListBucket
    - s3:ListAllMyBuckets
    - s3:GetBucketAcl
    - ec2:DescribeVpcEndpoints
    - ec2:DescribeRouteTables
    - ec2:CreateNetworkInterface
    - ec2:DeleteNetworkInterface
    - ec2:DescribeNetworkInterfaces
    - ec2:DescribeSecurityGroups
    - ec2:DescribeSubnets
    - ec2:DescribeVpcAttribute
    - iam:ListRolePolicies
    - iam:GetRole
    - iam:GetRolePolicy
    - cloudwatch:PutMetricData
    Resource:
    - '*'
  - Effect: Allow
    Action:
    - s3:CreateBucket
    Resource:
    - arn:aws:s3:::aws-glue-*
  - Effect: Allow
    Action:
    - s3:GetObject
    - s3:PutObject
    - s3:DeleteObject
    Resource:
    - arn:aws:s3:::aws-glue-*/*
    - arn:aws:s3:::*/*aws-glue-*/*
  - Effect: Allow
    Action:
    - s3:GetObject
    Resource:
    - arn:aws:s3:::crawler-public*
    - arn:aws:s3:::aws-glue-*
  - Effect: Allow
    Action:
    - logs:CreateLogGroup
    - logs:CreateLogStream
    - logs:PutLogEvents
    Resource:
    - arn:aws:logs:*:*:*:/aws-glue/*
  - Effect: Allow
    Action:
    - ec2:CreateTags
    - ec2:DeleteTags
    Condition:
      ForAllValues:StringEquals:
        aws:TagKeys:
        - aws-glue-service-resource
    Resource:
    - arn:aws:ec2:*:*:network-interface/*
    - arn:aws:ec2:*:*:security-group/*
    - arn:aws:ec2:*:*:instance/*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
