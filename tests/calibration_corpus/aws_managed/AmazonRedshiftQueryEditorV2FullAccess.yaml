name: aws-managed-AmazonRedshiftQueryEditorV2FullAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AmazonRedshiftQueryEditorV2FullAccess\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: RedshiftPermissions
    Effect: Allow
    Action:
    - redshift:DescribeClusters
    - redshift-serverless:ListNamespaces
    - redshift-serverless:ListWorkgroups
    Resource: '*'
  - Sid: KeyManagementServicePermissions
    Effect: Allow
    Action:
    - kms:DescribeKey
    - kms:ListAliases
    Resource: '*'
  - Sid: SecretsManagerPermissions
    Effect: Allow
    Action:
    - secretsmanager:CreateSecret
    - secretsmanager:GetSecretValue
    - secretsmanager:DeleteSecret
    - secretsmanager:TagResource
    Resource: arn:aws:secretsmanager:*:*:sqlworkbench!*
  - Sid: ResourceGroupsTaggingPermissions
    Effect: Allow
    Action:
    - tag:GetResources
    Resource: '*'
    Condition:
      StringEquals:
        aws:CalledViaLast: sqlworkbench.amazonaws.com
  - Sid: AmazonRedshiftQueryEditorV2Permissions
    Effect: Allow
    Action: sqlworkbench:*
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
