name: aws-managed-AmazonSageMakerSpacesRouterPolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AmazonSageMakerSpacesRouterPolicy\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=6; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: KMSDescribeKey
    Effect: Allow
    Action:
    - kms:DescribeKey
    Resource: arn:aws:kms:*:*:key/*
  - Sid: KMSKeyOperations
    Effect: Allow
    Action:
    - kms:GenerateDataKey
    - kms:Decrypt
    Resource: arn:aws:kms:*:*:key/*
    Condition:
      StringEquals:
        kms:EncryptionContext:sagemaker:component: amazon-sagemaker-spaces
        kms:EncryptionContext:sagemaker:eks-cluster-arn: ${aws:PrincipalTag/eks-cluster-arn}
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 5
  score_max: 7
