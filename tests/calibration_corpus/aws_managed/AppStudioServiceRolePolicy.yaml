name: aws-managed-AppStudioServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AppStudioServiceRolePolicy\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: AppStudioResourcePermissionsForCloudWatch
    Effect: Allow
    Action:
    - logs:CreateLogGroup
    - logs:CreateLogStream
    - logs:PutLogEvents
    Resource:
    - arn:aws:logs:*:*:log-group:/aws/appstudio/*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: AppStudioResourcePermissionsForSecretsManager
    Effect: Allow
    Action:
    - secretsmanager:CreateSecret
    - secretsmanager:DeleteSecret
    - secretsmanager:DescribeSecret
    - secretsmanager:GetSecretValue
    - secretsmanager:PutSecretValue
    - secretsmanager:UpdateSecret
    - secretsmanager:TagResource
    Resource: arn:aws:secretsmanager:*:*:secret:appstudio-*
    Condition:
      ForAllValues:StringEquals:
        aws:TagKeys:
        - IsAppStudioSecret
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
        aws:ResourceTag/IsAppStudioSecret: 'true'
  - Sid: AppStudioResourcePermissionsForManagedSecrets
    Effect: Allow
    Action:
    - secretsmanager:DeleteSecret
    - secretsmanager:DescribeSecret
    - secretsmanager:GetSecretValue
    - secretsmanager:PutSecretValue
    - secretsmanager:UpdateSecret
    Resource: arn:aws:secretsmanager:*:*:secret:appstudio!*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
        secretsmanager:ResourceTag/aws:secretsmanager:owningService: appstudio
  - Sid: AppStudioResourceWritePermissionsForManagedSecrets
    Effect: Allow
    Action:
    - secretsmanager:CreateSecret
    Resource: arn:aws:secretsmanager:*:*:secret:appstudio!*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: AppStudioResourcePermissionsForSSO
    Effect: Allow
    Action:
    - sso:GetManagedApplicationInstance
    - sso-directory:DescribeUsers
    - sso-directory:ListMembersInGroup
    Resource: '*'
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
