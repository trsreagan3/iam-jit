name: aws-managed-ROSAControlPlaneOperatorPolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/service-role/ROSAControlPlaneOperatorPolicy\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: ReadPermissions
    Effect: Allow
    Action:
    - ec2:DescribeVpcEndpoints
    - ec2:DescribeVpcs
    - ec2:DescribeSecurityGroups
    - route53:ListHostedZones
    Resource: '*'
  - Sid: CreateSecurityGroups
    Effect: Allow
    Action:
    - ec2:CreateSecurityGroup
    Resource:
    - arn:aws:ec2:*:*:security-group*/*
    Condition:
      StringEquals:
        aws:RequestTag/red-hat-managed: 'true'
  - Sid: DeleteSecurityGroup
    Effect: Allow
    Action:
    - ec2:DeleteSecurityGroup
    Resource:
    - arn:aws:ec2:*:*:security-group*/*
    Condition:
      StringEquals:
        aws:ResourceTag/red-hat-managed: 'true'
  - Sid: SecurityGroupIngressEgress
    Effect: Allow
    Action:
    - ec2:AuthorizeSecurityGroupIngress
    - ec2:AuthorizeSecurityGroupEgress
    - ec2:RevokeSecurityGroupIngress
    - ec2:RevokeSecurityGroupEgress
    Resource:
    - arn:aws:ec2:*:*:security-group*/*
    Condition:
      StringEquals:
        aws:ResourceTag/red-hat-managed: 'true'
  - Sid: CreateSecurityGroupsVPCNoCondition
    Effect: Allow
    Action:
    - ec2:CreateSecurityGroup
    Resource:
    - arn:aws:ec2:*:*:vpc/*
  - Sid: ListResourceRecordSets
    Effect: Allow
    Action:
    - route53:ListResourceRecordSets
    Resource:
    - '*'
  - Sid: ChangeResourceRecordSetsRestrictedRecordNames
    Effect: Allow
    Action:
    - route53:ChangeResourceRecordSets
    Resource:
    - '*'
    Condition:
      ForAllValues:StringLike:
        route53:ChangeResourceRecordSetsNormalizedRecordNames:
        - '*.hypershift.local'
  - Sid: VPCEndpointWithCondition
    Effect: Allow
    Action:
    - ec2:CreateVpcEndpoint
    Resource:
    - arn:aws:ec2:*:*:vpc-endpoint/*
    Condition:
      StringEquals:
        aws:RequestTag/red-hat-managed: 'true'
  - Sid: VPCEndpointResourceTagCondition
    Effect: Allow
    Action:
    - ec2:CreateVpcEndpoint
    Resource:
    - arn:aws:ec2:*:*:security-group*/*
    Condition:
      StringEquals:
        aws:ResourceTag/red-hat-managed: 'true'
  - Sid: VPCEndpointNoCondition
    Effect: Allow
    Action:
    - ec2:CreateVpcEndpoint
    Resource:
    - arn:aws:ec2:*:*:vpc/*
    - arn:aws:ec2:*:*:subnet/*
    - arn:aws:ec2:*:*:route-table/*
  - Sid: ManageVPCEndpointWithCondition
    Effect: Allow
    Action:
    - ec2:ModifyVpcEndpoint
    - ec2:DeleteVpcEndpoints
    Resource:
    - arn:aws:ec2:*:*:vpc-endpoint/*
    - arn:aws:ec2:*:*:security-group/*
    Condition:
      StringEquals:
        aws:ResourceTag/red-hat-managed: 'true'
  - Sid: ModifyVPCEndpointNoCondition
    Effect: Allow
    Action:
    - ec2:ModifyVpcEndpoint
    Resource:
    - arn:aws:ec2:*:*:subnet/*
  - Sid: CreateTagsRestrictedActions
    Effect: Allow
    Action:
    - ec2:CreateTags
    Resource:
    - arn:aws:ec2:*:*:vpc-endpoint/*
    - arn:aws:ec2:*:*:security-group/*
    Condition:
      StringEquals:
        ec2:CreateAction:
        - CreateVpcEndpoint
        - CreateSecurityGroup
  - Sid: AddTagsToRedHatManagedSecurityGroups
    Effect: Allow
    Action:
    - ec2:CreateTags
    Resource: arn:aws:ec2:*:*:security-group/*
    Condition:
      StringEquals:
        aws:ResourceTag/red-hat-managed: 'true'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
