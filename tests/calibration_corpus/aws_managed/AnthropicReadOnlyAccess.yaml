name: aws-managed-AnthropicReadOnlyAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AnthropicReadOnlyAccess\nAWS description: (none)\n\
  Generated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule\
  \ refactors. Current det_score=6; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: AnthropicReadOnlyWorkspace
    Effect: Allow
    Action:
    - aws-external-anthropic:Get*
    - aws-external-anthropic:List*
    Resource: arn:aws:aws-external-anthropic:*:*:workspace/*
  - Sid: AnthropicReadOnlyResourceless
    Effect: Allow
    Action:
    - aws-external-anthropic:GetAccountStatus
    - aws-external-anthropic:CallWithBearerToken
    Resource: '*'
  - Sid: AnthropicReadOnlyGetToken
    Effect: Allow
    Action: sts:GetWebIdentityToken
    Resource: '*'
    Condition:
      ForAnyValue:StringEquals:
        sts:IdentityTokenAudience:
        - https://api.anthropic.com
        - https://platform.claude.com
      StringEquals:
        aws:CalledViaLast: aws-external-anthropic.amazonaws.com
  - Sid: AnthropicReadOnlyTagToken
    Effect: Allow
    Action: sts:TagGetWebIdentityToken
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 5
  score_max: 7
