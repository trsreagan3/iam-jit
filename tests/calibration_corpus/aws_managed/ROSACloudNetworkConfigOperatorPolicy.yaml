name: aws-managed-ROSACloudNetworkConfigOperatorPolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/service-role/ROSACloudNetworkConfigOperatorPolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=6; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: DescribeNetworkResources
    Effect: Allow
    Action:
    - ec2:DescribeInstances
    - ec2:DescribeInstanceStatus
    - ec2:DescribeInstanceTypes
    - ec2:DescribeSubnets
    - ec2:DescribeNetworkInterfaces
    Resource: '*'
  - Sid: ModifyEIPs
    Effect: Allow
    Action:
    - ec2:UnassignPrivateIpAddresses
    - ec2:AssignPrivateIpAddresses
    - ec2:UnassignIpv6Addresses
    - ec2:AssignIpv6Addresses
    Resource: arn:aws:ec2:*:*:network-interface/*
    Condition:
      StringEquals:
        aws:ResourceTag/red-hat-managed: 'true'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
