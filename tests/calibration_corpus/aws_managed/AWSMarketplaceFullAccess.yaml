name: aws-managed-AWSMarketplaceFullAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AWSMarketplaceFullAccess\nAWS description: (none)\n\
  Generated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule\
  \ refactors. Current det_score=9; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - aws-marketplace:*
    - cloudformation:CreateStack
    - cloudformation:DescribeStackResource
    - cloudformation:DescribeStackResources
    - cloudformation:DescribeStacks
    - cloudformation:List*
    - ec2:AuthorizeSecurityGroupEgress
    - ec2:AuthorizeSecurityGroupIngress
    - ec2:CreateSecurityGroup
    - ec2:CreateTags
    - ec2:DescribeAccountAttributes
    - ec2:DescribeAddresses
    - ec2:DeleteSecurityGroup
    - ec2:DescribeAccountAttributes
    - ec2:DescribeImages
    - ec2:DescribeInstances
    - ec2:DescribeKeyPairs
    - ec2:DescribeSecurityGroups
    - ec2:DescribeSubnets
    - ec2:DescribeTags
    - ec2:DescribeVpcs
    - ec2:RunInstances
    - ec2:StartInstances
    - ec2:StopInstances
    - ec2:TerminateInstances
    Resource: '*'
  - Effect: Allow
    Action:
    - ec2:CopyImage
    - ec2:DeregisterImage
    - ec2:DescribeSnapshots
    - ec2:DeleteSnapshot
    - ec2:CreateImage
    - ec2:DescribeInstanceStatus
    - ssm:GetAutomationExecution
    - ssm:ListDocuments
    - ssm:DescribeDocument
    - sns:ListTopics
    - sns:GetTopicAttributes
    - sns:CreateTopic
    - iam:GetRole
    - iam:GetInstanceProfile
    - iam:ListRoles
    - iam:ListInstanceProfiles
    Resource: '*'
  - Effect: Allow
    Action:
    - iam:PassRole
    Resource:
    - '*'
    Condition:
      StringLike:
        iam:PassedToService:
        - ec2.amazonaws.com
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  score_max: 10
