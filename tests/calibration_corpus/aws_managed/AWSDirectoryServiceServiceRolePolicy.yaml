name: aws-managed-AWSDirectoryServiceServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AWSDirectoryServiceServiceRolePolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=9; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: SSMSendCommandPermission
    Effect: Allow
    Action:
    - ssm:SendCommand
    Resource:
    - arn:aws:ssm:*:*:document/AWS-RunPowerShellScript
    - arn:aws:ec2:*:*:instance/*
  - Sid: EC2DescribePermissions
    Effect: Allow
    Action:
    - ec2:DescribeAvailabilityZones
    - ec2:DescribeDhcpOptions
    - ec2:DescribeNetworkInterfaces
    - ec2:DescribeRouteTables
    - ec2:DescribeSecurityGroups
    - ec2:DescribeSubnets
    - ec2:DescribeVpcs
    Resource: '*'
  - Sid: SSMManagementPermissions
    Effect: Allow
    Action:
    - ssm:ListCommands
    - ssm:GetCommandInvocation
    - ssm:DescribeInstanceInformation
    - ssm:GetConnectionStatus
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
