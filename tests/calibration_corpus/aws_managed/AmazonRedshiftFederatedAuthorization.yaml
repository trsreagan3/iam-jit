name: aws-managed-AmazonRedshiftFederatedAuthorization
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AmazonRedshiftFederatedAuthorization\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: AmazonRedshiftFederatedAuthorization
    Effect: Allow
    Action:
    - glue:GetCatalog
    - glue:GetCatalogs
    - glue:GetDatabase
    - glue:GetDatabases
    - glue:GetTable
    - glue:GetTables
    - glue:GetUserDefinedFunctions
    - glue:CreateDatabase
    - glue:CreateTable
    - glue:DeleteDatabase
    - glue:DeleteTable
    - glue:UpdateCatalog
    - glue:UpdateDatabase
    - glue:UpdateTable
    - glue:RenameTable
    - glue:FederateAuthorization
    Resource:
    - arn:aws:glue:*:*:*
    Condition:
      StringEquals:
        glue:FederatedAuthorizationSource: Redshift
  - Sid: AmazonRedshiftIdentityCenterSetContext
    Effect: Allow
    Action:
    - sts:SetContext
    Resource: arn:aws:sts::*:self
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
