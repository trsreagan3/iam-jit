name: aws-managed-AmazonMSKFullAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AmazonMSKFullAccess\nAWS description: (none)\nGenerated\
  \ by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule refactors.\
  \ Current det_score=9; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - kafka:*
    - ec2:DescribeSubnets
    - ec2:DescribeVpcs
    - ec2:DescribeSecurityGroups
    - ec2:DescribeRouteTables
    - ec2:DescribeVpcEndpoints
    - ec2:DescribeVpcAttribute
    - kms:DescribeKey
    - kms:CreateGrant
    - logs:CreateLogDelivery
    - logs:GetLogDelivery
    - logs:UpdateLogDelivery
    - logs:DeleteLogDelivery
    - logs:ListLogDeliveries
    - logs:PutResourcePolicy
    - logs:DescribeResourcePolicies
    - logs:DescribeLogGroups
    - S3:GetBucketPolicy
    - firehose:TagDeliveryStream
    Resource: '*'
  - Effect: Allow
    Action:
    - ec2:CreateVpcEndpoint
    Resource:
    - arn:*:ec2:*:*:vpc/*
    - arn:*:ec2:*:*:subnet/*
    - arn:*:ec2:*:*:security-group/*
  - Effect: Allow
    Action:
    - ec2:CreateVpcEndpoint
    Resource:
    - arn:*:ec2:*:*:vpc-endpoint/*
    Condition:
      StringEquals:
        aws:RequestTag/AWSMSKManaged: 'true'
      StringLike:
        aws:RequestTag/ClusterArn: '*'
  - Effect: Allow
    Action:
    - ec2:CreateTags
    Resource: arn:*:ec2:*:*:vpc-endpoint/*
    Condition:
      StringEquals:
        ec2:CreateAction: CreateVpcEndpoint
  - Effect: Allow
    Action:
    - ec2:DeleteVpcEndpoints
    Resource: arn:*:ec2:*:*:vpc-endpoint/*
    Condition:
      StringEquals:
        ec2:ResourceTag/AWSMSKManaged: 'true'
      StringLike:
        ec2:ResourceTag/ClusterArn: '*'
  - Effect: Allow
    Action: iam:PassRole
    Resource: '*'
    Condition:
      StringEquals:
        iam:PassedToService: kafka.amazonaws.com
  - Effect: Allow
    Action: iam:CreateServiceLinkedRole
    Resource: arn:aws:iam::*:role/aws-service-role/kafka.amazonaws.com/AWSServiceRoleForKafka*
    Condition:
      StringEquals:
        iam:AWSServiceName: kafka.amazonaws.com
  - Effect: Allow
    Action: iam:CreateServiceLinkedRole
    Resource: arn:aws:iam::*:role/aws-service-role/delivery.logs.amazonaws.com/AWSServiceRoleForLogDelivery*
    Condition:
      StringEquals:
        iam:AWSServiceName: delivery.logs.amazonaws.com
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  score_max: 10
