name: aws-managed-AmazonElasticMapReduceEditorsRole
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/service-role/AmazonElasticMapReduceEditorsRole\nAWS\
  \ description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score\
  \ against future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - ec2:AuthorizeSecurityGroupEgress
    - ec2:AuthorizeSecurityGroupIngress
    - ec2:CreateSecurityGroup
    - ec2:DescribeSecurityGroups
    - ec2:RevokeSecurityGroupEgress
    - ec2:CreateNetworkInterface
    - ec2:CreateNetworkInterfacePermission
    - ec2:DeleteNetworkInterface
    - ec2:DeleteNetworkInterfacePermission
    - ec2:DescribeNetworkInterfaces
    - ec2:ModifyNetworkInterfaceAttribute
    - ec2:DescribeTags
    - ec2:DescribeInstances
    - ec2:DescribeSubnets
    - ec2:DescribeVpcs
    - elasticmapreduce:ListInstances
    - elasticmapreduce:DescribeCluster
    - elasticmapreduce:ListSteps
    Resource: '*'
  - Effect: Allow
    Action: ec2:CreateTags
    Resource: arn:aws:ec2:*:*:network-interface/*
    Condition:
      ForAllValues:StringEquals:
        aws:TagKeys:
        - aws:elasticmapreduce:editor-id
        - aws:elasticmapreduce:job-flow-id
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
