name: aws-managed-AWSElasticBeanstalkMulticontainerDocker
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AWSElasticBeanstalkMulticontainerDocker\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: ECSAccess
    Effect: Allow
    Action:
    - ecs:Poll
    - ecs:StartTask
    - ecs:StopTask
    - ecs:DiscoverPollEndpoint
    - ecs:StartTelemetrySession
    - ecs:RegisterContainerInstance
    - ecs:DeregisterContainerInstance
    - ecs:DescribeContainerInstances
    - ecs:Submit*
    - ecs:DescribeTasks
    Resource: '*'
  - Sid: AllowECSTagResource
    Effect: Allow
    Action:
    - ecs:TagResource
    Resource: '*'
    Condition:
      StringEquals:
        ecs:CreateAction:
        - RegisterContainerInstance
        - StartTask
  - Sid: AIEnvironmentAnalysisInvokeFoundationModel
    Effect: Allow
    Action: bedrock:InvokeModel
    Resource:
    - arn:aws:bedrock:*::foundation-model/anthropic.claude-*
    - arn:aws:bedrock:*::foundation-model/amazon.nova-*
  - Sid: AIEnvironmentAnalysisInvokeInferenceProfile
    Effect: Allow
    Action: bedrock:InvokeModel
    Resource:
    - arn:aws:bedrock:*:*:inference-profile/*anthropic.claude-*
    - arn:aws:bedrock:*:*:inference-profile/*amazon.nova-*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: AIEnvironmentAnalysisReadOnly
    Effect: Allow
    Action:
    - bedrock:ListFoundationModels
    - elasticbeanstalk:DescribeEvents
    - elasticbeanstalk:DescribeEnvironmentHealth
    Resource: '*'
  - Sid: MarketplaceOperationsFromBedrock
    Effect: Allow
    Action:
    - aws-marketplace:Subscribe
    - aws-marketplace:ViewSubscriptions
    - aws-marketplace:Unsubscribe
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
