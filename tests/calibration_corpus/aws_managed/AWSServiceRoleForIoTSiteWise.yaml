name: aws-managed-AWSServiceRoleForIoTSiteWise
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AWSServiceRoleForIoTSiteWise\nAWS\
  \ description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score\
  \ against future rule refactors. Current det_score=6; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: AllowSiteWiseReadGreenGrass
    Effect: Allow
    Action:
    - greengrass:GetAssociatedRole
    - greengrass:GetCoreDefinition
    - greengrass:GetCoreDefinitionVersion
    - greengrass:GetGroup
    - greengrass:GetGroupVersion
    Resource: '*'
  - Sid: AllowSiteWiseAccessLogGroup
    Effect: Allow
    Action:
    - logs:CreateLogGroup
    - logs:DescribeLogGroups
    Resource: arn:aws:logs:*:*:log-group:/aws/iotsitewise*
  - Sid: AllowSiteWiseAccessLog
    Effect: Allow
    Action:
    - logs:CreateLogStream
    - logs:DescribeLogStreams
    - logs:PutLogEvents
    Resource: arn:aws:logs:*:*:log-group:/aws/iotsitewise*:log-stream:*
  - Sid: AllowSiteWiseAccessSiteWiseManagedWorkspaceInTwinMaker
    Effect: Allow
    Action:
    - iottwinmaker:GetWorkspace
    - iottwinmaker:ExecuteQuery
    Resource: arn:aws:iottwinmaker:*:*:workspace/*
    Condition:
      ForAnyValue:StringEquals:
        iottwinmaker:linkedServices:
        - IOTSITEWISE
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 5
  score_max: 7
