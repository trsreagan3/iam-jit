name: aws-managed-AWSThinkboxAWSPortalGatewayPolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AWSThinkboxAWSPortalGatewayPolicy\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=7; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - logs:PutLogEvents
    - logs:DescribeLogStreams
    - logs:DescribeLogGroups
    - logs:CreateLogStream
    Resource:
    - arn:aws:logs:*:*:log-group:/thinkbox*
  - Effect: Allow
    Action:
    - logs:CreateLogGroup
    Resource:
    - '*'
  - Effect: Allow
    Action:
    - s3:GetObject
    - s3:PutObject
    - s3:ListBucket
    Resource:
    - arn:aws:s3:::aws-portal-cache*
  - Effect: Allow
    Action: dynamodb:Scan
    Resource:
    - arn:aws:dynamodb:*:*:table/DeadlineFleetHealth*
  - Effect: Allow
    Action:
    - s3:ListBucket
    - s3:GetObject
    Resource:
    - arn:aws:s3:::stack*
  - Effect: Allow
    Action:
    - s3:PutObject
    Resource:
    - arn:aws:s3:::stack*/gateway_certs/*
  - Effect: Allow
    Action:
    - secretsmanager:GetSecretValue
    Resource:
    - arn:aws:secretsmanager:*:*:secret:rcs-tls-pw-stack*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 6
  score_max: 8
