name: aws-managed-AWSDeepRacerServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/service-role/AWSDeepRacerServiceRolePolicy\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - deepracer:*
    Resource: '*'
  - Effect: Allow
    Action:
    - robomaker:*
    - sagemaker:*
    - s3:ListAllMyBuckets
    Resource: '*'
  - Effect: Allow
    Action:
    - cloudformation:ListStackResources
    - cloudformation:DescribeStacks
    - cloudformation:CreateStack
    - cloudformation:DeleteStack
    - cloudformation:DescribeStackResource
    - cloudformation:DescribeStackResources
    - cloudformation:DescribeStackEvents
    - cloudformation:DetectStackDrift
    - cloudformation:DescribeStackDriftDetectionStatus
    - cloudformation:DescribeStackResourceDrifts
    Resource: '*'
  - Effect: Allow
    Action: iam:CreateServiceLinkedRole
    Condition:
      StringEquals:
        iam:AWSServiceName: robomaker.amazonaws.com
    Resource: '*'
  - Effect: Allow
    Action:
    - iam:PassRole
    Resource:
    - arn:aws:iam::*:role/AWSDeepRacer*
    - arn:aws:iam::*:role/service-role/AWSDeepRacer*
  - Effect: Allow
    Action:
    - cloudwatch:GetMetricData
    - logs:CreateLogGroup
    - logs:CreateLogStream
    - logs:DescribeLogStreams
    - logs:GetLogEvents
    - logs:PutLogEvents
    Resource: '*'
  - Effect: Allow
    Action:
    - lambda:CreateFunction
    - lambda:DeleteFunction
    - lambda:GetFunction
    - lambda:InvokeFunction
    - lambda:UpdateFunctionCode
    Resource:
    - arn:aws:lambda:*:*:function:*DeepRacer*
    - arn:aws:lambda:*:*:function:*Deepracer*
    - arn:aws:lambda:*:*:function:*deepracer*
    - arn:aws:lambda:*:*:function:*dr-*
  - Effect: Allow
    Action:
    - s3:GetObject
    - s3:GetBucketLocation
    - s3:DeleteObject
    - s3:ListBucket
    - s3:PutObject
    - s3:PutBucketPolicy
    - s3:GetBucketAcl
    Resource:
    - arn:aws:s3:::*DeepRacer*
    - arn:aws:s3:::*Deepracer*
    - arn:aws:s3:::*deepracer*
    - arn:aws:s3:::dr-*
  - Effect: Allow
    Action:
    - s3:GetObject
    Resource: '*'
    Condition:
      StringEqualsIgnoreCase:
        s3:ExistingObjectTag/DeepRacer: 'true'
  - Effect: Allow
    Action:
    - kinesisvideo:CreateStream
    - kinesisvideo:DeleteStream
    - kinesisvideo:DescribeStream
    - kinesisvideo:GetDataEndpoint
    - kinesisvideo:GetHLSStreamingSessionURL
    - kinesisvideo:GetMedia
    - kinesisvideo:PutMedia
    - kinesisvideo:TagStream
    Resource:
    - arn:aws:kinesisvideo:*:*:stream/dr-*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
