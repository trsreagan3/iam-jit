name: aws-managed-AppIntegrationsServiceLinkedRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AppIntegrationsServiceLinkedRolePolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - cloudwatch:PutMetricData
    Resource: '*'
    Condition:
      StringEquals:
        cloudwatch:namespace: AWS/AppIntegrations
  - Effect: Allow
    Action:
    - appflow:DescribeConnectorEntity
    - appflow:ListConnectorEntities
    Resource: '*'
  - Effect: Allow
    Action:
    - appflow:DescribeConnectorProfiles
    - appflow:UseConnectorProfile
    Resource: arn:aws:appflow:*:*:connector-profile/*
  - Effect: Allow
    Action:
    - appflow:DeleteFlow
    - appflow:DescribeFlow
    - appflow:DescribeFlowExecutionRecords
    - appflow:StartFlow
    - appflow:StopFlow
    - appflow:UpdateFlow
    Condition:
      StringEquals:
        aws:ResourceTag/AppIntegrationsManaged: 'true'
    Resource: arn:aws:appflow:*:*:flow/FlowCreatedByAppIntegrations-*
  - Effect: Allow
    Action:
    - appflow:TagResource
    Condition:
      ForAllValues:StringEquals:
        aws:TagKeys:
        - AppIntegrationsManaged
    Resource: arn:aws:appflow:*:*:flow/FlowCreatedByAppIntegrations-*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
