name: aws-managed-AmazonECSInfrastructureRolePolicyForVolumes
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/service-role/AmazonECSInfrastructureRolePolicyForVolumes\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
