name: aws-managed-ElastiCacheServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/ElastiCacheServiceRolePolicy\nAWS\
  \ description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score\
  \ against future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: ElastiCacheManagementActions
    Effect: Allow
    Action:
    - ec2:AuthorizeSecurityGroupIngress
    - ec2:CreateNetworkInterface
    - ec2:CreateSecurityGroup
    - ec2:DeleteNetworkInterface
    - ec2:DeleteSecurityGroup
    - ec2:DescribeAvailabilityZones
    - ec2:DescribeNetworkInterfaces
    - ec2:DescribeSecurityGroups
    - ec2:DescribeSubnets
    - ec2:DescribeVpcs
    - ec2:DescribeVpcEndpoints
    - ec2:ModifyNetworkInterfaceAttribute
    - ec2:RevokeSecurityGroupIngress
    - cloudwatch:PutMetricData
    - outposts:GetOutpost
    - outposts:GetOutpostInstanceTypes
    - outposts:ListOutposts
    - outposts:ListSites
    Resource: '*'
  - Sid: CreateDeleteVPCEndpoints
    Effect: Allow
    Action:
    - ec2:CreateVpcEndpoint
    - ec2:DeleteVpcEndpoints
    Resource: arn:aws:ec2:*:*:vpc-endpoint/*
    Condition:
      StringLike:
        ec2:VpceServiceName: com.amazonaws.elasticache.serverless.*
  - Sid: TagVPCEndpointsOnCreation
    Effect: Allow
    Action:
    - ec2:CreateTags
    Resource: arn:aws:ec2:*:*:vpc-endpoint/*
    Condition:
      StringEquals:
        ec2:CreateAction: CreateVpcEndpoint
        aws:RequestTag/AmazonElastiCacheManaged: 'true'
  - Sid: ModifyVpcEndpoints
    Effect: Allow
    Action:
    - ec2:ModifyVpcEndpoint
    Resource: arn:aws:ec2:*:*:vpc-endpoint/*
    Condition:
      StringEquals:
        ec2:ResourceTag/AmazonElastiCacheManaged: 'true'
  - Sid: AllowAccessToElastiCacheTaggedVpcEndpoints
    Effect: Allow
    Action:
    - ec2:CreateVpcEndpoint
    - ec2:ModifyVpcEndpoint
    NotResource: arn:aws:ec2:*:*:vpc-endpoint/*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
