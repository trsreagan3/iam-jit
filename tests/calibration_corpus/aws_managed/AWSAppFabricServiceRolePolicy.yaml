name: aws-managed-AWSAppFabricServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AWSAppFabricServiceRolePolicy\nAWS\
  \ description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score\
  \ against future rule refactors. Current det_score=6; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: CloudWatchEmitMetric
    Effect: Allow
    Action:
    - cloudwatch:PutMetricData
    Resource: '*'
    Condition:
      StringEquals:
        cloudwatch:namespace: AWS/AppFabric
  - Sid: S3PutObject
    Effect: Allow
    Action:
    - s3:PutObject
    Resource: arn:aws:s3:::*/AWSAppFabric/*
    Condition:
      StringEquals:
        s3:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: FirehosePutRecord
    Effect: Allow
    Action:
    - firehose:PutRecordBatch
    Resource: arn:aws:firehose:*:*:deliverystream/*
    Condition:
      StringEqualsIgnoreCase:
        aws:ResourceTag/AWSAppFabricManaged: 'true'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 5
  score_max: 7
