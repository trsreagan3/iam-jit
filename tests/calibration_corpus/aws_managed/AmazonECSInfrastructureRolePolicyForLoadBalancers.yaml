  - Sid: NLBModifyListeners
    Effect: Allow
    Action: elasticloadbalancing:ModifyListener
    Resource:
    - arn:aws:elasticloadbalancing:*:*:listener/net/*/*/*
  - Sid: ALBModifyRules
    Effect: Allow
    Action: elasticloadbalancing:ModifyRule
