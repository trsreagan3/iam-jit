name: aws-managed-AmazonECSInfrastructureRolePolicyForLoadBalancers
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AmazonECSInfrastructureRolePolicyForLoadBalancers\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: ELBReadOperations
    Effect: Allow
    Action:
    - elasticloadbalancing:DescribeListeners
    - elasticloadbalancing:DescribeRules
    - elasticloadbalancing:DescribeTargetGroups
    - elasticloadbalancing:DescribeTargetHealth
