name: aws-managed-AmazonEC2ContainerServiceforEC2Role
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/service-role/AmazonEC2ContainerServiceforEC2Role\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=6; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - ec2:DescribeTags
    - ecs:CreateCluster
    - ecs:DeregisterContainerInstance
    - ecs:DiscoverPollEndpoint
    - ecs:Poll
    - ecs:RegisterContainerInstance
    - ecs:StartTelemetrySession
    - ecs:UpdateContainerInstancesState
    - ecs:Submit*
    - ecr:GetAuthorizationToken
    - ecr:BatchCheckLayerAvailability
    - ecr:GetDownloadUrlForLayer
    - ecr:BatchGetImage
    - logs:CreateLogStream
    - logs:PutLogEvents
    Resource: '*'
  - Effect: Allow
    Action: ecs:TagResource
    Resource: '*'
    Condition:
      StringEquals:
        ecs:CreateAction:
        - CreateCluster
        - RegisterContainerInstance
  - Effect: Allow
    Action:
    - ecs:ListTagsForResource
    Resource:
    - arn:aws:ecs:*:*:task/*/*
    - arn:aws:ecs:*:*:container-instance/*/*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 5
  score_max: 7
