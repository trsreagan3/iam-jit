name: aws-managed-AWSEC2VssSnapshotPolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AWSEC2VssSnapshotPolicy\nAWS description: (none)\n\
  Generated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule\
  \ refactors. Current det_score=6; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: DescribeInstanceInfo
    Effect: Allow
    Action:
    - ec2:DescribeInstanceAttribute
    Resource:
    - arn:aws:ec2:*:*:instance/*
    Condition:
      ArnLike:
        ec2:SourceInstanceARN: arn:aws:ec2:*:*:instance/${ec2:InstanceId}
  - Sid: CreateSnapshotsWithTag
    Effect: Allow
    Action:
    - ec2:CreateSnapshots
    Resource:
    - arn:aws:ec2:*:*:snapshot/*
    Condition:
      StringLike:
        aws:RequestTag/AwsVssConfig: '*'
  - Sid: CreateSnapshotsAccessInstance
    Effect: Allow
    Action:
    - ec2:CreateSnapshots
    Resource:
    - arn:aws:ec2:*:*:instance/*
    Condition:
      ArnLike:
        ec2:SourceInstanceARN: arn:aws:ec2:*:*:instance/${ec2:InstanceId}
  - Sid: CreateSnapshotsAccessVolume
    Effect: Allow
    Action:
    - ec2:CreateSnapshots
    Resource:
    - arn:aws:ec2:*:*:volume/*
  - Sid: CreateImageWithTag
    Effect: Allow
    Action:
    - ec2:CreateImage
    Resource:
    - arn:aws:ec2:*:*:snapshot/*
    - arn:aws:ec2:*:*:image/*
    Condition:
      StringLike:
        aws:RequestTag/AwsVssConfig: '*'
  - Sid: CreateImageAccessInstance
    Effect: Allow
    Action:
    - ec2:CreateImage
    Resource:
    - arn:aws:ec2:*:*:instance/*
    Condition:
      ArnLike:
        ec2:SourceInstanceARN: arn:aws:ec2:*:*:instance/${ec2:InstanceId}
  - Sid: CreateTagsOnResourceCreation
    Effect: Allow
    Action: ec2:CreateTags
    Resource:
    - arn:aws:ec2:*:*:snapshot/*
    - arn:aws:ec2:*:*:image/*
    Condition:
      StringEquals:
        ec2:CreateAction:
        - CreateImage
        - CreateSnapshots
  - Sid: CreateTagsAfterResourceCreation
    Effect: Allow
    Action: ec2:CreateTags
    Resource:
    - arn:aws:ec2:*:*:snapshot/*
    - arn:aws:ec2:*:*:image/*
    Condition:
      StringLike:
        ec2:ResourceTag/AwsVssConfig: '*'
      ForAllValues:StringEquals:
        aws:TagKeys:
        - AppConsistent
        - Device
  - Sid: DescribeImagesAndSnapshots
    Effect: Allow
    Action:
    - ec2:DescribeImages
    - ec2:DescribeSnapshots
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 5
  score_max: 7
