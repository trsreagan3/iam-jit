name: aws-managed-AmazonBedrockStudioPermissionsBoundary
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AmazonBedrockStudioPermissionsBoundary\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: AccessS3Buckets
    Effect: Allow
    Action:
    - s3:ListBucket
    - s3:ListBucketVersions
    - s3:GetObject
    - s3:PutObject
    - s3:DeleteObject
    - s3:GetObjectVersion
    - s3:DeleteObjectVersion
    Resource: arn:aws:s3:::br-studio-${aws:PrincipalAccount}-*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: AccessOpenSearchCollections
    Effect: Allow
    Action: aoss:APIAccessAll
    Resource: '*'
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: InvokeBedrockModels
    Effect: Allow
    Action:
    - bedrock:InvokeModel
    - bedrock:InvokeModelWithResponseStream
    Resource: arn:aws:bedrock:*::foundation-model/*
  - Sid: AccessBedrockResources
    Effect: Allow
    Action:
    - bedrock:InvokeAgent
    - bedrock:Retrieve
    - bedrock:StartIngestionJob
    - bedrock:GetIngestionJob
    - bedrock:ListIngestionJobs
    - bedrock:ApplyGuardrail
    - bedrock:ListPrompts
    - bedrock:GetPrompt
    - bedrock:CreatePrompt
    - bedrock:DeletePrompt
    - bedrock:CreatePromptVersion
    - bedrock:InvokeFlow
    - bedrock:ListTagsForResource
    - bedrock:TagResource
    - bedrock:UntagResource
    Resource: '*'
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
        aws:ResourceTag/AmazonBedrockManaged: 'true'
      'Null':
        aws:ResourceTag/AmazonDataZoneProject: 'false'
  - Sid: RetrieveAndGenerate
    Effect: Allow
    Action: bedrock:RetrieveAndGenerate
    Resource: '*'
  - Sid: WriteLogs
    Effect: Allow
    Action:
    - logs:CreateLogGroup
    - logs:CreateLogStream
    - logs:PutLogEvents
    Resource: arn:aws:logs:*:*:log-group:/aws/lambda/br-studio-*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
        aws:ResourceTag/AmazonBedrockManaged: 'true'
      'Null':
        aws:ResourceTag/AmazonDataZoneProject: 'false'
  - Sid: InvokeLambdaFunctions
    Effect: Allow
    Action: lambda:InvokeFunction
    Resource: arn:aws:lambda:*:*:function:br-studio-*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
        aws:ResourceTag/AmazonBedrockManaged: 'true'
      'Null':
        aws:ResourceTag/AmazonDataZoneProject: 'false'
  - Sid: AccessSecretsManagerSecrets
    Effect: Allow
    Action:
    - secretsmanager:DescribeSecret
    - secretsmanager:GetSecretValue
    - secretsmanager:PutSecretValue
    Resource: arn:aws:secretsmanager:*:*:secret:br-studio/*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
        aws:ResourceTag/AmazonBedrockManaged: 'true'
      'Null':
        aws:ResourceTag/AmazonDataZoneProject: 'false'
  - Sid: UseKmsKeyWithBedrock
    Effect: Allow
    Action:
    - kms:Decrypt
    - kms:GenerateDataKey
    Resource: '*'
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
        aws:ResourceTag/EnableBedrock: 'true'
      'Null':
        kms:EncryptionContext:aws:bedrock:arn: 'false'
  - Sid: UseKmsKeyWithAwsServices
    Effect: Allow
    Action:
    - kms:Decrypt
    - kms:GenerateDataKey
    Resource: '*'
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
        aws:ResourceTag/EnableBedrock: 'true'
      StringLike:
        kms:ViaService:
        - s3.*.amazonaws.com
        - secretsmanager.*.amazonaws.com
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
