name: aws-managed-AmazonSageMakerPipelinesIntegrations
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AmazonSageMakerPipelinesIntegrations\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=9; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - lambda:CreateFunction
    - lambda:DeleteFunction
    - lambda:GetFunction
    - lambda:InvokeFunction
    - lambda:UpdateFunctionCode
    Resource:
    - arn:aws:lambda:*:*:function:*sagemaker*
    - arn:aws:lambda:*:*:function:*sageMaker*
    - arn:aws:lambda:*:*:function:*SageMaker*
  - Effect: Allow
    Action:
    - sqs:CreateQueue
    - sqs:SendMessage
    Resource:
    - arn:aws:sqs:*:*:*sagemaker*
    - arn:aws:sqs:*:*:*sageMaker*
    - arn:aws:sqs:*:*:*SageMaker*
  - Effect: Allow
    Action:
    - iam:PassRole
    Resource: arn:aws:iam::*:role/*
    Condition:
      StringEquals:
        iam:PassedToService:
        - lambda.amazonaws.com
        - elasticmapreduce.amazonaws.com
        - ec2.amazonaws.com
  - Effect: Allow
    Action:
    - events:DescribeRule
    - events:PutRule
    - events:PutTargets
    Resource:
    - arn:aws:events:*:*:rule/SageMakerPipelineExecutionEMRStepStatusUpdateRule
    - arn:aws:events:*:*:rule/SageMakerPipelineExecutionEMRClusterStatusUpdateRule
  - Effect: Allow
    Action:
    - elasticmapreduce:AddJobFlowSteps
    - elasticmapreduce:CancelSteps
    - elasticmapreduce:DescribeStep
    - elasticmapreduce:RunJobFlow
    - elasticmapreduce:DescribeCluster
    - elasticmapreduce:TerminateJobFlows
    - elasticmapreduce:ListSteps
    Resource:
    - arn:aws:elasticmapreduce:*:*:cluster/*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  score_max: 10
