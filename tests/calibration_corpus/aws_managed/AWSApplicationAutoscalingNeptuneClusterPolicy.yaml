name: aws-managed-AWSApplicationAutoscalingNeptuneClusterPolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AWSApplicationAutoscalingNeptuneClusterPolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=4; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - rds:ListTagsForResource
    - rds:DescribeDBInstances
    - rds:DescribeDBClusters
    - rds:DescribeDBClusterParameters
    - cloudwatch:DescribeAlarms
    Resource:
    - '*'
  - Effect: Allow
    Action: rds:AddTagsToResource
    Resource:
    - arn:aws:rds:*:*:db:autoscaled-reader*
    Condition:
      StringEquals:
        rds:DatabaseEngine: neptune
  - Effect: Allow
    Action: rds:CreateDBInstance
    Resource:
    - arn:aws:rds:*:*:db:autoscaled-reader*
    - arn:aws:rds:*:*:cluster:*
    Condition:
      StringEquals:
        rds:DatabaseEngine: neptune
  - Effect: Allow
    Action:
    - rds:DeleteDBInstance
    Resource:
    - arn:aws:rds:*:*:db:autoscaled-reader*
  - Effect: Allow
    Action:
    - cloudwatch:PutMetricAlarm
    - cloudwatch:DeleteAlarms
    Resource:
    - arn:aws:cloudwatch:*:*:alarm:TargetTracking*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 3
  score_max: 5
