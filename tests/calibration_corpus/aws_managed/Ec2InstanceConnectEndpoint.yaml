name: aws-managed-Ec2InstanceConnectEndpoint
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/Ec2InstanceConnectEndpoint\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - ec2:DescribeNetworkInterfaces
    - ec2:DescribeAvailabilityZones
    Resource: '*'
  - Effect: Allow
    Action:
    - ec2:CreateNetworkInterface
    Resource: arn:aws:ec2:*:*:subnet/*
  - Effect: Allow
    Action:
    - ec2:CreateNetworkInterface
    Resource: arn:aws:ec2:*:*:network-interface/*
    Condition:
      ForAllValues:StringEquals:
        aws:TagKeys:
        - InstanceConnectEndpointId
      StringLike:
        aws:RequestTag/InstanceConnectEndpointId:
        - eice-*
  - Effect: Allow
    Action:
    - ec2:ModifyNetworkInterfaceAttribute
    Resource: arn:aws:ec2:*:*:network-interface/*
    Condition:
      StringLike:
        aws:ResourceTag/InstanceConnectEndpointId:
        - eice-*
  - Effect: Allow
    Action:
    - ec2:CreateTags
    Resource: arn:aws:ec2:*:*:network-interface/*
    Condition:
      StringEquals:
        ec2:CreateAction: CreateNetworkInterface
      ForAllValues:StringEquals:
        aws:TagKeys:
        - InstanceConnectEndpointId
      StringLike:
        aws:RequestTag/InstanceConnectEndpointId:
        - eice-*
  - Effect: Allow
    Action:
    - ec2:AssignIpv6Addresses
    - ec2:UnassignIpv6Addresses
    Resource: arn:aws:ec2:*:*:network-interface/*
    Condition:
      StringLike:
        aws:ResourceTag/InstanceConnectEndpointId:
        - eice-*
  - Effect: Allow
    Action: ec2:ModifyNetworkInterfaceAttribute
    Resource: arn:aws:ec2:*:*:security-group/*
  - Effect: Allow
    Action:
    - ec2:DeleteNetworkInterface
    Resource: '*'
    Condition:
      StringLike:
        aws:ResourceTag/InstanceConnectEndpointId:
        - eice-*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
