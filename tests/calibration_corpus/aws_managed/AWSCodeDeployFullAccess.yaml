policy:
  Version: '2012-10-17'
  Statement:
  - Action: codedeploy:*
    Effect: Allow
    Resource: '*'
  - Sid: CodeStarNotificationsReadWriteAccess
    Effect: Allow
    Action:
    - codestar-notifications:CreateNotificationRule
