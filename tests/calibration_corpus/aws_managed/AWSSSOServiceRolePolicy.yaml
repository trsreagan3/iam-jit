name: aws-managed-AWSSSOServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AWSSSOServiceRolePolicy\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=9; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: IAMRoleProvisioningActions
    Effect: Allow
    Action:
    - iam:AttachRolePolicy
    - iam:CreateRole
    - iam:PutRolePolicy
    - iam:UpdateRole
    - iam:UpdateRoleDescription
    - iam:UpdateAssumeRolePolicy
    - iam:PutRolePermissionsBoundary
    - iam:DeleteRolePermissionsBoundary
    Resource:
    - arn:aws:iam::*:role/aws-reserved/sso.amazonaws.com/*
    Condition:
      StringNotEquals:
        aws:PrincipalOrgMasterAccountId: ${aws:PrincipalAccount}
  - Sid: IAMRoleReadActions
    Effect: Allow
    Action:
    - iam:GetRole
    - iam:ListRoles
    Resource:
    - '*'
  - Sid: IAMRoleCleanupActions
    Effect: Allow
    Action:
    - iam:DeleteRole
    - iam:DeleteRolePolicy
    - iam:DetachRolePolicy
    - iam:ListRolePolicies
    - iam:ListAttachedRolePolicies
    Resource:
    - arn:aws:iam::*:role/aws-reserved/sso.amazonaws.com/*
  - Sid: IAMSLRCleanupActions
    Effect: Allow
    Action:
    - iam:DeleteServiceLinkedRole
    - iam:GetServiceLinkedRoleDeletionStatus
    - iam:DeleteRole
    - iam:GetRole
    Resource:
    - arn:aws:iam::*:role/aws-service-role/sso.amazonaws.com/AWSServiceRoleForSSO
  - Sid: IAMSAMLProviderCreationAction
    Effect: Allow
    Action:
    - iam:CreateSAMLProvider
    Resource:
    - arn:aws:iam::*:saml-provider/AWSSSO_*
    Condition:
      StringNotEquals:
        aws:PrincipalOrgMasterAccountId: ${aws:PrincipalAccount}
  - Sid: IAMSAMLProviderUpdateAction
    Effect: Allow
    Action:
    - iam:UpdateSAMLProvider
    Resource:
    - arn:aws:iam::*:saml-provider/AWSSSO_*
  - Sid: IAMSAMLProviderCleanupActions
    Effect: Allow
    Action:
    - iam:DeleteSAMLProvider
    - iam:GetSAMLProvider
    Resource:
    - arn:aws:iam::*:saml-provider/AWSSSO_*
  - Effect: Allow
    Action:
    - organizations:DescribeAccount
    - organizations:DescribeOrganization
    - organizations:ListAccounts
    - organizations:ListDelegatedAdministrators
    - organizations:ListAWSServiceAccessForOrganization
    Resource:
    - '*'
  - Sid: AllowUnauthAppForDirectory
    Effect: Allow
    Action:
    - ds:UnauthorizeApplication
    Resource:
    - '*'
  - Sid: AllowDescribeForDirectory
    Effect: Allow
    Action:
    - ds:DescribeDirectories
    - ds:DescribeTrusts
    Resource:
    - '*'
  - Sid: AllowDescribeAndListOperationsOnIdentitySource
    Effect: Allow
    Action:
    - identitystore:DescribeUser
    - identitystore:DescribeGroup
    - identitystore:ListGroups
    - identitystore:ListUsers
    Resource:
    - '*'
  - Sid: AllowDeleteSyncProfile
    Effect: Allow
    Action:
    - identity-sync:DeleteSyncProfile
    Resource:
    - arn:aws:identity-sync:*:*:profile/*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  score_max: 10
