name: aws-managed-AWSElementalMediaConnectCreateFlow
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AWSElementalMediaConnectCreateFlow\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=6; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action: iam:PassRole
    Resource: arn:aws:iam::*:role/*
    Condition:
      StringEquals:
        iam:PassedToService: mediaconnect.amazonaws.com
  - Effect: Allow
    Action:
    - mediaconnect:CreateFlow
    - mediaconnect:AddFlowSources
    - mediaconnect:AddFlowOutputs
    - mediaconnect:GrantFlowEntitlements
    - mediaconnect:AddFlowMediaStreams
    - mediaconnect:AddFlowVpcInterfaces
    - mediaconnect:TagResource
    Resource:
    - arn:aws:mediaconnect:*:*:flow:*:*
    - arn:aws:mediaconnect:*:*:source:*:*
    - arn:aws:mediaconnect:*:*:output:*:*
    - arn:aws:mediaconnect:*:*:entitlement:*:*
    - arn:aws:mediaconnect:*:*:flow:*:*/vpcInterface/*
    - arn:aws:mediaconnect:*:*:flow:*:*/mediaStream/*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
