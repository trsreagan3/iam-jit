name: aws-managed-AWSM2ServicePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AWSM2ServicePolicy\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - ec2:DescribeSubnets
    - ec2:CreateNetworkInterface
    - ec2:DeleteNetworkInterface
    - ec2:DescribeNetworkInterfaces
    - ec2:CreateNetworkInterfacePermission
    - ec2:ModifyNetworkInterfaceAttribute
    Resource: '*'
  - Effect: Allow
    Action:
    - elasticfilesystem:DescribeMountTargets
    Resource: '*'
  - Effect: Allow
    Action:
    - elasticloadbalancing:RegisterTargets
    - elasticloadbalancing:DeregisterTargets
    Resource: '*'
  - Effect: Allow
    Action:
    - fsx:DescribeFileSystems
    Resource: '*'
  - Effect: Allow
    Action:
    - cloudwatch:PutMetricData
    Resource: '*'
    Condition:
      StringEquals:
        cloudwatch:namespace:
        - AWS/M2
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
