        deadline:QueueMembershipLevels:
        - MANAGER
      StringEquals:
        deadline:AssociatedMembershipLevel:
        - MANAGER
        - CONTRIBUTOR
        - VIEWER
        - ''
  - Sid: OwnerManagerPermissions
    Effect: Allow
    Action:
    - deadline:ListJobMembers
    - deadline:ListQueueMembers
    - deadline:UpdateJob
    - deadline:UpdateSession
    - deadline:UpdateStep
    - deadline:UpdateTask
    Resource:
    - '*'
    Condition:
      ForAnyValue:StringEquals:
        deadline:QueueMembershipLevels:
        - OWNER
        - MANAGER
  - Sid: OwnerManagerContributorPermissions
    Effect: Allow
    Action:
    - deadline:AssumeQueueRoleForUser
    - deadline:CreateJob
    Resource:
    - '*'
    Condition:
      ForAnyValue:StringEquals:
        deadline:QueueMembershipLevels:
        - OWNER
        - MANAGER
        - CONTRIBUTOR
  - Sid: AllLevelsPermissions
    Effect: Allow
    Action:
    - deadline:AssumeQueueRoleForRead
    - deadline:GetJob
    - deadline:GetJobTemplate
    - deadline:GetQueue
    - deadline:GetQueueEnvironment
    - deadline:GetQueueFleetAssociation
    - deadline:GetSession
    - deadline:GetSessionAction
    - deadline:GetStep
    - deadline:GetStorageProfileForQueue
    - deadline:GetTask
    - deadline:ListJobParameterDefinitions
    - deadline:ListQueueEnvironments
    - deadline:ListQueueFleetAssociations
    - deadline:ListSessionActions
    - deadline:ListSessions
    - deadline:ListStepConsumers
    - deadline:ListStepDependencies
    - deadline:ListSteps
    - deadline:ListStorageProfilesForQueue
    - deadline:ListTasks
    - deadline:SearchJobs
    - deadline:SearchSteps
    - deadline:SearchTasks
    Resource:
    - '*'
    Condition:
      ForAnyValue:StringEquals:
        deadline:QueueMembershipLevels:
        - OWNER
        - MANAGER
        - CONTRIBUTOR
        - VIEWER
  - Sid: ListBasedOnMembership
    Effect: Allow
    Action:
    - deadline:ListJobs
    - deadline:ListQueues
    Resource:
