name: aws-managed-SageMakerStudioBedrockEvaluationJobServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/service-role/SageMakerStudioBedrockEvaluationJobServiceRolePolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: BedrockEvaluationInferenceProfileInvocationPermissions
    Effect: Allow
    Action:
    - bedrock:InvokeModel
    - bedrock:InvokeModelWithResponseStream
    - bedrock:GetInferenceProfile
    Resource:
    - arn:aws:bedrock:*:*:application-inference-profile/*
    Condition:
      StringEquals:
        aws:ResourceTag/AmazonDataZoneProject: ${aws:PrincipalTag/AmazonDataZoneProject}
  - Sid: BedrockInvokeModelPermissions
    Effect: Allow
    Action:
    - bedrock:InvokeModel
    - bedrock:InvokeModelWithResponseStream
    Resource:
    - arn:aws:bedrock:*::foundation-model/*
    - arn:aws:bedrock:*:*:custom-model/*
    - arn:aws:bedrock:*:*:provisioned-model/*
    Condition:
      'Null':
        bedrock:InferenceProfileArn: 'false'
  - Sid: BedrockModelInvocationPermissions
    Effect: Allow
    Action:
    - bedrock:CreateModelInvocationJob
    - bedrock:StopModelInvocationJob
    - bedrock:GetProvisionedModelThroughput
    Resource: '*'
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: S3GetBucketLocationPermissions
    Effect: Allow
    Action: s3:GetBucketLocation
    Resource: arn:aws:s3:::${aws:PrincipalTag/DomainBucketName}
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
      StringNotEquals:
        aws:PrincipalTag/DomainBucketName: ''
  - Sid: S3ListBucketPermissions
    Effect: Allow
    Action: s3:ListBucket
    Resource: arn:aws:s3:::${aws:PrincipalTag/DomainBucketName}
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
      StringLike:
        s3:prefix: ${aws:PrincipalTag/AmazonDataZoneDomain}/${aws:PrincipalTag/AmazonDataZoneProject}/*
      StringNotEquals:
        aws:PrincipalTag/DomainBucketName: ''
        aws:PrincipalTag/AmazonDataZoneDomain: ''
        aws:PrincipalTag/AmazonDataZoneProject: ''
  - Sid: S3EvaluationPermissions
    Effect: Allow
    Action:
    - s3:GetObject
    - s3:PutObject
    - s3:ListMultipartUploadParts
    - s3:AbortMultipartUpload
    Resource:
    - arn:aws:s3:::${aws:PrincipalTag/DomainBucketName}/${aws:PrincipalTag/AmazonDataZoneDomain}/${aws:PrincipalTag/AmazonDataZoneProject}/*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
      StringNotEquals:
        aws:PrincipalTag/DomainBucketName: ''
        aws:PrincipalTag/AmazonDataZoneDomain: ''
        aws:PrincipalTag/AmazonDataZoneProject: ''
  - Sid: KmsDescribeKeyPermissions
    Effect: Allow
    Action: kms:DescribeKey
    Resource: arn:aws:kms:*:*:key/${aws:PrincipalTag/KmsKeyId}
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: S3KmsPermissions
    Effect: Allow
    Action:
    - kms:Decrypt
    - kms:GenerateDataKey
    Resource: arn:aws:kms:*:*:key/${aws:PrincipalTag/KmsKeyId}
    Condition:
      StringLike:
        kms:ViaService: s3.*.amazonaws.com
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
      ArnLike:
        kms:EncryptionContext:aws:s3:arn:
        - arn:aws:s3:::${aws:PrincipalTag/DomainBucketName}
        - arn:aws:s3:::${aws:PrincipalTag/DomainBucketName}/*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
