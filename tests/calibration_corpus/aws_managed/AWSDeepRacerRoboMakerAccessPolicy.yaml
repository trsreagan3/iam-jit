name: aws-managed-AWSDeepRacerRoboMakerAccessPolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AWSDeepRacerRoboMakerAccessPolicy\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - robomaker:*
    Resource: '*'
  - Effect: Allow
    Action:
    - cloudwatch:PutMetricData
    - ec2:CreateNetworkInterfacePermission
    - ec2:DeleteNetworkInterface
    - ec2:DescribeNetworkInterfaces
    - ec2:DescribeSubnets
    - ec2:DescribeSecurityGroups
    - ec2:DescribeVpcs
    Resource: '*'
  - Effect: Allow
    Action:
    - logs:CreateLogGroup
    - logs:CreateLogStream
    - logs:DescribeLogStreams
    - logs:PutLogEvents
    Resource:
    - arn:aws:logs:*:*:log-group:/aws/robomaker/SimulationJobs
    - arn:aws:logs:*:*:log-group:/aws/robomaker/SimulationJobs:log-stream:*
  - Effect: Allow
    Action:
    - s3:GetObject
    - s3:GetBucketLocation
    - s3:ListBucket
    - s3:ListAllMyBuckets
    - s3:PutObject
    Resource:
    - arn:aws:s3:::*DeepRacer*
    - arn:aws:s3:::*Deepracer*
    - arn:aws:s3:::*deepracer*
    - arn:aws:s3:::dr-*
  - Effect: Allow
    Action:
    - s3:GetObject
    Resource: '*'
    Condition:
      StringEqualsIgnoreCase:
        s3:ExistingObjectTag/DeepRacer: 'true'
  - Effect: Allow
    Action:
    - kinesisvideo:CreateStream
    - kinesisvideo:DescribeStream
    - kinesisvideo:GetDataEndpoint
    - kinesisvideo:PutMedia
    - kinesisvideo:TagStream
    Resource:
    - arn:aws:kinesisvideo:*:*:stream/dr-*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
