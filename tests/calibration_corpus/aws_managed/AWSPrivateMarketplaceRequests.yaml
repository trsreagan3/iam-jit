name: aws-managed-AWSPrivateMarketplaceRequests
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AWSPrivateMarketplaceRequests\nAWS description: (none)\n\
  Generated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule\
  \ refactors. Current det_score=6; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: LegacyPrivateMarketplaceRequestsPermissions
    Effect: Allow
    Action:
    - aws-marketplace:CreatePrivateMarketplaceRequests
    - aws-marketplace:ListPrivateMarketplaceRequests
    - aws-marketplace:DescribePrivateMarketplaceRequests
    Resource: '*'
  - Sid: PrivateMarketplaceManageRequestsPermissions
    Effect: Allow
    Action:
    - aws-marketplace:StartChangeSet
    Resource:
    - arn:aws:aws-marketplace:*:*:AWSMarketplace/ProductProcurementRequest/*
    - arn:aws:aws-marketplace:*:*:AWSMarketplace/ChangeSet/*
    Condition:
      StringEquals:
        catalog:ChangeType:
        - CreateProductProcurementRequest
        - CancelProductProcurementRequest
  - Sid: PrivateMarketplaceReadRequestsPermissions
    Effect: Allow
    Action:
    - aws-marketplace:DescribeEntity
    Resource:
    - arn:aws:aws-marketplace:*:*:AWSMarketplace/ProductProcurementRequest/*
  - Sid: PrivateMarketplaceListRequestsPermissions
    Effect: Allow
    Action:
    - aws-marketplace:ListEntities
    - aws-marketplace:ListChangeSets
    Resource: '*'
  - Sid: PrivateMarketplaceReadChangeSetPermissions
    Effect: Allow
    Action:
    - aws-marketplace:DescribeChangeSet
    Resource:
    - arn:aws:aws-marketplace:*:*:AWSMarketplace/ChangeSet/*
  - Sid: PrivateMarketplaceTaggingRequestsPermissions
    Effect: Allow
    Action:
    - aws-marketplace:TagResource
    - aws-marketplace:UntagResource
    - aws-marketplace:ListTagsForResource
    Resource:
    - arn:aws:aws-marketplace:*:*:AWSMarketplace/ProductProcurementRequest/*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 5
  score_max: 7
