name: aws-managed-AWSLambda_FullAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AWSLambda_FullAccess\nAWS description: (none)\nGenerated\
  \ by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule refactors.\
  \ Current det_score=9; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - cloudformation:DescribeStacks
    - cloudformation:ListStackResources
    - cloudwatch:ListMetrics
    - cloudwatch:GetMetricData
    - ec2:DescribeSecurityGroups
    - ec2:DescribeSubnets
    - ec2:DescribeVpcs
    - kms:DescribeKey
    - kms:ListAliases
    - iam:GetPolicy
    - iam:GetPolicyVersion
    - iam:GetRole
    - iam:GetRolePolicy
    - iam:ListAttachedRolePolicies
    - iam:ListRolePolicies
    - iam:ListRoles
    - lambda:*
    - logs:DescribeLogGroups
    - states:DescribeStateMachine
    - states:ListStateMachines
    - tag:GetResources
    - xray:GetTraceSummaries
    - xray:BatchGetTraces
    Resource: '*'
  - Effect: Allow
    Action: iam:PassRole
    Resource: '*'
    Condition:
      StringEquals:
        iam:PassedToService: lambda.amazonaws.com
  - Effect: Allow
    Action:
    - logs:DescribeLogStreams
    - logs:GetLogEvents
    - logs:FilterLogEvents
    - logs:StartLiveTail
    - logs:StopLiveTail
    Resource: arn:aws:logs:*:*:log-group:/aws/lambda/*
  - Effect: Allow
    Action: iam:CreateServiceLinkedRole
    Resource: arn:aws:iam::*:role/aws-service-role/lambda.amazonaws.com/AWSServiceRoleForLambda
    Condition:
      StringEquals:
        iam:AWSServiceName: lambda.amazonaws.com
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  score_max: 10
