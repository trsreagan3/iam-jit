name: aws-managed-AWSQuicksightOpenSearchPolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/service-role/AWSQuicksightOpenSearchPolicy\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=3; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - es:ESHttpGet
    Resource:
    - arn:aws:es:*:*:domain/*/
    - arn:aws:es:*:*:domain/*/_cluster/settings
    - arn:aws:es:*:*:domain/*/_cat/indices
  - Effect: Allow
    Action: es:ListDomainNames
    Resource: '*'
  - Effect: Allow
    Action:
    - es:DescribeDomain
    Resource:
    - arn:aws:es:*:*:domain/*
  - Effect: Allow
    Action:
    - es:ESHttpPost
    - es:ESHttpGet
    Resource:
    - arn:aws:es:*:*:domain/*/_opendistro/_sql
    - arn:aws:es:*:*:domain/*/_plugin/_sql
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
