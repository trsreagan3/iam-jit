name: aws-managed-AWSEntityResolutionConsoleFullAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AWSEntityResolutionConsoleFullAccess\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=9; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: EntityResolutionAccess
    Effect: Allow
    Action:
    - entityresolution:*
    Resource: '*'
  - Sid: GlueSourcesConsoleDisplay
    Effect: Allow
    Action:
    - glue:GetSchema
    - glue:SearchTables
    - glue:GetSchemaByDefinition
    - glue:GetSchemaVersion
    - glue:GetSchemaVersionsDiff
    - glue:GetDatabase
    - glue:GetDatabases
    - glue:GetTable
    - glue:GetTables
    - glue:GetTableVersion
    - glue:GetTableVersions
    Resource: '*'
  - Sid: S3BucketsConsoleDisplay
    Effect: Allow
    Action:
    - s3:ListAllMyBuckets
    Resource: '*'
  - Sid: S3SourcesConsoleDisplay
    Effect: Allow
    Action:
    - s3:ListBucket
    - s3:GetBucketLocation
    - s3:ListBucketVersions
    - s3:GetBucketVersioning
    Resource: '*'
  - Sid: TaggingConsoleDisplay
    Effect: Allow
    Action:
    - tag:GetTagKeys
    - tag:GetTagValues
    Resource: '*'
  - Sid: KMSConsoleDisplay
    Effect: Allow
    Action:
    - kms:DescribeKey
    - kms:ListAliases
    Resource: '*'
  - Sid: ListRolesToPickRoleForPassing
    Effect: Allow
    Action:
    - iam:ListRoles
    Resource: '*'
  - Sid: PassRoleToEntityResolutionService
    Effect: Allow
    Action:
    - iam:PassRole
    Resource: arn:aws:iam::*:role/*entityresolution*
    Condition:
      StringEquals:
        iam:PassedToService:
        - entityresolution.amazonaws.com
  - Sid: ManageEventBridgeRules
    Effect: Allow
    Action:
    - events:DeleteRule
    - events:PutTargets
    - events:PutRule
    Resource:
    - arn:aws:events:*:*:rule/entity-resolution-automatic*
  - Sid: ADXReadAccess
    Effect: Allow
    Action:
    - dataexchange:GetDataSet
    Resource: '*'
  - Sid: CustomerProfilesIntegrationReadAccess
    Effect: Allow
    Action:
    - connect:ListInstances
    - profile:ListDomains
    - profile:GetDomain
    - profile:ListIntegrations
    - profile:ListAccountIntegrations
    - profile:ListProfileObjectTypes
    Resource: '*'
  - Sid: CustomerProfilesIntegrationWriteAccess
    Effect: Allow
    Action:
    - profile:PutProfileObjectType
    Resource:
    - arn:aws:profile:*:*:domains/*/object-types/*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  score_max: 10
