name: aws-managed-AWSApplicationMigrationReplicationServerPolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/service-role/AWSApplicationMigrationReplicationServerPolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=6; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - mgn:SendClientMetricsForMgn
    - mgn:SendClientLogsForMgn
    - mgn:GetChannelCommandsForMgn
    - mgn:SendChannelCommandResultForMgn
    - mgn:GetAgentSnapshotCreditsForMgn
    - mgn:DescribeReplicationServerAssociationsForMgn
    - mgn:DescribeSnapshotRequestsForMgn
    - mgn:BatchDeleteSnapshotRequestForMgn
    - mgn:NotifyAgentAuthenticationForMgn
    - mgn:BatchCreateVolumeSnapshotGroupForMgn
    - mgn:UpdateAgentReplicationProcessStateForMgn
    - mgn:NotifyAgentReplicationProgressForMgn
    - mgn:NotifyAgentConnectedForMgn
    - mgn:NotifyAgentDisconnectedForMgn
    Resource: '*'
  - Effect: Allow
    Action:
    - ec2:DescribeInstances
    - ec2:DescribeSnapshots
    Resource: '*'
  - Effect: Allow
    Action:
    - ec2:CreateSnapshot
    Resource: arn:aws:ec2:*:*:volume/*
    Condition:
      'Null':
        aws:ResourceTag/AWSApplicationMigrationServiceManaged: 'false'
  - Effect: Allow
    Action:
    - ec2:CreateSnapshot
    Resource: arn:aws:ec2:*:*:snapshot/*
    Condition:
      'Null':
        aws:RequestTag/AWSApplicationMigrationServiceManaged: 'false'
  - Effect: Allow
    Action: ec2:CreateTags
    Resource: '*'
    Condition:
      StringEquals:
        ec2:CreateAction: CreateSnapshot
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 5
  score_max: 7
