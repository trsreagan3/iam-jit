name: aws-managed-AWSDeadlineCloud-UserAccessJobs
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AWSDeadlineCloud-UserAccessJobs\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: AdditionalPermissions
    Effect: Allow
    Action:
    - identitystore:DescribeGroup
    - identitystore:DescribeUser
    - identitystore:ListGroupMembershipsForMember
    - deadline:GetApplicationVersion
    - ec2:DescribeInstanceTypes
    - identitystore:ListUsers
    Resource:
    - '*'
  - Sid: OwnerLevelPermissions
    Effect: Allow
    Action:
    - deadline:AssociateMemberToJob
    - deadline:DisassociateMemberFromJob
    Resource:
    - '*'
    Condition:
      ForAnyValue:StringEquals:
        deadline:JobMembershipLevels:
        - OWNER
  - Sid: ManagerLevelMemberAssociation
    Effect: Allow
    Action:
    - deadline:AssociateMemberToJob
    Resource:
    - '*'
    Condition:
      ForAnyValue:StringEquals:
        deadline:JobMembershipLevels:
        - MANAGER
      StringEquals:
        deadline:AssociatedMembershipLevel:
        - MANAGER
        - CONTRIBUTOR
        - VIEWER
        - ''
        deadline:MembershipLevel:
        - MANAGER
        - CONTRIBUTOR
        - VIEWER
  - Sid: ManagerLevelMemberDisassociation
    Effect: Allow
    Action:
    - deadline:DisassociateMemberFromJob
    Resource:
    - '*'
    Condition:
      ForAnyValue:StringEquals:
        deadline:JobMembershipLevels:
        - MANAGER
      StringEquals:
        deadline:AssociatedMembershipLevel:
        - MANAGER
        - CONTRIBUTOR
        - VIEWER
        - ''
  - Sid: OwnerManagerPermissions
    Effect: Allow
    Action:
    - deadline:ListJobMembers
    - deadline:UpdateJob
    - deadline:UpdateSession
    - deadline:UpdateStep
    - deadline:UpdateTask
    Resource:
    - '*'
    Condition:
      ForAnyValue:StringEquals:
        deadline:JobMembershipLevels:
        - OWNER
        - MANAGER
  - Sid: AllLevelsPermissions
    Effect: Allow
    Action:
    - deadline:GetJob
    - deadline:GetJobTemplate
    - deadline:GetSession
    - deadline:GetSessionAction
    - deadline:GetStep
    - deadline:GetTask
    - deadline:ListJobParameterDefinitions
    - deadline:ListSessionActions
    - deadline:ListSessions
    - deadline:ListStepConsumers
    - deadline:ListStepDependencies
    - deadline:ListSteps
    - deadline:ListTasks
    - deadline:SearchSteps
    - deadline:SearchTasks
    Resource:
    - '*'
    Condition:
      ForAnyValue:StringEquals:
        deadline:JobMembershipLevels:
        - OWNER
        - MANAGER
        - CONTRIBUTOR
        - VIEWER
  - Sid: ListBasedOnMembership
    Effect: Allow
    Action:
    - deadline:ListJobs
    Resource:
    - '*'
    Condition:
      StringEquals:
        deadline:RequesterPrincipalId: ${deadline:PrincipalId}
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
