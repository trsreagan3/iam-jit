name: aws-managed-AWSElasticDisasterRecoveryStagingAccountPolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/service-role/AWSElasticDisasterRecoveryStagingAccountPolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: DRSStagingAccountPolicy1
    Effect: Allow
    Action:
    - drs:DescribeSourceServers
    - drs:DescribeRecoverySnapshots
    - drs:CreateConvertedSnapshotForDrs
    - drs:GetReplicationConfiguration
    - drs:DescribeJobs
    - drs:DescribeJobLogItems
    Resource: '*'
  - Sid: DRSStagingAccountPolicy2
    Effect: Allow
    Action:
    - ec2:ModifySnapshotAttribute
    Resource: arn:aws:ec2:*:*:snapshot/*
    Condition:
      StringEquals:
        ec2:Add/userId: ${aws:SourceIdentity}
      'Null':
        aws:ResourceTag/AWSElasticDisasterRecoveryManaged: 'false'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
