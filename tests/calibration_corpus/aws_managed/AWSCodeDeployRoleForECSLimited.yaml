name: aws-managed-AWSCodeDeployRoleForECSLimited
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AWSCodeDeployRoleForECSLimited\nAWS description: (none)\n\
  Generated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule\
  \ refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Action:
    - ecs:DescribeServices
    - ecs:CreateTaskSet
    - ecs:UpdateServicePrimaryTaskSet
    - ecs:DeleteTaskSet
    - cloudwatch:DescribeAlarms
    Resource: '*'
    Effect: Allow
  - Action:
    - sns:Publish
    Resource: arn:aws:sns:*:*:CodeDeployTopic_*
    Effect: Allow
  - Action:
    - elasticloadbalancing:DescribeTargetGroups
    - elasticloadbalancing:DescribeListeners
    - elasticloadbalancing:ModifyListener
    - elasticloadbalancing:DescribeRules
    - elasticloadbalancing:ModifyRule
    Resource: '*'
    Effect: Allow
  - Action:
    - lambda:InvokeFunction
    Resource: arn:aws:lambda:*:*:function:CodeDeployHook_*
    Effect: Allow
  - Action:
    - s3:GetObject
    - s3:GetObjectVersion
    Resource: '*'
    Condition:
      StringEquals:
        s3:ExistingObjectTag/UseWithCodeDeploy: 'true'
    Effect: Allow
  - Action:
    - iam:PassRole
    Effect: Allow
    Resource:
    - arn:aws:iam::*:role/ecsTaskExecutionRole
    - arn:aws:iam::*:role/ECSTaskExecution*
    Condition:
      StringLike:
        iam:PassedToService:
        - ecs-tasks.amazonaws.com
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
