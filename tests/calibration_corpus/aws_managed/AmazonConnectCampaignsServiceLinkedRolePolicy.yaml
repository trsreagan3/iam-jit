name: aws-managed-AmazonConnectCampaignsServiceLinkedRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AmazonConnectCampaignsServiceLinkedRolePolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: ConnectCampaignAccess
    Effect: Allow
    Action:
    - connect-campaigns:ListCampaigns
    Resource: '*'
  - Sid: ConnectAccess
    Effect: Allow
    Action:
    - connect:BatchPutContact
    - connect:StopContact
    - connect:DescribeContactFlow
    - connect:SendOutboundEmail
    Resource: arn:aws:connect:*:*:instance/*
  - Sid: EventBridgeListRuleAccess
    Effect: Allow
    Action:
    - events:ListRules
    Resource: arn:aws:events:*:*:rule/*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: EventBridgeManagedResourceAccess
    Effect: Allow
    Action:
    - events:DeleteRule
    - events:PutRule
    - events:PutTargets
    - events:RemoveTargets
    Resource: arn:aws:events:*:*:rule/ConnectCampaignsRule*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
        events:ManagedBy: connect-campaigns.amazonaws.com
  - Sid: EventBridgeListTargetsByRuleAccess
    Effect: Allow
    Action:
    - events:ListTargetsByRule
    Resource: arn:aws:events:*:*:rule/ConnectCampaignsRule*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: AllowWisdomForConnectCampaignsEnabledTaggedResources
    Effect: Allow
    Action:
    - wisdom:GetMessageTemplate
    - wisdom:RenderMessageTemplate
    Resource: '*'
    Condition:
      StringEquals:
        aws:ResourceTag/AmazonConnectCampaignsEnabled: 'True'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
