name: aws-managed-AWSEC2SqlHaServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AWSEC2SqlHaServiceRolePolicy\nAWS\
  \ description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score\
  \ against future rule refactors. Current det_score=9; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: AllowSSMSendCommandToTaggedInstances
    Effect: Allow
    Action: ssm:SendCommand
    Resource:
    - arn:aws:ec2:*:*:instance/*
    Condition:
      StringLike:
        aws:ResourceTag/SqlHaMonitored: 'true'
  - Sid: AllowSSMSendCommandOfOwnedDoc
    Effect: Allow
    Action: ssm:SendCommand
    Resource:
    - arn:aws:ssm:*:*:document/AWSEC2-DetectSqlHa*
  - Sid: AllowSSMNonMutating
    Effect: Allow
    Action:
    - ssm:DescribeInstanceInformation
    - ssm:GetCommandInvocation
    - ssm:ListCommands
    - ssm:ListCommandInvocations
    Resource: '*'
  - Sid: AllowEC2NonMutating
    Effect: Allow
    Action:
    - ec2:DescribeInstances
    - ec2:DescribeInstanceAttribute
    - ec2:DescribeInstanceStatus
    - ec2:DescribeTags
    Resource: '*'
  - Sid: AllowEventsMutateManagedRule
    Effect: Allow
    Action:
    - events:PutTargets
    - events:PutRule
    - events:DeleteRule
    - events:RemoveTargets
    Condition:
      StringEquals:
        events:ManagedBy: ec2sqlha.amazonaws.com
        aws:PrincipalAccount: ${aws:ResourceAccount}
    Resource: arn:aws:events:*:*:rule/AWSEC2SqlHa*
  - Sid: AllowEventsNonMutatingManagedRule
    Effect: Allow
    Action:
    - events:ListTargetsByRule
    - events:DescribeRule
    Resource: arn:aws:events:*:*:rule/AWSEC2SqlHa*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  score_max: 10
