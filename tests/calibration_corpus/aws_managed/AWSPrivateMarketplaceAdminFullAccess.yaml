name: aws-managed-AWSPrivateMarketplaceAdminFullAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AWSPrivateMarketplaceAdminFullAccess\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=9; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: PrivateMarketplaceGetRolePermissions
    Effect: Allow
    Action:
    - iam:GetRole
    Resource:
    - arn:aws:iam::*:role/*AWSServiceRoleForPrivateMarketplaceAdmin
  - Sid: PrivateMarketplaceCreateSLRPermissions
    Effect: Allow
    Action:
    - iam:CreateServiceLinkedRole
    Resource:
    - arn:aws:iam::*:role/aws-service-role/private-marketplace.marketplace.amazonaws.com/AWSServiceRoleForPrivateMarketplaceAdmin
    Condition:
      StringEquals:
        iam:AWSServiceName: private-marketplace.marketplace.amazonaws.com
  - Sid: PrivateMarketplaceManageDelegatedAdministratorPermissions
    Effect: Allow
    Action:
    - organizations:RegisterDelegatedAdministrator
    - organizations:DeregisterDelegatedAdministrator
    Resource: '*'
    Condition:
      StringEquals:
        organizations:ServicePrincipal: private-marketplace.marketplace.amazonaws.com
  - Sid: PrivateMarketplaceEnableServiceAccessPermissions
    Effect: Allow
    Action:
    - organizations:EnableAWSServiceAccess
    Resource: '*'
    Condition:
      StringEquals:
        organizations:ServicePrincipal: private-marketplace.marketplace.amazonaws.com
  - Sid: PrivateMarketplaceRequestPermissions
    Effect: Allow
    Action:
    - aws-marketplace:AssociateProductsWithPrivateMarketplace
    - aws-marketplace:DisassociateProductsFromPrivateMarketplace
    - aws-marketplace:ListPrivateMarketplaceRequests
    - aws-marketplace:DescribePrivateMarketplaceRequests
    Resource:
    - '*'
  - Sid: PrivateMarketplaceCatalogAPIPermissions
    Effect: Allow
    Action:
    - aws-marketplace:ListEntities
    - aws-marketplace:DescribeEntity
    - aws-marketplace:StartChangeSet
    - aws-marketplace:ListChangeSets
    - aws-marketplace:DescribeChangeSet
    - aws-marketplace:CancelChangeSet
    Resource: '*'
  - Sid: PrivateMarketplaceCatalogTaggingPermissions
    Effect: Allow
    Action:
    - aws-marketplace:TagResource
    - aws-marketplace:UntagResource
    - aws-marketplace:ListTagsForResource
    Resource: arn:aws:aws-marketplace:*:*:AWSMarketplace/*
  - Sid: PrivateMarketplaceOrganizationPermissions
    Effect: Allow
    Action:
    - organizations:DescribeOrganization
    - organizations:DescribeOrganizationalUnit
    - organizations:DescribeAccount
    - organizations:ListRoots
    - organizations:ListParents
    - organizations:ListOrganizationalUnitsForParent
    - organizations:ListAccountsForParent
    - organizations:ListAccounts
    - organizations:ListAWSServiceAccessForOrganization
    - organizations:ListDelegatedAdministrators
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  score_max: 10
