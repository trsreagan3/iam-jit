name: aws-managed-AmazonOpenSearchIngestionServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AmazonOpenSearchIngestionServiceRolePolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - ec2:DescribeSubnets
    - ec2:DescribeSecurityGroups
    - ec2:DescribeVpcEndpoints
    Resource: '*'
  - Effect: Allow
    Action:
    - ec2:CreateVpcEndpoint
    Resource:
    - arn:aws:ec2:*:*:vpc/*
    - arn:aws:ec2:*:*:security-group/*
    - arn:aws:ec2:*:*:subnet/*
    - arn:aws:ec2:*:*:route-table/*
  - Effect: Allow
    Action: ec2:CreateVpcEndpoint
    Resource:
    - arn:aws:ec2:*:*:vpc-endpoint/*
    Condition:
      StringEquals:
        aws:RequestTag/OSISManaged: 'true'
  - Effect: Allow
    Action:
    - ec2:ModifyVpcEndpoint
    - ec2:DeleteVpcEndpoints
    Resource:
    - arn:aws:ec2:*:*:vpc-endpoint/*
    Condition:
      StringEquals:
        aws:ResourceTag/OSISManaged: 'true'
  - Effect: Allow
    Action:
    - ec2:CreateTags
    Resource: arn:aws:ec2:*:*:vpc-endpoint/*
    Condition:
      StringEquals:
        ec2:CreateAction: CreateVpcEndpoint
  - Effect: Allow
    Action: cloudwatch:PutMetricData
    Resource: '*'
    Condition:
      StringEquals:
        cloudwatch:namespace: AWS/OSIS
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
