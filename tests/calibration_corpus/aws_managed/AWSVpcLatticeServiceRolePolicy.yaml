name: aws-managed-AWSVpcLatticeServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AWSVpcLatticeServiceRolePolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action: cloudwatch:PutMetricData
    Resource: '*'
    Condition:
      StringEquals:
        cloudwatch:namespace: AWS/VpcLattice
  - Sid: VpcLatticeDescribeActions
    Effect: Allow
    Action:
    - ec2:DescribeSubnets
    - ec2:DescribeSecurityGroups
    - ec2:DescribeNetworkInterfaces
    - ec2:DescribeVpcs
    Resource: '*'
  - Sid: VpcLatticeCreateNetworkInterfaceWithTag
    Effect: Allow
    Action:
    - ec2:CreateNetworkInterface
    Resource: arn:aws:ec2:*:*:network-interface/*
    Condition:
      StringEquals:
        aws:RequestTag/VpcLatticeManaged: 'true'
  - Sid: VpcLatticeCreateNetworkInterfaceWithSubnetAndSecurityGroup
    Effect: Allow
    Action:
    - ec2:CreateNetworkInterface
    Resource:
    - arn:aws:ec2:*:*:subnet/*
    - arn:aws:ec2:*:*:security-group/*
  - Sid: VpcLatticeTagNetworkInterfaceActions
    Effect: Allow
    Action:
    - ec2:CreateTags
    Resource: arn:aws:ec2:*:*:network-interface/*
    Condition:
      StringEquals:
        ec2:CreateAction: CreateNetworkInterface
  - Sid: VpcLatticeMutateNetworkInterfaceActions
    Effect: Allow
    Action:
    - ec2:ModifyNetworkInterfaceAttribute
    - ec2:CreateNetworkInterfacePermission
    - ec2:DeleteNetworkInterface
    Resource: arn:aws:ec2:*:*:network-interface/*
    Condition:
      StringEquals:
        aws:ResourceTag/VpcLatticeManaged: 'true'
  - Sid: VpcLatticeModifyNetworkInterfaceSecurityGroup
    Effect: Allow
    Action:
    - ec2:ModifyNetworkInterfaceAttribute
    Resource: arn:aws:ec2:*:*:security-group/*
  - Sid: VpcLatticeModifyNetworkInterfaceActionsIpAddressActions
    Effect: Allow
    Action:
    - ec2:AssignIpv6Addresses
    - ec2:UnassignIpv6Addresses
    - ec2:AssignPrivateIpAddresses
    - ec2:UnassignPrivateIpAddresses
    Resource: arn:aws:ec2:*:*:network-interface/*
    Condition:
      StringEquals:
        aws:ResourceTag/VpcLatticeManaged: 'true'
  - Sid: VpcLatticeAssociateHostedZoneToVpc
    Effect: Allow
    Action:
    - route53:AssociateVPCWithHostedZone
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
