name: aws-managed-ComputeOptimizerAutomationServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/ComputeOptimizerAutomationServiceRolePolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: EBSReadOnly
    Effect: Allow
    Action:
    - ec2:DescribeVolumes
    - ec2:DescribeSnapshots
    - ec2:DescribeVolumesModifications
    Resource: '*'
  - Sid: EBSVolumeModification
    Effect: Allow
    Action:
    - ec2:ModifyVolume
    - ec2:DeleteVolume
    Resource: '*'
    Condition:
      'Null':
        aws:ResourceTag/exclude-from-compute-optimizer-automation: 'true'
  - Sid: CreateEBSSnapshot
    Effect: Allow
    Action:
    - ec2:CreateSnapshot
    Resource: '*'
  - Sid: RollbackEBSVolumeDeletion
    Effect: Allow
    Action:
    - ec2:CreateVolume
    Resource: '*'
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: Tag
    Effect: Allow
    Action:
    - ec2:CreateTags
    Resource:
    - arn:aws:ec2:*:*:volume/*
    - arn:aws:ec2:*:*:snapshot/*
    Condition:
      StringEquals:
        ec2:CreateAction:
        - CreateVolume
        - CreateSnapshot
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
