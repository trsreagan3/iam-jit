name: aws-managed-AmazonEKSBlockStoragePolicyV2
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AmazonEKSBlockStoragePolicyV2\nAWS description: (none)\n\
  Generated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule\
  \ refactors. Current det_score=6; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - ec2:AttachVolume
    - ec2:DetachVolume
    - ec2:ModifyVolume
    - ec2:EnableFastSnapshotRestores
    Resource: '*'
    Condition:
      StringEquals:
        aws:ResourceTag/eks:eks-cluster-name: ${aws:PrincipalTag/eks:eks-cluster-name}
  - Effect: Allow
    Action: ec2:CreateTags
    Resource: '*'
    Condition:
      StringEquals:
        ec2:CreateAction:
        - CreateVolume
        - CreateSnapshot
  - Effect: Allow
    Action:
    - ec2:CreateVolume
    Resource: arn:aws:ec2:*:*:volume/*
    Condition:
      StringEquals:
        aws:RequestTag/eks:eks-cluster-name: ${aws:PrincipalTag/eks:eks-cluster-name}
      ForAllValues:StringLike:
        aws:TagKeys:
        - eks:eks-cluster-name
        - CSIVolumeName
        - ebs.csi.eks.amazonaws.com/cluster
        - kubernetes.io/cluster/*
        - kubernetes.io/created-for/*
        - Name
        - KubernetesCluster
  - Effect: Allow
    Action:
    - ec2:CreateVolume
    Resource: arn:aws:ec2:*:*:snapshot/*
    Condition:
      StringEquals:
        aws:ResourceTag/eks:eks-cluster-name: ${aws:PrincipalTag/eks:eks-cluster-name}
  - Effect: Allow
    Action:
    - ec2:CreateSnapshot
    Resource: arn:aws:ec2:*:*:volume/*
    Condition:
      StringEquals:
        aws:ResourceTag/eks:eks-cluster-name: ${aws:PrincipalTag/eks:eks-cluster-name}
  - Effect: Allow
    Action:
    - ec2:CreateSnapshot
    Resource: arn:aws:ec2:*:*:snapshot/*
    Condition:
      StringEquals:
        aws:RequestTag/eks:eks-cluster-name: ${aws:PrincipalTag/eks:eks-cluster-name}
      ForAllValues:StringLike:
        aws:TagKeys:
        - eks:eks-cluster-name
        - CSIVolumeSnapshotName
        - ebs.csi.eks.amazonaws.com/cluster
        - kubernetes.io/cluster/*
        - Name
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 5
  score_max: 7
