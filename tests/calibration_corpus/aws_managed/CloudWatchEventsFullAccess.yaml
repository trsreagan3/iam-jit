name: aws-managed-CloudWatchEventsFullAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/CloudWatchEventsFullAccess\nAWS description: (none)\n\
  Generated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule\
  \ refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: EventBridgeActions
    Effect: Allow
    Action:
    - events:*
    - schemas:*
    - scheduler:*
    - pipes:*
    Resource: '*'
  - Sid: IAMCreateServiceLinkedRoleForApiDestinations
    Effect: Allow
    Action: iam:CreateServiceLinkedRole
    Resource: arn:aws:iam::*:role/aws-service-role/apidestinations.events.amazonaws.com/AWSServiceRoleForAmazonEventBridgeApiDestinations
    Condition:
      StringEquals:
        iam:AWSServiceName: apidestinations.events.amazonaws.com
  - Sid: IAMCreateServiceLinkedRoleForAmazonEventBridgeSchemas
    Effect: Allow
    Action: iam:CreateServiceLinkedRole
    Resource: arn:aws:iam::*:role/aws-service-role/schemas.amazonaws.com/AWSServiceRoleForSchemas
    Condition:
      StringEquals:
        iam:AWSServiceName: schemas.amazonaws.com
  - Sid: SecretsManagerAccessForApiDestinations
    Effect: Allow
    Action:
    - secretsmanager:CreateSecret
    - secretsmanager:UpdateSecret
    - secretsmanager:DeleteSecret
    - secretsmanager:GetSecretValue
    - secretsmanager:PutSecretValue
    Resource: arn:aws:secretsmanager:*:*:secret:events!*
  - Sid: IAMPassRoleForCloudWatchEvents
    Effect: Allow
    Action: iam:PassRole
    Resource: arn:aws:iam::*:role/AWS_Events_Invoke_Targets
  - Sid: IAMPassRoleAccessForScheduler
    Effect: Allow
    Action: iam:PassRole
    Resource: arn:aws:iam::*:role/*
    Condition:
      StringEquals:
        iam:PassedToService: scheduler.amazonaws.com
  - Sid: IAMPassRoleAccessForPipes
    Effect: Allow
    Action: iam:PassRole
    Resource: arn:aws:iam::*:role/*
    Condition:
      StringEquals:
        iam:PassedToService: pipes.amazonaws.com
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
