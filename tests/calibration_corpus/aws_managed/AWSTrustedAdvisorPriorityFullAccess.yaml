name: aws-managed-AWSTrustedAdvisorPriorityFullAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AWSTrustedAdvisorPriorityFullAccess\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=9; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - trustedadvisor:DescribeAccount*
    - trustedadvisor:DescribeOrganization
    - trustedadvisor:DescribeRisk*
    - trustedadvisor:DownloadRisk
    - trustedadvisor:UpdateRiskStatus
    - trustedadvisor:DescribeNotificationConfigurations
    - trustedadvisor:UpdateNotificationConfigurations
    - trustedadvisor:DeleteNotificationConfigurationForDelegatedAdmin
    - trustedadvisor:SetOrganizationAccess
    Resource: '*'
  - Effect: Allow
    Action:
    - organizations:DescribeAccount
    - organizations:DescribeOrganization
    - organizations:ListAWSServiceAccessForOrganization
    Resource: '*'
  - Effect: Allow
    Action:
    - organizations:ListDelegatedAdministrators
    - organizations:EnableAWSServiceAccess
    - organizations:DisableAWSServiceAccess
    Resource: '*'
    Condition:
      StringEquals:
        organizations:ServicePrincipal:
        - reporting.trustedadvisor.amazonaws.com
  - Effect: Allow
    Action: iam:CreateServiceLinkedRole
    Resource: arn:aws:iam::*:role/aws-service-role/reporting.trustedadvisor.amazonaws.com/AWSServiceRoleForTrustedAdvisorReporting
    Condition:
      StringLike:
        iam:AWSServiceName: reporting.trustedadvisor.amazonaws.com
  - Effect: Allow
    Action:
    - organizations:RegisterDelegatedAdministrator
    - organizations:DeregisterDelegatedAdministrator
    Resource: arn:aws:organizations::*:*
    Condition:
      StringEquals:
        organizations:ServicePrincipal:
        - reporting.trustedadvisor.amazonaws.com
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  score_max: 10
