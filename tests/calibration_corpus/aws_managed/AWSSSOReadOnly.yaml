name: aws-managed-AWSSSOReadOnly
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AWSSSOReadOnly\nAWS description: (none)\nGenerated\
  \ by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule refactors.\
  \ Current det_score=7; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: AWSSSOReadOnly
    Effect: Allow
    Action:
    - ds:DescribeDirectories
    - ds:DescribeTrusts
    - iam:ListPolicies
    - organizations:DescribeOrganization
    - organizations:DescribeAccount
    - organizations:ListParents
    - organizations:ListChildren
    - organizations:ListAccounts
    - organizations:ListRoots
    - organizations:ListAccountsForParent
    - organizations:ListOrganizationalUnitsForParent
    - organizations:ListDelegatedAdministrators
    - sso:Describe*
    - sso:Get*
    - sso:List*
    - sso:Search*
    - sso-directory:DescribeDirectory
    - access-analyzer:ValidatePolicy
    - signin:ListTrustedIdentityPropagationApplicationsForConsole
    Resource: '*'
  - Sid: AllowKMSKeyUseViaAWSIAMIdentityCenterService
    Effect: Allow
    Action:
    - kms:Decrypt
    Resource: '*'
    Condition:
      StringLike:
        kms:ViaService: sso.*.amazonaws.com
        kms:EncryptionContext:aws:sso:instance-arn: '*'
  - Sid: AllowKMSKeyDiscovery
    Effect: Allow
    Action:
    - kms:ListAliases
    - kms:DescribeKey
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 6
  score_max: 8
