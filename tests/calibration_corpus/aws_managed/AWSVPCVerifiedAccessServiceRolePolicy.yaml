name: aws-managed-AWSVPCVerifiedAccessServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AWSVPCVerifiedAccessServiceRolePolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: VerifiedAccessRoleModifyTaggedNetworkInterfaceActions
    Effect: Allow
    Action:
    - ec2:ModifyNetworkInterfaceAttribute
    - ec2:DeleteNetworkInterface
    Resource: arn:aws:ec2:*:*:network-interface/*
    Condition:
      StringEquals:
        aws:ResourceTag/VerifiedAccessManaged: 'true'
  - Sid: VerifiedAccessRoleModifyNetworkInterfaceActions
    Effect: Allow
    Action:
    - ec2:ModifyNetworkInterfaceAttribute
    Resource: arn:aws:ec2:*:*:security-group/*
  - Sid: VerifiedAccessRoleNetworkInterfaceActions
    Effect: Allow
    Action:
    - ec2:CreateNetworkInterface
    Resource:
    - arn:aws:ec2:*:*:subnet/*
    - arn:aws:ec2:*:*:security-group/*
  - Sid: VerifiedAccessRoleTaggedNetworkInterfaceActions
    Effect: Allow
    Action:
    - ec2:CreateNetworkInterface
    Resource: arn:aws:ec2:*:*:network-interface/*
    Condition:
      StringEquals:
        aws:RequestTag/VerifiedAccessManaged: 'true'
  - Sid: VerifiedAccessRoleTaggingActions
    Effect: Allow
    Action:
    - ec2:CreateTags
    Resource: arn:aws:ec2:*:*:network-interface/*
    Condition:
      StringEquals:
        ec2:CreateAction: CreateNetworkInterface
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
