name: aws-managed-KeyspacesReplicationServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/KeyspacesReplicationServiceRolePolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: KeyspacesActionsNeededForSteadyStateReplication
    Effect: Allow
    Action:
    - cassandra:Select
    - cassandra:Modify
    - cassandra:Alter
    - cassandra:ModifyMultiRegionResource
    - cassandra:SelectMultiRegionResource
    - cassandra:AlterMultiRegionResource
    - application-autoscaling:RegisterScalableTarget
    - application-autoscaling:DeregisterScalableTarget
    - application-autoscaling:DescribeScalableTargets
    - application-autoscaling:DescribeScalingPolicies
    - application-autoscaling:PutScalingPolicy
    Resource: '*'
  - Sid: CWDeleteAlarmPolicy
    Effect: Allow
    Action:
    - cloudwatch:DeleteAlarms
    Resource: arn:aws:cloudwatch:*:*:alarm:TargetTracking-*
  - Sid: CWDescribeAlarmPolicy
    Effect: Allow
    Action:
    - cloudwatch:DescribeAlarms
    Resource: arn:aws:cloudwatch:*:*:alarm:*
  - Sid: CWPutMetricAlarmPolicy
    Effect: Allow
    Action:
    - cloudwatch:PutMetricAlarm
    Resource: arn:aws:cloudwatch:*:*:alarm:TargetTracking-*
    Condition:
      ForAllValues:StringLike:
        cloudwatch:AlarmActions:
        - arn:aws:autoscaling:*:*:scalingPolicy:*:resource/cassandra/keyspace/*/table/*:policyName/*:createdBy/*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
