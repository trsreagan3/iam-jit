name: aws-managed-AWSPanoramaGreengrassGroupRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/service-role/AWSPanoramaGreengrassGroupRolePolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: PanoramaS3Access
    Effect: Allow
    Action:
    - s3:ListBucket
    - s3:GetBucket*
    - s3:GetObject
    - s3:PutObject
    Resource:
    - arn:aws:s3:::*aws-panorama*
  - Sid: PanoramaCLoudWatchPutDashboard
    Effect: Allow
    Action: cloudwatch:PutDashboard
    Resource:
    - arn:aws:cloudwatch::*:dashboard/panorama*
  - Sid: PanoramaCloudWatchPutMetricData
    Effect: Allow
    Action: cloudwatch:PutMetricData
    Resource: '*'
  - Sid: PanoramaGreenGrassCloudWatchAccess
    Effect: Allow
    Action:
    - logs:CreateLogStream
    - logs:DescribeLogStreams
    - logs:PutLogEvents
    - logs:CreateLogGroup
    Resource: arn:aws:logs:*:*:log-group:/aws/greengrass/*
  - Sid: PanoramaAccess
    Effect: Allow
    Action:
    - panorama:*
    Resource:
    - '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
