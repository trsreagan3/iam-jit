name: aws-managed-AWSMigrationHubDiscoveryAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/service-role/AWSMigrationHubDiscoveryAccess\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=6; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - discovery:ListConfigurations
    - discovery:DescribeConfigurations
    Resource:
    - '*'
  - Effect: Allow
    Action: ec2:CreateTags
    Resource:
    - arn:aws:ec2:*:*:instance/*
    - arn:aws:ec2:*:*:image/*
    - arn:aws:ec2:*:*:volume/*
    Condition:
      ForAllValues:StringEquals:
        aws:TagKeys: aws:migrationhub:source-id
  - Effect: Allow
    Action: dms:AddTagsToResource
    Resource:
    - arn:aws:dms:*:*:endpoint:*
    Condition:
      ForAllValues:StringEquals:
        aws:TagKeys: aws:migrationhub:source-id
  - Effect: Allow
    Action:
    - ec2:DescribeInstanceAttribute
    Resource:
    - '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 5
  score_max: 7
