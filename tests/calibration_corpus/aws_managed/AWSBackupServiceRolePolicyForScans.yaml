name: aws-managed-AWSBackupServiceRolePolicyForScans
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AWSBackupServiceRolePolicyForScans\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=9; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: GuardDutyMalwareScanPermissions
    Effect: Allow
    Action:
    - guardduty:StartMalwareScan
    - guardduty:GetMalwareScan
    Resource: '*'
  - Sid: IAMPassPermissions
    Effect: Allow
    Action: iam:PassRole
    Resource: '*'
    Condition:
      StringEquals:
        iam:PassedToService: malware-protection.guardduty.amazonaws.com
  - Sid: EC2ReadAPIPermissions
    Effect: Allow
    Action:
    - ec2:DescribeImages
    - ec2:DescribeSnapshots
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  score_max: 10
