name: aws-managed-AWSLambdaManagedEC2ResourceOperator
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AWSLambdaManagedEC2ResourceOperator\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - ec2:RunInstances
    - ec2:CreateTags
    - ec2:AttachNetworkInterface
    Resource:
    - arn:aws:ec2:*:*:instance/*
    - arn:aws:ec2:*:*:network-interface/*
    - arn:aws:ec2:*:*:volume/*
    Condition:
      StringEquals:
        ec2:ManagedResourceOperator: scaler.lambda.amazonaws.com
  - Effect: Allow
    Action:
    - ec2:DescribeAvailabilityZones
    - ec2:DescribeCapacityReservations
    - ec2:DescribeInstances
    - ec2:DescribeInstanceStatus
    - ec2:DescribeInstanceTypeOfferings
    - ec2:DescribeInstanceTypes
    - ec2:DescribeSecurityGroups
    - ec2:DescribeSubnets
    - ec2:DescribeVpcEncryptionControls
    Resource: '*'
  - Effect: Allow
    Action:
    - ec2:RunInstances
    - ec2:CreateNetworkInterface
    Resource:
    - arn:aws:ec2:*:*:subnet/*
    - arn:aws:ec2:*:*:security-group/*
  - Effect: Allow
    Action:
    - ec2:RunInstances
    Resource:
    - arn:aws:ec2:*:*:image/*
    Condition:
      StringEquals:
        ec2:Owner: amazon
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
