name: aws-managed-CostOptimizationHubAdminAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/CostOptimizationHubAdminAccess\nAWS description: (none)\n\
  Generated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule\
  \ refactors. Current det_score=6; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: CostOptimizationHubAdminAccess
    Effect: Allow
    Action:
    - cost-optimization-hub:ListEnrollmentStatuses
    - cost-optimization-hub:UpdateEnrollmentStatus
    - cost-optimization-hub:GetPreferences
    - cost-optimization-hub:UpdatePreferences
    - cost-optimization-hub:GetRecommendation
    - cost-optimization-hub:ListRecommendations
    - cost-optimization-hub:ListRecommendationSummaries
    - cost-optimization-hub:ListEfficiencyMetrics
    Resource: '*'
  - Sid: AllowCreationOfServiceLinkedRoleForCostOptimizationHub
    Effect: Allow
    Action:
    - iam:CreateServiceLinkedRole
    Resource:
    - arn:aws:iam::*:role/aws-service-role/cost-optimization-hub.bcm.amazonaws.com/AWSServiceRoleForCostOptimizationHub
    Condition:
      StringLike:
        iam:AWSServiceName: cost-optimization-hub.bcm.amazonaws.com
  - Sid: AllowAWSServiceAccessForCostOptimizationHub
    Effect: Allow
    Action:
    - organizations:EnableAWSServiceAccess
    Resource: '*'
    Condition:
      StringLike:
        organizations:ServicePrincipal:
        - cost-optimization-hub.bcm.amazonaws.com
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 5
  score_max: 7
