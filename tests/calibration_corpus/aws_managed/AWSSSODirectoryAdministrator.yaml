name: aws-managed-AWSSSODirectoryAdministrator
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AWSSSODirectoryAdministrator\nAWS description: (none)\n\
  Generated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule\
  \ refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: AWSSSODirectoryAdministrator
    Effect: Allow
    Action:
    - sso-directory:*
    - identitystore:*
    - identitystore-auth:*
    - sso:ListDirectoryAssociations
    Resource: '*'
  - Sid: AllowKMSKeyUseViaAWSIdentityStoreService
    Effect: Allow
    Action:
    - kms:Decrypt
    Resource: '*'
    Condition:
      StringLike:
        kms:ViaService: identitystore.*.amazonaws.com
        kms:EncryptionContext:aws:identitystore:identitystore-arn: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
