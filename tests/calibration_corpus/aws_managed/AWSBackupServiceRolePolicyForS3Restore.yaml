name: aws-managed-AWSBackupServiceRolePolicyForS3Restore
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AWSBackupServiceRolePolicyForS3Restore\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - s3:CreateBucket
    - s3:ListBucketVersions
    - s3:ListBucket
    - s3:GetBucketVersioning
    - s3:GetBucketLocation
    - s3:PutBucketVersioning
    - s3:PutBucketOwnershipControls
    - s3:GetBucketOwnershipControls
    Resource:
    - arn:aws:s3:::*
  - Effect: Allow
    Action:
    - s3:GetObject
    - s3:GetObjectVersion
    - s3:DeleteObject
    - s3:PutObjectVersionAcl
    - s3:GetObjectVersionAcl
    - s3:GetObjectTagging
    - s3:PutObjectTagging
    - s3:GetObjectAcl
    - s3:PutObjectAcl
    - s3:ListMultipartUploadParts
    - s3:PutObject
    Resource:
    - arn:aws:s3:::*/*
  - Effect: Allow
    Action:
    - kms:DescribeKey
    - kms:GenerateDataKey
    - kms:Decrypt
    Resource: '*'
    Condition:
      StringLike:
        kms:ViaService: s3.*.amazonaws.com
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
