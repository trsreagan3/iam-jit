name: aws-managed-AmazonSageMakerCanvasEMRServerlessExecutionRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AmazonSageMakerCanvasEMRServerlessExecutionRolePolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: S3Operations
    Effect: Allow
    Action:
    - s3:GetObject
    - s3:PutObject
    - s3:DeleteObject
    - s3:GetBucketCors
    - s3:GetBucketLocation
    - s3:AbortMultipartUpload
    Resource:
    - arn:aws:s3:::*SageMaker*
    - arn:aws:s3:::*sagemaker*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: S3GetObjectOperation
    Effect: Allow
    Action: s3:GetObject
    Resource: arn:aws:s3:::*
    Condition:
      StringEqualsIgnoreCase:
        s3:ExistingObjectTag/SageMaker: 'true'
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: S3ListOperations
    Effect: Allow
    Action:
    - s3:ListBucket
    - s3:ListAllMyBuckets
    Resource: '*'
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
