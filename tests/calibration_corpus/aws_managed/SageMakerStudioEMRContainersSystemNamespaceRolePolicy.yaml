  - Sid: SetContextProjectRoles
    Effect: Allow
    Action:
    - sts:SetContext
    Resource:
    - arn:aws:iam::*:role/datazone_usr_role_*
    Condition:
      ForAllValues:ArnEquals:
        sts:RequestContextProviders:
