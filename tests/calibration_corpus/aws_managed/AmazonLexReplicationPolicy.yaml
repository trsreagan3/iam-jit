name: aws-managed-AmazonLexReplicationPolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AmazonLexReplicationPolicy\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=9; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: ReplicationServicePolicyStatement1
    Effect: Allow
    Action:
    - lex:BuildBotLocale
    - lex:ListBotLocales
    - lex:CreateBotAlias
    - lex:UpdateBotAlias
    - lex:DeleteBotAlias
    - lex:DescribeBotAlias
    - lex:CreateBotVersion
    - lex:DeleteBotVersion
    - lex:DescribeBotVersion
    - lex:CreateExport
    - lex:DescribeBot
    - lex:UpdateExport
    - lex:DescribeExport
    - lex:DescribeBotLocale
    - lex:DescribeIntent
    - lex:ListIntents
    - lex:DescribeSlotType
    - lex:ListSlotTypes
    - lex:DescribeSlot
    - lex:ListSlots
    - lex:DescribeCustomVocabulary
    - lex:StartImport
    - lex:DescribeImport
    - lex:CreateBot
    - lex:UpdateBot
    - lex:DeleteBot
    - lex:CreateBotLocale
    - lex:UpdateBotLocale
    - lex:DeleteBotLocale
    - lex:CreateIntent
    - lex:UpdateIntent
    - lex:DeleteIntent
    - lex:CreateSlotType
    - lex:UpdateSlotType
    - lex:DeleteSlotType
    - lex:CreateSlot
    - lex:UpdateSlot
    - lex:DeleteSlot
    - lex:CreateCustomVocabulary
    - lex:UpdateCustomVocabulary
    - lex:DeleteCustomVocabulary
    - lex:DeleteBotChannel
    - lex:ListTagsForResource
    - lex:TagResource
    - lex:UntagResource
    - lex:CreateResourcePolicy
    - lex:DeleteResourcePolicy
    - lex:DescribeResourcePolicy
    - lex:UpdateResourcePolicy
    Resource:
    - arn:aws:lex:*:*:bot/*
    - arn:aws:lex:*:*:bot-alias/*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: ReplicationServicePolicyStatement2
    Effect: Allow
    Action:
    - lex:CreateUploadUrl
    - lex:ListBots
    Resource: '*'
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: ReplicationServicePolicyStatement3
    Effect: Allow
    Action:
    - iam:PassRole
    Resource: '*'
    Condition:
      StringEquals:
        iam:PassedToService: lexv2.amazonaws.com
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  score_max: 10
