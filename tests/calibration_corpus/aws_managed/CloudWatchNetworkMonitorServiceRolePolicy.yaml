name: aws-managed-CloudWatchNetworkMonitorServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/CloudWatchNetworkMonitorServiceRolePolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: PublishCw
    Effect: Allow
    Action: cloudwatch:PutMetricData
    Resource: '*'
    Condition:
      StringEquals:
        cloudwatch:namespace: AWS/NetworkMonitor
  - Sid: DescribeAny
    Effect: Allow
    Action:
    - ec2:DescribeNetworkInterfaces
    - ec2:DescribeNetworkInterfaceAttribute
    - ec2:DescribeVpcs
    - ec2:DescribeNetworkInterfacePermissions
    - ec2:DescribeSubnets
    - ec2:DescribeSecurityGroups
    - ec2:DescribeRouteTables
    - ec2:DescribeTransitGatewayAttachments
    - ec2:DescribeTransitGatewayRouteTables
    - ec2:SearchTransitGatewayRoutes
    Resource: '*'
  - Sid: DeleteModifyEc2Resources
    Effect: Allow
    Action:
    - ec2:AuthorizeSecurityGroupEgress
    - ec2:CreateNetworkInterfacePermission
    - ec2:DeleteNetworkInterfacePermission
    - ec2:RevokeSecurityGroupEgress
    - ec2:ModifyNetworkInterfaceAttribute
    - ec2:DeleteNetworkInterface
    - ec2:DeleteSecurityGroup
    Resource:
    - arn:aws:ec2:*:*:network-interface/*
    - arn:aws:ec2:*:*:security-group/*
    Condition:
      StringEquals:
        aws:ResourceTag/ManagedByCloudWatchNetworkMonitor: 'true'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
