name: aws-managed-AmazonDetectiveOrganizationsAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AmazonDetectiveOrganizationsAccess\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=9; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - detective:DisableOrganizationAdminAccount
    - detective:EnableOrganizationAdminAccount
    - detective:ListOrganizationAdminAccount
    Resource: '*'
  - Effect: Allow
    Action:
    - iam:CreateServiceLinkedRole
    Resource: '*'
    Condition:
      StringEquals:
        iam:AWSServiceName: detective.amazonaws.com
  - Effect: Allow
    Action:
    - organizations:EnableAWSServiceAccess
    - organizations:RegisterDelegatedAdministrator
    - organizations:DeregisterDelegatedAdministrator
    Resource: '*'
    Condition:
      StringEquals:
        organizations:ServicePrincipal:
        - detective.amazonaws.com
  - Effect: Allow
    Action:
    - organizations:DescribeAccount
    - organizations:DescribeOrganization
    - organizations:ListAccounts
    Resource: '*'
  - Effect: Allow
    Action:
    - organizations:ListDelegatedAdministrators
    Resource: '*'
    Condition:
      StringEquals:
        organizations:ServicePrincipal:
        - detective.amazonaws.com
        - guardduty.amazonaws.com
        - macie.amazonaws.com
        - securityhub.amazonaws.com
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  score_max: 10
