name: aws-managed-AWSServiceCatalogAppRegistryFullAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AWSServiceCatalogAppRegistryFullAccess\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: AppRegistryUpdateStackAndResourceGroupTagging
    Effect: Allow
    Action:
    - cloudformation:UpdateStack
    - tag:GetResources
    Resource: '*'
    Condition:
      ForAnyValue:StringEquals:
        aws:CalledVia: servicecatalog-appregistry.amazonaws.com
  - Sid: AppRegistryResourceGroupsIntegration
    Effect: Allow
    Action:
    - resource-groups:CreateGroup
    - resource-groups:DeleteGroup
    - resource-groups:GetGroup
    - resource-groups:GetTags
    - resource-groups:Tag
    - resource-groups:Untag
    - resource-groups:GetGroupConfiguration
    - resource-groups:AssociateResource
    - resource-groups:DisassociateResource
    Resource: arn:aws:resource-groups:*:*:group/AWS_*
    Condition:
      ForAnyValue:StringEquals:
        aws:CalledVia: servicecatalog-appregistry.amazonaws.com
  - Sid: AppRegistryServiceLinkedRole
    Effect: Allow
    Action: iam:CreateServiceLinkedRole
    Resource: arn:aws:iam::*:role/aws-service-role/servicecatalog-appregistry.amazonaws.com/AWSServiceRoleForAWSServiceCatalogAppRegistry*
    Condition:
      StringEquals:
        iam:AWSServiceName: servicecatalog-appregistry.amazonaws.com
  - Sid: AppRegistryOperations
    Effect: Allow
    Action:
    - cloudformation:DescribeStacks
    - servicecatalog:CreateApplication
    - servicecatalog:GetApplication
    - servicecatalog:UpdateApplication
    - servicecatalog:DeleteApplication
    - servicecatalog:ListApplications
    - servicecatalog:AssociateResource
    - servicecatalog:DisassociateResource
    - servicecatalog:GetAssociatedResource
    - servicecatalog:ListAssociatedResources
    - servicecatalog:AssociateAttributeGroup
    - servicecatalog:DisassociateAttributeGroup
    - servicecatalog:ListAssociatedAttributeGroups
    - servicecatalog:CreateAttributeGroup
    - servicecatalog:UpdateAttributeGroup
    - servicecatalog:DeleteAttributeGroup
    - servicecatalog:GetAttributeGroup
    - servicecatalog:ListAttributeGroups
    - servicecatalog:SyncResource
    - servicecatalog:ListAttributeGroupsForApplication
    - servicecatalog:GetConfiguration
    - servicecatalog:PutConfiguration
    Resource: '*'
  - Sid: AppRegistryResourceTagging
    Effect: Allow
    Action:
    - servicecatalog:ListTagsForResource
    - servicecatalog:UntagResource
    - servicecatalog:TagResource
    Resource: arn:aws:servicecatalog:*:*:*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
