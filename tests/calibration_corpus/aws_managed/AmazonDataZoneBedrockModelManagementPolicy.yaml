name: aws-managed-AmazonDataZoneBedrockModelManagementPolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/service-role/AmazonDataZoneBedrockModelManagementPolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: ManageApplicationInferenceProfile
    Effect: Allow
    Action:
    - bedrock:CreateInferenceProfile
    - bedrock:TagResource
    Resource:
    - arn:aws:bedrock:*:*:application-inference-profile/*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
      ForAnyValue:StringEquals:
        aws:TagKeys:
        - AmazonDataZoneProject
      'Null':
        aws:ResourceTag/AmazonDataZoneProject: 'false'
        aws:RequestTag/AmazonDataZoneProject: 'false'
  - Sid: DeleteApplicationInferenceProfile
    Effect: Allow
    Action:
    - bedrock:DeleteInferenceProfile
    Resource:
    - arn:aws:bedrock:*:*:application-inference-profile/*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
      'Null':
        aws:ResourceTag/AmazonDataZoneProject: 'false'
  - Sid: CreateApplicationInferenceProfileUsingFoundationModels
    Effect: Allow
    Action:
    - bedrock:CreateInferenceProfile
    Resource:
    - arn:aws:bedrock:*::foundation-model/*
  - Sid: CreateApplicationInferenceProfileUsingBedrockModels
    Effect: Allow
    Action:
    - bedrock:CreateInferenceProfile
    Resource:
    - arn:aws:bedrock:*:*:inference-profile/*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
