name: aws-managed-AWSCloud9EnvironmentMember
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AWSCloud9EnvironmentMember\nAWS description: (none)\n\
  Generated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule\
  \ refactors. Current det_score=9; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - cloud9:GetUserSettings
    - cloud9:UpdateUserSettings
    - cloud9:GetMigrationExperiences
    - iam:GetUser
    - iam:ListUsers
    Resource: '*'
  - Effect: Allow
    Action:
    - cloud9:DescribeEnvironmentMemberships
    Resource:
    - '*'
    Condition:
      'Null':
        cloud9:UserArn: 'true'
        cloud9:EnvironmentId: 'true'
  - Effect: Allow
    Action:
    - ssm:StartSession
    - ssm:GetConnectionStatus
    Resource: arn:aws:ec2:*:*:instance/*
    Condition:
      StringLike:
        ssm:resourceTag/aws:cloud9:environment: '*'
      StringEquals:
        aws:CalledViaFirst: cloud9.amazonaws.com
  - Effect: Allow
    Action:
    - ssm:StartSession
    Resource:
    - arn:aws:ssm:*:*:document/*
  - Effect: Allow
    Action:
    - ssmmessages:OpenDataChannel
    Resource:
    - arn:aws:ssm:*:*:session/*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  score_max: 10
