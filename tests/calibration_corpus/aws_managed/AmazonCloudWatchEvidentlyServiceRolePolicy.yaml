name: aws-managed-AmazonCloudWatchEvidentlyServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AmazonCloudWatchEvidentlyServiceRolePolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action: appconfig:StartDeployment
    Resource:
    - arn:aws:appconfig:*:*:application/*
    - arn:aws:appconfig:*:*:deploymentstrategy/*
    Condition:
      StringEquals:
        aws:RequestTag/DeployedBy: Evidently
  - Effect: Deny
    Action: appconfig:StartDeployment
    Resource: arn:aws:appconfig:*:*:application/*/configurationprofile/*
    Condition:
      StringNotEquals:
        aws:ResourceTag/Owner: Evidently
  - Effect: Allow
    Action: appconfig:TagResource
    Resource: arn:aws:appconfig:*:*:application/*/environment/*/deployment/*
    Condition:
      StringEquals:
        aws:RequestTag/DeployedBy: Evidently
  - Effect: Allow
    Action: appconfig:StopDeployment
    Resource: arn:aws:appconfig:*:*:application/*
  - Effect: Deny
    Action: appconfig:StopDeployment
    Resource: arn:aws:appconfig:*:*:application/*/environment/*/deployment/*
    Condition:
      StringNotEquals:
        aws:ResourceTag/DeployedBy: Evidently
  - Effect: Allow
    Action: appconfig:ListDeployments
    Resource: arn:aws:appconfig:*:*:application/*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
