name: aws-managed-AmazonBedrockLimitedAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AmazonBedrockLimitedAccess\nAWS description: (none)\n\
  Generated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule\
  \ refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: BedrockAPIs
    Effect: Allow
    Action:
    - bedrock:Get*
    - bedrock:List*
    - bedrock:CallWithBearerToken
    - bedrock:BatchDeleteEvaluationJob
    - bedrock:CancelAutomatedReasoningPolicyBuildWorkflow
    - bedrock:CreateAutomatedReasoningPolicy
    - bedrock:CreateAutomatedReasoningPolicyTestCase
    - bedrock:CreateAutomatedReasoningPolicyVersion
    - bedrock:CreateEvaluationJob
    - bedrock:CreateGuardrail
    - bedrock:CreateGuardrailVersion
    - bedrock:CreateInferenceProfile
    - bedrock:CreateModelCopyJob
    - bedrock:CreateModelCustomizationJob
    - bedrock:CreateModelImportJob
    - bedrock:CreateModelInvocationJob
    - bedrock:CreatePromptRouter
    - bedrock:CreateProvisionedModelThroughput
    - bedrock:DeleteAutomatedReasoningPolicy
    - bedrock:DeleteAutomatedReasoningPolicyBuildWorkflow
    - bedrock:DeleteAutomatedReasoningPolicyTestCase
    - bedrock:DeleteCustomModel
    - bedrock:DeleteGuardrail
    - bedrock:DeleteImportedModel
    - bedrock:DeleteInferenceProfile
    - bedrock:DeletePromptRouter
    - bedrock:DeleteProvisionedModelThroughput
    - bedrock:ExportAutomatedReasoningPolicyVersion
    - bedrock:StartAutomatedReasoningPolicyBuildWorkflow
    - bedrock:StartAutomatedReasoningPolicyTestWorkflow
    - bedrock:StopEvaluationJob
    - bedrock:StopModelCustomizationJob
    - bedrock:StopModelInvocationJob
    - bedrock:TagResource
    - bedrock:UntagResource
    - bedrock:UpdateAutomatedReasoningPolicy
    - bedrock:UpdateAutomatedReasoningPolicyAnnotations
    - bedrock:UpdateAutomatedReasoningPolicyTestCase
    - bedrock:UpdateGuardrail
    - bedrock:UpdateProvisionedModelThroughput
    - bedrock:ApplyGuardrail
    - bedrock:InvokeAutomatedReasoningPolicy
    - bedrock:InvokeModel
    - bedrock:InvokeModelWithResponseStream
    Resource: '*'
  - Sid: DescribeKey
    Effect: Allow
    Action:
    - kms:DescribeKey
    Resource: arn:*:kms:*:::*
  - Sid: APIsWithAllResourceAccess
    Effect: Allow
    Action:
    - iam:ListRoles
    - ec2:DescribeVpcs
    - ec2:DescribeSubnets
    - ec2:DescribeSecurityGroups
    Resource: '*'
  - Sid: BedrockMantleAPIs
    Effect: Allow
    Action:
    - bedrock-mantle:CallWithBearerToken
    - bedrock-mantle:Get*
    - bedrock-mantle:List*
    - bedrock-mantle:CreateInference
    Resource: '*'
  - Sid: MarketplaceOperationsFromBedrockFor3pModels
    Effect: Allow
    Action:
    - aws-marketplace:Subscribe
    - aws-marketplace:ViewSubscriptions
    - aws-marketplace:Unsubscribe
    Resource: '*'
    Condition:
      StringEquals:
        aws:CalledViaLast:
        - bedrock.amazonaws.com
        - bedrock-mantle.amazonaws.com
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
