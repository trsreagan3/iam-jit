name: aws-managed-ROSASharedVPCRoute53Policy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/ROSASharedVPCRoute53Policy\nAWS description: (none)\n\
  Generated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule\
  \ refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: ReadPermissions
    Effect: Allow
    Action:
    - route53:GetHostedZone
    - route53:ListResourceRecordSets
    - route53:ListHostedZones
    - tag:GetResources
    Resource: '*'
  - Sid: ChangeResourceRecordSetsRestrictedRecordNames
    Effect: Allow
    Action:
    - route53:ChangeResourceRecordSets
    Resource:
    - '*'
    Condition:
      ForAllValues:StringLike:
        route53:ChangeResourceRecordSetsNormalizedRecordNames:
        - '*.hypershift.local'
        - '*.openshiftapps.com'
        - '*.devshift.org'
        - '*.openshiftusgov.com'
        - '*.devshiftusgov.com'
  - Sid: ChangeTagsForResourceNoCondition
    Effect: Allow
    Action:
    - route53:ChangeTagsForResource
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
