name: aws-managed-AmazonSageMakerQuickSightVPCPolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/service-role/AmazonSageMakerQuickSightVPCPolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: ManageQuickSightVPCConnection
    Effect: Allow
    Action:
    - quicksight:CreateVPCConnection
    - quicksight:DescribeVPCConnection
    - quicksight:DeleteVPCConnection
    - quicksight:ListVPCConnections
    - quicksight:UpdateVPCConnection
    Resource: arn:aws:quicksight:*:*:vpcconnection/*
    Condition:
      'Null':
        aws:ResourceTag/AmazonDataZoneProject: 'false'
  - Sid: DescribeQuickSightVPCConnectionEC2Resources
    Effect: Allow
    Action:
    - ec2:DescribeVpcs
    - ec2:DescribeSubnets
    - ec2:DescribeSecurityGroups
    - ec2:DescribeNetworkInterfaces
    - ec2:DescribeNetworkAcls
    - ec2:DescribeRouteTables
    Resource:
    - '*'
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: ManageQuickSightEC2NetworkInterface
    Effect: Allow
    Action:
    - ec2:CreateNetworkInterface
    - ec2:DeleteNetworkInterface
    Resource:
    - arn:aws:ec2:*:*:subnet/*
    - arn:aws:ec2:*:*:security-group/*
    - arn:aws:ec2:*:*:network-interface/*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
