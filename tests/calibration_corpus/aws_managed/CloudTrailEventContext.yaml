name: aws-managed-CloudTrailEventContext
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/CloudTrailEventContext\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: CloudTrailEventContextPermissionForTag
    Effect: Allow
    Action: tag:GetResources
    Resource: '*'
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: AllowEventBridgeRuleCreation
    Effect: Allow
    Action: events:PutRule
    Resource: arn:aws:events:*:*:rule/CloudTrailEventContext*
    Condition:
      ForAllValues:StringEquals:
        events:source: aws.tag
      StringEquals:
        events:creatorAccount: ${aws:PrincipalAccount}
        events:detail-type: Tag Change on Resource
        events:ManagedBy: context.cloudtrail.amazonaws.com
  - Sid: AllowEventBridgeRuleWrite
    Effect: Allow
    Action:
    - events:PutTargets
    - events:DeleteRule
    - events:RemoveTargets
    Resource: arn:aws:events:*:*:rule/CloudTrailEventContext*
    Condition:
      StringEquals:
        events:creatorAccount: ${aws:PrincipalAccount}
        events:ManagedBy: context.cloudtrail.amazonaws.com
  - Sid: AllowEventBridgeRuleRead
    Effect: Allow
    Action:
    - events:DescribeRule
    - events:ListTargetsByRule
    Condition:
      StringEquals:
        events:creatorAccount: ${aws:PrincipalAccount}
    Resource: arn:aws:events:*:*:rule/CloudTrailEventContext*
  - Sid: AllowEventBridgeRuleList
    Effect: Allow
    Action:
    - events:ListRules
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
