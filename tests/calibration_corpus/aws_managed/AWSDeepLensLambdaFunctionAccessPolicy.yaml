name: aws-managed-AWSDeepLensLambdaFunctionAccessPolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AWSDeepLensLambdaFunctionAccessPolicy\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: DeepLensS3ObjectAccess
    Effect: Allow
    Action:
    - s3:ListBucket
    - s3:GetObject
    Resource:
    - arn:aws:s3:::deeplens*/*
    - arn:aws:s3:::deeplens*
  - Sid: DeepLensGreenGrassCloudWatchAccess
    Effect: Allow
    Action:
    - logs:CreateLogStream
    - logs:DescribeLogStreams
    - logs:PutLogEvents
    - logs:CreateLogGroup
    Resource: arn:aws:logs:*:*:log-group:/aws/greengrass/*
  - Sid: DeepLensAccess
    Effect: Allow
    Action:
    - deeplens:*
    Resource:
    - '*'
  - Sid: DeepLensKinesisVideoAccess
    Effect: Allow
    Action:
    - kinesisvideo:DescribeStream
    - kinesisvideo:CreateStream
    - kinesisvideo:GetDataEndpoint
    - kinesisvideo:PutMedia
    Resource:
    - '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
