    - iam:CreateServiceLinkedRole
    Resource: arn:aws:iam::*:role/aws-service-role/config-conforms.amazonaws.com/AWSServiceRoleForConfigConforms
    Condition:
      StringLike:
        iam:AWSServiceName: config-conforms.amazonaws.com
