name: aws-managed-AWSCodeStarNotificationsServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AWSCodeStarNotificationsServiceRolePolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=6; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Action:
    - events:PutTargets
    - events:PutRule
    - events:DescribeRule
    Resource: arn:aws:events:*:*:rule/awscodestarnotifications-*
    Effect: Allow
  - Action:
    - sns:CreateTopic
    Resource: arn:aws:sns:*:*:CodeStarNotifications-*
    Effect: Allow
  - Action:
    - codecommit:GetCommentsForPullRequest
    - codecommit:GetCommentsForComparedCommit
    - chatbot:DescribeSlackChannelConfigurations
    - chatbot:UpdateSlackChannelConfiguration
    - codecommit:GetDifferences
    - codepipeline:ListActionExecutions
    Resource: '*'
    Effect: Allow
  - Action:
    - codecommit:GetFile
    Resource: '*'
    Condition:
      StringNotEquals:
        aws:ResourceTag/ExcludeFileContentFromNotifications: 'true'
    Effect: Allow
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 5
  score_max: 7
