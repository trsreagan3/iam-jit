name: aws-managed-AmazonAppFlowFullAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AmazonAppFlowFullAccess\nAWS description: (none)\n\
  Generated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule\
  \ refactors. Current det_score=9; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action: appflow:*
    Resource: '*'
  - Sid: ListRolesForRedshift
    Effect: Allow
    Action: iam:ListRoles
    Resource: '*'
  - Sid: KMSListAccess
    Effect: Allow
    Action:
    - kms:ListKeys
    - kms:DescribeKey
    - kms:ListAliases
    Resource: '*'
  - Sid: KMSGrantAccess
    Effect: Allow
    Action:
    - kms:CreateGrant
    Resource: '*'
    Condition:
      StringLike:
        kms:ViaService: appflow.*.amazonaws.com
      Bool:
        kms:GrantIsForAWSResource: 'true'
  - Sid: KMSListGrantAccess
    Effect: Allow
    Action:
    - kms:ListGrants
    Resource: '*'
    Condition:
      StringLike:
        kms:ViaService: appflow.*.amazonaws.com
  - Sid: S3ReadAccess
    Effect: Allow
    Action:
    - s3:ListAllMyBuckets
    - s3:ListBucket
    - s3:GetBucketLocation
    - s3:GetBucketPolicy
    Resource: '*'
  - Sid: S3PutBucketPolicyAccess
    Effect: Allow
    Action:
    - s3:PutBucketPolicy
    Resource: arn:aws:s3:::appflow-*
  - Sid: SecretsManagerCreateSecretAccess
    Effect: Allow
    Action: secretsmanager:CreateSecret
    Resource: '*'
    Condition:
      StringLike:
        secretsmanager:Name: appflow!*
      ForAnyValue:StringEquals:
        aws:CalledVia:
        - appflow.amazonaws.com
  - Sid: SecretsManagerPutResourcePolicyAccess
    Effect: Allow
    Action:
    - secretsmanager:PutResourcePolicy
    Resource: '*'
    Condition:
      ForAnyValue:StringEquals:
        aws:CalledVia:
        - appflow.amazonaws.com
      StringEqualsIgnoreCase:
        secretsmanager:ResourceTag/aws:secretsmanager:owningService: appflow
  - Sid: LambdaListFunctions
    Effect: Allow
    Action:
    - lambda:ListFunctions
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  score_max: 10
