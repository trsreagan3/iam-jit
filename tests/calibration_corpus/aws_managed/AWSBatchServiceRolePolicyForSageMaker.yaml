name: aws-managed-AWSBatchServiceRolePolicyForSageMaker
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AWSBatchServiceRolePolicyForSageMaker\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=9; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - sagemaker:CreateTrainingJob
    - sagemaker:DescribeTrainingJob
    - sagemaker:StopTrainingJob
    - sagemaker:ListTags
    - sagemaker:DeleteTrainingJob
    Resource: arn:aws:sagemaker:*:*:training-job/AWSBatch*
  - Effect: Allow
    Action:
    - sagemaker:CreateTrainingJob
    Resource:
    - arn:aws:sagemaker:*:*:training-plan/*
    - arn:aws:sagemaker:*:*:reserved-capacity/*
  - Effect: Allow
    Action:
    - sagemaker:AddTags
    Resource: arn:aws:sagemaker:*:*:training-job/AWSBatch*
    Condition:
      StringEquals:
        sagemaker:TaggingAction: CreateTrainingJob
  - Effect: Allow
    Action:
    - sagemaker:ListTrainingJobs
    - sagemaker:Search
    Resource: '*'
  - Effect: Allow
    Action: iam:PassRole
    Resource: '*'
    Condition:
      StringEquals:
        iam:PassedToService:
        - sagemaker.amazonaws.com
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  score_max: 10
