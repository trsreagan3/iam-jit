name: aws-managed-AWSDataSyncDiscoveryServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AWSDataSyncDiscoveryServiceRolePolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=7; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - secretsmanager:GetSecretValue
    Resource:
    - arn:*:secretsmanager:*:*:secret:datasync!*
    Condition:
      StringEquals:
        secretsmanager:ResourceTag/aws:secretsmanager:owningService: datasync
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Effect: Allow
    Action:
    - logs:CreateLogGroup
    - logs:CreateLogStream
    Resource:
    - arn:*:logs:*:*:log-group:/aws/datasync*
  - Effect: Allow
    Action:
    - logs:PutLogEvents
    Resource:
    - arn:*:logs:*:*:log-group:/aws/datasync:log-stream:*
