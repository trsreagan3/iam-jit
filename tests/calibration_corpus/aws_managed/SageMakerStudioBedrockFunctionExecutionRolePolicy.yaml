name: aws-managed-SageMakerStudioBedrockFunctionExecutionRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/service-role/SageMakerStudioBedrockFunctionExecutionRolePolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=1; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: SecretsManagerReadPermissions
    Effect: Allow
    Action:
    - secretsmanager:DescribeSecret
    - secretsmanager:GetSecretValue
    Resource: arn:aws:secretsmanager:*:*:secret:amazon-bedrock*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
        aws:ResourceTag/AmazonDataZoneProject: ${aws:PrincipalTag/AmazonDataZoneProject}
  - Sid: KMSSameAccountBedrockViaSecretsManagerPermissions
    Effect: Allow
    Action: kms:Decrypt
    Resource: arn:aws:kms:*:*:key/${aws:PrincipalTag/KmsKeyId}
    Condition:
      StringLike:
        kms:ViaService: secretsmanager.*.amazonaws.com
        kms:EncryptionContext:SecretARN: arn:aws:secretsmanager:*:${aws:PrincipalAccount}:secret:amazon-bedrock*
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 1
  score_max: 2
