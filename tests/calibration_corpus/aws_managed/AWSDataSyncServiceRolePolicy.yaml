name: aws-managed-AWSDataSyncServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AWSDataSyncServiceRolePolicy\nAWS\
  \ description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score\
  \ against future rule refactors. Current det_score=4; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: DataSyncCloudWatchLogCreateAccess
    Effect: Allow
    Action:
    - logs:CreateLogGroup
    - logs:CreateLogStream
    Resource:
    - arn:*:logs:*:*:log-group:/aws/datasync*
  - Sid: DataSyncCloudWatchLogStreamUpdateAccess
    Effect: Allow
    Action:
    - logs:PutLogEvents
    Resource:
    - arn:*:logs:*:*:log-group:/aws/datasync*:log-stream:*
  - Sid: DataSyncSecretsManagerReadAccess
    Effect: Allow
    Action:
    - secretsmanager:DescribeSecret
    - secretsmanager:GetSecretValue
    Resource:
    - arn:*:secretsmanager:*:*:secret:aws-datasync!*
    Condition:
      StringEquals:
        secretsmanager:ResourceTag/aws:secretsmanager:owningService: aws-datasync
        aws:ResourceAccount: ${aws:PrincipalAccount}
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 3
  score_max: 5
