name: aws-managed-AmazonEBSCSIDriverPolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/service-role/AmazonEBSCSIDriverPolicy\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - ec2:DescribeAvailabilityZones
    - ec2:DescribeInstances
    - ec2:DescribeSnapshots
    - ec2:DescribeTags
    - ec2:DescribeVolumes
    - ec2:DescribeVolumesModifications
    - ec2:DescribeVolumeStatus
    Resource: '*'
  - Effect: Allow
    Action:
    - ec2:CreateSnapshot
    - ec2:ModifyVolume
    Resource: arn:aws:ec2:*:*:volume/*
  - Effect: Allow
    Action:
    - ec2:CopyVolumes
    Resource:
    - arn:aws:ec2:*:*:volume/vol-*
  - Effect: Allow
    Action:
    - ec2:AttachVolume
    - ec2:DetachVolume
    Resource:
    - arn:aws:ec2:*:*:volume/*
    - arn:aws:ec2:*:*:instance/*
  - Effect: Allow
    Action:
    - ec2:CreateVolume
    - ec2:EnableFastSnapshotRestores
    Resource: arn:aws:ec2:*:*:snapshot/*
  - Effect: Allow
    Action:
    - ec2:CreateTags
    Resource:
    - arn:aws:ec2:*:*:volume/*
    - arn:aws:ec2:*:*:snapshot/*
    Condition:
      StringEquals:
        ec2:CreateAction:
        - CreateVolume
        - CreateSnapshot
        - CopyVolumes
  - Effect: Allow
    Action:
    - ec2:DeleteTags
    Resource:
    - arn:aws:ec2:*:*:volume/*
    - arn:aws:ec2:*:*:snapshot/*
  - Effect: Allow
    Action:
    - ec2:CreateVolume
    - ec2:CopyVolumes
    Resource: arn:aws:ec2:*:*:volume/*
    Condition:
      StringLike:
        aws:RequestTag/ebs.csi.aws.com/cluster: 'true'
  - Effect: Allow
    Action:
    - ec2:CreateVolume
    - ec2:CopyVolumes
    Resource: arn:aws:ec2:*:*:volume/*
    Condition:
      StringLike:
        aws:RequestTag/CSIVolumeName: '*'
  - Effect: Allow
    Action:
    - ec2:DeleteVolume
    Resource: arn:aws:ec2:*:*:volume/*
    Condition:
      StringLike:
        ec2:ResourceTag/ebs.csi.aws.com/cluster: 'true'
  - Effect: Allow
    Action:
    - ec2:DeleteVolume
    Resource: arn:aws:ec2:*:*:volume/*
    Condition:
      StringLike:
        ec2:ResourceTag/CSIVolumeName: '*'
  - Effect: Allow
    Action:
    - ec2:DeleteVolume
    Resource: arn:aws:ec2:*:*:volume/*
    Condition:
      StringLike:
        ec2:ResourceTag/kubernetes.io/created-for/pvc/name: '*'
  - Effect: Allow
    Action:
    - ec2:CreateSnapshot
    Resource: arn:aws:ec2:*:*:snapshot/*
    Condition:
      StringLike:
        aws:RequestTag/CSIVolumeSnapshotName: '*'
  - Effect: Allow
    Action:
    - ec2:CreateSnapshot
    Resource: arn:aws:ec2:*:*:snapshot/*
    Condition:
      StringLike:
        aws:RequestTag/ebs.csi.aws.com/cluster: 'true'
  - Effect: Allow
    Action:
    - ec2:DeleteSnapshot
    - ec2:LockSnapshot
    Resource: arn:aws:ec2:*:*:snapshot/*
    Condition:
      StringLike:
        ec2:ResourceTag/CSIVolumeSnapshotName: '*'
  - Effect: Allow
    Action:
    - ec2:DeleteSnapshot
    - ec2:LockSnapshot
    Resource: arn:aws:ec2:*:*:snapshot/*
    Condition:
      StringLike:
        ec2:ResourceTag/ebs.csi.aws.com/cluster: 'true'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
