description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AWSDeadlineCloud-WorkerHost\nAWS description: (none)\n\
  Generated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule\
  \ refactors. Current det_score=6; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: JoinFleetPermissions
    Effect: Allow
    Action:
    - deadline:CreateWorker
    - deadline:AssumeFleetRoleForWorker
    Resource: '*'
    Condition:
      StringEquals:
        aws:PrincipalAccount: ${aws:ResourceAccount}
  - Sid: TagWorkerPermission
    Effect: Allow
    Action:
    - deadline:TagResource
    Resource: arn:aws:deadline:*:*:farm/*/fleet/*/worker/*
    Condition:
      StringEquals:
        aws:PrincipalAccount: ${aws:ResourceAccount}
        deadline:CalledAction: CreateWorker
  - Sid: ListFleetTagsPermission
    Effect: Allow
    Action:
    - deadline:ListTagsForResource
    Resource: arn:aws:deadline:*:*:farm/*/fleet/*
    Condition:
      StringEquals:
        aws:PrincipalAccount: ${aws:ResourceAccount}
        deadline:CalledAction: CreateWorker
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
