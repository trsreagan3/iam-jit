name: aws-managed-AWSSecurityHubServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AWSSecurityHubServiceRolePolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: SecurityHubServiceRolePermissions
    Effect: Allow
    Action:
    - cloudtrail:DescribeTrails
    - cloudtrail:GetTrailStatus
    - cloudtrail:GetEventSelectors
    - cloudwatch:DescribeAlarms
    - cloudwatch:DescribeAlarmsForMetric
    - logs:DescribeMetricFilters
    - sns:ListSubscriptionsByTopic
    - config:DescribeConfigurationRecorders
    - config:DescribeConfigurationRecorderStatus
    - config:DescribeConfigRules
    - config:DescribeConfigRuleEvaluationStatus
    - config:BatchGetResourceConfig
    - config:SelectResourceConfig
    - iam:GenerateCredentialReport
    - organizations:ListAccounts
    - config:PutEvaluations
    - tag:GetResources
    - iam:GetCredentialReport
    - organizations:DescribeAccount
    - organizations:DescribeOrganization
    - organizations:ListChildren
    - organizations:ListAWSServiceAccessForOrganization
    - organizations:DescribeOrganizationalUnit
    - securityhub:BatchDisableStandards
    - securityhub:BatchEnableStandards
    - securityhub:BatchUpdateStandardsControlAssociations
    - securityhub:BatchGetSecurityControls
    - securityhub:BatchGetStandardsControlAssociations
    - securityhub:CreateMembers
    - securityhub:DeleteMembers
    - securityhub:DescribeHub
    - securityhub:DescribeOrganizationConfiguration
    - securityhub:DescribeStandards
    - securityhub:DescribeStandardsControls
    - securityhub:DisassociateFromAdministratorAccount
    - securityhub:DisassociateMembers
    - securityhub:DisableSecurityHub
    - securityhub:EnableSecurityHub
    - securityhub:GetEnabledStandards
    - securityhub:ListStandardsControlAssociations
    - securityhub:ListSecurityControlDefinitions
    - securityhub:UpdateOrganizationConfiguration
    - securityhub:UpdateSecurityControl
    - securityhub:UpdateSecurityHubConfiguration
    - securityhub:UpdateStandardsControl
    Resource: '*'
  - Sid: SecurityHubServiceRoleConfigPermissions
    Effect: Allow
    Action:
    - config:PutConfigRule
    - config:DeleteConfigRule
    - config:GetComplianceDetailsByConfigRule
    Resource: arn:aws:config:*:*:config-rule/aws-service-rule/*securityhub*
  - Sid: SecurityHubServiceRoleOrganizationsPermissions
    Effect: Allow
    Action:
    - organizations:ListDelegatedAdministrators
    Resource: '*'
    Condition:
      StringEquals:
        organizations:ServicePrincipal:
        - securityhub.amazonaws.com
  - Sid: SecurityHubCSPMServiceRoleConfig
    Effect: Allow
    Action:
    - config:PutServiceLinkedConfigurationRecorder
    - config:DeleteServiceLinkedConfigurationRecorder
    - config:DescribeConfigurationRecorders
    - config:DescribeConfigurationRecorderStatus
    Resource:
    - arn:aws:config:*:*:configuration-recorder/*ConfigurationRecorderForSecurityHubCSPM*
  - Sid: SecurityHubCSPMServiceRoleIamPermissions
    Effect: Allow
    Action:
    - iam:CreateServiceLinkedRole
    Resource: arn:aws:iam::*:role/aws-service-role/config.amazonaws.com/AWSServiceRoleForConfig
    Condition:
      StringEquals:
        iam:AWSServiceName: config.amazonaws.com
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
