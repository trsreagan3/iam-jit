name: aws-managed-AWSQuickSetupEnableAREXExecutionPolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AWSQuickSetupEnableAREXExecutionPolicy\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=6; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: AllowReadActions
    Effect: Allow
    Action:
    - resource-explorer-2:GetDefaultView
    - resource-explorer-2:GetIndex
    - resource-explorer-2:ListIndexes
    - resource-explorer-2:ListViews
    Resource: '*'
  - Sid: AllowUpdateExistingIndexAndAssociateDefaultView
    Effect: Allow
    Action:
    - resource-explorer-2:UpdateIndexType
    - resource-explorer-2:AssociateDefaultView
    Resource: '*'
  - Sid: AllowCreateViewAndIndex
    Effect: Allow
    Action:
    - resource-explorer-2:CreateView
    - resource-explorer-2:CreateIndex
    - resource-explorer-2:TagResource
    Resource:
    - arn:aws:resource-explorer-2:*:*:view/all-resources/*
    - arn:aws:resource-explorer-2:*:*:index/*
    Condition:
      StringEquals:
        aws:RequestTag/Type: QuickSetup
        aws:ResourceTag/Type: QuickSetup
      ForAllValues:StringEquals:
        aws:TagKeys: Type
  - Sid: AllowCreateServiceLinkedRole
    Effect: Allow
    Action:
    - iam:CreateServiceLinkedRole
    Condition:
      StringEquals:
        iam:AWSServiceName:
        - resource-explorer-2.amazonaws.com
    Resource: arn:aws:iam::*:role/aws-service-role/resource-explorer-2.amazonaws.com/AWSServiceRoleForResourceExplorer
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 5
  score_max: 7
