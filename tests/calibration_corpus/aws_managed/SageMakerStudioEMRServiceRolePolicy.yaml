name: aws-managed-SageMakerStudioEMRServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/service-role/SageMakerStudioEMRServiceRolePolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=6; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: PassRoleToEMREC2InstanceRole
    Effect: Allow
    Action: iam:PassRole
    Resource: arn:aws:iam::*:role/datazone_emr_ec2_instance_role_${aws:PrincipalTag/AmazonDataZoneProject}_${aws:PrincipalTag/AmazonDataZoneEnvironment}
    Condition:
      StringLike:
        iam:PassedToService: ec2.amazonaws.com
      StringNotEquals:
        aws:PrincipalTag/AmazonDataZoneProject: ''
        aws:PrincipalTag/AmazonDataZoneEnvironment: ''
      'Null':
        aws:PrincipalTag/AmazonDataZoneProject: 'false'
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: CreateInNetworkForSharedSubnet
    Effect: Allow
    Action:
    - ec2:CreateNetworkInterface
    - ec2:RunInstances
    - ec2:CreateFleet
    Resource:
    - '*'
    Condition:
      ArnLike:
        ec2:Vpc: arn:aws:ec2:*:*:vpc/${aws:PrincipalTag/VpcId}
  - Sid: EMRKMSPermissions
    Effect: Allow
    Action:
    - kms:CreateGrant
    - kms:Decrypt
    - kms:Encrypt
    - kms:GenerateDataKeyWithoutPlaintext
    Resource: arn:aws:kms:*:*:key/${aws:PrincipalTag/KmsKeyId}
    Condition:
      StringLike:
        kms:ViaService:
        - ec2.*.amazonaws.com
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
      'Null':
        kms:EncryptionContextKeys: 'false'
  - Sid: AllowGenerateDataKeyForEbsEncryption
    Effect: Allow
    Action: kms:GenerateDataKey
    Resource: arn:aws:kms:*:*:key/${aws:PrincipalTag/KmsKeyId}
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: AllowDescribeKeyForLogPusherCMK
    Effect: Allow
    Action:
    - kms:DescribeKey
    Resource: arn:aws:kms:*:*:key/${aws:PrincipalTag/KmsKeyId}
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 5
  score_max: 7
