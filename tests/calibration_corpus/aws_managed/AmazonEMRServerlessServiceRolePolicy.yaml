name: aws-managed-AmazonEMRServerlessServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AmazonEMRServerlessServiceRolePolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: EC2PolicyStatement
    Effect: Allow
    Action:
    - ec2:CreateNetworkInterface
    - ec2:DeleteNetworkInterface
    - ec2:DescribeNetworkInterfaces
    - ec2:DescribeSecurityGroups
    - ec2:DescribeSubnets
    - ec2:DescribeVpcs
    - ec2:DescribeDhcpOptions
    - ec2:DescribeRouteTables
    Resource: '*'
  - Sid: CloudWatchPolicyStatement
    Effect: Allow
    Action:
    - cloudwatch:PutMetricData
    Resource:
    - '*'
    Condition:
      StringEquals:
        cloudwatch:namespace:
        - AWS/EMRServerless
        - AWS/Usage
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
