name: aws-managed-AmazonQFullAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AmazonQFullAccess\nAWS description: (none)\nGenerated\
  \ by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule refactors.\
  \ Current det_score=9; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: AllowAmazonQFullAccess
    Effect: Allow
    Action:
    - q:StartConversation
    - q:SendMessage
    - q:GetConversation
    - q:ListConversations
    - q:UpdateConversation
    - q:DeleteConversation
    - q:PassRequest
    - q:StartTroubleshootingAnalysis
    - q:GetTroubleshootingResults
    - q:StartTroubleshootingResolutionExplanation
    - q:UpdateTroubleshootingCommandResult
    - q:GetIdentityMetadata
    - q:CreateAssignment
    - q:DeleteAssignment
    - q:GenerateCodeFromCommands
    - q:CreatePlugin
    - q:UpdatePlugin
    - q:DeletePlugin
    - q:GetPlugin
    - q:UsePlugin
    - q:ListPlugins
    - q:ListPluginProviders
    - q:ListTagsForResource
    - q:UntagResource
    - q:TagResource
    Resource: '*'
  - Sid: AllowCloudControlReadAccess
    Effect: Allow
    Action:
    - cloudformation:GetResource
    - cloudformation:ListResources
    Resource: '*'
  - Sid: AllowSetTrustedIdentity
    Effect: Allow
    Action:
    - sts:SetContext
    Resource: arn:aws:sts::*:self
  - Sid: AllowPassRoleToAmazonQ
    Effect: Allow
    Action:
    - iam:PassRole
    Resource: arn:aws:iam::*:role/*
    Condition:
      StringEquals:
        iam:PassedToService:
        - q.amazonaws.com
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  score_max: 10
