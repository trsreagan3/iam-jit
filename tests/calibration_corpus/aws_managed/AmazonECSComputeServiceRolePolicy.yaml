name: aws-managed-AmazonECSComputeServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AmazonECSComputeServiceRolePolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: ReadOnlyPermissionsForInstanceManagement
    Effect: Allow
    Action:
    - ec2:DescribeInstances
    - ec2:DescribeInstanceStatus
    - ec2:DescribeNetworkInterfaces
    - ec2:DescribeFleets
    Resource: '*'
  - Sid: ReadOnlyPermissionsForInstanceEventWindows
    Effect: Allow
    Action:
    - ec2:DescribeInstanceEventWindows
    Resource: '*'
  - Sid: ReadOnlyPermissionsForLaunchTemplates
    Effect: Allow
    Action:
    - ec2:DescribeLaunchTemplates
    - ec2:DescribeLaunchTemplateVersions
    Resource: '*'
  - Sid: DeleteManagedLaunchTemplate
    Effect: Allow
    Action:
    - ec2:DeleteLaunchTemplate
    - ec2:DeleteLaunchTemplateVersions
    Resource: arn:aws:ec2:*:*:launch-template/*
    Condition:
      StringEquals:
        ec2:ManagedResourceOperator: ecs.amazonaws.com
  - Sid: TerminateManagedInstances
    Effect: Allow
    Action:
    - ec2:TerminateInstances
    Resource: arn:aws:ec2:*:*:instance/*
    Condition:
      StringEquals:
        ec2:ManagedResourceOperator: ecs.amazonaws.com
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
