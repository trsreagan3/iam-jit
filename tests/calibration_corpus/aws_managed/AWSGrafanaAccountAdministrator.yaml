  \ refactors. Current det_score=9; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: AWSGrafanaOrganizationAdmin
    Effect: Allow
    Action:
    - iam:ListRoles
    Resource: '*'
  - Sid: GrafanaIAMGetRolePermission
    Effect: Allow
    Action: iam:GetRole
    Resource: arn:aws:iam::*:role/*
  - Sid: AWSGrafanaPermissions
    Effect: Allow
    Action:
    - grafana:*
    Resource: '*'
