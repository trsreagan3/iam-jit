name: aws-managed-AmazonSecurityLakePermissionsBoundary
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AmazonSecurityLakePermissionsBoundary\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: AllowActionsForSecurityLake
    Effect: Allow
    Action:
    - s3:GetObject
    - s3:GetObjectVersion
    - s3:ListBucket
    - s3:ListBucketVersions
    - s3:PutObject
    - s3:GetBucketLocation
    - kms:Decrypt
    - kms:GenerateDataKey
    - sqs:ReceiveMessage
    - sqs:ChangeMessageVisibility
    - sqs:DeleteMessage
    - sqs:GetQueueUrl
    - sqs:SendMessage
    - sqs:GetQueueAttributes
    - sqs:ListQueues
    Resource: '*'
  - Sid: DenyActionsForSecurityLake
    Effect: Deny
    NotAction:
    - s3:GetObject
    - s3:GetObjectVersion
    - s3:ListBucket
    - s3:ListBucketVersions
    - s3:PutObject
    - s3:GetBucketLocation
    - kms:Decrypt
    - kms:GenerateDataKey
    - sqs:ReceiveMessage
    - sqs:ChangeMessageVisibility
    - sqs:DeleteMessage
    - sqs:GetQueueUrl
    - sqs:SendMessage
    - sqs:GetQueueAttributes
    - sqs:ListQueues
    Resource: '*'
  - Sid: DenyActionsNotOnSecurityLakeBucket
    Effect: Deny
    Action:
    - s3:GetObject
    - s3:GetObjectVersion
    - s3:ListBucket
    - s3:ListBucketVersions
    - s3:PutObject
    - s3:GetBucketLocation
    NotResource:
    - arn:aws:s3:::aws-security-data-lake*
  - Sid: DenyActionsNotOnSecurityLakeSQS
    Effect: Deny
    Action:
    - sqs:ReceiveMessage
    - sqs:ChangeMessageVisibility
    - sqs:DeleteMessage
    - sqs:GetQueueUrl
    - sqs:SendMessage
    - sqs:GetQueueAttributes
    - sqs:ListQueues
    NotResource: arn:aws:sqs:*:*:AmazonSecurityLake*
  - Sid: DenyActionsNotOnSecurityLakeKMSS3SQS
    Effect: Deny
    Action:
    - kms:Decrypt
    - kms:GenerateDataKey
    Resource: '*'
    Condition:
      StringNotLike:
        kms:ViaService:
        - s3.*.amazonaws.com
        - sqs.*.amazonaws.com
  - Sid: DenyActionsNotOnSecurityLakeKMSForS3
    Effect: Deny
    Action:
    - kms:Decrypt
    - kms:GenerateDataKey
    Resource: '*'
    Condition:
      'Null':
        kms:EncryptionContext:aws:s3:arn: 'false'
      StringNotLikeIfExists:
        kms:EncryptionContext:aws:s3:arn:
        - arn:aws:s3:::aws-security-data-lake*
  - Sid: DenyActionsNotOnSecurityLakeKMSForS3SQS
    Effect: Deny
    Action:
    - kms:Decrypt
    - kms:GenerateDataKey
    Resource: '*'
    Condition:
      'Null':
        kms:EncryptionContext:aws:sqs:arn: 'false'
      StringNotLikeIfExists:
        kms:EncryptionContext:aws:sqs:arn:
        - arn:aws:sqs:*:*:AmazonSecurityLake*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
