name: aws-managed-AWSRoboMakerServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AWSRoboMakerServiceRolePolicy\nAWS description: (none)\n\
  Generated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule\
  \ refactors. Current det_score=9; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Action:
    - ec2:CreateNetworkInterfacePermission
    - ec2:DescribeNetworkInterfaces
    - ec2:DeleteNetworkInterface
    - ec2:DescribeSubnets
    - ec2:DescribeVpcs
    - ec2:DescribeSecurityGroups
    - greengrass:CreateDeployment
    - greengrass:CreateGroupVersion
    - greengrass:CreateFunctionDefinition
    - greengrass:CreateFunctionDefinitionVersion
    - greengrass:GetDeploymentStatus
    - greengrass:GetGroup
    - greengrass:GetGroupVersion
    - greengrass:GetCoreDefinitionVersion
    - greengrass:GetFunctionDefinitionVersion
    - greengrass:GetAssociatedRole
    - lambda:CreateFunction
    Effect: Allow
    Resource: '*'
  - Action:
    - lambda:UpdateFunctionCode
    - lambda:GetFunction
    - lambda:UpdateFunctionConfiguration
    Effect: Allow
    Resource: arn:aws:lambda:*:*:function:aws-robomaker-*
  - Effect: Allow
    Action: iam:PassRole
    Resource: '*'
    Condition:
      StringEqualsIfExists:
        iam:PassedToService: lambda.amazonaws.com
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  score_max: 10
