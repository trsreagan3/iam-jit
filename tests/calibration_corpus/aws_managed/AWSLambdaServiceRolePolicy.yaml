name: aws-managed-AWSLambdaServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AWSLambdaServiceRolePolicy\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - ec2:TerminateInstances
    Resource:
    - arn:aws:ec2:*:*:instance/*
    Condition:
      StringEquals:
        ec2:ManagedResourceOperator: scaler.lambda.amazonaws.com
  - Effect: Allow
    Action:
    - ec2:DescribeInstanceStatus
    - ec2:DescribeInstances
    Resource:
    - '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
