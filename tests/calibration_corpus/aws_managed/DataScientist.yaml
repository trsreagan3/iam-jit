name: aws-managed-DataScientist
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/job-function/DataScientist\nAWS description: (none)\n\
  Generated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule\
  \ refactors. Current det_score=9; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Action:
    - autoscaling:*
    - cloudwatch:*
    - cloudformation:CreateStack
    - cloudformation:DescribeStackEvents
    - datapipeline:Describe*
    - datapipeline:ListPipelines
    - datapipeline:GetPipelineDefinition
    - datapipeline:QueryObjects
    - dynamodb:*
    - ec2:CancelSpotInstanceRequests
    - ec2:CancelSpotFleetRequests
    - ec2:CreateTags
    - ec2:DeleteTags
    - ec2:Describe*
    - ec2:ModifyImageAttribute
    - ec2:ModifyInstanceAttribute
    - ec2:ModifySpotFleetRequest
    - ec2:RequestSpotInstances
    - ec2:RequestSpotFleet
    - elasticfilesystem:*
    - elasticmapreduce:*
    - es:*
    - firehose:*
    - fsx:DescribeFileSystems
    - iam:GetInstanceProfile
    - iam:GetRole
    - iam:GetPolicy
    - iam:GetPolicyVersion
    - iam:ListRoles
    - kinesis:*
    - kms:List*
    - lambda:Create*
    - lambda:Delete*
    - lambda:Get*
    - lambda:InvokeFunction
    - lambda:PublishVersion
    - lambda:Update*
    - lambda:List*
    - machinelearning:*
    - sdb:*
    - rds:*
    - sns:ListSubscriptions
    - sns:ListTopics
    - logs:DescribeLogStreams
    - logs:GetLogEvents
    - redshift:*
    - s3:CreateBucket
    - sns:CreateTopic
    - sns:Get*
    - sns:List*
    Effect: Allow
    Resource: '*'
  - Effect: Allow
    Action:
    - s3:Abort*
    - s3:DeleteObject
    - s3:Get*
    - s3:List*
    - s3:PutAccelerateConfiguration
    - s3:PutBucketCors
    - s3:PutBucketLogging
    - s3:PutBucketNotification
    - s3:PutBucketTagging
    - s3:PutObject
    - s3:Replicate*
    - s3:RestoreObject
    Resource:
    - '*'
  - Effect: Allow
    Action:
    - ec2:RunInstances
    - ec2:TerminateInstances
    Resource:
    - '*'
  - Effect: Allow
    Action:
    - iam:PassRole
    Resource:
    - arn:aws:iam::*:role/DataPipelineDefaultRole
    - arn:aws:iam::*:role/DataPipelineDefaultResourceRole
    - arn:aws:iam::*:role/EMR_EC2_DefaultRole
    - arn:aws:iam::*:role/EMR_DefaultRole
    - arn:aws:iam::*:role/kinesis-*
  - Effect: Allow
    Action:
    - iam:PassRole
    Resource: '*'
    Condition:
      StringEquals:
        iam:PassedToService: sagemaker.amazonaws.com
  - Effect: Allow
    Action:
    - sagemaker:*
    NotResource:
    - arn:aws:sagemaker:*:*:domain/*
    - arn:aws:sagemaker:*:*:user-profile/*
    - arn:aws:sagemaker:*:*:app/*
    - arn:aws:sagemaker:*:*:flow-definition/*
  - Effect: Allow
    Action:
    - sagemaker:CreatePresignedDomainUrl
    - sagemaker:DescribeDomain
    - sagemaker:ListDomains
    - sagemaker:DescribeUserProfile
    - sagemaker:ListUserProfiles
    - sagemaker:*App
    - sagemaker:ListApps
    Resource: '*'
  - Effect: Allow
    Action:
    - sagemaker:*FlowDefinition
    - sagemaker:*FlowDefinitions
    Resource: '*'
    Condition:
      StringEqualsIfExists:
        sagemaker:WorkteamType:
        - private-crowd
        - vendor-crowd
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  score_max: 10
