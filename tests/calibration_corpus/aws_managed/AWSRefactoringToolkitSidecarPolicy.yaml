name: aws-managed-AWSRefactoringToolkitSidecarPolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AWSRefactoringToolkitSidecarPolicy\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=7; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: SsmMessagesAccess
    Effect: Allow
    Action:
    - ssmmessages:OpenControlChannel
    - ssmmessages:CreateControlChannel
    - ssmmessages:OpenDataChannel
    - ssmmessages:CreateDataChannel
    Resource: '*'
  - Sid: S3GetObjectAccess
    Effect: Allow
    Action:
    - s3:GetObject
    Resource: arn:aws:s3:::*/refactoringtoolkit*
  - Sid: S3ListBucketAccess
    Effect: Allow
    Action:
    - s3:ListBucket
    Resource: arn:aws:s3:::*
    Condition:
      StringLike:
        s3:prefix: refactoringtoolkit*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
