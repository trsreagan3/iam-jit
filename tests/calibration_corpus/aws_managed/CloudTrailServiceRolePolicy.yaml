name: aws-managed-CloudTrailServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/CloudTrailServiceRolePolicy\nAWS\
  \ description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score\
  \ against future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: CloudTrailFullAccess
    Effect: Allow
    Action:
    - cloudtrail:*
    Resource: '*'
  - Sid: AwsOrgsAccess
    Effect: Allow
    Action:
    - organizations:DescribeAccount
    - organizations:DescribeOrganization
    - organizations:ListAccounts
    - organizations:ListAWSServiceAccessForOrganization
    Resource:
    - '*'
  - Sid: AwsOrgsDelegatedAdminAccess
    Effect: Allow
    Action: organizations:ListDelegatedAdministrators
    Resource: '*'
    Condition:
      StringEquals:
        organizations:ServicePrincipal:
        - cloudtrail.amazonaws.com
  - Sid: DeleteTableAccess
    Effect: Allow
    Action: glue:DeleteTable
    Resource:
    - arn:*:glue:*:*:catalog
    - arn:*:glue:*:*:database/aws:cloudtrail
    - arn:*:glue:*:*:table/aws:cloudtrail/*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: DeregisterResourceAccess
    Effect: Allow
    Action: lakeformation:DeregisterResource
    Resource: '*'
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
