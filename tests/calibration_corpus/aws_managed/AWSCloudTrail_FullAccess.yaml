name: aws-managed-AWSCloudTrail_FullAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AWSCloudTrail_FullAccess\nAWS description: (none)\n\
  Generated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule\
  \ refactors. Current det_score=9; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - sns:AddPermission
    - sns:CreateTopic
    - sns:SetTopicAttributes
    - sns:GetTopicAttributes
    Resource:
    - arn:aws:sns:*:*:aws-cloudtrail-logs*
  - Effect: Allow
    Action:
    - sns:ListTopics
    Resource: '*'
  - Effect: Allow
    Action:
    - s3:CreateBucket
    - s3:PutBucketPolicy
    - s3:PutBucketPublicAccessBlock
    Resource:
    - arn:aws:s3:::aws-cloudtrail-logs*
  - Effect: Allow
    Action:
    - s3:ListAllMyBuckets
    - s3:GetBucketLocation
    - s3:GetBucketPolicy
    Resource: '*'
  - Effect: Allow
    Action: cloudtrail:*
    Resource: '*'
  - Effect: Allow
    Action:
    - logs:CreateLogGroup
    Resource:
    - arn:aws:logs:*:*:log-group:aws-cloudtrail-logs*
  - Effect: Allow
    Action:
    - iam:ListRoles
    - iam:GetRolePolicy
    - iam:GetUser
    Resource: '*'
  - Effect: Allow
    Action:
    - iam:PassRole
    Resource: '*'
    Condition:
      StringEquals:
        iam:PassedToService: cloudtrail.amazonaws.com
  - Effect: Allow
    Action:
    - kms:CreateKey
    - kms:CreateAlias
    - kms:ListKeys
    - kms:ListAliases
    Resource: '*'
  - Effect: Allow
    Action:
    - lambda:ListFunctions
    Resource: '*'
  - Effect: Allow
    Action:
    - dynamodb:ListGlobalTables
    - dynamodb:ListTables
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  score_max: 10
