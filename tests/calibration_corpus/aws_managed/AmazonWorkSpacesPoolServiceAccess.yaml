name: aws-managed-AmazonWorkSpacesPoolServiceAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AmazonWorkSpacesPoolServiceAccess\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: ProvisioningWorkSpacesPoolPermissions
    Effect: Allow
    Action:
    - ec2:DescribeVpcs
    - ec2:DescribeSubnets
    - ec2:DescribeAvailabilityZones
    - ec2:DescribeSecurityGroups
    - ec2:DescribeRouteTables
    - s3:ListAllMyBuckets
    Resource: '*'
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: WorkSpacesPoolS3Permissions
    Effect: Allow
    Action:
    - s3:CreateBucket
    - s3:ListBucket
    - s3:GetObject
    - s3:PutObject
    - s3:DeleteObject
    - s3:GetObjectVersion
    - s3:DeleteObjectVersion
    - s3:GetBucketPolicy
    - s3:PutBucketPolicy
    - s3:PutEncryptionConfiguration
    Resource:
    - arn:aws:s3:::wspool-logs-*
    - arn:aws:s3:::wspool-app-settings-*
    - arn:aws:s3:::wspool-home-folder-*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
