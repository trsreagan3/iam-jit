name: aws-managed-NeptuneReadOnlyAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/NeptuneReadOnlyAccess\nAWS description: (none)\nGenerated\
  \ by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule refactors.\
  \ Current det_score=7; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: AllowReadOnlyPermissionsForRDS
    Effect: Allow
    Action:
    - rds:DescribeAccountAttributes
    - rds:DescribeCertificates
    - rds:DescribeDBClusterParameterGroups
    - rds:DescribeDBClusterParameters
    - rds:DescribeDBClusterSnapshotAttributes
    - rds:DescribeDBClusterSnapshots
    - rds:DescribeDBClusters
    - rds:DescribeDBEngineVersions
    - rds:DescribeDBInstances
    - rds:DescribeDBLogFiles
    - rds:DescribeDBParameterGroups
    - rds:DescribeDBParameters
    - rds:DescribeDBSubnetGroups
    - rds:DescribeEventCategories
    - rds:DescribeEventSubscriptions
    - rds:DescribeEvents
    - rds:DescribeGlobalClusters
    - rds:DescribeOrderableDBInstanceOptions
    - rds:DescribePendingMaintenanceActions
    - rds:DownloadDBLogFilePortion
    - rds:ListTagsForResource
    Resource: '*'
  - Sid: AllowReadOnlyPermissionsForCloudwatch
    Effect: Allow
    Action:
    - cloudwatch:GetMetricStatistics
    - cloudwatch:ListMetrics
    Resource: '*'
  - Sid: AllowReadOnlyPermissionsForEC2
    Effect: Allow
    Action:
    - ec2:DescribeAccountAttributes
    - ec2:DescribeAvailabilityZones
    - ec2:DescribeInternetGateways
    - ec2:DescribeSecurityGroups
    - ec2:DescribeSubnets
    - ec2:DescribeVpcAttribute
    - ec2:DescribeVpcs
    Resource: '*'
  - Sid: AllowReadOnlyPermissionsForKMS
    Effect: Allow
    Action:
    - kms:ListKeys
    - kms:ListRetirableGrants
    - kms:ListAliases
    - kms:ListKeyPolicies
    Resource: '*'
  - Sid: AllowReadOnlyPermissionsForLogs
    Effect: Allow
    Action:
    - logs:DescribeLogStreams
    - logs:GetLogEvents
    Resource:
    - arn:aws:logs:*:*:log-group:/aws/rds/*:log-stream:*
    - arn:aws:logs:*:*:log-group:/aws/neptune/*:log-stream:*
  - Sid: AllowReadOnlyPermissionsForNeptuneDB
    Effect: Allow
    Action:
    - neptune-db:Read*
    - neptune-db:Get*
    - neptune-db:List*
    Resource:
    - '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 6
  score_max: 8
