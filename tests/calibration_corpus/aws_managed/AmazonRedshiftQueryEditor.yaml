name: aws-managed-AmazonRedshiftQueryEditor
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AmazonRedshiftQueryEditor\nAWS description: (none)\n\
  Generated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule\
  \ refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - redshift:GetClusterCredentials
    - redshift:ListSchemas
    - redshift:ListTables
    - redshift:ListDatabases
    - redshift:ExecuteQuery
    - redshift:FetchResults
    - redshift:CancelQuery
    - redshift:DescribeClusters
    - redshift:DescribeQuery
    - redshift:DescribeTable
    - redshift:ViewQueriesFromConsole
    - redshift:DescribeSavedQueries
    - redshift:CreateSavedQuery
    - redshift:DeleteSavedQueries
    - redshift:ModifySavedQuery
    Resource: '*'
  - Sid: DataAPIPermissions
    Action:
    - redshift-data:ExecuteStatement
    - redshift-data:ListDatabases
    - redshift-data:ListSchemas
    - redshift-data:ListTables
    - redshift-data:DescribeTable
    Effect: Allow
    Resource: '*'
  - Sid: DataAPIIAMSessionPermissionsRestriction
    Action:
    - redshift-data:GetStatementResult
    - redshift-data:CancelStatement
    - redshift-data:DescribeStatement
    - redshift-data:ListStatements
    Effect: Allow
    Resource: '*'
    Condition:
      StringEquals:
        redshift-data:statement-owner-iam-userid: ${aws:userid}
  - Sid: SecretsManagerListPermissions
    Action:
    - secretsmanager:ListSecrets
    Effect: Allow
    Resource: '*'
  - Sid: SecretsManagerCreateGetPermissions
    Action:
    - secretsmanager:CreateSecret
    - secretsmanager:GetSecretValue
    - secretsmanager:TagResource
    Effect: Allow
    Resource: arn:aws:secretsmanager:*:*:secret:*
    Condition:
      StringEquals:
        secretsmanager:ResourceTag/RedshiftQueryOwner: ${aws:userid}
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
