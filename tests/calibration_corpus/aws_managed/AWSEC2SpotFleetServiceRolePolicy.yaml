name: aws-managed-AWSEC2SpotFleetServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AWSEC2SpotFleetServiceRolePolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=9; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - ec2:DescribeImages
    - ec2:DescribeSubnets
    - ec2:RequestSpotInstances
    - ec2:DescribeInstanceStatus
    - ec2:RunInstances
    Resource:
    - '*'
  - Effect: Allow
    Action:
    - iam:PassRole
    Resource:
    - '*'
    Condition:
      StringEquals:
        iam:PassedToService:
        - ec2.amazonaws.com
        - ec2.amazonaws.com.cn
  - Effect: Allow
    Action:
    - ec2:CreateTags
    Resource:
    - arn:aws:ec2:*:*:instance/*
    - arn:aws:ec2:*:*:spot-instances-request/*
    - arn:aws:ec2:*:*:spot-fleet-request/*
    - arn:aws:ec2:*:*:volume/*
  - Effect: Allow
    Action:
    - ec2:TerminateInstances
    Resource: '*'
    Condition:
      StringLike:
        ec2:ResourceTag/aws:ec2spot:fleet-request-id: '*'
  - Effect: Allow
    Action:
    - elasticloadbalancing:RegisterInstancesWithLoadBalancer
    Resource:
    - arn:aws:elasticloadbalancing:*:*:loadbalancer/*
  - Effect: Allow
    Action:
    - elasticloadbalancing:RegisterTargets
    Resource:
    - arn:aws:elasticloadbalancing:*:*:*/*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  score_max: 10
