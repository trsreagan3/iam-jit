name: aws-managed-AWSCloudFrontVPCOriginServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AWSCloudFrontVPCOriginServiceRolePolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: EC2Action1
    Effect: Allow
    Action:
    - ec2:CreateNetworkInterface
    Condition:
      StringEquals:
        aws:RequestTag/aws.cloudfront.vpcorigin: enabled
    Resource: arn:aws:ec2:*:*:network-interface/*
  - Sid: EC2Action2
    Effect: Allow
    Action:
    - ec2:CreateNetworkInterface
    Resource:
    - arn:aws:ec2:*:*:subnet/*
    - arn:aws:ec2:*:*:security-group/*
  - Sid: EC2Action3
    Effect: Allow
    Action:
    - ec2:CreateSecurityGroup
    Condition:
      StringEquals:
        aws:RequestTag/aws.cloudfront.vpcorigin: enabled
    Resource:
    - arn:aws:ec2:*:*:security-group/*
  - Sid: EC2Action4
    Effect: Allow
    Action:
    - ec2:CreateSecurityGroup
    Resource:
    - arn:aws:ec2:*:*:vpc/*
  - Sid: EC2Action5
    Effect: Allow
    Action:
    - ec2:ModifyNetworkInterfaceAttribute
    - ec2:DeleteNetworkInterface
    - ec2:DeleteSecurityGroup
    - ec2:AssignIpv6Addresses
    - ec2:UnassignIpv6Addresses
    Condition:
      StringEquals:
        aws:ResourceTag/aws.cloudfront.vpcorigin: enabled
    Resource: '*'
  - Sid: EC2Action6
    Effect: Allow
    Action:
    - ec2:DescribeNetworkInterfaces
    - ec2:DescribeSecurityGroups
    - ec2:DescribeInstances
    - ec2:DescribeInternetGateways
    - ec2:DescribeSubnets
    - ec2:DescribeRegions
    - ec2:DescribeAddresses
    Resource: '*'
  - Sid: EC2Action7
    Effect: Allow
    Action: ec2:CreateTags
    Condition:
      StringEquals:
        aws:RequestTag/aws.cloudfront.vpcorigin: enabled
        ec2:CreateAction:
        - CreateNetworkInterface
        - CreateSecurityGroup
    Resource:
    - arn:aws:ec2:*:*:security-group/*
    - arn:aws:ec2:*:*:network-interface/*
  - Sid: ElbAction1
    Effect: Allow
    Action:
    - elasticloadbalancing:DescribeLoadBalancers
    - elasticloadbalancing:DescribeListeners
    - elasticloadbalancing:DescribeTargetGroups
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
