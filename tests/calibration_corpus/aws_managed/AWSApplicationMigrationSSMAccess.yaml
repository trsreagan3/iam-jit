name: aws-managed-AWSApplicationMigrationSSMAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AWSApplicationMigrationSSMAccess\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=6; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - ssm:GetCommandInvocation
    - ssm:DescribeInstanceInformation
    Resource:
    - '*'
    Condition:
      ForAnyValue:StringEquals:
        aws:CalledVia:
        - mgn.amazonaws.com
  - Effect: Allow
    Action:
    - ssm:SendCommand
    - ssm:DescribeDocument
    - ssm:StartAutomationExecution
    Resource:
    - arn:aws:ssm:*:*:document/*
    - arn:aws:ssm:*:*:automation-execution/*
    - arn:aws:ssm:*:*:automation-definition/*:*
    Condition:
      ForAnyValue:StringEquals:
        aws:CalledVia:
        - mgn.amazonaws.com
  - Effect: Allow
    Action:
    - ssm:SendCommand
    Resource:
    - arn:aws:ec2:*:*:instance/*
    Condition:
      ForAnyValue:StringEquals:
        aws:CalledVia:
        - mgn.amazonaws.com
      'Null':
        aws:ResourceTag/AWSApplicationMigrationServiceManaged: 'false'
  - Effect: Allow
    Action:
    - ssm:ListDocuments
    Resource: '*'
  - Effect: Allow
    Action:
    - ssm:ListDocumentVersions
    - ssm:GetDocument
    Resource: arn:aws:ssm:*:*:document/*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 5
  score_max: 7
