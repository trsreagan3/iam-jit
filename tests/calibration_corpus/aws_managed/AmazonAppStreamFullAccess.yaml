name: aws-managed-AmazonAppStreamFullAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AmazonAppStreamFullAccess\nAWS description: (none)\n\
  Generated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule\
  \ refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Action:
    - appstream:*
    Effect: Allow
    Resource: '*'
  - Action:
    - application-autoscaling:DeleteScalingPolicy
    - application-autoscaling:DescribeScalableTargets
    - application-autoscaling:DescribeScalingPolicies
    - application-autoscaling:PutScalingPolicy
    - application-autoscaling:RegisterScalableTarget
    - application-autoscaling:DescribeScheduledActions
    - application-autoscaling:PutScheduledAction
    - application-autoscaling:DeleteScheduledAction
    Effect: Allow
    Resource: '*'
  - Action:
    - cloudwatch:DeleteAlarms
    - cloudwatch:DescribeAlarms
    - cloudwatch:GetMetricStatistics
    - cloudwatch:PutMetricAlarm
    Effect: Allow
    Resource: '*'
  - Action:
    - ec2:DescribeRouteTables
    - ec2:DescribeSecurityGroups
    - ec2:DescribeSubnets
    - ec2:DescribeVpcs
    - ec2:DescribeVpcEndpoints
    Effect: Allow
    Resource: '*'
  - Action: iam:ListRoles
    Effect: Allow
    Resource: '*'
  - Action: iam:PassRole
    Effect: Allow
    Resource: arn:aws:iam::*:role/service-role/ApplicationAutoScalingForAmazonAppStreamAccess
    Condition:
      StringLike:
        iam:PassedToService: application-autoscaling.amazonaws.com
  - Action: iam:CreateServiceLinkedRole
    Effect: Allow
    Resource: arn:aws:iam::*:role/aws-service-role/appstream.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_AppStreamFleet
    Condition:
      StringLike:
        iam:AWSServiceName: appstream.application-autoscaling.amazonaws.com
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
