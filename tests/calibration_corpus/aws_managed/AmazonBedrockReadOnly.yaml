name: aws-managed-AmazonBedrockReadOnly
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AmazonBedrockReadOnly\nAWS description: (none)\nGenerated\
  \ by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule refactors.\
  \ Current det_score=4; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: AmazonBedrockReadOnly
    Effect: Allow
    Action:
    - bedrock:Get*
    - bedrock:List*
    Resource: '*'
  - Sid: MarketplaceModelEndpointNonMutatingAPIs
    Effect: Allow
    Action:
    - sagemaker:DescribeEndpoint
    - sagemaker:DescribeEndpointConfig
    - sagemaker:DescribeModel
    - sagemaker:DescribeInferenceComponent
    - sagemaker:ListEndpoints
    - sagemaker:ListTags
    Resource:
    - arn:aws:sagemaker:*:*:endpoint/*
    - arn:aws:sagemaker:*:*:endpoint-config/*
    - arn:aws:sagemaker:*:*:model/*
    Condition:
      StringEquals:
        aws:CalledViaLast: bedrock.amazonaws.com
  - Sid: DiscoveringMarketplaceModel
    Effect: Allow
    Action:
    - sagemaker:DescribeHubContent
    Resource:
    - arn:aws:sagemaker:*:aws:hub-content/SageMakerPublicHub/Model/*
    - arn:aws:sagemaker:*:aws:hub/SageMakerPublicHub
  - Sid: AllowMarketplaceModelsListing
    Effect: Allow
    Action:
    - sagemaker:ListHubContents
    Resource: arn:aws:sagemaker:*:aws:hub/SageMakerPublicHub
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 3
  score_max: 5
