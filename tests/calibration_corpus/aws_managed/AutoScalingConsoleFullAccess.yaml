name: aws-managed-AutoScalingConsoleFullAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AutoScalingConsoleFullAccess\nAWS description: (none)\n\
  Generated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule\
  \ refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - ec2:AuthorizeSecurityGroupIngress
    - ec2:CreateKeyPair
    - ec2:CreateSecurityGroup
    - ec2:DescribeAccountAttributes
    - ec2:DescribeAvailabilityZones
    - ec2:DescribeImages
    - ec2:DescribeInstanceAttribute
    - ec2:DescribeInstances
    - ec2:DescribeKeyPairs
    - ec2:DescribeLaunchTemplateVersions
    - ec2:DescribePlacementGroups
    - ec2:DescribeSecurityGroups
    - ec2:DescribeSpotInstanceRequests
    - ec2:DescribeSubnets
    - ec2:DescribeVpcs
    - ec2:DescribeVpcClassicLink
    - ec2:ImportKeyPair
    Resource: '*'
  - Effect: Allow
    Action: elasticloadbalancing:Describe*
    Resource: '*'
  - Effect: Allow
    Action:
    - cloudwatch:ListMetrics
    - cloudwatch:GetMetricStatistics
    - cloudwatch:PutMetricAlarm
    - cloudwatch:Describe*
    Resource: '*'
  - Effect: Allow
    Action: autoscaling:*
    Resource: '*'
  - Effect: Allow
    Action:
    - sns:ListSubscriptions
    - sns:ListTopics
    Resource: '*'
  - Effect: Allow
    Action: iam:ListRoles
    Resource: '*'
  - Effect: Allow
    Action: iam:CreateServiceLinkedRole
    Resource: '*'
    Condition:
      StringEquals:
        iam:AWSServiceName: autoscaling.amazonaws.com
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
