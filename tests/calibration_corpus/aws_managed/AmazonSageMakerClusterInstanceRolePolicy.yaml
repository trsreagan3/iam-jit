name: aws-managed-AmazonSageMakerClusterInstanceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AmazonSageMakerClusterInstanceRolePolicy\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=7; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: CloudwatchLogStreamPublishPermissions
    Effect: Allow
    Action:
    - logs:PutLogEvents
    - logs:CreateLogStream
    - logs:DescribeLogStreams
    Resource:
    - arn:aws:logs:*:*:log-group:/aws/sagemaker/Clusters/*:log-stream:*
  - Sid: CloudwatchLogGroupCreationPermissions
    Effect: Allow
    Action:
    - logs:CreateLogGroup
    Resource:
    - arn:aws:logs:*:*:log-group:/aws/sagemaker/Clusters/*
  - Sid: CloudwatchPutMetricDataAccess
    Effect: Allow
    Action:
    - cloudwatch:PutMetricData
    Resource:
    - '*'
    Condition:
      StringEquals:
        cloudwatch:namespace: /aws/sagemaker/Clusters
  - Sid: DataRetrievalFromS3BucketPermissions
    Effect: Allow
    Action:
    - s3:ListBucket
    - s3:GetObject
    Resource:
    - arn:aws:s3:::sagemaker-*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: SSMConnectivityPermissions
    Effect: Allow
    Action:
    - ssmmessages:CreateControlChannel
    - ssmmessages:CreateDataChannel
    - ssmmessages:OpenControlChannel
    - ssmmessages:OpenDataChannel
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 6
  score_max: 8
