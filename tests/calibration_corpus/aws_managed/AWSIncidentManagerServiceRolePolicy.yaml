name: aws-managed-AWSIncidentManagerServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AWSIncidentManagerServiceRolePolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=6; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: UpdateIncidentRecordPermissions
    Effect: Allow
    Action:
    - ssm-incidents:ListIncidentRecords
    - ssm-incidents:CreateTimelineEvent
    Resource: '*'
  - Sid: RelatedOpsItemPermissions
    Effect: Allow
    Action:
    - ssm:CreateOpsItem
    - ssm:AssociateOpsItemRelatedItem
    Resource: '*'
  - Sid: IncidentEngagementPermissions
    Effect: Allow
    Action: ssm-contacts:StartEngagement
    Resource: '*'
  - Sid: PutMetricDataPermission
    Effect: Allow
    Action:
    - cloudwatch:PutMetricData
    Resource: '*'
    Condition:
      StringEquals:
        cloudwatch:namespace:
        - AWS/IncidentManager
        - AWS/Usage
