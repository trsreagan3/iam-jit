name: aws-managed-AWSElasticBeanstalkServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AWSElasticBeanstalkServiceRolePolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=6; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: AllowCloudformationReadOperationsOnElasticBeanstalkStacks
    Effect: Allow
    Action:
    - cloudformation:DescribeStackResource
    - cloudformation:DescribeStackResources
    - cloudformation:DescribeStacks
    Resource:
    - arn:aws:cloudformation:*:*:stack/awseb-*
    - arn:aws:cloudformation:*:*:stack/eb-*
  - Sid: AllowOperations
    Effect: Allow
    Action:
    - autoscaling:DescribeAutoScalingGroups
    - autoscaling:DescribeAutoScalingInstances
    - autoscaling:DescribeNotificationConfigurations
    - autoscaling:DescribeScalingActivities
    - autoscaling:PutNotificationConfiguration
    - ec2:DescribeInstanceStatus
    - ec2:AssociateAddress
    - ec2:DescribeAddresses
    - ec2:DescribeInstances
    - ec2:DescribeSecurityGroups
    - elasticloadbalancing:DescribeInstanceHealth
    - elasticloadbalancing:DescribeLoadBalancers
    - elasticloadbalancing:DescribeTargetHealth
    - elasticloadbalancing:DescribeTargetGroups
    - lambda:GetFunction
    - sqs:GetQueueAttributes
    - sqs:GetQueueUrl
    - sns:Publish
    Resource:
    - '*'
  - Sid: AllowOperationsOnHealthStreamingLogs
    Effect: Allow
    Action:
    - logs:CreateLogStream
    - logs:DescribeLogGroups
    - logs:DescribeLogStreams
    - logs:DeleteLogGroup
    - logs:PutLogEvents
    Resource: arn:aws:logs:*:*:log-group:/aws/elasticbeanstalk/*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 5
  score_max: 7
