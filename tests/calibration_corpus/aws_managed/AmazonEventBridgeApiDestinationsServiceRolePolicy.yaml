name: aws-managed-AmazonEventBridgeApiDestinationsServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AmazonEventBridgeApiDestinationsServiceRolePolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - secretsmanager:CreateSecret
    - secretsmanager:UpdateSecret
    - secretsmanager:DescribeSecret
    - secretsmanager:DeleteSecret
    - secretsmanager:GetSecretValue
    - secretsmanager:PutSecretValue
    Resource: arn:aws:secretsmanager:*:*:secret:events!connection/*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Effect: Allow
    Action:
    - kms:Decrypt
    - kms:Encrypt
    - kms:GenerateDataKey
    Resource: arn:aws:kms:*:*:key/*
    Condition:
      StringLike:
        kms:ViaService: secretsmanager.*.amazonaws.com
        kms:EncryptionContext:SecretARN:
        - arn:aws:secretsmanager:*:*:secret:events!connection/*
      StringEquals:
        aws:ResourceTag/EventBridgeApiDestinations: 'true'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
