name: aws-managed-AWSQuickSetupPatchPolicyBaselineAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AWSQuickSetupPatchPolicyBaselineAccess\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=7; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: QuickSetupPatchingBaselineOverridesS3SameAccountReadOnlyAccess
    Effect: Allow
    Action: s3:GetObject
    Resource: arn:aws:s3:::aws-quicksetup-patchpolicy-*
    Condition:
      StringEquals:
        aws:PrincipalAccount:
        - ${aws:ResourceAccount}
  - Sid: QuickSetupPatchingBaselineOverridesS3OrganizationReadOnlyAccess
    Effect: Allow
    Action: s3:GetObject
    Resource: arn:aws:s3:::aws-quicksetup-patchpolicy-*
    Condition:
      StringEquals:
        aws:PrincipalOrgID:
        - ${aws:ResourceOrgID}
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
