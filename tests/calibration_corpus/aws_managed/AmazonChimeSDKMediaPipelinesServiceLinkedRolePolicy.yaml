  - Sid: AllowKinesisVideoStreamsListAccess
    Effect: Allow
    Action:
    - kinesisvideo:ListStreams
    Resource:
    - '*'
  - Sid: AllowChimeMeetingAccess
    Effect: Allow
    Action:
    - chime:GetMeeting
    - chime:CreateAttendee
    - chime:DeleteAttendee
