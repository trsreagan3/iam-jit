name: aws-managed-ElasticLoadBalancingFullAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/ElasticLoadBalancingFullAccess\nAWS description: (none)\n\
  Generated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule\
  \ refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action: elasticloadbalancing:*
    Resource: '*'
  - Effect: Allow
    Action:
    - ec2:DescribeAccountAttributes
    - ec2:DescribeAddresses
    - ec2:DescribeInternetGateways
    - ec2:DescribeSecurityGroups
    - ec2:DescribeSubnets
    - ec2:DescribeVpcs
    - ec2:DescribeVpcClassicLink
    - ec2:DescribeInstances
    - ec2:DescribeNetworkInterfaces
    - ec2:DescribeClassicLinkInstances
    - ec2:DescribeRouteTables
    - ec2:DescribeCoipPools
    - ec2:GetCoipPoolUsage
    - ec2:GetSecurityGroupsForVpc
    - ec2:DescribeVpcPeeringConnections
    - ec2:DescribeAvailabilityZones
    - cognito-idp:DescribeUserPoolClient
    Resource: '*'
  - Effect: Allow
    Action: iam:CreateServiceLinkedRole
    Resource: '*'
    Condition:
      StringEquals:
        iam:AWSServiceName: elasticloadbalancing.amazonaws.com
  - Effect: Allow
    Action: arc-zonal-shift:*
    Resource: arn:aws:elasticloadbalancing:*:*:loadbalancer/*
  - Effect: Allow
    Action:
    - arc-zonal-shift:ListManagedResources
    - arc-zonal-shift:ListZonalShifts
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
