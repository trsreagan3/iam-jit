name: aws-managed-AmazonInspector2FullAccess_v2
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AmazonInspector2FullAccess_v2\nAWS description: (none)\n\
  Generated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule\
  \ refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: AllowFullAccessToInspectorApis
    Effect: Allow
    Action: inspector2:*
    Resource: '*'
  - Sid: AllowAccessToCodeGuruApis
    Effect: Allow
    Action:
    - codeguru-security:BatchGetFindings
    - codeguru-security:GetAccountConfiguration
    Resource: '*'
  - Sid: AllowAccessToCreateSlr
    Effect: Allow
    Action: iam:CreateServiceLinkedRole
    Resource: '*'
    Condition:
      StringEquals:
        iam:AWSServiceName:
        - agentless.inspector2.amazonaws.com
        - inspector2.amazonaws.com
  - Sid: AllowServicePrincipalBasedAccessToOrganizationApis
    Effect: Allow
    Action:
    - organizations:EnableAWSServiceAccess
    - organizations:RegisterDelegatedAdministrator
    - organizations:ListDelegatedAdministrators
    Resource: '*'
    Condition:
      StringEquals:
        organizations:ServicePrincipal:
        - inspector2.amazonaws.com
        - agentless.inspector2.amazonaws.com
  - Sid: AllowOrganizationalBasedAccessToOrganizationApis
    Effect: Allow
    Action:
    - organizations:DescribeOrganizationalUnit
    Resource: arn:aws:organizations::*:ou/o-*/ou-*
  - Sid: AllowAccountsBasedAccessToOrganizationApis
    Effect: Allow
    Action:
    - organizations:DescribeAccount
    Resource: arn:aws:organizations::*:account/o-*/*
  - Sid: AllowAccessToOrganizationApis
    Effect: Allow
    Action:
    - organizations:ListAWSServiceAccessForOrganization
    - organizations:DescribeOrganization
    Resource: '*'
  - Sid: AllowListPoliciesForInspectorPolicyType
    Effect: Allow
    Action: organizations:ListPolicies
    Resource: '*'
    Condition:
      StringEquals:
        organizations:PolicyType:
        - INSPECTOR_POLICY
  - Sid: AllowDescribeResourcePolicyForDelegation
    Effect: Allow
    Action: organizations:DescribeResourcePolicy
    Resource: '*'
  - Sid: AllowDescribeEffectivePolicyForInspector
    Effect: Allow
    Action: organizations:DescribeEffectivePolicy
    Resource: '*'
    Condition:
      StringEquals:
        organizations:PolicyType:
        - INSPECTOR_POLICY
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
