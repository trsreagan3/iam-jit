  - Sid: sid5
    Effect: Allow
    Action:
    - cloudwatch:PutMetricData
    Resource: '*'
    Condition:
      StringEquals:
        cloudwatch:namespace:
        - AWS/CodeWhisperer
  - Sid: AllowKmsAccessViaIdentityCenter
    Effect: Allow
    Action:
    - kms:Decrypt
