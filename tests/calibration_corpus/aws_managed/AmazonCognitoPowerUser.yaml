name: aws-managed-AmazonCognitoPowerUser
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AmazonCognitoPowerUser\nAWS description: (none)\n\
  Generated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule\
  \ refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - cognito-identity:*
    - cognito-idp:*
    - cognito-sync:*
    - iam:ListRoles
    - iam:ListOpenIdConnectProviders
    - iam:GetRole
    - iam:ListSAMLProviders
    - iam:GetSAMLProvider
    - kinesis:ListStreams
    - lambda:GetPolicy
    - lambda:ListFunctions
    - sns:GetSMSSandboxAccountStatus
    - sns:ListPlatformApplications
    - ses:ListIdentities
    - ses:GetIdentityVerificationAttributes
    - mobiletargeting:GetApps
    - acm:ListCertificates
    - sms-voice:DescribeAccountAttributes
    Resource: '*'
  - Effect: Allow
    Action: iam:CreateServiceLinkedRole
    Resource: '*'
    Condition:
      StringEquals:
        iam:AWSServiceName:
        - cognito-idp.amazonaws.com
        - email.cognito-idp.amazonaws.com
  - Effect: Allow
    Action:
    - iam:DeleteServiceLinkedRole
    - iam:GetServiceLinkedRoleDeletionStatus
    Resource:
    - arn:aws:iam::*:role/aws-service-role/cognito-idp.amazonaws.com/AWSServiceRoleForAmazonCognitoIdp*
    - arn:aws:iam::*:role/aws-service-role/email.cognito-idp.amazonaws.com/AWSServiceRoleForAmazonCognitoIdpEmail*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
