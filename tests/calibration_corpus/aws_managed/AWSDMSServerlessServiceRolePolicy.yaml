    Condition:
      StringEqualsIgnoreCase:
        aws:ResourceTag/ResourceCreatedBy: DMSServerless
  - Sid: id3
    Effect: Allow
    Action:
    - dms:TestConnection
    - dms:DeleteConnection
    Resource:
    - arn:aws:dms:*:*:rep:*
    - arn:aws:dms:*:*:endpoint:*
