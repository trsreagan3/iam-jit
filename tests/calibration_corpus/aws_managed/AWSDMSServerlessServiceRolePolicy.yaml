    - arn:aws:s3:::dms-serverless-premigration-results-*
    - arn:aws:s3:::dms-premigration-results-*
    Condition:
      StringEquals:
        s3:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: id6
    Effect: Allow
    Action:
    - dms:StartReplicationTaskAssessmentRun
    Resource:
    - arn:aws:dms:*:*:task:*
