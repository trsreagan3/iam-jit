name: aws-managed-AmazonRDSReadOnlyAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AmazonRDSReadOnlyAccess\nAWS description: (none)\n\
  Generated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule\
  \ refactors. Current det_score=4; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - rds:Describe*
    - rds:ListTagsForResource
    - ec2:DescribeAccountAttributes
    - ec2:DescribeAvailabilityZones
    - ec2:DescribeInternetGateways
    - ec2:DescribeSecurityGroups
    - ec2:DescribeSubnets
    - ec2:DescribeVpcAttribute
    - ec2:DescribeVpcs
    Resource: '*'
  - Effect: Allow
    Action:
    - cloudwatch:GetMetricStatistics
    - cloudwatch:ListMetrics
    - cloudwatch:GetMetricData
    - logs:DescribeLogStreams
    - logs:GetLogEvents
    - devops-guru:GetResourceCollection
    Resource: '*'
  - Action:
    - devops-guru:SearchInsights
    - devops-guru:ListAnomaliesForInsight
    Effect: Allow
    Resource: '*'
    Condition:
      ForAllValues:StringEquals:
        devops-guru:ServiceNames:
        - RDS
      'Null':
        devops-guru:ServiceNames: 'false'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 3
  score_max: 5
