name: aws-managed-AWSCloud9User
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AWSCloud9User\nAWS description: (none)\nGenerated\
  \ by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule refactors.\
  \ Current det_score=6; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - cloud9:UpdateUserSettings
    - cloud9:GetUserSettings
    - cloud9:GetMigrationExperiences
    - iam:GetUser
    - iam:ListUsers
    - ec2:DescribeVpcs
    - ec2:DescribeSubnets
    - ec2:DescribeInstanceTypeOfferings
    - ec2:DescribeRouteTables
    Resource: '*'
  - Effect: Allow
    Action:
    - cloud9:CreateEnvironmentEC2
    - cloud9:CreateEnvironmentSSH
    Resource: '*'
    Condition:
      'Null':
        cloud9:OwnerArn: 'true'
  - Effect: Allow
    Action:
    - cloud9:GetUserPublicKey
    Resource: '*'
    Condition:
      'Null':
        cloud9:UserArn: 'true'
  - Effect: Allow
    Action:
    - cloud9:DescribeEnvironmentMemberships
    Resource:
    - '*'
    Condition:
      'Null':
        cloud9:UserArn: 'true'
        cloud9:EnvironmentId: 'true'
  - Effect: Allow
    Action:
    - iam:CreateServiceLinkedRole
    Resource: '*'
    Condition:
      StringLike:
        iam:AWSServiceName: cloud9.amazonaws.com
  - Effect: Allow
    Action:
    - ssm:StartSession
    - ssm:GetConnectionStatus
    Resource: arn:aws:ec2:*:*:instance/*
    Condition:
      StringLike:
        ssm:resourceTag/aws:cloud9:environment: '*'
      StringEquals:
        aws:CalledViaFirst: cloud9.amazonaws.com
  - Effect: Allow
    Action:
    - ssm:StartSession
    Resource:
    - arn:aws:ssm:*:*:document/*
  - Effect: Allow
    Action:
    - ssmmessages:OpenDataChannel
    Resource:
    - arn:aws:ssm:*:*:session/*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 5
  score_max: 7
