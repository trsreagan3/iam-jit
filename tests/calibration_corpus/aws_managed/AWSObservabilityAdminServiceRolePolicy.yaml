name: aws-managed-AWSObservabilityAdminServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AWSObservabilityAdminServiceRolePolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=9; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - organizations:ListAccounts
    - organizations:ListAccountsForParent
    - organizations:ListChildren
    - organizations:ListParents
    - organizations:DescribeOrganization
    - organizations:DescribeOrganizationalUnit
    Resource: '*'
  - Effect: Allow
    Action:
    - config:PutServiceLinkedConfigurationRecorder
    - config:DeleteServiceLinkedConfigurationRecorder
    Resource:
    - arn:aws:config:*:*:configuration-recorder/AWSConfigurationRecorderForObservabilityAdmin/*
  - Effect: Allow
    Action:
    - config:PutConfigurationAggregator
    - config:DeleteConfigurationAggregator
    - config:SelectAggregateResourceConfig
    Resource:
    - arn:aws:config:*:*:config-aggregator/aws-service-config-aggregator/observabilityadmin.amazonaws.com/*
  - Effect: Allow
    Action:
    - iam:CreateServiceLinkedRole
    Resource:
    - arn:aws:iam::*:role/aws-service-role/config.amazonaws.com/AWSServiceRoleForConfig
    Condition:
      StringEquals:
        iam:AWSServiceName:
        - config.amazonaws.com
  - Effect: Allow
    Action:
    - iam:PassRole
    Resource:
    - arn:aws:iam::*:role/aws-service-role/config.amazonaws.com/AWSServiceRoleForConfig
    Condition:
      StringEquals:
        iam:PassedToService:
        - config.amazonaws.com
  - Effect: Allow
    Action:
    - organizations:EnableAWSServiceAccess
    Resource: '*'
    Condition:
      StringEquals:
        organizations:ServicePrincipal:
        - config.amazonaws.com
  - Effect: Allow
    Action:
    - organizations:ListDelegatedAdministrators
    Resource: '*'
    Condition:
      StringEquals:
        organizations:ServicePrincipal:
        - observabilityadmin.amazonaws.com
        - config.amazonaws.com
