name: aws-managed-AmazonRedshiftDataFullAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AmazonRedshiftDataFullAccess\nAWS description: (none)\n\
  Generated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule\
  \ refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: DataAPIPermissions
    Effect: Allow
    Action:
    - redshift-data:BatchExecuteStatement
    - redshift-data:ExecuteStatement
    - redshift-data:CancelStatement
    - redshift-data:ListStatements
    - redshift-data:GetStatementResult
    - redshift-data:DescribeStatement
    - redshift-data:ListDatabases
    - redshift-data:ListSchemas
    - redshift-data:ListTables
    - redshift-data:DescribeTable
    Resource: '*'
  - Sid: SecretsManagerPermissions
    Effect: Allow
    Action:
    - secretsmanager:GetSecretValue
    Resource: arn:aws:secretsmanager:*:*:secret:*
    Condition:
      StringLike:
        secretsmanager:ResourceTag/RedshiftDataFullAccess: '*'
  - Sid: GetCredentialsForAPIUser
    Effect: Allow
    Action: redshift:GetClusterCredentials
    Resource:
    - arn:aws:redshift:*:*:dbname:*/*
    - arn:aws:redshift:*:*:dbuser:*/redshift_data_api_user
  - Sid: GetCredentialsWithFederatedIAMCredentials
    Effect: Allow
    Action: redshift:GetClusterCredentialsWithIAM
    Resource: arn:aws:redshift:*:*:dbname:*/*
  - Sid: GetCredentialsForServerless
    Effect: Allow
    Action: redshift-serverless:GetCredentials
    Resource: arn:aws:redshift-serverless:*:*:workgroup/*
    Condition:
      StringLike:
        aws:ResourceTag/RedshiftDataFullAccess: '*'
  - Sid: DenyCreateAPIUser
    Effect: Deny
    Action: redshift:CreateClusterUser
    Resource:
    - arn:aws:redshift:*:*:dbuser:*/redshift_data_api_user
  - Sid: ServiceLinkedRole
    Effect: Allow
    Action: iam:CreateServiceLinkedRole
    Resource: arn:aws:iam::*:role/aws-service-role/redshift-data.amazonaws.com/AWSServiceRoleForRedshift
    Condition:
      StringLike:
        iam:AWSServiceName: redshift-data.amazonaws.com
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
