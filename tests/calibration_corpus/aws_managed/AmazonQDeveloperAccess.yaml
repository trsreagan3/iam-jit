policy:
  Version: '2012-10-17'
  Statement:
  - Sid: AllowAmazonQDeveloperAccess
    Effect: Allow
    Action:
    - q:StartConversation
    - q:SendMessage
    - q:GetConversation
    - q:ListConversations
    - q:UpdateConversation
    - q:DeleteConversation
