name: aws-managed-AWSSSMOpsInsightsServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AWSSSMOpsInsightsServiceRolePolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=6; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: AllowCreateOpsItem
    Effect: Allow
    Action:
    - ssm:CreateOpsItem
    - ssm:AddTagsToResource
    Resource: '*'
  - Sid: AllowAccessOpsItem
    Effect: Allow
    Action:
    - ssm:UpdateOpsItem
    - ssm:GetOpsItem
    Resource: '*'
    Condition:
      StringEquals:
        aws:ResourceTag/SsmOperationalInsight: 'true'
