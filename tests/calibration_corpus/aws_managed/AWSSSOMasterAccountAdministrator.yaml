name: aws-managed-AWSSSOMasterAccountAdministrator
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AWSSSOMasterAccountAdministrator\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: AWSSSOCreateSLR
    Effect: Allow
    Action: iam:CreateServiceLinkedRole
    Resource: arn:aws:iam::*:role/aws-service-role/sso.amazonaws.com/AWSServiceRoleForSSO
    Condition:
      StringLike:
        iam:AWSServiceName: sso.amazonaws.com
  - Sid: AWSSSOMasterAccountAdministrator
    Effect: Allow
    Action: iam:PassRole
    Resource: arn:aws:iam::*:role/aws-service-role/sso.amazonaws.com/AWSServiceRoleForSSO
    Condition:
      StringLike:
        iam:PassedToService: sso.amazonaws.com
  - Sid: AWSSSOMemberAccountAdministrator
    Effect: Allow
    Action:
    - ds:DescribeTrusts
    - ds:UnauthorizeApplication
    - ds:DescribeDirectories
    - ds:AuthorizeApplication
    - iam:ListPolicies
    - organizations:EnableAWSServiceAccess
    - organizations:ListRoots
    - organizations:ListAccounts
    - organizations:ListOrganizationalUnitsForParent
    - organizations:ListAccountsForParent
    - organizations:DescribeOrganization
    - organizations:ListChildren
    - organizations:DescribeAccount
    - organizations:ListParents
    - organizations:ListDelegatedAdministrators
    - sso:*
    - sso-directory:*
    - identitystore:*
    - identitystore-auth:*
    - ds:CreateAlias
    - access-analyzer:ValidatePolicy
    - signin:CreateTrustedIdentityPropagationApplicationForConsole
    - signin:ListTrustedIdentityPropagationApplicationsForConsole
    Resource: '*'
  - Sid: AWSSSOManageDelegatedAdministrator
    Effect: Allow
    Action:
    - organizations:RegisterDelegatedAdministrator
    - organizations:DeregisterDelegatedAdministrator
    Resource: '*'
    Condition:
      StringEquals:
        organizations:ServicePrincipal: sso.amazonaws.com
  - Sid: AllowDeleteSyncProfile
    Effect: Allow
    Action:
    - identity-sync:DeleteSyncProfile
    Resource:
    - arn:aws:identity-sync:*:*:profile/*
  - Sid: AllowKMSKeyUseViaAWSIAMIdentityCenterService
    Effect: Allow
    Action:
    - kms:GenerateDataKeyWithoutPlaintext
    - kms:Encrypt
    - kms:Decrypt
    Resource: '*'
    Condition:
      StringLike:
        kms:ViaService: sso.*.amazonaws.com
        kms:EncryptionContext:aws:sso:instance-arn: '*'
  - Sid: AllowKMSKeyUseViaAWSIdentityStoreService
    Effect: Allow
    Action:
    - kms:GenerateDataKeyWithoutPlaintext
    - kms:Encrypt
    - kms:Decrypt
    Resource: '*'
    Condition:
      StringLike:
        kms:ViaService: identitystore.*.amazonaws.com
        kms:EncryptionContext:aws:identitystore:identitystore-arn: '*'
  - Sid: AllowKMSKeyDiscovery
    Effect: Allow
    Action:
    - kms:ListAliases
    - kms:DescribeKey
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
