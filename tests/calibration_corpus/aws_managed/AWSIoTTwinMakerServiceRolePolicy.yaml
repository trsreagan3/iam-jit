name: aws-managed-AWSIoTTwinMakerServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AWSIoTTwinMakerServiceRolePolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: SiteWiseAssetReadAccess
    Effect: Allow
    Action:
    - iotsitewise:DescribeAsset
    Resource:
    - arn:aws:iotsitewise:*:*:asset/*
  - Sid: SiteWiseAssetModelReadAccess
    Effect: Allow
    Action:
    - iotsitewise:DescribeAssetModel
    Resource:
    - arn:aws:iotsitewise:*:*:asset-model/*
  - Sid: SiteWiseAssetModelAndAssetListAccess
    Effect: Allow
    Action:
    - iotsitewise:ListAssets
    - iotsitewise:ListAssetModels
    Resource:
    - '*'
  - Sid: TwinMakerAccess
    Effect: Allow
    Action:
    - iottwinmaker:GetEntity
    - iottwinmaker:CreateEntity
    - iottwinmaker:UpdateEntity
    - iottwinmaker:DeleteEntity
    - iottwinmaker:ListEntities
    - iottwinmaker:GetComponentType
    - iottwinmaker:CreateComponentType
    - iottwinmaker:UpdateComponentType
    - iottwinmaker:DeleteComponentType
    - iottwinmaker:ListComponentTypes
    Resource:
    - arn:aws:iottwinmaker:*:*:workspace/*
    Condition:
      ForAnyValue:StringEquals:
        iottwinmaker:linkedServices:
        - IOTSITEWISE
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
