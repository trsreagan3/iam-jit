name: aws-managed-AWSQuickSightSecretsManagerWritePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AWSQuickSightSecretsManagerWritePolicy\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=3; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - secretsmanager:PutResourcePolicy
    Resource: arn:aws:secretsmanager:*:*:secret:quicksight!*
    Condition:
      StringEquals:
        secretsmanager:ResourceTag/aws:secretsmanager:owningService: quicksight
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Effect: Allow
    Action:
    - secretsmanager:CreateSecret
    Resource: arn:aws:secretsmanager:*:*:secret:quicksight!*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
      StringLike:
        secretsmanager:Name: quicksight!*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 2
  score_max: 4
