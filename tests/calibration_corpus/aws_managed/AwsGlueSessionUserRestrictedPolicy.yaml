name: aws-managed-AwsGlueSessionUserRestrictedPolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AwsGlueSessionUserRestrictedPolicy\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: AllowSessionActions
    Effect: Allow
    Action:
    - glue:CreateSession
    Resource:
    - arn:aws:glue:*:*:session/*
    Condition:
      StringEquals:
        aws:RequestTag/owner: ${aws:userid}
      ForAnyValue:StringEquals:
        aws:TagKeys:
        - owner
  - Sid: AllowGlueTaggingAction
    Effect: Allow
    Action:
    - glue:TagResource
    Resource: arn:aws:glue:*:*:session/*
    Condition:
      StringEquals:
        aws:ResourceTag/owner: ${aws:userid}
        aws:RequestTag/owner: ${aws:userid}
  - Sid: AllowCompletionActions
    Effect: Allow
    Action:
    - glue:StartCompletion
    - glue:GetCompletion
    Resource:
    - arn:aws:glue:*:*:completion/*
  - Sid: AllowGlueActions
    Effect: Allow
    Action:
    - glue:RunStatement
    - glue:GetStatement
    - glue:ListStatements
    - glue:CancelStatement
    - glue:StopSession
    - glue:DeleteSession
    - glue:GetSession
    Resource:
    - arn:aws:glue:*:*:session/*
    Condition:
      StringEquals:
        aws:ResourceTag/owner: ${aws:userid}
  - Sid: AllowListSessions
    Effect: Allow
    Action:
    - glue:ListSessions
    Resource:
    - '*'
  - Sid: DenyTagActions
    Effect: Deny
    Action:
    - glue:UntagResource
    - tag:TagResources
    - tag:UntagResources
    Resource:
    - arn:aws:glue:*:*:session/*
    Condition:
      ForAnyValue:StringEquals:
        aws:TagKeys:
        - owner
  - Sid: AllowPassRoleActions
    Effect: Allow
    Action:
    - iam:PassRole
    Resource:
    - arn:aws:iam::*:role/service-role/AwsGlueSessionServiceRoleUserRestricted*
    Condition:
      StringLike:
        iam:PassedToService:
        - glue.amazonaws.com
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
