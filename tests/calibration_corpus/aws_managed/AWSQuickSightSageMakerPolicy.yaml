name: aws-managed-AWSQuickSightSageMakerPolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/service-role/AWSQuickSightSageMakerPolicy\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: SageMakerTransformJobAccess
    Effect: Allow
    Action:
    - sagemaker:DescribeTransformJob
    - sagemaker:StopTransformJob
    - sagemaker:CreateTransformJob
    Resource: arn:aws:sagemaker:*:*:transform-job/quicksight-auto-generated-*
  - Sid: SageMakerModelReadAccess
    Effect: Allow
    Action:
    - sagemaker:ListModels
    - sagemaker:DescribeModel
    Resource: '*'
  - Sid: S3ObjectReadAccess
    Effect: Allow
    Action: s3:GetObject
    Resource:
    - arn:aws:s3:::quicksight-ml.*
    - arn:aws:s3:::sagemaker*
  - Sid: S3ObjectUpdateAccess
    Effect: Allow
    Action: s3:PutObject
    Resource: arn:aws:s3:::sagemaker*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: S3BucketReadAccess
    Effect: Allow
    Action: s3:ListBucket
    Resource: arn:aws:s3:::sagemaker*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
