name: aws-managed-GameLiftContainerFleetPolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/GameLiftContainerFleetPolicy\nAWS description: (none)\n\
  Generated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule\
  \ refactors. Current det_score=3; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: WriteGameSessionLogsToLogStream
    Effect: Allow
    Action:
    - logs:CreateLogStream
    - logs:PutLogEvents
    - logs:PutRetentionPolicy
    Resource: arn:aws:logs:*:*:log-group:gamelift-*:log-stream:*
  - Sid: CreateLogGroupToStoreGameSessionLogs
    Effect: Allow
    Action: logs:CreateLogGroup
    Resource: arn:aws:logs:*:*:log-group:gamelift-*
  - Sid: WriteGameSessionLogsToS3Bucket
    Effect: Allow
    Action:
    - s3:PutObject
    - s3:GetBucketLocation
    Resource:
    - arn:aws:s3:::gamelift-*
    Condition:
      StringEquals:
        s3:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: RetrieveComputeAuthToken
    Effect: Allow
    Action:
    - gamelift:GetComputeAuthToken
    Resource:
    - arn:aws:gamelift:*:*:containerfleet/*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 2
  score_max: 4
