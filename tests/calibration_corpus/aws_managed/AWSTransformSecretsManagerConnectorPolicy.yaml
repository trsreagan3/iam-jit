name: aws-managed-AWSTransformSecretsManagerConnectorPolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AWSTransformSecretsManagerConnectorPolicy\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=3; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: ReadSecretsManagerSecret
    Effect: Allow
    Action:
    - secretsmanager:GetSecretValue
    - secretsmanager:DescribeSecret
    Resource: arn:aws:secretsmanager:*:*:secret:${aws:PrincipalTag/SecretId}
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: DecryptWithCustomerProvidedKMSKey
    Effect: Allow
    Action:
    - kms:Decrypt
    Resource: arn:aws:kms:*:*:key/${aws:PrincipalTag/KMSKeyId}
    Condition:
      StringLike:
        kms:EncryptionContext:SecretARN: arn:aws:secretsmanager:${aws:RequestedRegion}:${aws:PrincipalAccount}:secret:${aws:PrincipalTag/SecretId}
        kms:ViaService: secretsmanager.*.amazonaws.com
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: DescribeKMSKey
    Effect: Allow
    Action:
    - kms:DescribeKey
    Resource: arn:aws:kms:*:*:key/*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 2
  score_max: 4
