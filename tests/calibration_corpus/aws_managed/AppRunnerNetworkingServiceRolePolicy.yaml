name: aws-managed-AppRunnerNetworkingServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AppRunnerNetworkingServiceRolePolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - ec2:DescribeNetworkInterfaces
    - ec2:DescribeVpcs
    - ec2:DescribeDhcpOptions
    - ec2:DescribeSubnets
    - ec2:DescribeSecurityGroups
    Resource: '*'
  - Effect: Allow
    Action: ec2:CreateNetworkInterface
    Resource: '*'
    Condition:
      ForAllValues:StringEquals:
        aws:TagKeys:
        - AWSAppRunnerManaged
  - Effect: Allow
    Action: ec2:CreateTags
    Resource: arn:aws:ec2:*:*:network-interface/*
    Condition:
      StringEquals:
        ec2:CreateAction: CreateNetworkInterface
      StringLike:
        aws:RequestTag/AWSAppRunnerManaged: '*'
  - Effect: Allow
    Action: ec2:DeleteNetworkInterface
    Resource: '*'
    Condition:
      'Null':
        ec2:ResourceTag/AWSAppRunnerManaged: 'false'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
