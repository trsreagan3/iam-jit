name: aws-managed-CloudWatchLogsAPIKeyAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/CloudWatchLogsAPIKeyAccess\nAWS description: (none)\n\
  Generated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule\
  \ refactors. Current det_score=6; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: LogsAPIs
    Effect: Allow
    Action:
    - logs:CallWithBearerToken
    - logs:PutLogEvents
    Resource: '*'
  - Sid: KMSAPIs
    Effect: Allow
    Action:
    - kms:GenerateDataKey
    - kms:Decrypt
    Condition:
      StringLike:
        kms:ViaService: logs.*.amazonaws.com
      ArnLike:
        kms:EncryptionContext:aws:logs:arn: arn:aws:logs:*:*:log-group:*
    Resource: arn:aws:kms:*:*:key/*
  - Sid: KMSDescribeAPIs
    Effect: Allow
    Action:
    - kms:DescribeKey
    Condition:
      StringLike:
        kms:ViaService: logs.*.amazonaws.com
    Resource: arn:aws:kms:*:*:key/*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 5
  score_max: 7
