name: aws-managed-AmazonMQFullAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AmazonMQFullAccess\nAWS description: (none)\nGenerated\
  \ by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule refactors.\
  \ Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - mq:*
    - cloudformation:CreateStack
    - ec2:CreateNetworkInterface
    - ec2:CreateNetworkInterfacePermission
    - ec2:DeleteNetworkInterface
    - ec2:DeleteNetworkInterfacePermission
    - ec2:DetachNetworkInterface
    - ec2:DescribeInternetGateways
    - ec2:DescribeNetworkInterfaces
    - ec2:DescribeNetworkInterfacePermissions
    - ec2:DescribeRouteTables
    - ec2:DescribeSecurityGroups
    - ec2:DescribeSubnets
    - ec2:DescribeVpcs
    - ec2:CreateSecurityGroup
    - ec2:AuthorizeSecurityGroupIngress
    Resource: '*'
  - Effect: Allow
    Action:
    - logs:CreateLogGroup
    Resource:
    - arn:aws:logs:*:*:log-group:/aws/amazonmq/*
  - Action: iam:CreateServiceLinkedRole
    Effect: Allow
    Resource: '*'
    Condition:
      StringLike:
        iam:AWSServiceName: mq.amazonaws.com
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
