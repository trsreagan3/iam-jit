name: aws-managed-ConfigConformsServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/ConfigConformsServiceRolePolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=9; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - config:PutConfigRule
    - config:DeleteConfigRule
    Resource: arn:aws:config:*:*:config-rule/aws-service-rule/config-conforms.amazonaws.com*
  - Effect: Allow
    Action:
    - config:DescribeConfigRules
    Resource: '*'
  - Effect: Allow
    Action:
    - config:DescribeRemediationConfigurations
    - config:DeleteRemediationConfiguration
    - config:PutRemediationConfigurations
    Resource: arn:aws:config:*:*:remediation-configuration/aws-service-remediation-configuration/config-conforms.amazonaws.com*
  - Effect: Allow
    Action:
    - iam:GetRole
    Resource: arn:aws:iam::*:role/aws-service-role/config-conforms.amazonaws.com/*
  - Effect: Allow
    Action:
    - iam:GetRole
    Resource: arn:aws:iam::*:role/aws-service-role/remediation.config.amazonaws.com/AWSServiceRoleForConfigRemediation
  - Effect: Allow
    Action: iam:CreateServiceLinkedRole
    Resource: arn:aws:iam::*:role/aws-service-role/remediation.config.amazonaws.com/AWSServiceRoleForConfigRemediation
    Condition:
      StringLike:
        iam:AWSServiceName: remediation.config.amazonaws.com
  - Effect: Allow
    Action: iam:PassRole
    Resource: '*'
    Condition:
      StringEquals:
        iam:PassedToService: ssm.amazonaws.com
  - Effect: Allow
    Action:
    - ssm:DescribeDocument
    - ssm:GetDocument
    Resource: '*'
  - Effect: Allow
    Action:
    - s3:PutObject
    - s3:PutObjectAcl
    - s3:GetObject
    - s3:GetBucketAcl
    Resource: arn:aws:s3:::awsconfigconforms*
  - Effect: Allow
    Action:
    - cloudformation:CreateStack
    - cloudformation:DeleteStack
    - cloudformation:DescribeStackEvents
    - cloudformation:DescribeStackResource
    - cloudformation:DescribeStackResources
    - cloudformation:DescribeStacks
    - cloudformation:GetStackPolicy
    - cloudformation:SetStackPolicy
    - cloudformation:UpdateStack
    - cloudformation:UpdateTerminationProtection
    - cloudformation:ValidateTemplate
    - cloudformation:ListStackResources
    Resource: arn:aws:cloudformation:*:*:stack/awsconfigconforms-*
  - Effect: Allow
    Action:
    - cloudwatch:PutMetricData
    Resource: '*'
    Condition:
      StringEquals:
        cloudwatch:namespace: AWS/Config
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
