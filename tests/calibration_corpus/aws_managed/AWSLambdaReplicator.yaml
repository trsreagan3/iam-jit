name: aws-managed-AWSLambdaReplicator
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AWSLambdaReplicator\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=9; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: LambdaCreateDeletePermission
    Effect: Allow
    Action:
    - lambda:CreateFunction
    - lambda:DeleteFunction
    - lambda:DisableReplication
    Resource:
    - arn:aws:lambda:*:*:function:*
  - Sid: IamPassRolePermission
    Effect: Allow
    Action:
    - iam:PassRole
    Resource:
    - '*'
    Condition:
      StringLikeIfExists:
        iam:PassedToService: lambda.amazonaws.com
  - Sid: CloudFrontListDistributions
    Effect: Allow
    Action:
    - cloudfront:ListDistributionsByLambdaFunction
    Resource:
    - '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  score_max: 10
