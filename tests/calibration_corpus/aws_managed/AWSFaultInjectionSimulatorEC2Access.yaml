name: aws-managed-AWSFaultInjectionSimulatorEC2Access
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/service-role/AWSFaultInjectionSimulatorEC2Access\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: AllowEc2Actions
    Effect: Allow
    Action:
    - ec2:RebootInstances
    - ec2:SendSpotInstanceInterruptions
    - ec2:StartInstances
    - ec2:StopInstances
    - ec2:TerminateInstances
    Resource: arn:aws:ec2:*:*:instance/*
  - Sid: AllowEc2InstancesWithEncryptedEbsVolumes
    Effect: Allow
    Action:
    - kms:CreateGrant
    Resource:
    - arn:aws:kms:*:*:key/*
    Condition:
      StringLike:
        kms:ViaService: ec2.*.amazonaws.com
      Bool:
        kms:GrantIsForAWSResource: 'true'
  - Sid: AllowSSMSendOnEc2
    Effect: Allow
    Action:
    - ssm:SendCommand
    Resource:
    - arn:aws:ec2:*:*:instance/*
    - arn:aws:ssm:*:*:document/*
  - Sid: AllowSSMStopOnEc2
    Effect: Allow
    Action:
    - ssm:CancelCommand
    - ssm:ListCommands
    Resource: '*'
  - Sid: DescribeInstances
    Effect: Allow
    Action: ec2:DescribeInstances
    Resource: '*'
  - Sid: DescribeSubnets
    Effect: Allow
    Action: ec2:DescribeSubnets
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
