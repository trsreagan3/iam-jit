name: aws-managed-AWSSecurityHubOrganizationsAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AWSSecurityHubOrganizationsAccess\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=6; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: OrganizationPermissions
    Effect: Allow
    Action:
    - organizations:ListAccounts
    - organizations:DescribeOrganization
    - organizations:ListRoots
    - organizations:ListDelegatedAdministrators
    - organizations:ListAWSServiceAccessForOrganization
    - organizations:ListOrganizationalUnitsForParent
    - organizations:ListAccountsForParent
    - organizations:ListParents
    - organizations:DescribeAccount
    - organizations:DescribeOrganizationalUnit
    - organizations:ListPolicies
    - organizations:ListPoliciesForTarget
    - organizations:ListTargetsForPolicy
    - organizations:DescribeResourcePolicy
    Resource: '*'
  - Sid: OrganizationPermissionsEnable
    Effect: Allow
    Action: organizations:EnableAWSServiceAccess
    Resource: '*'
    Condition:
      StringEquals:
        organizations:ServicePrincipal:
        - securityhub.amazonaws.com
        - inspector2.amazonaws.com
        - guardduty.amazonaws.com
        - malware-protection.guardduty.amazonaws.com
  - Sid: OrganizationPermissionsDelegatedAdmin
    Effect: Allow
    Action:
    - organizations:RegisterDelegatedAdministrator
    - organizations:DeregisterDelegatedAdministrator
    Resource: arn:aws:organizations::*:account/o-*/*
    Condition:
      StringEquals:
        organizations:ServicePrincipal:
        - securityhub.amazonaws.com
        - inspector2.amazonaws.com
        - guardduty.amazonaws.com
        - malware-protection.guardduty.amazonaws.com
  - Sid: OrganizationPolicyPermissions
    Effect: Allow
    Action:
    - organizations:DescribePolicy
    - organizations:DescribeEffectivePolicy
    - organizations:CreatePolicy
    - organizations:UpdatePolicy
    - organizations:DeletePolicy
    - organizations:AttachPolicy
    - organizations:DetachPolicy
    - organizations:EnablePolicyType
    - organizations:DisablePolicyType
    Resource:
    - arn:aws:organizations::*:root/o-*/*
    - arn:aws:organizations::*:account/o-*/*
    - arn:aws:organizations::*:ou/o-*/*
    - arn:aws:organizations::*:policy/o-*/securityhub_policy/*
    - arn:aws:organizations::*:policy/o-*/inspector_policy/*
    Condition:
      StringLikeIfExists:
        organizations:PolicyType:
        - SECURITYHUB_POLICY
        - INSPECTOR_POLICY
  - Sid: OrganizationPolicyTaggingPermissions
    Effect: Allow
    Action:
    - organizations:TagResource
    - organizations:UntagResource
    - organizations:ListTagsForResource
    Resource:
    - arn:aws:organizations::*:policy/o-*/securityhub_policy/*
    - arn:aws:organizations::*:policy/o-*/inspector_policy/*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 5
  score_max: 7
