name: aws-managed-AmazonEKSNetworkingPolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AmazonEKSNetworkingPolicy\nAWS description: (none)\n\
  Generated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule\
  \ refactors. Current det_score=6; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action: ec2:CreateNetworkInterface
    Resource: '*'
    Condition:
      StringEquals:
        aws:RequestTag/eks:eks-cluster-name: ${aws:PrincipalTag/eks:eks-cluster-name}
      StringLike:
        aws:RequestTag/eks:kubernetes-cni-node-name: '*'
      ForAllValues:StringEquals:
        aws:TagKeys:
        - eks:eks-cluster-name
        - eks:kubernetes-cni-node-name
  - Effect: Allow
    Action: ec2:CreateNetworkInterface
    Resource:
    - arn:aws:ec2:*:*:security-group/*
    - arn:aws:ec2:*:*:subnet/*
  - Effect: Allow
    Action: ec2:CreateTags
    Resource: '*'
    Condition:
      StringEquals:
        ec2:CreateAction: CreateNetworkInterface
  - Effect: Allow
    Action:
    - ec2:AttachNetworkInterface
    - ec2:DetachNetworkInterface
    - ec2:UnassignPrivateIpAddresses
    - ec2:UnassignIpv6Addresses
    - ec2:AssignPrivateIpAddresses
    - ec2:AssignIpv6Addresses
    Resource: '*'
    Condition:
      StringEquals:
        aws:ResourceTag/eks:eks-cluster-name: ${aws:PrincipalTag/eks:eks-cluster-name}
  - Effect: Allow
    Action: ec2:ModifyNetworkInterfaceAttribute
    Resource:
    - arn:aws:ec2:*:*:network-interface/*
    - arn:aws:ec2:*:*:instance/*
    Condition:
      StringEquals:
        aws:ResourceTag/eks:eks-cluster-name: ${aws:PrincipalTag/eks:eks-cluster-name}
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 5
  score_max: 7
