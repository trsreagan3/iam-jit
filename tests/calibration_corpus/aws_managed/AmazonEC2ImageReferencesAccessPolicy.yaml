name: aws-managed-AmazonEC2ImageReferencesAccessPolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AmazonEC2ImageReferencesAccessPolicy\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=7; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action: ec2:DescribeImageReferences
    Resource: '*'
  - Effect: Allow
    Action:
    - ec2:DescribeInstances
    - ec2:DescribeLaunchTemplates
    - ec2:DescribeLaunchTemplateVersions
    - ssm:DescribeParameters
    - ssm:GetParameters
    - imagebuilder:ListImageRecipes
    - imagebuilder:ListContainerRecipes
    - imagebuilder:GetContainerRecipe
    Resource: '*'
    Condition:
      ForAnyValue:StringEquals:
        aws:CalledVia:
        - ec2-images.amazonaws.com
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 6
  score_max: 8
