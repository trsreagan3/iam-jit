name: aws-managed-AWSArtifactAgreementsFullAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AWSArtifactAgreementsFullAccess\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: ListAgreementActions
    Effect: Allow
    Action:
    - artifact:ListAgreements
    - artifact:ListCustomerAgreements
    Resource: '*'
  - Sid: AWSAgreementActions
    Effect: Allow
    Action:
    - artifact:GetAgreement
    - artifact:AcceptNdaForAgreement
    - artifact:GetNdaForAgreement
    - artifact:AcceptAgreement
    Resource: arn:aws:artifact:::agreement/*
  - Sid: CustomerAgreementActions
    Effect: Allow
    Action:
    - artifact:GetCustomerAgreement
    - artifact:TerminateAgreement
    Resource: arn:aws:artifact::*:customer-agreement/*
  - Sid: CreateServiceLinkedRoleForOrganizationsIntegration
    Effect: Allow
    Action:
    - iam:CreateServiceLinkedRole
    Resource: arn:aws:iam::*:role/aws-service-role/artifact.amazonaws.com/AWSServiceRoleForArtifact
    Condition:
      StringEquals:
        iam:AWSServiceName:
        - artifact.amazonaws.com
  - Sid: GetRoleToCheckForRoleExistence
    Effect: Allow
    Action:
    - iam:GetRole
    Resource: arn:aws:iam::*:role/aws-service-role/artifact.amazonaws.com/AWSServiceRoleForArtifact
  - Sid: EnableServiceTrust
    Effect: Allow
    Action:
    - organizations:ListAWSServiceAccessForOrganization
    - organizations:DescribeOrganization
    Resource: '*'
  - Sid: EnableServiceTrustForArtifact
    Effect: Allow
    Action:
    - organizations:EnableAWSServiceAccess
    Resource: '*'
    Condition:
      StringEquals:
        organizations:ServicePrincipal:
        - aws-artifact-account-sync.amazonaws.com
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
