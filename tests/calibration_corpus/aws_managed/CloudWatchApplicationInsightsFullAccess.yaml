name: aws-managed-CloudWatchApplicationInsightsFullAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/CloudWatchApplicationInsightsFullAccess\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action: applicationinsights:*
    Resource: '*'
  - Effect: Allow
    Action:
    - ec2:DescribeInstances
    - ec2:DescribeVolumes
    - rds:DescribeDBInstances
    - rds:DescribeDBClusters
    - sqs:ListQueues
    - elasticloadbalancing:DescribeLoadBalancers
    - elasticloadbalancing:DescribeTargetGroups
    - elasticloadbalancing:DescribeTargetHealth
    - autoscaling:DescribeAutoScalingGroups
    - lambda:ListFunctions
    - dynamodb:ListTables
    - s3:ListAllMyBuckets
    - sns:ListTopics
    - states:ListStateMachines
    - apigateway:GET
    - ecs:ListClusters
    - ecs:DescribeTaskDefinition
    - ecs:ListServices
    - ecs:ListTasks
    - eks:ListClusters
    - eks:ListNodegroups
    - fsx:DescribeFileSystems
    - logs:DescribeLogGroups
    Resource: '*'
  - Effect: Allow
    Action:
    - iam:CreateServiceLinkedRole
    Resource:
    - arn:aws:iam::*:role/aws-service-role/application-insights.amazonaws.com/AWSServiceRoleForApplicationInsights
    Condition:
      StringEquals:
        iam:AWSServiceName: application-insights.amazonaws.com
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
