name: aws-managed-MultiPartyApprovalReadOnlyAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/MultiPartyApprovalReadOnlyAccess\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=7; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: MpaReadAccess
    Effect: Allow
    Action:
    - mpa:Get*
    - mpa:List*
    Resource: '*'
  - Sid: OrganizationsAccess
    Effect: Allow
    Action:
    - organizations:ListDelegatedAdministrators
    - organizations:DescribeOrganization
    Resource: '*'
  - Sid: SSOManagementAccess
    Effect: Allow
    Action:
    - sso:DescribeInstance
    - sso:ListInstances
    - sso:DescribeRegisteredRegions
    - sso:GetSharedSsoConfiguration
    - sso-directory:DescribeUsers
    - sso-directory:SearchUsers
    Resource: '*'
  - Sid: AllowKmsAccessViaIdentityCenter
    Effect: Allow
    Action:
    - kms:Decrypt
    Resource: '*'
    Condition:
      ArnLike:
        kms:EncryptionContext:aws:sso:instance-arn: arn:*:sso:::instance/*
      StringLike:
        kms:ViaService: sso.*.amazonaws.com
  - Sid: AllowKmsAccessViaIdentityStore
    Effect: Allow
    Action:
    - kms:Decrypt
    Resource: '*'
    Condition:
      ArnLike:
        kms:EncryptionContext:aws:identitystore:identitystore-arn: arn:*:identitystore::*:identitystore/*
      StringLike:
        kms:ViaService: identitystore.*.amazonaws.com
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 6
  score_max: 8
