name: aws-managed-AmazonEKSServicePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AmazonEKSServicePolicy\nAWS description: (none)\n\
  Generated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule\
  \ refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - ec2:CreateNetworkInterface
    - ec2:CreateNetworkInterfacePermission
    - ec2:DeleteNetworkInterface
    - ec2:DescribeInstances
    - ec2:DescribeNetworkInterfaces
    - ec2:DetachNetworkInterface
    - ec2:DescribeSecurityGroups
    - ec2:DescribeSubnets
    - ec2:DescribeVpcs
    - ec2:ModifyNetworkInterfaceAttribute
    - iam:ListAttachedRolePolicies
    - eks:UpdateClusterVersion
    - ec2:GetSecurityGroupsForVpc
    Resource: '*'
  - Effect: Allow
    Action:
    - ec2:CreateTags
    - ec2:DeleteTags
    Resource:
    - arn:aws:ec2:*:*:vpc/*
    - arn:aws:ec2:*:*:subnet/*
  - Effect: Allow
    Action:
    - ec2:CreateTags
    Resource:
    - arn:aws:ec2:*:*:network-interface/*
    Condition:
      StringLike:
        aws:RequestTag/Name: eks-cluster-*
  - Effect: Allow
    Action: route53:AssociateVPCWithHostedZone
    Resource: '*'
  - Effect: Allow
    Action: logs:CreateLogGroup
    Resource: '*'
  - Effect: Allow
    Action:
    - logs:CreateLogStream
    - logs:DescribeLogStreams
    Resource: arn:aws:logs:*:*:log-group:/aws/eks/*:*
  - Effect: Allow
    Action: logs:PutLogEvents
    Resource: arn:aws:logs:*:*:log-group:/aws/eks/*:*:*
  - Effect: Allow
    Action: iam:CreateServiceLinkedRole
    Resource: arn:aws:iam::*:role/aws-service-role/eks.amazonaws.com/AWSServiceRoleForAmazonEKS
    Condition:
      StringLike:
        iam:AWSServiceName: eks.amazonaws.com
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
