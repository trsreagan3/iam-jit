name: aws-managed-AWSIdentityCenterExternalManagementPolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/service-role/AWSIdentityCenterExternalManagementPolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: IdentityStoreUserCreation
    Effect: Allow
    Action:
    - identitystore:CreateUser
    Resource:
    - arn:aws:identitystore::*:identitystore/${aws:PrincipalTag/IdentityStoreId}
    - arn:aws:identitystore:::user/*
    Condition:
      ForAllValues:ArnEquals:
        identitystore:UserExternalIdIssuers:
        - arn:aws:identitystore::*:identitystore/${aws:PrincipalTag/IdentityStoreId}/provisioningtenant/${aws:PrincipalTag/IdentityStoreExternalIdIssuer}
      'Null':
        identitystore:UserExternalIdIssuers: 'false'
        identitystore:ReservedUserId: 'false'
  - Sid: IdentityStoreUserManagement
    Effect: Allow
    Action:
    - identitystore:UpdateUser
    - identitystore:DeleteUser
    - identitystore:DescribeUser
    Resource:
    - arn:aws:identitystore::*:identitystore/${aws:PrincipalTag/IdentityStoreId}
    - arn:aws:identitystore:::user/*
    Condition:
      ForAllValues:ArnEquals:
        identitystore:UserExternalIdIssuers:
        - arn:aws:identitystore::*:identitystore/${aws:PrincipalTag/IdentityStoreId}/provisioningtenant/${aws:PrincipalTag/IdentityStoreExternalIdIssuer}
      'Null':
        identitystore:UserExternalIdIssuers: 'false'
  - Sid: IdentityStoreCMKAccess
    Effect: Allow
    Action: kms:Decrypt
    Resource: '*'
    Condition:
      StringEquals:
        kms:EncryptionContext:aws:identitystore:identitystore-arn:
        - arn:aws:identitystore::${aws:PrincipalAccount}:identitystore/${aws:PrincipalTag/IdentityStoreId}
      StringLike:
        kms:ViaService: identitystore.*.amazonaws.com
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
