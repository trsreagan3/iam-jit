name: aws-managed-AWS-SSM-DiagnosisAutomation-ExecutionRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AWS-SSM-DiagnosisAutomation-ExecutionRolePolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=6; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: AllowReadOnlyAccessEC2Resource
    Effect: Allow
    Action:
    - ec2:DescribeVpcs
    - ec2:DescribeVpcAttribute
    - ec2:DescribeVpcEndpoints
    - ec2:DescribeSubnets
    - ec2:DescribeSecurityGroups
    - ec2:DescribeInstances
    - ec2:DescribeInternetGateways
    - ec2:DescribeInstanceStatus
    - ec2:DescribeNetworkAcls
    Resource: '*'
  - Sid: AllowReadOnlyAccessSSMResource
    Effect: Allow
    Action:
    - ssm:DescribeAutomationStepExecutions
    - ssm:DescribeInstanceInformation
    - ssm:DescribeAutomationExecutions
    - ssm:DescribeActivations
    - ssm:GetAutomationExecution
    - ssm:GetServiceSetting
    Resource: '*'
  - Sid: AllowExecuteSSMAutomation
    Effect: Allow
    Action:
    - ssm:StartAutomationExecution
    Resource:
    - arn:aws:ssm:*:*:document/AWS-*UnmanagedEC2*
    - arn:aws:ssm:*:*:automation-execution/*
    - arn:aws:ssm:*:*:automation-definition/AWS-*UnmanagedEC2*:*
  - Sid: AllowKMSOperations
    Effect: Allow
    Action:
    - kms:Decrypt
    - kms:GenerateDataKey
    Resource: arn:aws:kms:*:*:key/*
    Condition:
      StringEquals:
        aws:ResourceTag/SystemsManagerManaged: 'true'
      ArnLike:
        kms:EncryptionContext:aws:s3:arn: arn:aws:s3:::do-not-delete-ssm-diagnosis-*
      StringLike:
        kms:ViaService: s3.*.amazonaws.com
      Bool:
        aws:ViaAWSService: 'true'
  - Sid: AllowPassRoleOnSelfToSsm
    Effect: Allow
    Action: iam:PassRole
    Resource: arn:aws:iam::*:role/AWS-SSM-DiagnosisExecutionRole*
    Condition:
      StringEquals:
        iam:PassedToService: ssm.amazonaws.com
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 5
  score_max: 7
