name: aws-managed-AWSServiceRoleForAWSTransform
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AWSServiceRoleForAWSTransform\nAWS\
  \ description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score\
  \ against future rule refactors. Current det_score=7; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: PublishCloudWatchMetrics
    Effect: Allow
    Action:
    - cloudwatch:PutMetricData
    Resource: '*'
    Condition:
      StringEquals:
        cloudwatch:namespace:
        - AWS/Transform
  - Sid: UserManagementPolicy
    Effect: Allow
    Action:
    - sso:DescribeApplication
    - sso:GetApplicationAssignmentConfiguration
    - sso:ListApplicationAssignmentsForPrincipal
    Resource:
    - '*'
  - Sid: AllowKmsAccessViaIdentityCenter
    Effect: Allow
    Action:
    - kms:Decrypt
    Resource: '*'
    Condition:
      ArnLike:
        kms:EncryptionContext:aws:sso:instance-arn: arn:*:sso:::instance/*
      StringLike:
        kms:ViaService: sso.*.amazonaws.com
  - Sid: AllowKmsAccessViaIdentityStore
    Effect: Allow
    Action:
    - kms:Decrypt
    Resource: '*'
    Condition:
      ArnLike:
        kms:EncryptionContext:aws:identitystore:identitystore-arn: arn:*:identitystore::*:identitystore/*
      StringLike:
        kms:ViaService: identitystore.*.amazonaws.com
  - Sid: SupportCaseManagement
    Effect: Allow
    Action:
    - support:CreateCase
    - support:DescribeCases
    - support:DescribeCommunications
    - support:AddCommunicationToCase
    - support:ResolveCase
    Resource: '*'
  - Sid: ExternalIdpSecretsAccess
    Effect: Allow
    Action:
    - secretsmanager:GetSecretValue
    Resource: arn:aws:secretsmanager:*:*:secret:transform!*
    Condition:
      StringEquals:
        secretsmanager:ResourceTag/aws:secretsmanager:owningService: transform
        aws:ResourceAccount: ${aws:PrincipalAccount}
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 6
  score_max: 8
