name: aws-managed-NeptuneGraphReadOnlyAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/NeptuneGraphReadOnlyAccess\nAWS description: (none)\n\
  Generated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule\
  \ refactors. Current det_score=6; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: AllowReadOnlyPermissionsForNeptuneGraph
    Effect: Allow
    Action:
    - neptune-graph:Get*
    - neptune-graph:List*
    - neptune-graph:Read*
    Resource: '*'
  - Sid: AllowReadOnlyPermissionsForEC2
    Effect: Allow
    Action:
    - ec2:DescribeVpcEndpoints
    - ec2:DescribeVpcAttribute
    - ec2:DescribeSecurityGroups
    - ec2:DescribeSubnets
    - ec2:DescribeVpcs
    - ec2:DescribeAvailabilityZones
    Resource: '*'
  - Sid: AllowReadOnlyPermissionsForKMS
    Effect: Allow
    Action:
    - kms:ListKeys
    - kms:ListAliases
    Resource: '*'
  - Sid: AllowReadOnlyPermissionsForCloudwatch
    Effect: Allow
    Action:
    - cloudwatch:GetMetricData
    - cloudwatch:ListMetrics
    - cloudwatch:GetMetricStatistics
    Resource: '*'
  - Sid: AllowReadOnlyPermissionsForLogs
    Effect: Allow
    Action:
    - logs:DescribeLogStreams
    - logs:GetLogEvents
    Resource:
    - arn:aws:logs:*:*:log-group:/aws/neptune/*:log-stream:*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 5
  score_max: 7
