name: aws-managed-AmazonRedshiftFullAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AmazonRedshiftFullAccess\nAWS description: (none)\n\
  Generated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule\
  \ refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Action:
    - redshift:*
    - redshift-serverless:*
    - ec2:DescribeAccountAttributes
    - ec2:DescribeAddresses
    - ec2:DescribeAvailabilityZones
    - ec2:DescribeSecurityGroups
    - ec2:DescribeSubnets
    - ec2:DescribeVpcs
    - ec2:DescribeInternetGateways
    - sns:CreateTopic
    - sns:Get*
    - sns:List*
    - cloudwatch:Describe*
    - cloudwatch:Get*
    - cloudwatch:List*
    - cloudwatch:PutMetricAlarm
    - cloudwatch:EnableAlarmActions
    - cloudwatch:DisableAlarmActions
    - tag:GetResources
    - tag:UntagResources
    - tag:GetTagValues
    - tag:GetTagKeys
    - tag:TagResources
    Effect: Allow
    Resource: '*'
  - Effect: Allow
    Action: iam:CreateServiceLinkedRole
    Resource: arn:aws:iam::*:role/aws-service-role/redshift.amazonaws.com/AWSServiceRoleForRedshift
    Condition:
      StringLike:
        iam:AWSServiceName: redshift.amazonaws.com
  - Sid: DataAPIPermissions
    Action:
    - redshift-data:ExecuteStatement
    - redshift-data:CancelStatement
    - redshift-data:ListStatements
    - redshift-data:GetStatementResult
    - redshift-data:DescribeStatement
    - redshift-data:ListDatabases
    - redshift-data:ListSchemas
    - redshift-data:ListTables
    - redshift-data:DescribeTable
    Effect: Allow
    Resource: '*'
  - Sid: SecretsManagerListPermissions
    Action:
    - secretsmanager:ListSecrets
    Effect: Allow
    Resource: '*'
  - Sid: SecretsManagerCreateGetPermissions
    Action:
    - secretsmanager:CreateSecret
    - secretsmanager:GetSecretValue
    - secretsmanager:TagResource
    Effect: Allow
    Resource: '*'
    Condition:
      StringLike:
        secretsmanager:ResourceTag/RedshiftDataFullAccess: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
