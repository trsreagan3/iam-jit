name: aws-managed-APIGatewayServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/APIGatewayServiceRolePolicy\nAWS\
  \ description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score\
  \ against future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - elasticloadbalancing:AddListenerCertificates
    - elasticloadbalancing:RemoveListenerCertificates
    - elasticloadbalancing:ModifyListener
    - elasticloadbalancing:DescribeListeners
    - elasticloadbalancing:DescribeLoadBalancers
    - xray:PutTraceSegments
    - xray:PutTelemetryRecords
    - xray:GetSamplingTargets
    - xray:GetSamplingRules
    - logs:CreateLogDelivery
    - logs:GetLogDelivery
    - logs:UpdateLogDelivery
    - logs:DeleteLogDelivery
    - logs:ListLogDeliveries
    - servicediscovery:DiscoverInstances
    Resource:
    - '*'
  - Effect: Allow
    Action:
    - firehose:DescribeDeliveryStream
    - firehose:PutRecord
    - firehose:PutRecordBatch
    Resource: arn:aws:firehose:*:*:deliverystream/amazon-apigateway-*
  - Effect: Allow
    Action:
    - acm:DescribeCertificate
    - acm:GetCertificate
    Resource: arn:aws:acm:*:*:certificate/*
  - Effect: Allow
    Action: ec2:CreateNetworkInterfacePermission
    Resource: arn:aws:ec2:*:*:network-interface/*
  - Effect: Allow
    Action: ec2:CreateTags
    Resource: arn:aws:ec2:*:*:network-interface/*
    Condition:
      ForAllValues:StringEquals:
        aws:TagKeys:
        - Owner
        - VpcLinkId
  - Effect: Allow
    Action:
    - ec2:ModifyNetworkInterfaceAttribute
    - ec2:DeleteNetworkInterface
    - ec2:AssignPrivateIpAddresses
    - ec2:CreateNetworkInterface
    - ec2:DeleteNetworkInterfacePermission
    - ec2:DescribeNetworkInterfaces
    - ec2:DescribeAvailabilityZones
    - ec2:DescribeNetworkInterfaceAttribute
    - ec2:DescribeVpcs
    - ec2:DescribeNetworkInterfacePermissions
    - ec2:UnassignPrivateIpAddresses
    - ec2:DescribeSubnets
    - ec2:DescribeRouteTables
    - ec2:DescribeSecurityGroups
    Resource: '*'
  - Effect: Allow
    Action: servicediscovery:GetNamespace
    Resource: arn:aws:servicediscovery:*:*:namespace/*
  - Effect: Allow
    Action: servicediscovery:GetService
    Resource: arn:aws:servicediscovery:*:*:service/*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
