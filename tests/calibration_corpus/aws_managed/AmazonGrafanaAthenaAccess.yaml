name: aws-managed-AmazonGrafanaAthenaAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/service-role/AmazonGrafanaAthenaAccess\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - athena:GetDatabase
    - athena:GetDataCatalog
    - athena:GetTableMetadata
    - athena:ListDatabases
    - athena:ListDataCatalogs
    - athena:ListTableMetadata
    - athena:ListWorkGroups
    Resource:
    - '*'
  - Effect: Allow
    Action:
    - athena:GetQueryExecution
    - athena:GetQueryResults
    - athena:GetWorkGroup
    - athena:StartQueryExecution
    - athena:StopQueryExecution
    Resource:
    - '*'
    Condition:
      'Null':
        aws:ResourceTag/GrafanaDataSource: 'false'
  - Effect: Allow
    Action:
    - glue:GetDatabase
    - glue:GetDatabases
    - glue:GetTable
    - glue:GetTables
    - glue:GetPartition
    - glue:GetPartitions
    - glue:BatchGetPartition
    Resource:
    - '*'
  - Effect: Allow
    Action:
    - s3:GetBucketLocation
    - s3:GetObject
    - s3:ListBucket
    - s3:ListBucketMultipartUploads
    - s3:ListMultipartUploadParts
    - s3:AbortMultipartUpload
    - s3:CreateBucket
    - s3:PutObject
    - s3:PutBucketPublicAccessBlock
    Resource:
    - arn:aws:s3:::grafana-athena-query-results-*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
