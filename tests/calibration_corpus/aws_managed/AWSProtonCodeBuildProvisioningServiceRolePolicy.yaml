name: aws-managed-AWSProtonCodeBuildProvisioningServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AWSProtonCodeBuildProvisioningServiceRolePolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=9; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - cloudformation:CreateStack
    - cloudformation:CreateChangeSet
    - cloudformation:DeleteChangeSet
    - cloudformation:DeleteStack
    - cloudformation:UpdateStack
    - cloudformation:DescribeStacks
    - cloudformation:DescribeStackEvents
    - cloudformation:ListStackResources
    Resource:
    - arn:aws:cloudformation:*:*:stack/AWSProton-CodeBuild-*
  - Effect: Allow
    Action:
    - codebuild:CreateProject
    - codebuild:DeleteProject
    - codebuild:UpdateProject
    - codebuild:StartBuild
    - codebuild:StopBuild
    - codebuild:RetryBuild
    - codebuild:BatchGetBuilds
    - codebuild:BatchGetProjects
    Resource: arn:aws:codebuild:*:*:project/AWSProton*
  - Effect: Allow
    Action: iam:PassRole
    Resource: '*'
    Condition:
      StringEqualsIfExists:
        iam:PassedToService: codebuild.amazonaws.com
  - Effect: Allow
    Action:
    - servicequotas:GetServiceQuota
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 8
  score_max: 10
