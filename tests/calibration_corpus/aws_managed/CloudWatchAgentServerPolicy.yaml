name: aws-managed-CloudWatchAgentServerPolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy\nAWS description: (none)\n\
  Generated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule\
  \ refactors. Current det_score=6; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: CWACloudWatchServerPermissions
    Effect: Allow
    Action:
    - cloudwatch:PutMetricData
    - ec2:DescribeVolumes
    - ec2:DescribeTags
    - logs:PutLogEvents
    - logs:PutRetentionPolicy
    - logs:DescribeLogStreams
    - logs:DescribeLogGroups
    - logs:CreateLogStream
    - logs:CreateLogGroup
    - xray:PutTraceSegments
    - xray:PutTelemetryRecords
    - xray:GetSamplingRules
    - xray:GetSamplingTargets
    - xray:GetSamplingStatisticSummaries
    Resource: '*'
  - Sid: CWASSMServerPermissions
    Effect: Allow
    Action:
    - ssm:GetParameter
    Resource: arn:aws:ssm:*:*:parameter/AmazonCloudWatch-*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
