name: aws-managed-AmazonAugmentedAIIntegratedAPIAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AmazonAugmentedAIIntegratedAPIAccess\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=6; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - sagemaker:*HumanLoop
    - sagemaker:*HumanLoops
    - sagemaker:*FlowDefinition
    - sagemaker:*FlowDefinitions
    - sagemaker:*HumanTaskUi
    - sagemaker:*HumanTaskUis
    Resource: '*'
    Condition:
      StringEqualsIfExists:
        sagemaker:WorkteamType:
        - private-crowd
        - vendor-crowd
  - Effect: Allow
    Action:
    - textract:AnalyzeDocument
    Resource: '*'
  - Effect: Allow
    Action:
    - rekognition:DetectModerationLabels
    Resource: '*'
  - Effect: Allow
    Action:
    - iam:PassRole
    Resource: arn:aws:iam::*:role/*
    Condition:
      StringEquals:
        iam:PassedToService:
        - sagemaker.amazonaws.com
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 5
  score_max: 7
