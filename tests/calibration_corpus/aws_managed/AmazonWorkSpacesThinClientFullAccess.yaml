name: aws-managed-AmazonWorkSpacesThinClientFullAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AmazonWorkSpacesThinClientFullAccess\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: AllowThinClientFullAccess
    Effect: Allow
    Action:
    - thinclient:*
    Resource: '*'
  - Sid: AllowWorkSpacesAccess
    Effect: Allow
    Action:
    - workspaces:DescribeConnectionAliases
    - workspaces:DescribeWorkspaceDirectories
    Resource: '*'
  - Sid: AllowWorkSpacesSecureBrowserAccess
    Effect: Allow
    Action:
    - workspaces-web:GetPortal
    - workspaces-web:GetUserSettings
    - workspaces-web:ListPortals
    Resource: '*'
  - Sid: AllowAppStreamAccess
    Effect: Allow
    Action:
    - appstream:DescribeStacks
    Resource: '*'
  - Sid: AllowCreateServiceLinkedRole
    Effect: Allow
    Action: iam:CreateServiceLinkedRole
    Resource: arn:aws:iam::*:role/aws-service-role/monitoring.thinclient.amazonaws.com/AWSServiceRoleForAmazonWorkSpacesThinClientMonitoring
    Condition:
      StringEquals:
        iam:AWSServiceName: monitoring.thinclient.amazonaws.com
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
