  - Sid: MgnSourceServerTagResource
    Effect: Allow
    Action: mgn:TagResource
    Resource: arn:aws:mgn:*:*:source-server/*
    Condition:
      StringEquals:
        mgn:CreateAction: RegisterAgentForMgn
