    - '*'
  - Effect: Allow
    Action:
    - iam:PassRole
    Resource:
    - arn:aws:iam::*:role/aws-ec2-spot-fleet-tagging-role
    - arn:aws:iam::*:role/DeadlineSpot*
    Condition:
      StringLike:
        iam:PassedToService: ec2.amazonaws.com
