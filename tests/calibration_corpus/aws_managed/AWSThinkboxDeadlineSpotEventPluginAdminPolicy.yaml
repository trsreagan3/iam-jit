        ec2:ResourceTag/aws:ec2spot:fleet-request-id: '*'
  - Effect: Allow
    Action:
    - iam:CreateServiceLinkedRole
    Resource:
    - arn:aws:iam::*:role/aws-service-role/*
    Condition:
      StringEquals:
        iam:AWSServiceName:
        - spot.amazonaws.com
        - spotfleet.amazonaws.com
  - Effect: Allow
    Action:
    - iam:GetInstanceProfile
    Resource:
    - arn:aws:iam::*:instance-profile/*
  - Effect: Allow
