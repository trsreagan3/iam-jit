name: aws-managed-AWSOutpostsServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AWSOutpostsServiceRolePolicy\nAWS\
  \ description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score\
  \ against future rule refactors. Current det_score=6; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: PrivateConnectivityServiceRolePolicy
    Effect: Allow
    Action:
    - ec2:DescribeNetworkInterfaces
    - ec2:DescribeSecurityGroups
    - ec2:DescribeSubnets
    - ec2:DescribeVpcEndpoints
    Resource: '*'
  - Sid: PrivateConnectivityCreateNetworkInterfacePolicy
    Effect: Allow
    Action:
    - ec2:CreateNetworkInterface
    Resource:
    - arn:*:ec2:*:*:vpc/*
    - arn:*:ec2:*:*:subnet/*
    - arn:*:ec2:*:*:security-group/*
  - Sid: PrivateConnectivityCreateNetworkInterfaceTaggingPolicy
    Effect: Allow
    Action:
    - ec2:CreateNetworkInterface
    Resource:
    - arn:*:ec2:*:*:network-interface/*
    Condition:
      ForAnyValue:StringEquals:
        aws:TagKeys:
        - outposts:private-connectivity-resourceId
  - Sid: PrivateConnectivityCreateSecurityGroupPolicy
    Effect: Allow
    Action:
    - ec2:CreateSecurityGroup
    Resource:
    - arn:*:ec2:*:*:vpc/*
  - Sid: PrivateConnectivityCreateSecurityGroupTaggingPolicy
    Effect: Allow
    Action:
    - ec2:CreateSecurityGroup
    Resource:
    - arn:*:ec2:*:*:security-group/*
    Condition:
      ForAnyValue:StringEquals:
        aws:TagKeys:
        - outposts:private-connectivity-resourceId
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 5
  score_max: 7
