name: aws-managed-AWSMarketplaceDeploymentServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AWSMarketplaceDeploymentServiceRolePolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=6; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: ManageMarketplaceDeploymentSecrets
    Effect: Allow
    Action:
    - secretsmanager:CreateSecret
    - secretsmanager:PutSecretValue
    - secretsmanager:DescribeSecret
    - secretsmanager:DeleteSecret
    - secretsmanager:RemoveRegionsFromReplication
    Resource:
    - arn:aws:secretsmanager:*:*:secret:marketplace-deployment*!*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: ListSecrets
    Effect: Allow
    Action:
    - secretsmanager:ListSecrets
    Resource:
    - '*'
  - Sid: TagMarketplaceDeploymentSecrets
    Effect: Allow
    Action:
    - secretsmanager:TagResource
    Resource: arn:aws:secretsmanager:*:*:secret:marketplace-deployment!*
    Condition:
      'Null':
        aws:RequestTag/expirationDate: 'false'
      ForAllValues:StringEquals:
        aws:TagKeys:
        - expirationDate
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 5
  score_max: 7
