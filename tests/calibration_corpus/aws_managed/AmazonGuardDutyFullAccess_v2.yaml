name: aws-managed-AmazonGuardDutyFullAccess_v2
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AmazonGuardDutyFullAccess_v2\nAWS description: (none)\n\
  Generated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule\
  \ refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: GuardDutyFullAccess
    Effect: Allow
    Action: guardduty:*
    Resource: '*'
  - Sid: CreateGuardDutyServiceLinkedRole
    Effect: Allow
    Action: iam:CreateServiceLinkedRole
    Resource: '*'
    Condition:
      StringEquals:
        iam:AWSServiceName:
        - guardduty.amazonaws.com
        - malware-protection.guardduty.amazonaws.com
  - Sid: GuardDutyOrganizationsReadOnly
    Effect: Allow
    Action:
    - organizations:ListAWSServiceAccessForOrganization
    - organizations:DescribeOrganizationalUnit
    - organizations:DescribeAccount
    - organizations:DescribeOrganization
    - organizations:ListAccounts
    Resource: '*'
  - Sid: GuardDutyOrganizationsAdminAccess
    Effect: Allow
    Action:
    - organizations:EnableAWSServiceAccess
    - organizations:DisableAWSServiceAccess
    - organizations:RegisterDelegatedAdministrator
    - organizations:DeregisterDelegatedAdministrator
    - organizations:ListDelegatedAdministrators
    Resource: '*'
    Condition:
      StringEquals:
        organizations:ServicePrincipal:
        - guardduty.amazonaws.com
        - malware-protection.guardduty.amazonaws.com
  - Sid: GuardDutyIamRoleAccess
    Effect: Allow
    Action: iam:GetRole
    Resource: arn:aws:iam::*:role/*AWSServiceRoleForAmazonGuardDutyMalwareProtection
  - Sid: AllowPassRoleToMalwareProtection
    Effect: Allow
    Action:
    - iam:PassRole
    Resource: arn:aws:iam::*:role/*
    Condition:
      StringEquals:
        iam:PassedToService:
        - malware-protection-plan.guardduty.amazonaws.com
        - malware-protection.guardduty.amazonaws.com
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
