name: aws-managed-AWSNetworkFirewallServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AWSNetworkFirewallServiceRolePolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Action:
    - ec2:DescribeSubnets
    - ec2:DescribeVpcs
    - ec2:CreateVpcEndpoint
    - ec2:DescribeVpcEndpoints
    - ec2:DescribeInstances
    - ec2:DescribeNetworkInterfaces
    Effect: Allow
    Resource: '*'
  - Effect: Allow
    Action: acm:DescribeCertificate
    Resource: '*'
  - Effect: Allow
    Action: resource-groups:ListGroupResources
    Resource: '*'
  - Effect: Allow
    Action: tag:GetResources
    Resource: '*'
    Condition:
      StringEquals:
        aws:CalledViaLast: resource-groups.amazonaws.com
  - Effect: Allow
    Action:
    - ec2:CreateTags
    Resource: arn:aws:ec2:*:*:vpc-endpoint/*
    Condition:
      StringEquals:
        ec2:CreateAction: CreateVpcEndpoint
        aws:RequestTag/AWSNetworkFirewallManaged: 'true'
  - Effect: Allow
    Action:
    - ec2:DeleteVpcEndpoints
    Resource: '*'
    Condition:
      StringEquals:
        aws:ResourceTag/AWSNetworkFirewallManaged: 'true'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
