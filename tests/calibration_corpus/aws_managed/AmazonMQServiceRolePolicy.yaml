name: aws-managed-AmazonMQServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AmazonMQServiceRolePolicy\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - ec2:DescribeVpcEndpoints
    Resource: '*'
  - Effect: Allow
    Action:
    - ec2:CreateVpcEndpoint
    Resource:
    - arn:aws:ec2:*:*:vpc/*
    - arn:aws:ec2:*:*:subnet/*
    - arn:aws:ec2:*:*:security-group/*
  - Effect: Allow
    Action:
    - ec2:CreateVpcEndpoint
    Resource:
    - arn:aws:ec2:*:*:vpc-endpoint/*
    Condition:
      StringEquals:
        aws:RequestTag/AMQManaged: 'true'
  - Effect: Allow
    Action:
    - ec2:CreateTags
    Resource: arn:aws:ec2:*:*:vpc-endpoint/*
    Condition:
      StringEquals:
        ec2:CreateAction: CreateVpcEndpoint
  - Effect: Allow
    Action:
    - ec2:DeleteVpcEndpoints
    Resource: arn:aws:ec2:*:*:vpc-endpoint/*
    Condition:
      StringEquals:
        ec2:ResourceTag/AMQManaged: 'true'
  - Effect: Allow
    Action:
    - logs:PutLogEvents
    - logs:DescribeLogStreams
    - logs:DescribeLogGroups
    - logs:CreateLogStream
    - logs:CreateLogGroup
    Resource:
    - arn:aws:logs:*:*:log-group:/aws/amazonmq/*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
