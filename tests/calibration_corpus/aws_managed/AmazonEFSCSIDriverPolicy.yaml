name: aws-managed-AmazonEFSCSIDriverPolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/service-role/AmazonEFSCSIDriverPolicy\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: AllowDescribe
    Effect: Allow
    Action:
    - elasticfilesystem:DescribeAccessPoints
    - elasticfilesystem:DescribeFileSystems
    - elasticfilesystem:DescribeMountTargets
    - ec2:DescribeAvailabilityZones
    Resource: '*'
  - Sid: AllowCreateAccessPoint
    Effect: Allow
    Action:
    - elasticfilesystem:CreateAccessPoint
    Resource: '*'
    Condition:
      'Null':
        aws:RequestTag/efs.csi.aws.com/cluster: 'false'
      ForAllValues:StringEquals:
        aws:TagKeys: efs.csi.aws.com/cluster
  - Sid: AllowTagNewAccessPoints
    Effect: Allow
    Action:
    - elasticfilesystem:TagResource
    Resource: '*'
    Condition:
      StringEquals:
        elasticfilesystem:CreateAction: CreateAccessPoint
      'Null':
        aws:RequestTag/efs.csi.aws.com/cluster: 'false'
      ForAllValues:StringEquals:
        aws:TagKeys: efs.csi.aws.com/cluster
  - Sid: AllowDeleteAccessPoint
    Effect: Allow
    Action: elasticfilesystem:DeleteAccessPoint
    Resource: '*'
    Condition:
      'Null':
        aws:ResourceTag/efs.csi.aws.com/cluster: 'false'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
