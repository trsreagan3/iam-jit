name: aws-managed-AWSGreengrassResourceAccessRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/service-role/AWSGreengrassResourceAccessRolePolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: AllowGreengrassAccessToShadows
    Action:
    - iot:DeleteThingShadow
    - iot:GetThingShadow
    - iot:UpdateThingShadow
    Effect: Allow
    Resource:
    - arn:aws:iot:*:*:thing/GG_*
    - arn:aws:iot:*:*:thing/*-gcm
    - arn:aws:iot:*:*:thing/*-gda
    - arn:aws:iot:*:*:thing/*-gci
  - Sid: AllowGreengrassToDescribeThings
    Action:
    - iot:DescribeThing
    Effect: Allow
    Resource: arn:aws:iot:*:*:thing/*
  - Sid: AllowGreengrassToDescribeCertificates
    Action:
    - iot:DescribeCertificate
    Effect: Allow
    Resource: arn:aws:iot:*:*:cert/*
  - Sid: AllowGreengrassToCallGreengrassServices
    Action:
    - greengrass:*
    Effect: Allow
    Resource: '*'
  - Sid: AllowGreengrassToGetLambdaFunctions
    Action:
    - lambda:GetFunction
    - lambda:GetFunctionConfiguration
    Effect: Allow
    Resource: '*'
  - Sid: AllowGreengrassToGetGreengrassSecrets
    Action:
    - secretsmanager:GetSecretValue
    Effect: Allow
    Resource: arn:aws:secretsmanager:*:*:secret:greengrass-*
  - Sid: AllowGreengrassAccessToS3Objects
    Action:
    - s3:GetObject
    Effect: Allow
    Resource:
    - arn:aws:s3:::*Greengrass*
    - arn:aws:s3:::*GreenGrass*
    - arn:aws:s3:::*greengrass*
    - arn:aws:s3:::*Sagemaker*
    - arn:aws:s3:::*SageMaker*
    - arn:aws:s3:::*sagemaker*
  - Sid: AllowGreengrassAccessToS3BucketLocation
    Action:
    - s3:GetBucketLocation
    Effect: Allow
    Resource: '*'
  - Sid: AllowGreengrassAccessToSageMakerTrainingJobs
    Action:
    - sagemaker:DescribeTrainingJob
    Effect: Allow
    Resource:
    - arn:aws:sagemaker:*:*:training-job/*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
