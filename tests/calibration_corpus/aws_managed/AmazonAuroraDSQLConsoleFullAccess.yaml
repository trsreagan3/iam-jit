name: aws-managed-AmazonAuroraDSQLConsoleFullAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AmazonAuroraDSQLConsoleFullAccess\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: DsqlAllPermissions
    Effect: Allow
    Action:
    - dsql:PutClusterPolicy
    - dsql:GetClusterPolicy
    - dsql:DeleteClusterPolicy
    - dsql:CreateCluster
    - dsql:GetCluster
    - dsql:UpdateCluster
    - dsql:DeleteCluster
    - dsql:ListClusters
    - dsql:TagResource
    - dsql:UntagResource
    - dsql:ListTagsForResource
    - dsql:DbConnectAdmin
    - dsql:DbConnect
    - dsql:PutMultiRegionProperties
    - dsql:PutWitnessRegion
    - dsql:AddPeerCluster
    - dsql:RemovePeerCluster
    - dsql:GetVpcEndpointServiceName
    - dsql:StartBackupJob
    - dsql:GetBackupJob
    - dsql:StopBackupJob
    - dsql:StartRestoreJob
    - dsql:GetRestoreJob
    - dsql:StopRestoreJob
    - dsql:InjectError
    Resource: '*'
  - Sid: DsqlConsolePermissions
    Effect: Allow
    Action:
    - access-analyzer:ValidatePolicy
    - tag:GetTagKeys
    - tag:GetTagValues
    - cloudwatch:GetMetricData
    - ec2:DescribeVpcEndpoints
    - kms:ListAliases
    - kms:DescribeKey
    Resource: '*'
  - Sid: KMSCryptographicPermissions
    Effect: Allow
    Action:
    - kms:Decrypt
    - kms:Encrypt
    - kms:GenerateDataKey
    - kms:ReEncryptTo
    - kms:ReEncryptFrom
    Resource: '*'
    Condition:
      StringLike:
        kms:ViaService:
        - dsql.*.amazonaws.com
      ForAnyValue:StringEquals:
        kms:EncryptionContextKeys: aws:dsql:ClusterId
  - Sid: CreateDsqlServiceLinkedRole
    Effect: Allow
    Action: iam:CreateServiceLinkedRole
    Resource: '*'
    Condition:
      StringEquals:
        iam:AWSServiceName: dsql.amazonaws.com
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
