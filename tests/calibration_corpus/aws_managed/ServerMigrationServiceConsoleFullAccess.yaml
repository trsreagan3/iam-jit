name: aws-managed-ServerMigrationServiceConsoleFullAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/ServerMigrationServiceConsoleFullAccess\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Action:
    - sms:*
    Effect: Allow
    Resource: '*'
  - Action:
    - cloudformation:ListStacks
    - cloudformation:DescribeStacks
    - cloudformation:DescribeStackResources
    Effect: Allow
    Resource: '*'
  - Action: s3:ListAllMyBuckets
    Effect: Allow
    Resource: '*'
  - Effect: Allow
    Action: s3:GetObject
    Resource: arn:aws:s3:::sms-app-*/*
  - Action:
    - ec2:DescribeKeyPairs
    - ec2:DescribeVpcs
    - ec2:DescribeSubnets
    - ec2:DescribeSecurityGroups
    Effect: Allow
    Resource: '*'
  - Action:
    - iam:ListRoles
    Effect: Allow
    Resource: '*'
  - Action:
    - iam:CreateServiceLinkedRole
    Condition:
      StringEquals:
        iam:AWSServiceName: sms.amazonaws.com
    Effect: Allow
    Resource: '*'
  - Effect: Allow
    Action: iam:GetInstanceProfile
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
