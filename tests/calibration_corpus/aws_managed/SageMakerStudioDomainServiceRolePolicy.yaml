name: aws-managed-SageMakerStudioDomainServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/service-role/SageMakerStudioDomainServiceRolePolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=7; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: SSMGetParameterStatement
    Effect: Allow
    Action:
    - ssm:GetParameter
    Resource:
    - arn:aws:ssm:*:*:parameter/amazon/datazone/profiles/*
  - Sid: UseKMSKeyPermissionsStatement
    Effect: Allow
    Action:
    - kms:Decrypt
    Resource: '*'
    Condition:
      StringEquals:
        aws:ResourceTag/EnableKeyForAmazonDataZone: 'true'
      'Null':
        aws:ResourceTag/EnableKeyForAmazonDataZone: 'false'
      StringLike:
        kms:ViaService: ssm.*.amazonaws.com
        kms:EncryptionContext:PARAMETER_ARN: arn:aws:ssm:*:*:parameter/amazon/datazone/profiles*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
