name: aws-managed-AWSSecurityIncidentResponseTriageServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AWSSecurityIncidentResponseTriageServiceRolePolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - events:DeleteRule
    - events:PutRule
    - events:PutTargets
    - events:RemoveTargets
    Resource: '*'
    Condition:
      StringEquals:
        events:ManagedBy: triage.security-ir.amazonaws.com
  - Effect: Allow
    Action:
    - events:DescribeRule
    - events:ListTargetsByRule
    Resource: '*'
  - Effect: Allow
