name: aws-managed-AWSDataLifecycleManagerSSMFullAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/service-role/AWSDataLifecycleManagerSSMFullAccess\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=7; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: AllowSSMReadOnlyAccess
    Effect: Allow
    Action:
    - ssm:GetCommandInvocation
    - ssm:ListCommands
    - ssm:DescribeInstanceInformation
    Resource: '*'
  - Sid: AllowTaggedSSMDocumentsOnly
    Effect: Allow
    Action:
    - ssm:SendCommand
    - ssm:DescribeDocument
    - ssm:GetDocument
    Resource:
    - arn:aws:ssm:*:*:document/*
    Condition:
      StringEquals:
        aws:ResourceTag/DLMScriptsAccess: 'true'
  - Sid: AllowSpecificAWSOwnedSSMDocuments
    Effect: Allow
    Action:
    - ssm:SendCommand
    - ssm:DescribeDocument
    - ssm:GetDocument
    Resource:
    - arn:aws:ssm:*:*:document/AWSEC2-CreateVssSnapshot
    - arn:aws:ssm:*:*:document/AWSSystemsManagerSAP-CreateDLMSnapshotForSAPHANA
  - Sid: AllowAllEC2Instances
    Effect: Allow
    Action:
    - ssm:SendCommand
    Resource:
    - arn:aws:ec2:*:*:instance/*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 6
  score_max: 8
