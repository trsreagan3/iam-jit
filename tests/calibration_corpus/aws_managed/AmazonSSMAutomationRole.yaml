policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - lambda:InvokeFunction
    Resource:
    - arn:aws:lambda:*:*:function:Automation*
  - Effect: Allow
    Action:
    - ec2:CreateImage
    - ec2:CopyImage
    - ec2:DeregisterImage
    - ec2:DescribeImages
    - ec2:DeleteSnapshot
    - ec2:StartInstances
    - ec2:RunInstances
    - ec2:StopInstances
    - ec2:TerminateInstances
    - ec2:DescribeInstanceStatus
    - ec2:CreateTags
    - ec2:DeleteTags
    - ec2:DescribeTags
    - cloudformation:CreateStack
    - cloudformation:DescribeStackEvents
    - cloudformation:DescribeStacks
    - cloudformation:UpdateStack
    - cloudformation:DeleteStack
    - cloudformation:TagResource
    - cloudformation:UntagResource
    Resource:
    - '*'
  - Effect: Allow
    Action:
    - ssm:*
    Resource:
    - '*'
  - Effect: Allow
    Action:
    - sns:Publish
    Resource:
    - arn:aws:sns:*:*:Automation*
  - Effect: Allow
    Action:
    - ssmmessages:OpenDataChannel
    Resource:
    - arn:*:ssm:*:*:session/*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
