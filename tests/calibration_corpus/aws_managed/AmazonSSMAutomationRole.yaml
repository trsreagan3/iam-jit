name: aws-managed-AmazonSSMAutomationRole
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/service-role/AmazonSSMAutomationRole\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
