name: aws-managed-AmazonInspector2FullAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/AmazonInspector2FullAccess\nAWS description: (none)\n\
  Generated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule\
  \ refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: AllowFullAccessToInspectorApis
    Effect: Allow
    Action: inspector2:*
    Resource: '*'
  - Sid: AllowAccessToCodeGuruApis
    Effect: Allow
    Action:
    - codeguru-security:BatchGetFindings
    - codeguru-security:GetAccountConfiguration
    Resource: '*'
  - Sid: AllowAccessToCreateSlr
    Effect: Allow
    Action: iam:CreateServiceLinkedRole
    Resource: '*'
    Condition:
      StringEquals:
        iam:AWSServiceName:
        - agentless.inspector2.amazonaws.com
        - inspector2.amazonaws.com
  - Sid: AllowAccessToOrganizationApis
    Effect: Allow
    Action:
    - organizations:EnableAWSServiceAccess
    - organizations:RegisterDelegatedAdministrator
    - organizations:ListDelegatedAdministrators
    - organizations:ListAWSServiceAccessForOrganization
    - organizations:DescribeOrganizationalUnit
    - organizations:DescribeAccount
    - organizations:DescribeOrganization
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
