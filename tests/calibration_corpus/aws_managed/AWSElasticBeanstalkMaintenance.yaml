name: aws-managed-AWSElasticBeanstalkMaintenance
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AWSElasticBeanstalkMaintenance\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=5; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: AllowCloudformationChangeSetOperationsOnElasticBeanstalkStacks
    Effect: Allow
    Action:
    - cloudformation:CreateChangeSet
    - cloudformation:DescribeChangeSet
    - cloudformation:ExecuteChangeSet
    - cloudformation:DeleteChangeSet
    - cloudformation:ListChangeSets
    - cloudformation:DescribeStacks
    - cloudformation:TagResource
    - cloudformation:UntagResource
    Resource:
    - arn:aws:cloudformation:*:*:stack/awseb-*
    - arn:aws:cloudformation:*:*:stack/eb-*
  - Sid: AllowElasticBeanstalkStacksUpdateExecuteSuccessfully
    Effect: Allow
    Action: elasticloadbalancing:DescribeLoadBalancers
    Resource: '*'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 4
  score_max: 6
