name: aws-managed-AmazonEMRContainersServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/AmazonEMRContainersServiceRolePolicy\n\
  AWS description: (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic\
  \ score against future rule refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - eks:DescribeCluster
    - eks:ListNodeGroups
    - eks:DescribeNodeGroup
    - ec2:DescribeRouteTables
    - ec2:DescribeSubnets
    - ec2:DescribeSecurityGroups
    - elasticloadbalancing:DescribeInstanceHealth
    - elasticloadbalancing:DescribeLoadBalancers
    - elasticloadbalancing:DescribeTargetGroups
    - elasticloadbalancing:DescribeTargetHealth
    - eks:ListPodIdentityAssociations
    - eks:DescribePodIdentityAssociation
    Resource: '*'
  - Effect: Allow
    Action:
    - acm:ImportCertificate
    - acm:AddTagsToCertificate
    Resource: '*'
    Condition:
      StringEquals:
        aws:RequestTag/emr-container:endpoint:managed-certificate: 'true'
  - Effect: Allow
    Action:
    - acm:DeleteCertificate
    Resource: '*'
    Condition:
      StringEquals:
        aws:ResourceTag/emr-container:endpoint:managed-certificate: 'true'
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
