name: aws-managed-ServiceQuotasFullAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/ServiceQuotasFullAccess\nAWS description: (none)\n\
  Generated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule\
  \ refactors. Current det_score=8; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Effect: Allow
    Action:
    - autoscaling:DescribeAccountLimits
    - cloudformation:DescribeAccountLimits
    - cloudwatch:DescribeAlarmsForMetric
    - cloudwatch:DescribeAlarms
    - cloudwatch:GetMetricData
    - cloudwatch:GetMetricStatistics
    - cloudwatch:PutMetricAlarm
    - dynamodb:DescribeLimits
    - elasticloadbalancing:DescribeAccountLimits
    - iam:GetAccountSummary
    - kinesis:DescribeLimits
    - organizations:DescribeAccount
    - organizations:DescribeOrganization
    - organizations:ListAWSServiceAccessForOrganization
    - rds:DescribeAccountAttributes
    - route53:GetAccountLimit
    - tag:GetTagKeys
    - tag:GetTagValues
    - servicequotas:*
    Resource: '*'
  - Effect: Allow
    Action:
    - cloudwatch:DeleteAlarms
    Resource: '*'
    Condition:
      'Null':
        aws:ResourceTag/ServiceQuotaMonitor: 'false'
  - Effect: Allow
    Action:
    - organizations:EnableAWSServiceAccess
    Resource: '*'
    Condition:
      StringLike:
        organizations:ServicePrincipal:
        - servicequotas.amazonaws.com
  - Effect: Allow
    Action:
    - iam:CreateServiceLinkedRole
    Resource: '*'
    Condition:
      StringEquals:
        iam:AWSServiceName: servicequotas.amazonaws.com
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 7
  score_max: 9
