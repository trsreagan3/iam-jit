name: aws-managed-CloudWatchOpenSearchDashboardAccess
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/CloudWatchOpenSearchDashboardAccess\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=6; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: CloudWatchOpenSearchDashboardsIntegration
    Effect: Allow
    Action:
    - logs:ListIntegrations
    - logs:GetIntegration
    - logs:DescribeLogGroups
    - opensearch:ApplicationAccessAll
    - iam:ListRoles
    - iam:ListUsers
    Resource: '*'
  - Sid: CloudWatchLogsOpensearchReadAPIs
    Effect: Allow
    Action:
    - aoss:BatchGetCollection
    - aoss:BatchGetLifecyclePolicy
    - es:ListApplications
    Resource: '*'
    Condition:
      StringEquals:
        aws:CalledViaFirst: logs.amazonaws.com
  - Sid: CloudWatchLogsAPIAccessAll
    Effect: Allow
    Action:
    - aoss:APIAccessAll
    Resource: '*'
    Condition:
      StringLike:
        aoss:collection: cloudwatch-logs-*
  - Sid: CloudWatchLogsDQSCollectionPolicyAccess
    Effect: Allow
    Action:
    - aoss:GetAccessPolicy
    - aoss:GetSecurityPolicy
    Resource: '*'
    Condition:
      StringLike:
        aws:CalledViaFirst: logs.amazonaws.com
        aoss:collection: cloudwatch-logs-*
  - Sid: CloudWatchLogsApplicationResourceAccess
    Effect: Allow
    Action:
    - es:GetApplication
    Resource: '*'
    Condition:
      StringEquals:
        aws:CalledViaFirst: logs.amazonaws.com
        aws:ResourceTag/OpenSearchIntegration:
        - Dashboards
  - Sid: CloudWatchLogsDQSResourceQueryAccess
    Effect: Allow
    Action:
    - es:GetDirectQueryDataSource
    Resource: arn:aws:opensearch:*:*:datasource/cloudwatch_logs_*
    Condition:
      StringEquals:
        aws:CalledViaFirst: logs.amazonaws.com
        aws:ResourceTag/CloudWatchOpenSearchIntegration:
        - Dashboards
  - Sid: CloudWatchLogsDirectQueryStatusAccess
    Effect: Allow
    Action:
    - opensearch:GetDirectQuery
    Resource: arn:aws:opensearch:*:*:datasource/cloudwatch_logs_*
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 5
  score_max: 7
