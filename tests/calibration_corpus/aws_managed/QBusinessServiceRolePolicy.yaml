name: aws-managed-QBusinessServiceRolePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/aws-service-role/QBusinessServiceRolePolicy\nAWS description:\
  \ (none)\nGenerated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against\
  \ future rule refactors. Current det_score=6; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: QBusinessPutMetricDataPermission
    Effect: Allow
    Action:
    - cloudwatch:PutMetricData
    Resource: '*'
    Condition:
      StringEquals:
        cloudwatch:namespace: AWS/QBusiness
  - Sid: QBusinessCreateLogGroupPermission
    Effect: Allow
    Action:
    - logs:CreateLogGroup
    Resource:
    - arn:aws:logs:*:*:log-group:/aws/qbusiness/*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: QBusinessDescribeLogGroupsPermission
    Effect: Allow
    Action:
    - logs:DescribeLogGroups
    Resource: '*'
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
  - Sid: QBusinessLogStreamPermission
    Effect: Allow
    Action:
    - logs:DescribeLogStreams
    - logs:CreateLogStream
    - logs:PutLogEvents
    Resource:
    - arn:aws:logs:*:*:log-group:/aws/qbusiness/*:log-stream:*
    Condition:
      StringEquals:
        aws:ResourceAccount: ${aws:PrincipalAccount}
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
expected:
  score_min: 5
  score_max: 7
