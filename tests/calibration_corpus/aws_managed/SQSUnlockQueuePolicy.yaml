name: aws-managed-SQSUnlockQueuePolicy
description: "AWS-managed policy snapshot. ARN: arn:aws:iam::aws:policy/root-task/SQSUnlockQueuePolicy\nAWS description: (none)\n\
  Generated by scripts/fetch-aws-managed-policies.py \u2014 regression-protects the deterministic score against future rule\
  \ refactors. Current det_score=1; tolerance \xB11 reflects small calibration deltas."
policy:
  Version: '2012-10-17'
  Statement:
  - Sid: DenyAllOtherActionsOnAnyResource
    Effect: Deny
    NotAction:
    - sqs:SetQueueAttributes
    - sqs:GetQueueAttributes
    - sqs:ListQueues
    - sqs:GetQueueUrl
    Resource: '*'
  - Sid: DenyGettingQueueAttributesOnNonOwnQueue
    Effect: Deny
    Action:
    - sqs:GetQueueAttributes
    Resource: arn:aws:sqs:*:*:*
    Condition:
      StringNotEqualsIfExists:
        aws:ResourceAccount:
        - ${aws:PrincipalAccount}
  - Sid: DenyActionsForNonRootUser
    Effect: Deny
    Action:
    - sqs:SetQueueAttributes
    - sqs:GetQueueAttributes
    - sqs:ListQueues
    - sqs:GetQueueUrl
    Resource: '*'
    Condition:
      StringNotLike:
        aws:PrincipalArn: arn:aws:iam::*:root
request:
  spec:
    access_type: read-write
    duration:
      duration_hours: 1
