---
name: scenario-07-kbouncer-rbac-verbs
description: |
  Operator: a platform engineer running kubectl get pods across
  two namespaces (app-prod + app-staging). Bouncer: kbounce.
  Workflow shape: 6 K8s `get` verb events on Pod resources.

  Calibrates: per-bouncer parity — verifies the grader runs end-
  to-end on kbounce profile shape including the kbounce-native
  safety-floor deny shape `{target, verbs, resources, scope?}`.

  HISTORY: pre-#571 the grader's schema_parses required `actions[]`
  on every deny rule and this scenario expected schema_parses=FALSE
  as a documented CALIBRATION FINDING. #571 Finding B fixed this:
  schema_parses now dispatches per-bouncer (see
  grading.SCHEMA_VALIDATORS) and kbounce accepts EITHER `actions[]`
  (lean-permissive allows) OR `verbs[]+resources[]` (safety-floor
  denies). expected_flags.schema_parses flipped to TRUE per
  [[scorer-is-ground-truth]] — corpus follows reality, not vice
  versa. Overall remains PARTIAL because narrows_vs_admin_baseline
  is still FALSE (same finding as scenarios 01/03/04 — admin
  baseline also applies safety floor).

metadata:
  scenario_type: edge_case
  bouncer_kind: kbounce
  friction_budget: 10
  expected_overall: PARTIAL
  expected_flags:
    blocks_known_risk_shapes: true
    under_friction_budget: true
    allows_too_broad: true
    schema_parses: true
    narrows_vs_admin_baseline: false
  rationale: |
    Per implementation post-#571 Finding B: 4/5 flags pass = PARTIAL
    (MEANINGFUL requires 5/5).

    * blocks_known_risk_shapes: TRUE vacuously.
    * under_friction_budget: TRUE — kbounce safety floor denies
      nothing in this window; 0 denies extrapolates to 0/week.
    * allows_too_broad: TRUE — kbounce allows use namespace/path
      targets, not `*`.
    * schema_parses: TRUE — the kbounce lean-permissive generator
      emits safety-floor denies of shape
      `{target: cluster, verbs: [delete, deletecollection],
      resources: [namespaces, nodes, clusterroles, clusterrolebindings]}`.
      #571 Finding B added per-bouncer dispatch in
      grading._flag_schema_parses: the kbounce validator accepts
      EITHER `actions[]` (lean-permissive allows) OR
      `verbs[]+resources[]` (safety-floor denies) per rule.
    * narrows_vs_admin_baseline: FALSE — same finding as scenarios
      01/03/04. No denied event in window the profile catches that
      admin baseline wouldn't (admin baseline also applies the
      safety floor).

    Overall = PARTIAL (4 passes per _compute_overall threshold).
    Does NOT escalate to NEGATIVE-VALUE because allows_too_broad
    passes.

