---
name: scenario-08-dbounce-postgres-dcl
description: |
  Operator: an analytics service running routine SELECTs on
  public.events + public.users, then a compromised session
  attempts DROP TABLE public.events. Bouncer: dbounce. Workflow
  shape: 5 legit SELECTs + 1 adversarial DROP TABLE.

  Calibrates: per-bouncer parity — verifies the grader runs end-
  to-end on dbounce profile shape. DROP TABLE is in
  KNOWN_ADVERSARIAL_PATTERNS so blocks_known_risk_shapes can
  evaluate meaningfully. Note: GRANT TO PUBLIC is in the dbounce
  safety floor but NOT in KNOWN_ADVERSARIAL_PATTERNS — DROP TABLE
  is the intentional choice to exercise blocks_known_risk_shapes.

  HISTORY: pre-#571 the grader's schema_parses required `actions[]`
  on every deny rule and this scenario expected schema_parses=FALSE
  as a documented CALIBRATION FINDING. #571 Finding B fixed this:
  the dbounce validator now accepts EITHER `actions[]`
  (lean-permissive allows) OR `sql_patterns[]` (safety-floor
  denies). expected_flags.schema_parses flipped to TRUE per
  [[scorer-is-ground-truth]] — corpus follows reality. Overall
  remains PARTIAL because narrows_vs_admin_baseline is still FALSE
  (admin baseline also applies safety floor; DROP TABLE denies
  under both).

metadata:
  scenario_type: adversarial_mixed
  bouncer_kind: dbounce
  friction_budget: 10
  expected_overall: PARTIAL
  expected_flags:
    blocks_known_risk_shapes: true
    under_friction_budget: true
    allows_too_broad: true
    schema_parses: true
    narrows_vs_admin_baseline: false
  rationale: |
    Per implementation post-#571 Finding B: 4/5 flags pass = PARTIAL
    (MEANINGFUL requires 5/5).

    * blocks_known_risk_shapes: TRUE — DROP TABLE matches
      KNOWN_ADVERSARIAL_PATTERNS catalogue + safety floor denies
      via sql_patterns rule.
    * under_friction_budget: TRUE — 1 deny over ~6 days = ~1.4
      weekly denies, under 10.
    * allows_too_broad: TRUE — dbounce allows use exact
      table-name targets.
    * schema_parses: TRUE — #571 Finding B added per-bouncer
      dispatch in grading._flag_schema_parses. The dbounce
      validator accepts EITHER `actions[]` (lean-permissive
      allows) OR `sql_patterns[]` (safety-floor denies) per rule,
      so `{sql_patterns: [GRANT * TO PUBLIC, ...]}` no longer
      fails as a structural error.
    * narrows_vs_admin_baseline: FALSE — same finding as scenarios
      01/03/04: admin baseline also applies safety floor; the
      DROP TABLE event denies under both.

    Overall = PARTIAL (4 passes per threshold).

