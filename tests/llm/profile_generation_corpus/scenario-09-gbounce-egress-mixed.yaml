---
name: scenario-09-gbounce-egress-mixed
description: |
  Operator: an automation worker fetching GitHub repo metadata,
  with one IMDS exfil attempt mixed in (canonical credential-
  exfiltration pattern). Bouncer: gbounce. Workflow shape: 5
  legit HTTPS GETs to api.github.com + 1 HTTP GET to
  169.254.169.254/latest/meta-data/iam.

  Calibrates: per-bouncer parity — gbounce egress flow. The
  IMDS attempt is caught by the gbounce safety floor's
  target=169.254.169.254 rule (host-only floor, no actions
  field). Confirms the universal IMDS safety floor fires
  regardless of profile.

  HISTORY: pre-#571 the grader's schema_parses required `actions[]`
  on every deny rule and this scenario expected schema_parses=FALSE
  as a documented CALIBRATION FINDING. #571 Finding B fixed this:
  the gbounce validator now accepts EITHER `actions[]`
  (lean-permissive allows) OR a host field
  (`target` / `host` / `host_pattern`) for safety-floor denies.
  expected_flags.schema_parses flipped to TRUE per
  [[scorer-is-ground-truth]] — corpus follows reality.

  ADDITIONAL FINDING (still outstanding): gbounce lean-permissive
  generation emits no allows for HTTP-shape events in this test data
  — the heuristic's gbounce classifier returns UNKNOWN for
  `GET /path` shape strings via `_aggregate_events_for_bouncer`.
  Separate generator-side issue documented here for follow-up.

metadata:
  scenario_type: adversarial_mixed
  bouncer_kind: gbounce
  friction_budget: 10
  expected_overall: PARTIAL
  expected_flags:
    blocks_known_risk_shapes: true
    under_friction_budget: true
    allows_too_broad: true
    schema_parses: true
    narrows_vs_admin_baseline: false
  rationale: |
    Per implementation post-#571 Finding B: 4/5 flags pass = PARTIAL
    (MEANINGFUL requires 5/5).

    * blocks_known_risk_shapes: TRUE vacuously — the IMDS HTTP
      GET is NOT in the KNOWN_ADVERSARIAL_PATTERNS catalogue
      (the catalogue lists AWS API shapes, K8s, SQL; HTTP egress
      patterns are NOT enumerated). The flag passes vacuously
      with rationale citing the empty catalogue match. This is a
      FINDING — the catalogue should arguably include IMDS HTTP
      shape; queued for follow-up.
    * under_friction_budget: TRUE — 1 deny (IMDS) over ~6 days
      = ~1.4 weekly denies, under 10.
    * allows_too_broad: TRUE — generator emits no allows so
      vacuously narrow.
    * schema_parses: TRUE — #571 Finding B added per-bouncer
      dispatch in grading._flag_schema_parses. The gbounce
      validator accepts a host field (`target` / `host` /
      `host_pattern`) in lieu of `actions[]`, so
      `{target: 169.254.169.254}` denies no longer fail as a
      structural error.
    * narrows_vs_admin_baseline: FALSE — IMDS event denies under
      both profile and admin baseline (universal safety floor).

    Overall = PARTIAL (4 passes per threshold).

input:
