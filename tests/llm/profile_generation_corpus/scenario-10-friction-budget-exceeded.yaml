---
name: scenario-10-friction-budget-exceeded
description: |
  Operator: a data analyst whose profile is too tight — denies
  legitimate reads on bucket-blocked, breaking the daily workflow.
  Bouncer: ibounce. Workflow shape: 50 s3:GetObject events on
  bucket-blocked/* over a ~2-day span; profile denies all of them.

  Calibrates: the under_friction_budget flag's positive-detection
  path. 50 denies extrapolated over the ~2-day span yields ~171
  weekly denies, blowing the budget of 10 by ~17×. The
  recommended_action surfaces 'too tight - blocks legit work' as
  the explicit operator narrative.

  This is the OVER-TIGHT counterpart to scenario-05's OVER-PERMISSIVE
  shape. Both grade poorly but for OPPOSITE reasons; the rubric
  distinguishes them.

  Mode: supplied — lean-permissive generator does not produce
  profiles that deny legitimate observed traffic; this is a hand-
  crafted "too tight" shape the grader must catch.

metadata:
  scenario_type: edge_case
  bouncer_kind: ibounce
  friction_budget: 10
  expected_overall: PARTIAL
  expected_flags:
    blocks_known_risk_shapes: true
    under_friction_budget: false
    allows_too_broad: true
    schema_parses: true
    narrows_vs_admin_baseline: true
  rationale: |
    Per implementation: 4/5 flags pass = PARTIAL (the over-tight
    case grades like the over-permissive scenarios — same
    severity, opposite shape).

    * blocks_known_risk_shapes: TRUE vacuously (no adversarial).
    * under_friction_budget: FALSE — 50 denies over ~2 days =
      ~171 weekly denies, exceeds budget=10 by factor 17.1×.
      Evidence cites the over_budget_factor.
    * allows_too_broad: TRUE — narrow allow on bucket-allowed/*.
    * schema_parses: TRUE — well-formed generator-shape.
    * narrows_vs_admin_baseline: TRUE — bucket-blocked GetObject
      events deny under profile but admin baseline allows them
      (s3:GetObject is NOT in the universal safety floor; only
      iam: / kms: / cloudtrail: / etc.). Narrowing demonstrated.

    Overall = PARTIAL (4 passes per threshold). Critically: this
    scenario PROVES under_friction_budget catches the over-tight
    case — the most common cause of bouncer uninstalls per
    [[safety-mode-lean-permissive]] watch-out #2.

input:
  mode: supplied
  profile:
    bouncer: ibounce
    profile_name: overly-tight
    allows:
      - target: "arn:aws:s3:::bucket-allowed/*"
        actions: [s3:GetObject]
        reason: narrow allow
    denies:
      - target: "arn:aws:s3:::bucket-blocked/*"
        actions: [s3:GetObject]
        reason: "too tight - blocks legitimate analyst work"
  # 50 events on bucket-blocked across ~2 days, 1 per hour.
  # Listed inline below.
  events:
    - {_bouncer: ibounce, time: 1716412800000, activity_name: deny, unmapped: {iam_jit: {verdict: deny}}, api: {service: {name: s3}, operation: GetObject, resources: [{name: "arn:aws:s3:::bucket-blocked/k0"}]}}
