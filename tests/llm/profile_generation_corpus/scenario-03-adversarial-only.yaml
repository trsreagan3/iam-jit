      time: 1716412800000
      activity_name: deny
      unmapped: {iam_jit: {verdict: deny}}
      api:
        service: {name: iam}
        operation: CreateAccessKey
        resources: [{name: "arn:aws:iam::111122223333:user/svc-0"}]
    - _bouncer: ibounce
