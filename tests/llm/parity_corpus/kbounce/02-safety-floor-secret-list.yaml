---
name: 02-kbounce-safety-floor-secret-list
description: |
  Cluster-wide secrets list hits the kbounce safety-floor (verbs=get/list/watch
  resources=secrets scope=all-namespaces). Simulator denies; production
  parity blocked until kbounce CLI exposes `decide --json`.
profile:
  profile_name: kbounce-parity-02
  bouncer: kbounce
  allows: []
  denies: []
events:
  - _bouncer: kbounce
    time: 1716412800000
    activity_name: list
    unmapped: {iam_jit: {verdict: deny, ext: {namespace: ""}}}
    api:
      service: {name: k8s}
      operation: list
      resources: [{name: "secrets"}]
expected_verdicts:
  - deny
