AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: |
  iam-jit hub-account stack. Deploys the FastAPI-based service Lambda
  (HTTP API + MCP-over-HTTP), the scheduled expiry Lambda, and the
  Lambda execution role configured to assume cross-account into
  ProvisionerRole(s) deployed via the per-destination CloudFormation
  template.

  PUBLIC-EXPOSURE WARNING — read before deploying:
    AWS Lambda Function URLs are reachable from anywhere on the
    internet. This template REFUSES TO DEPLOY a configuration that
    pairs a Function URL with `local` auth and the public-exposure
    opt-in left at its default of `false`. To deploy publicly on
    purpose, set AllowPublicNetworkExposure=true AND set CorsAllowedOrigins
    to your specific origin (never `*`). The recommended posture for
    most teams is AuthMode=aws_iam — AWS handles SigV4 + IAM
    enforcement at the Function URL layer, so even an exposed URL is
    not anonymously usable.

Parameters:
  StateBucketName:
    Type: String
    Description: |
      **[MVP — REQUIRED]** S3 bucket name for storing request YAML files
      (the source of truth for queue / provisioning / expiry state).
      Must be globally unique. Convention: `iam-jit-state-<account-id>`.
      No default — every deploy must set this.

  ProvisionerRoleArns:
    Type: CommaDelimitedList
    Default: "arn:aws:iam::000000000000:role/iam-jit-provisioner-placeholder"
    Description: |
      Comma-separated full ARNs of the iam-jit-provisioner roles in each
      destination account. Get these from the `ProvisionerRoleArn` output of
      the per-destination CloudFormation stack. The default is a placeholder;
      replace with real ARNs after deploying destination stacks.

  DiscoveryRoleArns:
    Type: CommaDelimitedList
    Default: "arn:aws:iam::000000000000:role/iam-jit-discovery-placeholder"
    Description: |
      Comma-separated full ARNs of the iam-jit-discovery roles. Use the
      placeholder ARN if you have no destination accounts configured for
      discovery yet (the policy is harmless either way).

  LLMBackend:
    Type: String
    Default: none
    AllowedValues: [none, ollama, anthropic, bedrock]
    Description: |
      Which LLM backend the service uses. `none` = paste-mode + deterministic
      review only. `ollama` = call out to OllamaHost. `anthropic` = Anthropic
      API (requires AnthropicApiKeySecret). `bedrock` = AWS Bedrock Converse
      API (requires BedrockModelId).

  OllamaHost:
    Type: String
    Default: ""
    Description: URL of an Ollama server reachable from the Lambda's VPC. Required when LLMBackend=ollama.

  AnthropicApiKeySecret:
    Type: String
    Default: ""
    Description: |
      Secrets Manager ARN holding the Anthropic API key. Required when
      LLMBackend=anthropic. The Lambda role gets read access to ONLY this
      secret.

  BedrockModelId:
    Type: String
    Default: ""
    Description: |
      Bedrock model ID to use (e.g. `meta.llama3-3-70b-instruct-v1:0`).
      Required when LLMBackend=bedrock. Bedrock provisioning is NOT done
      by this template — the deployer is assumed to have Bedrock enabled
      and the model invocation already permitted in their account.

  WebhookSigningSecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: |
      HMAC secret used to sign outgoing webhooks to submitting agents.
      Empty disables webhook signing (not recommended for production).

  ApiTokensTableName:
    Type: String
    Default: iam-jit-api-tokens
    Description: DynamoDB table that stores per-user API tokens.

  AuthMode:
    Type: String
    Default: local
    AllowedValues: [local, aws_iam]
    Description: |
      How users authenticate to iam-jit.
        local   — magic-link-based local users (DynamoDB-backed). Best for
                  small teams; admin manages the user list.
        aws_iam — Function URL uses AWS_IAM auth; requests must be SigV4-
                  signed. A DynamoDB table maps IAM principal ARN to
                  iam-jit role (admin/approver/requester). Works for IAM
                  users, IAM roles, and Identity Center session-assumed
                  roles. Best for orgs that already use AWS Identity
                  Center for human access.

  UsersTableName:
    Type: String
    Default: iam-jit-users
    Description: |
      DynamoDB table for user records. In `local` mode, holds email +
      role + magic-link state. In `aws_iam` mode, holds iam_arn → role
      mapping (the deployer-controlled access list). Used only when
      UserConfigSource=dynamodb.

  SettingsTableName:
    Type: String
    Default: iam-jit-settings
    Description: |
      DynamoDB table that persists admin-editable runtime settings
      (auto-approve threshold, blocklists, toggles, max role
      duration). Persistence survives Lambda cold-starts and stack
      redeploys (`DeletionPolicy: Retain`).

      Override this on a re-deploy when the default-named table from
      a prior deploy is still retained in the account (otherwise the
      stack creation fails with `AlreadyExistsException`). See
      `docs/REDEPLOY.md` for the two paths: fresh table (loses
      data) vs CFN resource import (preserves data).

  AccountsTableName:
    Type: String
    Default: iam-jit-accounts
    Description: |
      DynamoDB table that persists registered destination accounts
      (ProvisionerRole ARN, ExternalId, mode, etc). Without this
      backing table, accounts live in-memory and get wiped on every
      Lambda cold-start AND on every stack redeploy — which means
      admins have to re-register every account after each deploy
      and any auto-approved request scheduled during the window
      between redeploy and re-registration fails with `account is
      not registered with iam-jit`.

      `DeletionPolicy: Retain` so accounts survive a stack delete
      (same audit-preservation rationale as the other stores).
      Same override rationale as `SettingsTableName` if re-deploying
      against retained tables.

  CidrsTableName:
    Type: String
    Default: iam-jit-cidrs
    Description: |
      DynamoDB table that persists the runtime CIDR allowlist. Without
      this backing table, the allowlist is in-memory and resets on
      Lambda cold-start. `DeletionPolicy: Retain` so a stack delete
      preserves the allowlist for audit / re-deploy.

      Same override rationale as `SettingsTableName` — change this
      on a re-deploy if the prior table is still in the account. See
      `docs/REDEPLOY.md`.

  UserConfigSource:
    Type: String
    Default: dynamodb
    AllowedValues: [dynamodb, file]
    Description: |
      Source of truth for the user list.
        dynamodb — Users managed via UI/CLI/API; writes go to UsersTable.
        file     — Users read from a YAML object in the state bucket
                   (path = UserConfigFileKey). Admins update by uploading
                   a new version; Lambda refreshes within a 60s cache TTL.
                   No DynamoDB writes happen in this mode. Use for
                   GitOps-style user management or when you want to
                   review user changes via PR.
      Switching modes is a single SAM parameter update (no infra change);
      use `iam-jit users export` to dump DynamoDB to YAML before
      switching to `file`, and `iam-jit users import` for the reverse.

  UserConfigFileKey:
    Type: String
    Default: users.yaml
    Description: |
      Path within the state bucket where the users config file lives.
      Used only when UserConfigSource=file.

  MagicLinkSecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: |
      HMAC secret used to sign magic-link tokens and session cookies.
      Required when AuthMode=local. Generate with `openssl rand -hex 32`
      and rotate periodically.

  SesSenderAddress:
    Type: String
    Default: ""
    Description: |
      Verified SES sender for magic-link emails. Required when AuthMode=
      local. Format: noreply@your-domain.com

  AllowPublicNetworkExposure:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: |
      **[PUBLIC TIER — set true to allow public traffic]** EXPLICIT
      OPT-IN to deploy a Function URL that is reachable from the
      public internet without an additional auth layer.

      Scope: this parameter governs the **Function URL** specifically.
      It does NOT govern the optional ALB
      (`EnablePublicALB=true`) — the ALB has its own access-control
      posture via its security group + the runtime
      `AllowedSourceCidrs` allowlist + (optionally)
      `AlbCertificateArn` for transport encryption.

      Default `false`: deployers committed to fronting the Function
      URL themselves (VPN, IAP, CloudFront + WAF, an ALB in front,
      etc.), or using AuthMode=aws_iam (SigV4 at the URL layer).
      Setting `true` acknowledges the deployer has put their own
      access controls in front of the Function URL. The CFN Rules
      block refuses `true` without a non-empty
      `AllowedSourceCidrs`.

  CorsAllowedOrigins:
    Type: CommaDelimitedList
    Default: ""
    Description: |
      **[PUBLIC TIER — required when AllowPublicNetworkExposure=true]**
      Specific origins allowed for browser CORS. Wildcard `*` is REJECTED.
      Empty (default) sends no CORS headers, blocking all browsers
      other than same-origin — the right default for most deployments.

  AdminBootstrapEmail:
    Type: String
    Default: ""
    Description: |
      **[MVP — REQUIRED when UserConfigSource=dynamodb (the default)]**
      Email of the initial admin user. Pre-populates the users table
      with this address as an admin so post-deploy bootstrap doesn't
      require an out-of-band write. Set this to YOUR email — not a
      shared address — and rotate to additional admins after first
      sign-in. CFN Rules will refuse the deploy if empty and
      UserConfigSource=dynamodb.

  BootstrapSetupKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: |
      **[MVP — STRONGLY RECOMMENDED]** One-time secret you generate
      locally (`openssl rand -hex 32`) and pass at `sam deploy` time.
      After deploy, visit the `BootstrapClaimUrl` output, enter the
      AdminBootstrapEmail above and this key into the form, and you're
      signed in as the first admin.

      The key is stored as a Lambda env var (readable only via
      `lambda:GetFunctionConfiguration` on the iam-jit function — a
      narrower set than CFN-stack-read). It is NOT included in CFN
      outputs and not in any URL iam-jit ever issues. Keep it in your
      password manager or terminal history; if you lose it before
      claiming, redeploy with a fresh value (the bootstrap user record
      is auto-recreated on each cold-start that finds an empty store).

      Leave empty to disable `/setup` entirely (e.g., if you're using
      SES email delivery instead).

  AllowedSourceCidrs:
    Type: CommaDelimitedList
    Default: ""
    Description: |
      **[PUBLIC TIER — required when AllowPublicNetworkExposure=true]**
      Comma-separated CIDR blocks allowed to reach the iam-jit Function
      URL. When set, every request whose source IP isn't in one of
      these networks is refused with 403 at the application layer.
      Use `0.0.0.0/0` as an explicit "yes, public to all" acknowledgement
      (matches the documented public-launch shape); narrower CIDRs for
      private/VPN-fronted deploys.

      Examples:
        10.0.0.0/8                      (RFC1918 private)
        198.51.100.0/24,203.0.113.0/24  (a couple of office WANs)
        72.5.123.45/32                  (single office IP)

      Lambda Function URLs CAN'T natively restrict source IP — this
      is enforced at the iam-jit middleware layer. For deeper
      isolation, put CloudFront + WAF in front and configure
      IAM_JIT_TRUST_FORWARDED_FOR=1 (default) so the iam-jit layer
      reads the original IP from X-Forwarded-For. With no proxy,
      set IAM_JIT_TRUST_FORWARDED_FOR=0 to ignore XFF (otherwise
      attackers can spoof the header).

  TokenInactivityDays:
    Type: Number
    Default: 180
    MinValue: 1
    MaxValue: 3650
    Description: |
      Auto-revoke API tokens inactive for this many days (last_used_at
      older than the cutoff). Default 180 ≈ 6 months. The scheduled
      Lambda sweeps on each firing; admins can also run a one-off
      sweep via POST /api/v1/admin/sweep-inactive-tokens.

  EnablePublicALB:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: |
      When `true`, deploy a public Application Load Balancer in front
      of the Lambda. The ALB invokes Lambda via `lambda:InvokeFunction`
      (NOT `lambda:InvokeFunctionUrl`) — useful when your AWS
      Organization attaches an SCP that denies the Function-URL-
      invocation action broadly, since the underlying IAM action is
      different.

      The Function URL is still provisioned but is unreachable from
      the public internet when the SCP is in place; the ALB becomes
      the only public surface. You provide `VpcId` and `SubnetIds`
      (≥2 subnets in different AZs); the template provisions the
      security group, target group, listener, listener rule, and
      Lambda invoke permission for the ELB service principal.

      HTTPS requires `AlbCertificateArn`. With no certificate the
      ALB listens on port 80 only — suitable for dev / staging
      behind a VPN, not for production. Cookies will be sent
      cleartext.

  EnableEdgeProtection:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: |
      When `true`, deploy a CloudFront distribution + WAFv2 WebACL in
      front of the Lambda Function URL. Provides three things:

        1. **Per-IP rate limiting at the edge** (WAFv2 rate-based rule).
           The in-Lambda limiter is process-local and resets on cold-
           start; the real cap must be at the edge. Default 2,000
           requests per 5-minute sliding window per source IP — well
           above the documented free tier (100 req/month) so legitimate
           traffic isn't throttled, but stops scraping / Show-HN-day
           hammering before requests reach (and pay for) Lambda.

        2. **HTTPS termination at AWS-managed cert** (no ACM cert
           required for the apex `*.cloudfront.net` URL). For a custom
           domain, add `CustomDomainName` + `EdgeCertificateArn` in a
           future revision.

        3. **DDoS protection via AWS Shield Standard** (free, included
           with CloudFront).

      Cost when enabled: ~$5–15/mo at launch traffic (1 TB egress and
      10 M requests are free tier; rate-based WAF rules are $1/rule
      + $0.60/M requests evaluated). The Function URL stays
      provisioned and reachable for direct testing; CloudFront is an
      additional surface.
    # Caveat: WAFv2 WebACLs with Scope=CLOUDFRONT MUST be deployed in
    # us-east-1 (this is an AWS hard requirement, not a template
    # limitation). If you're deploying this stack in another region,
    # the WAF resource creation will fail — set EnableEdgeProtection
    # back to false and deploy the WebACL via a separate us-east-1
    # stack, then pass its ARN in.

  CloudFrontPriceClass:
    Type: String
    Default: PriceClass_100
    AllowedValues: [PriceClass_100, PriceClass_200, PriceClass_All]
    Description: |
      CloudFront edge-location coverage when EnableEdgeProtection=true.
      PriceClass_100 = NA + EU only (cheapest). PriceClass_200 adds
      Asia / Middle East / Africa. PriceClass_All = everywhere.
      Stick with PriceClass_100 unless you have customers outside
      NA/EU — the cost difference is meaningful at scale.

  WafRateLimitPer5Min:
    Type: Number
    Default: 2000
    MinValue: 100
    MaxValue: 20000000
    Description: |
      Requests per 5-minute window per source IP before WAFv2 blocks.
      Default 2,000 = ~6.7 req/sec sustained. Bumps to 429 effective
      response. Tune by tier: a CI integration making one PR-comment
      every commit is well under 100 req/5min; a scraping attack will
      blow past 2,000. Override per deployment.

  AlbVpcId:
    Type: String
    Default: ""
    Description: |
      VPC id (vpc-xxxx) the ALB is deployed into. Required when
      EnablePublicALB=true. Use the default VPC unless you have
      reason to put iam-jit in a custom VPC.

  AlbSubnetIds:
    Type: CommaDelimitedList
    Default: ""
    Description: |
      Comma-separated public subnet ids the ALB is attached to. Need
      at least 2 in different AZs for ALB to deploy. Required when
      EnablePublicALB=true.

  AlbCertificateArn:
    Type: String
    Default: ""
    Description: |
      ACM certificate ARN for the ALB HTTPS listener. Optional. With
      no cert, the ALB listens on HTTP port 80 only — fine for
      VPN-fronted staging, NOT acceptable for production. The cert
      must be in the same region as the ALB and match whatever
      hostname you'll point at the ALB (auto-generated ALB DNS
      hostnames can't get ACM certs, so HTTPS implies a CNAME with
      a domain you control).

      Full cert provisioning guide (DNS validation, email validation,
      wildcards, cross-account, imported certs, rotation):
      docs/HTTPS-SETUP.md

  LogRetentionDays:
    Type: Number
    Default: 545
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90, 120, 150, 180, 365, 400, 545, 731, 1827, 3653]
    Description: |
      CloudWatch Logs retention for the Lambda log group. Without
      this, AWS Lambda's auto-created log group retains logs
      FOREVER and the bill grows linearly with time.

      Default 545 days (~1.5 years) is calibrated for the audit /
      compliance use case iam-jit is built for: every access grant
      is a privileged action, and the lookback window an auditor or
      incident responder needs is measured in months-to-years, not
      days. PCI DSS requires 1 year of log retention; SOC 2 and ISO
      27001 typically expect "appropriate" retention with 1+ year
      being the norm. 545 days exceeds both with headroom.

      Valid values are the discrete set CloudWatch accepts. Common
      alternatives:
        - 731 (~2 years) — extra headroom for regulated industries
        - 1827 (~5 years) — finance / healthcare worst case
        - 365 — minimum-viable PCI DSS
        - 30 — dev/cost-bounded (NOT recommended for prod; sub-1y
          retention fails most compliance audits)

      Admins can RAISE retention at runtime via the
      /api/v1/admin/log-retention endpoint, but not below the
      `MinLogRetentionDays` floor below.

  MinLogRetentionDays:
    Type: Number
    Default: 545
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90, 120, 150, 180, 365, 400, 545, 731, 1827, 3653]
    Description: |
      The lower bound on `log_retention_days` that an in-system
      admin can configure via the runtime API. PATCH requests below
      this floor are refused with HTTP 400. Default 545 matches
      `LogRetentionDays` — admins can ONLY extend retention from
      the SAM default upward, never shorten it.

      This protects against a malicious or compromised admin
      shortening retention to hide their tracks (the "evidence
      destruction" attack). Compliance use cases should keep this
      ≥365 (PCI DSS minimum) or ≥730 (SOC 2 typical).


  # ---- Auto-approve floor parameters ----
  # These define the LOWER BOUND of restrictiveness for the auto-
  # approve feature. Admins can tighten further at runtime via the
  # /api/v1/admin/auto-approve/settings API, but cannot loosen below
  # these floors — the API refuses any PATCH that would do so. This
  # prevents the "admin sets threshold=10 + empty blocklist =
  # approve anything" foot-gun. Platform team owns floors at deploy
  # time; in-system admins own day-to-day tightening at runtime.

  MaxAutoApproveRiskBelow:
    Type: Number
    Default: 5
    MinValue: 1
    MaxValue: 10
    Description: |
      Hard ceiling on `auto_approve_risk_below`. An admin PATCH-ing
      a value above this is refused with HTTP 400. Recommended:
      3 for conservative (only "single-resource read" qualifies),
      5 for medium (includes mid-impact reads), 10 to disable the
      floor entirely (NOT recommended — see docs/security-notes.md
      § E4b). Default 5 matches the calibration table in
      docs/USE-CASES.md.

  RequiredServiceBlocklist:
    Type: CommaDelimitedList
    Default: "iam,organizations,sts,kms,secretsmanager"
    Description: |
      Services that the in-system admin can never remove from the
      `never_auto_approve_services` list. Each entry MUST be present
      in the runtime settings; a PATCH that omits any of these is
      refused. Admins can ADD more services beyond this floor.
      Default matches the pre-roadmap deterministic _SENSITIVE_SERVICES
      set in src/iam_jit/review.py.

  RequiredAccountBlocklist:
    Type: CommaDelimitedList
    Default: ""
    Description: |
      Account IDs that the in-system admin can never remove from
      `never_auto_approve_accounts`. Typical use: list your prod
      account IDs here so an admin can't accidentally / maliciously
      enable auto-approve against prod. Default empty (no
      account-level floor) — set this for any deployment that
      manages prod access.

  MaxAutoApproveQuotaPerHour:
    Type: Number
    Default: 10
    MinValue: 1
    MaxValue: 100
    Description: |
      Hard ceiling on `auto_approve_quota_per_hour`. The
      composability-attack defense (per-user sliding-window cap)
      can be tightened by the admin but not loosened above this
      value. Default 10 is generous; 5 is recommended for
      production. Tightening this affects all in-flight users
      immediately (sliding window).

  AlbIngressCidr:
    Type: String
    Default: ""
    Description: |
      Source CIDR range allowed to reach the ALB at the network
      layer (security-group ingress on ports 80 and 443).

      Required when `EnablePublicALB=true` — the template refuses
      to deploy with a missing or empty value via a CFN Rule. This
      is intentional: an unintended `0.0.0.0/0` default would
      expose the BootstrapSetupKey form to the entire internet
      between deploy and first-claim, and the deploying agent
      should ALWAYS make this decision explicitly rather than
      relying on a permissive default. See `AGENT-DEPLOYMENT-
      PROMPT.md` step 8b for the pre-deploy IP-detection flow.

      Common values:
        - `<workstation-ip>/32`  (most secure, single-IP)
        - `<vpn-egress-cidr>`    (corp VPN range)
        - `0.0.0.0/0`            (open; allowed but explicit)

      The CFN Rule won't accept the empty string but accepts
      `0.0.0.0/0` as an explicit operator acknowledgment of an
      open surface. The deploying agent should surface this choice
      to the operator (see deploy prompt).

      The `AllowedPattern` validation below catches malformed
      CIDRs (e.g., missing prefix length) at the changeset stage.

      Effect: this is the **network-layer** allowlist applied to
      the ALB security group. It rejects packets before they reach
      the Lambda. Independent of the **application-layer**
      `AllowedSourceCidrs` allowlist (which iam-jit middleware
      enforces after the request reaches the Lambda and applies to
      both Function URL and ALB callers). For defense-in-depth
      set both.

      Only one CIDR; the SAM template doesn't currently support
      multi-CIDR ingress (CFN can't iterate a CommaDelimitedList
      over `SecurityGroupIngress`). For multiple ranges, tighten
      this to the broadest superset and rely on
      `AllowedSourceCidrs` for fine-grained restriction, or
      extend the template post-deploy via
      `aws ec2 authorize-security-group-ingress`.

      Only effective when `EnablePublicALB=true`.
    AllowedPattern: "^$|^([0-9]{1,3}\\.){3}[0-9]{1,3}/(3[0-2]|[1-2]?[0-9])$"
    ConstraintDescription: |
      Must be a valid CIDR (e.g., 10.0.0.0/8 or 203.0.113.5/32),
      or empty (template will refuse deploy when EnablePublicALB=true).

Conditions:
  UsesAnthropic: !Equals [!Ref LLMBackend, anthropic]
  UsesBedrock: !Equals [!Ref LLMBackend, bedrock]
  HasAnthropicSecret: !And [!Condition UsesAnthropic, !Not [!Equals [!Ref AnthropicApiKeySecret, ""]]]
  AuthLocal: !Equals [!Ref AuthMode, local]
  AuthAwsIam: !Equals [!Ref AuthMode, aws_iam]
  HasCorsOrigins: !Not [!Equals [!Join [",", !Ref CorsAllowedOrigins], ""]]
  UsePublicALB: !Equals [!Ref EnablePublicALB, "true"]
  EdgeProtectionEnabled: !Equals [!Ref EnableEdgeProtection, "true"]
  # AlbHasCertificate is intentionally a conjunction with UsePublicALB
  HttpOnlyAlbDeploy: !And
    - !Equals [!Ref EnablePublicALB, "true"]
    - !Equals [!Ref AlbCertificateArn, ""]
  # so the HTTPS listener resource (which !Refs the ALB / target
  # group) can't accidentally fire on a deploy where ALB itself is
  # disabled — cfn-lint W1001 catches that combination as a possible
  # broken reference, and the conjunction makes the regression
  # impossible by construction.
  AlbHasCertificate: !And
    - !Equals [!Ref EnablePublicALB, "true"]
    - !Not [!Equals [!Ref AlbCertificateArn, ""]]

# Rules block deployments that combine inputs in a known-dangerous way.
# A failed rule produces a CFN error before a single resource is created
# — operators see the message, fix the inputs, and re-deploy.
#
# (Note: the deeper "Function URL on local auth without explicit
# public-exposure opt-in" warning lives in the template Description and
# in the SecurityChecklistReminder Output. CFN Rules can't express
# 'create-conditionally on this parameter combo' — they can only block
# deployment outright. We keep the deploy unblocked for the default-safe
# combination and rely on the documentation + the operational
# checklist.)
Rules:
  # The user store starts empty on a fresh deploy. With UserConfigSource=
  # dynamodb, no operator can sign in until somebody writes the first
  # admin row — and the system itself can't accept that write because
  # every admin endpoint requires being already-admin. Refuse the deploy
  # unless AdminBootstrapEmail is set; the Lambda startup hook
  # idempotently seeds that email as admin on first cold-start.
  #
  # File mode (UserConfigSource=file) doesn't have this problem — the
  # operator owns the YAML and writes the first admin in there.
  RequireAdminBootstrapForDynamoDBUsers:
    RuleCondition: !Equals [!Ref UserConfigSource, dynamodb]
    Assertions:
      - Assert: !Not [!Equals [!Ref AdminBootstrapEmail, ""]]
        AssertDescription: |
          UserConfigSource=dynamodb requires AdminBootstrapEmail. Set it
          to the email of the first admin (typically the deployer's
          own address). The Lambda will idempotently seed that user
          as admin on first cold-start; subsequent admins are added
          via the UI. To skip the bootstrap, set UserConfigSource=file
          and upload an initial users.yaml to the state bucket
          before first sign-in.
  RefuseWildcardCorsOrigin:
    RuleCondition: !Equals [!Ref AllowPublicNetworkExposure, "true"]
    Assertions:
      - Assert: !Not [!Contains [!Ref CorsAllowedOrigins, "*"]]
        AssertDescription: |
          CorsAllowedOrigins must NOT contain `*` when
          AllowPublicNetworkExposure=true. List the specific origin(s) of
          the iam-jit web UI (e.g. https://iam-jit.your-corp.com).
      # "Required when public exposure is true" — assert at least one
      # member of the CommaDelimitedList is non-empty. The CFN Rules
      # block doesn't accept Fn::Join, so we express "list isn't all
      # empty strings" via Fn::EachMemberEquals.
      - Assert: !Not [!EachMemberEquals [!Ref CorsAllowedOrigins, ""]]
        AssertDescription: |
          CorsAllowedOrigins is required when AllowPublicNetworkExposure=true.

  # Public exposure without a CIDR allowlist is a foot-gun: the
  # Function URL is reachable from the entire internet, the runtime
  # ACL is the only network-layer restriction, and that ACL is empty.
  # Refuse the deploy unless the operator has explicitly configured
  # source-IP restrictions OR explicitly set AllowedSourceCidrs to
  # `0.0.0.0/0` (which is at least an explicit acknowledgement).
  # ALB ingress must be an explicit operator decision — no
  # accidental "open by default" deploys. The deploying agent is
  # expected to detect the operator's egress IP (see
  # docs/AGENT-DEPLOYMENT-PROMPT.md step 8b) and pass an explicit
  # AlbIngressCidr value. `0.0.0.0/0` is accepted as a valid
  # explicit choice, but the empty-string default is refused so
  # the deployer has to choose.
  RequireAlbIngressCidrWhenPublicALB:
    RuleCondition: !Equals [!Ref EnablePublicALB, "true"]
    Assertions:
      - Assert: !Not [!Equals [!Ref AlbIngressCidr, ""]]
        AssertDescription: |
          EnablePublicALB=true requires AlbIngressCidr to be set
          explicitly. The deploying agent should detect the
          operator's egress IP (`curl https://checkip.amazonaws.com`
          on their workstation) and pass AlbIngressCidr=<IP>/32.
          For broader access pass a CIDR range; for explicit-public
          pass `0.0.0.0/0` (which is accepted, but must be a
          deliberate choice — not a default). See docs/AGENT-
          DEPLOYMENT-PROMPT.md step 8b.

  RequireSourceCidrsForPublicExposure:
    RuleCondition: !Equals [!Ref AllowPublicNetworkExposure, "true"]
    Assertions:
      - Assert: !Not [!EachMemberEquals [!Ref AllowedSourceCidrs, ""]]
        AssertDescription: |
          AllowPublicNetworkExposure=true requires AllowedSourceCidrs.
          Set it to your corporate VPN egress, office WANs, or VPC NAT
          gateway IPs. To explicitly deploy a fully-public iam-jit
          (NOT recommended), set AllowedSourceCidrs to "0.0.0.0/0" —
          that's an opt-in acknowledgement, not the default.

Globals:
  Function:
    Runtime: python3.12
    Architectures: [arm64]
    MemorySize: 512
    Timeout: 30
    Environment:
      Variables:
        IAM_JIT_LLM: !Ref LLMBackend
        IAM_JIT_LLM_MODEL: !Ref BedrockModelId
        OLLAMA_HOST: !Ref OllamaHost
        IAM_JIT_STATE_BUCKET: !Ref StateBucketName
        IAM_JIT_API_TOKENS_TABLE: !Ref ApiTokensTableName
        IAM_JIT_USERS_TABLE: !Ref UsersTableName
        IAM_JIT_REQUESTS_TABLE: !Ref RequestsTable
        IAM_JIT_USER_CONFIG_SOURCE: !Ref UserConfigSource
        IAM_JIT_USER_CONFIG_FILE_KEY: !Ref UserConfigFileKey
        IAM_JIT_AUTH_MODE: !Ref AuthMode
        IAM_JIT_MAGIC_LINK_SECRET: !Ref MagicLinkSecret
        IAM_JIT_SES_SENDER: !Ref SesSenderAddress
        IAM_JIT_PROVISIONER_ROLE_ARNS: !Join [",", !Ref ProvisionerRoleArns]
        IAM_JIT_DISCOVERY_ROLE_ARNS: !Join [",", !Ref DiscoveryRoleArns]
        IAM_JIT_ADMIN_BOOTSTRAP_EMAIL: !Ref AdminBootstrapEmail
        IAM_JIT_BOOTSTRAP_SETUP_KEY: !Ref BootstrapSetupKey
        IAM_JIT_PUBLIC_EXPOSURE_OPT_IN: !Ref AllowPublicNetworkExposure
        IAM_JIT_TOKEN_INACTIVITY_DAYS: !Ref TokenInactivityDays
        IAM_JIT_ALLOWED_SOURCE_CIDRS: !Join [",", !Ref AllowedSourceCidrs]
        # Runtime CIDR allowlist persistence. Without this env var
        # the runtime CIDR store is in-memory and resets to empty on
        # every Lambda cold-start — admin-added entries disappear.
        # Routing through DynamoDB makes the allowlist durable across
        # cold-starts, stack updates, and even stack-replace (the
        # table has DeletionPolicy=Retain).
        IAM_JIT_CIDRS_TABLE: !Ref CidrsTable
        IAM_JIT_SETTINGS_TABLE: !Ref SettingsTable
        IAM_JIT_ACCOUNTS_TABLE: !Ref AccountsTable
        # Atomic single-use enforcement across Lambda instances —
        # MAGIC-LINK-REPLAY-MULTI-INSTANCE closure. The table uses
        # TimeToLiveSpecification on `expires_at` so consumed-token
        # rows auto-evict at 2× the magic-link TTL.
        IAM_JIT_MAGIC_LINK_NONCES_TABLE: !Ref MagicLinkNoncesTable
        # Cross-instance ban store — BAN-MULTI-INSTANCE-DESYNC
        # closure. Without this, a banned user simply re-trips on
        # the next Lambda instance.
        IAM_JIT_BANS_TABLE: !Ref BansTable
        # Floor params — surface them to the runtime so the admin
        # PATCH validator can refuse loosen-below-floor attempts and
        # the GET endpoint can show "locked by deploy" indicators.
        IAM_JIT_MAX_AUTO_APPROVE_RISK_BELOW: !Ref MaxAutoApproveRiskBelow
        IAM_JIT_REQUIRED_SERVICE_BLOCKLIST: !Join [",", !Ref RequiredServiceBlocklist]
        IAM_JIT_REQUIRED_ACCOUNT_BLOCKLIST: !Join [",", !Ref RequiredAccountBlocklist]
        IAM_JIT_MAX_AUTO_APPROVE_QUOTA: !Ref MaxAutoApproveQuotaPerHour
        # Log-retention floor. Admins can extend retention via the
        # /api/v1/admin/log-retention API but never below this floor.
        # The current SAM-default retention is also surfaced so the
        # admin endpoint can show "configured at deploy" vs the
        # runtime-applied value.
        IAM_JIT_LOG_RETENTION_DAYS: !Ref LogRetentionDays
        IAM_JIT_MIN_LOG_RETENTION_DAYS: !Ref MinLogRetentionDays
        IAM_JIT_LOG_GROUP_NAME: /aws/lambda/iam-jit
        # When the public surface is an ALB, the Host header reaching
        # the Lambda is whatever the ALB target group injected (the
        # ALB DNS name by default), NOT the hostname end-users typed
        # in their browser. The app reads X-Forwarded-Host (which
        # ALB sets to the original Host) so magic-link callbacks
        # point at the public surface, not the internal target. Only
        # trust XFH when an ALB is actually in front — otherwise an
        # external caller could spoof the header to redirect magic-
        # links to an attacker domain.
        IAM_JIT_TRUST_FORWARDED_HOST: !If [UsePublicALB, "1", "0"]
        # When the ALB is HTTP-only (no AlbCertificateArn), the
        # Lambda's session cookies MUST be set without the `Secure`
        # flag — otherwise the browser refuses to store them on an
        # http:// response, and the magic-link callback redirects
        # the user to /login with no cookie set. This auto-derives
        # the insecure-cookie flag from the deploy posture so the
        # operator doesn't have to think about it: HTTP-only ALB
        # → insecure cookies (cookies stick); HTTPS ALB or Function-
        # URL-only → secure cookies (cookies refuse over HTTP).
        # The flag ALSO surfaces magic-links inline on the login_sent
        # page when SES isn't configured, so the no-email path is
        # immediately usable.
        IAM_JIT_DEV_INSECURE_SECRET: !If [HttpOnlyAlbDeploy, "1", ""]

Resources:
  # ---- Storage ----

  # State bucket holds the authoritative request YAML + audit log
  # archives. DeletionPolicy=Retain + UpdateReplacePolicy=Retain
  # so an accidental stack-delete OR stack-replace doesn't take
  # the data with it — the bucket survives and a fresh stack
  # `sam deploy` will adopt-or-create. Recovery procedure:
  # docs/PRODUCTION-READINESS.md § "Backup/restore runbook".
  StateBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref StateBucketName
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: managed-by
          Value: iam-jit

  # All four DynamoDB tables have:
  #   - Point-in-Time Recovery (35-day continuous backup; PITR is the
  #     only way to recover from accidental write/delete).
  #   - DeletionPolicy=Retain + UpdateReplacePolicy=Retain (data
  #     survives a `cloudformation delete-stack` or stack-replace).
  # Together these enforce the persistence invariant the
  # SecurityChecklistReminder output used to ask operators to
  # verify manually.
  ApiTokensTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Ref ApiTokensTableName
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: token_hash
          AttributeType: S
        - AttributeName: user_id
          AttributeType: S
      KeySchema:
        - AttributeName: token_hash
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: by-user
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: managed-by
          Value: iam-jit

  UsersTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Ref UsersTableName
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      # `user_id` is `email:<email>` in local mode and `iam:<arn>` in
      # aws_iam mode — same record shape, different key namespace.
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
      Tags:
        - Key: managed-by
          Value: iam-jit
        - Key: auth-mode
          Value: !Ref AuthMode

  # Runtime settings (auto-approve threshold, quota, context rules).
  # Admin-editable via /api/v1/admin/auto-approve/settings without
  # a redeploy. Backed by DDB so settings survive Lambda cold-start.
  SettingsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Ref SettingsTableName
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      Tags:
        - Key: managed-by
          Value: iam-jit

  # Registered destination accounts. Without this backing table, the
  # accounts store is in-memory and wipes on every Lambda cold-start
  # (admin has to re-register every account after each redeploy).
  # Hash key is account_id (the 12-digit AWS account ID).
  AccountsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Ref AccountsTableName
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: account_id
          AttributeType: S
      KeySchema:
        - AttributeName: account_id
          KeyType: HASH
      Tags:
        - Key: managed-by
          Value: iam-jit

  # Runtime CIDR allowlist persistence. Without a backing table the
  # allowlist is in-memory and resets on every Lambda cold-start.
  CidrsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Ref CidrsTableName
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: cidr
          AttributeType: S
      KeySchema:
        - AttributeName: cidr
          KeyType: HASH
      Tags:
        - Key: managed-by
          Value: iam-jit

  MagicLinkNoncesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      TableName: !Sub "iam-jit-magic-link-nonces-${AWS::StackName}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: token_hash
          AttributeType: S
      KeySchema:
        - AttributeName: token_hash
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      Tags:
        - Key: managed-by
          Value: iam-jit

  BansTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub "iam-jit-bans-${AWS::StackName}"
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
      Tags:
        - Key: managed-by
          Value: iam-jit

  RequestsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub "iam-jit-requests-${AWS::StackName}"
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      # Full request payload lives in the `payload` (S, JSON) attribute.
      # The lifecycle fields (state, owner_id, submitted_at) are projected
      # as top-level attributes so the queue UI can query the GSI without
      # deserializing every payload.
      AttributeDefinitions:
        - AttributeName: request_id
          AttributeType: S
        - AttributeName: state
          AttributeType: S
        - AttributeName: submitted_at
          AttributeType: S
        - AttributeName: owner_id
          AttributeType: S
      KeySchema:
        - AttributeName: request_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        # Powers the approver queue: "list pending requests, newest first."
        - IndexName: state-submitted_at-index
          KeySchema:
            - AttributeName: state
              KeyType: HASH
            - AttributeName: submitted_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        # Powers the requester home page: "list my requests."
        - IndexName: owner-submitted_at-index
          KeySchema:
            - AttributeName: owner_id
              KeyType: HASH
            - AttributeName: submitted_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: managed-by
          Value: iam-jit

  # ---- IAM ----

  ApiLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: iam-jit-lambda-execution
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: state-and-tokens
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt StateBucket.Arn
                  - !Sub "${StateBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:UpdateItem
                  - dynamodb:Scan
                Resource:
                  - !GetAtt ApiTokensTable.Arn
                  - !Sub "${ApiTokensTable.Arn}/index/*"
                  - !GetAtt UsersTable.Arn
                  - !GetAtt RequestsTable.Arn
                  - !Sub "${RequestsTable.Arn}/index/*"
                  - !GetAtt CidrsTable.Arn
                  - !GetAtt SettingsTable.Arn
                  - !GetAtt AccountsTable.Arn
                  - !GetAtt MagicLinkNoncesTable.Arn
                  - !GetAtt BansTable.Arn
              - !If
                  - AuthLocal
                  - Effect: Allow
                    Action: ses:SendEmail
                    Resource: "*"
                    Condition:
                      StringEquals:
                        ses:FromAddress: !Ref SesSenderAddress
                  - !Ref AWS::NoValue
        - PolicyName: cross-account-assume
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: sts:AssumeRole
                Resource: !Ref ProvisionerRoleArns
              - Effect: Allow
                Action: sts:AssumeRole
                Resource: !Ref DiscoveryRoleArns
        - !If
            - HasAnthropicSecret
            - PolicyName: anthropic-secret-read
              PolicyDocument:
                Version: "2012-10-17"
                Statement:
                  - Effect: Allow
                    Action: secretsmanager:GetSecretValue
                    Resource: !Ref AnthropicApiKeySecret
            - !Ref AWS::NoValue
        - !If
            - UsesBedrock
            - PolicyName: bedrock-invoke
              PolicyDocument:
                Version: "2012-10-17"
                Statement:
                  - Effect: Allow
                    Action:
                      - bedrock:InvokeModel
                      - bedrock:Converse
                    Resource: "*"
            - !Ref AWS::NoValue
        # Self-managed retention. The Lambda needs to read its own
        # log group's current RetentionInDays (admin GET endpoint)
        # and to extend it (admin PATCH endpoint). Scoped to the
        # iam-jit log group ONLY — the policy refuses access to
        # any other log group, so a runaway admin can't shorten
        # someone else's logs.
        #
        # Defense-in-depth: an explicit Deny on Delete*/PutRetention
        # against any log group OTHER than IAMJitLogGroup. Explicit
        # Deny overrides any Allow, so even if a future code change
        # accidentally added a broader Allow, this Deny still blocks
        # the action against foreign log groups.
        - PolicyName: self-log-retention
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: AllowDescribeForListing
                Effect: Allow
                Action:
                  - logs:DescribeLogGroups
                Resource: "*"  # Describe requires "*"; admin handler filters by name.
              - Sid: AllowRetentionOnSelf
                Effect: Allow
                Action:
                  - logs:PutRetentionPolicy
                Resource:
                  - !GetAtt IAMJitLogGroup.Arn
              - Sid: DenyAllDeleteAnywhere
                # Belt-and-suspenders: there is no Allow for any
                # logs:Delete* action anywhere in this role today,
                # but an explicit Deny makes it impossible for a
                # future template edit (or a managed-policy update)
                # to accidentally introduce one.
                Effect: Deny
                Action:
                  - logs:DeleteLogGroup
                  - logs:DeleteLogStream
                  - logs:DeleteRetentionPolicy
                  - logs:DeleteDestination
                  - logs:DeleteMetricFilter
                  - logs:DeleteResourcePolicy
                  - logs:DeleteSubscriptionFilter
                Resource: "*"
              - Sid: DenyRetentionOnForeignLogGroups
                # Explicit Deny on PutRetentionPolicy anywhere OTHER
                # than iam-jit's log group, via NotResource.
                # Redundant with the scoped Allow above but defends
                # against future accidental widening.
                Effect: Deny
                Action:
                  - logs:PutRetentionPolicy
                NotResource:
                  - !GetAtt IAMJitLogGroup.Arn

  # ---- Function (single Lambda, dispatched by event source) ----
  #
  # One AWS::Serverless::Function handles both:
  #   - HTTP API requests via the Function URL (FastAPI + Mangum)
  #   - Scheduled expiry sweeps via the EventBridge schedule
  # The handler dispatches on event shape: scheduled events have
  # `event["source"] == "aws.events"`; HTTP events have a `requestContext`
  # block. Phase 2 fills in the actual code; this stub returns 503 / a
  # well-formed empty expiry response.

  # Explicit log group with bounded retention. Without this, AWS
  # Lambda auto-creates `/aws/lambda/iam-jit` with retention=Never
  # and the bill grows linearly with time. The function references
  # this group via LoggingConfig so the auto-create-on-first-invoke
  # path doesn't race with the IaC-owned group.
  IAMJitLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/iam-jit
      RetentionInDays: !Ref LogRetentionDays

  IAMJitFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: iam-jit
      Description: iam-jit API + scheduled expiry, dispatched by event source.
      Role: !GetAtt ApiLambdaRole.Arn
      CodeUri: ../../src/
      Handler: iam_jit.lambda_handler.handler
      LoggingConfig:
        LogGroup: !Ref IAMJitLogGroup
      FunctionUrlConfig:
        # NONE for `local` auth (app-layer middleware enforces session
        # cookies); AWS_IAM for `aws_iam` auth (Function URL validates
        # SigV4 signatures and the principal is mapped to a role via
        # the UsersTable). Both modes deny anonymous access — `local`
        # at the app layer, `aws_iam` at the Function URL layer.
        AuthType: !If [AuthAwsIam, AWS_IAM, NONE]
        # CORS: explicit origins only. `*` is intentionally NOT supported
        # (the CFN Rules block above refuses to deploy with a wildcard).
        # When CorsAllowedOrigins is empty (default), no AllowOrigins is
        # rendered — same-origin requests from the iam-jit-served UI
        # still work, but no other browser origin can reach the API.
        Cors: !If
          - HasCorsOrigins
          - AllowMethods: ["GET", "POST", "PATCH", "DELETE"]
            AllowOrigins: !Ref CorsAllowedOrigins
            AllowCredentials: true
            AllowHeaders: ["Content-Type", "Authorization", "X-Requested-With"]
          - !Ref AWS::NoValue
      Events:
        ScheduledExpiry:
          Type: Schedule
          Properties:
            # 15-minute cadence covers grant-expiry sweeps. Inactive-
            # token sweeps run on every firing too — the work is cheap
            # (single Scan, no AWS calls, no IAM mutation) and skipping
            # tokens not yet past 180 days of inactivity is a no-op.
            Schedule: rate(15 minutes)
            Description: |
              Periodic iam-jit chores: expired-grant cleanup +
              inactive-token sweep (180-day default). Override the
              token-sweep window with IAM_JIT_TOKEN_INACTIVITY_DAYS.

  # `AWS::Serverless::Function` provisions the Function URL but does
  # NOT auto-add the resource-based policy that lets the URL endpoint
  # route to the function. Without it the Function URL returns
  # AWS-layer 403 (AccessDeniedException) even when AuthType=NONE.
  # Principal=* — real auth is at the app layer (cookies, local) or
  # SigV4 (aws_iam). The Function URL stays provisioned even when
  # EnablePublicALB=true; it's harmless when the SCP blocks reaching
  # it from the public internet, and useful for direct `aws lambda
  # invoke` smoke testing.
  IAMJitFunctionUrlInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref IAMJitFunction
      Action: lambda:InvokeFunctionUrl
      Principal: "*"
      FunctionUrlAuthType: !If [AuthAwsIam, AWS_IAM, NONE]

  # ---- Optional public ALB ----
  #
  # When EnablePublicALB=true, deploy a public Application Load
  # Balancer that invokes the Lambda via `lambda:InvokeFunction`.
  # The ALB target group registers the Lambda as a target; the ELB
  # service principal needs explicit lambda:InvokeFunction permission
  # for the target group ARN.
  #
  # All five resources are gated on `UsePublicALB` so the default
  # deploy doesn't provision them. Mangum auto-detects ALB event
  # shapes via `requestContext.elb`, so no Lambda code changes are
  # needed when this is toggled on.

  IAMJitAlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: UsePublicALB
    Properties:
      GroupDescription: iam-jit ALB ingress
      VpcId: !Ref AlbVpcId
      SecurityGroupIngress:
        # AlbIngressCidr governs which source IPs can reach the ALB
        # at the network layer. Defaults to 0.0.0.0/0 (open) — set
        # to your workstation IP, VPN egress, or office WAN CIDR
        # for any non-sandbox deploy. The runtime app-layer ACL
        # (`AllowedSourceCidrs` env var + admin-managed runtime
        # store) provides defense-in-depth on top of this.
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref AlbIngressCidr
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref AlbIngressCidr
      Tags:
        - Key: managed-by
          Value: iam-jit

  IAMJitAlb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Condition: UsePublicALB
    Properties:
      Name: !Sub "${AWS::StackName}-alb"
      Type: application
      Scheme: internet-facing
      IpAddressType: ipv4
      Subnets: !Ref AlbSubnetIds
      SecurityGroups:
        - !Ref IAMJitAlbSecurityGroup
      Tags:
        - Key: managed-by
          Value: iam-jit

  IAMJitAlbTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Condition: UsePublicALB
    DependsOn: IAMJitAlbInvokePermission
    Properties:
      Name: !Sub "${AWS::StackName}-tg"
      TargetType: lambda
      Targets:
        - Id: !GetAtt IAMJitFunction.Arn
      # ALB → Lambda invocation reads/writes JSON envelopes. Health
      # checks default to GET / on Lambda targets, returning whatever
      # iam-jit serves at / (which is a redirect to /login). The
      # default 200-399 success codes treat 30x as healthy. No tuning
      # needed.
      Tags:
        - Key: managed-by
          Value: iam-jit

  IAMJitAlbInvokePermission:
    Type: AWS::Lambda::Permission
    Condition: UsePublicALB
    Properties:
      FunctionName: !Ref IAMJitFunction
      Action: lambda:InvokeFunction
      Principal: elasticloadbalancing.amazonaws.com
      # Scoping by SourceArn would require !Ref-ing the target group,
      # which creates a circular dependency (TG.Targets ← Function;
      # Permission.SourceArn ← TG). The permission is account-local
      # to the ELB service; without the SourceArn anyone with ELB in
      # this account could route to our Lambda, but that requires
      # already having lambda:InvokeFunction grant which only this
      # template gives.

  IAMJitAlbListenerHttp:
    # Always create an HTTP listener. When AlbCertificateArn is set,
    # this redirects to HTTPS; otherwise it forwards directly to the
    # target group. HTTP-only deployments are explicitly insecure for
    # session cookies and the `/setup` form, but useful for VPN-
    # fronted dev/staging.
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: UsePublicALB
    Properties:
      LoadBalancerArn: !Ref IAMJitAlb
      Port: 80
      Protocol: HTTP
      DefaultActions: !If
        - AlbHasCertificate
        - - Type: redirect
            RedirectConfig:
              Protocol: HTTPS
              Port: "443"
              StatusCode: HTTP_301
        - - Type: forward
            TargetGroupArn: !Ref IAMJitAlbTargetGroup

  IAMJitAlbListenerHttps:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: AlbHasCertificate
    Properties:
      LoadBalancerArn: !Ref IAMJitAlb
      Port: 443
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates:
        - CertificateArn: !Ref AlbCertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref IAMJitAlbTargetGroup

  # ---- Optional edge protection (CloudFront + WAFv2) ----
  #
  # When EnableEdgeProtection=true, deploy a CloudFront distribution
  # in front of the Lambda Function URL with a WAFv2 WebACL attached.
  # The WebACL has a rate-based rule that blocks per-source-IP traffic
  # above WafRateLimitPer5Min in a sliding 5-minute window.
  #
  # The Function URL stays reachable independently for direct testing
  # (`curl https://<id>.lambda-url...`) — CloudFront is an ADDITIONAL
  # public surface, not a replacement. Real callers should use the
  # CloudFront URL surfaced in the `CloudFrontUrl` Output.
  #
  # WAFv2 WebACLs with Scope=CLOUDFRONT must be deployed in us-east-1.
  # This template assumes the stack itself is in us-east-1 (which is
  # the documented launch region — see docs/PUBLISHING.md). Deploying
  # the rest of the stack in another region while wanting edge
  # protection requires deploying the WebACL via a side-car us-east-1
  # stack and passing in its ARN; not modeled here.

  ApiWebACL:
    Type: AWS::WAFv2::WebACL
    Condition: EdgeProtectionEnabled
    Properties:
      Name: !Sub ${AWS::StackName}-rate-limit
      Description: !Sub "Edge rate-limit WebACL for ${AWS::StackName}. Per-IP rate-based rule blocks sources above WafRateLimitPer5Min in a sliding 5-minute window."
      Scope: CLOUDFRONT
      DefaultAction:
        Allow: {}
      Rules:
        - Name: RateLimitPerSourceIP
          Priority: 1
          Statement:
            RateBasedStatement:
              Limit: !Ref WafRateLimitPer5Min
              AggregateKeyType: IP
          Action:
            Block:
              CustomResponse:
                ResponseCode: 429
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub ${AWS::StackName}-rate-limit-rule
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: !Sub ${AWS::StackName}-webacl

  # CloudFront distribution fronting the Lambda Function URL.
  #
  # CacheBehavior decisions:
  #   - POST/PUT/PATCH/DELETE are forwarded but NOT cached. POST-body
  #     caching keyed on policy_fingerprint requires a CloudFront
  #     Function (computes the cache key from the request body); v2
  #     work, not included here.
  #   - GET/HEAD use AWS-managed "CachingOptimized" policy. Endpoints
  #     like /healthz and /api/v1/score with the Cache-Control header
  #     we set in routes/score.py (s-maxage=86400) will be cached by
  #     CloudFront for 1 day.
  #   - OriginRequestPolicyId = "AllViewerExceptHostHeader" — forwards
  #     all viewer headers EXCEPT Host (which CloudFront overrides to
  #     the origin's hostname so the Function URL accepts the request).
  ApiCloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Condition: EdgeProtectionEnabled
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub ${AWS::StackName} edge cache + rate limit
        HttpVersion: http2and3
        IPV6Enabled: true
        PriceClass: !Ref CloudFrontPriceClass
        WebACLId: !GetAtt ApiWebACL.Arn
        Origins:
          - Id: lambda-origin
            # FunctionUrl has the form `https://<id>.lambda-url.<region>.on.aws/`.
            # !Select [2, !Split ["/", ...]] yields the host portion.
            DomainName: !Select [2, !Split ["/", !GetAtt IAMJitFunctionUrl.FunctionUrl]]
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              OriginSSLProtocols: [TLSv1.2]
              OriginReadTimeout: 30
              OriginKeepaliveTimeout: 5
        DefaultCacheBehavior:
          TargetOriginId: lambda-origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS, POST, PUT, PATCH, DELETE]
          CachedMethods: [GET, HEAD, OPTIONS]
          Compress: true
          # AWS-managed CachePolicy "CachingOptimized" — respects the
          # Cache-Control header on the response (so /healthz with
          # max-age=N gets cached for N seconds, /api/v1/score with
          # s-maxage=86400 cached for 1 day at the edge, etc).
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          # AWS-managed OriginRequestPolicy "AllViewerExceptHostHeader"
          # — forwards all viewer headers + query strings + cookies to
          # the origin, except Host (which CloudFront sets to the
          # origin domain). Lets the Lambda see real client headers
          # for things like the prompt-injection scanner's source-IP
          # audit.
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac

  # CloudWatch alarm on WAF blocked-request count. Fires when WAF
  # blocks > 1000 requests in 5 minutes — likely a scraping attack
  # or a misconfigured CI hammering the endpoint. Wire to SNS for
  # ops-on-call notification.
  WafBlockedRequestsAlarm:
    Type: AWS::CloudWatch::Alarm
    Condition: EdgeProtectionEnabled
    Properties:
      AlarmName: !Sub ${AWS::StackName}-waf-blocked-requests
      AlarmDescription: !Sub |
        WAFv2 blocked > 1000 requests in 5 min — investigate via the
        ${AWS::StackName}-rate-limit-rule CloudWatch metric in the WAF
        Sampled Requests dashboard. Likely a scraping attack or
        runaway CI; if legitimate, increase WafRateLimitPer5Min.
      MetricName: BlockedRequests
      Namespace: AWS/WAFV2
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: WebACL
          Value: !Sub ${AWS::StackName}-rate-limit
        - Name: Region
          Value: !Ref AWS::Region
        - Name: Rule
          Value: ALL

Outputs:
  CloudFrontUrl:
    Condition: EdgeProtectionEnabled
    Description: |
      Public CloudFront URL fronting the Lambda Function URL with
      WAFv2 rate-limiting and AWS Shield Standard DDoS protection.
      Use this URL for real client traffic when EnableEdgeProtection
      is on. The underlying Function URL is still reachable for
      direct testing.

      Allow ~15 min after stack creation for CloudFront to fully
      deploy to edge locations.
    Value: !Sub "https://${ApiCloudFrontDistribution.DomainName}"

  ApiFunctionUrl:
    Description: |
      Function URL for the iam-jit API. With AuthMode=local and
      AllowPublicNetworkExposure=false, this URL exists but is intended to
      be reached only from your private network — put it behind a VPN, IAP,
      or CloudFront+WAF before exposing publicly. With AuthMode=aws_iam,
      AWS validates SigV4 at the Function URL layer and anonymous callers
      are rejected at the edge.
    Value: !GetAtt IAMJitFunctionUrl.FunctionUrl

  PublicBaseUrl:
    Description: |
      The URL real callers should use. When EnablePublicALB=true this
      is the ALB DNS name (with the scheme derived from whether HTTPS
      is configured); otherwise it's the Function URL (reachable only
      if your AWS Organization allows public AuthType=NONE Function
      URLs). Subsequent /setup, /login, /admin/* paths all hang off
      this base.
    Value: !If
      - UsePublicALB
      - !If
          - AlbHasCertificate
          - !Sub "https://${IAMJitAlb.DNSName}"
          - !Sub "http://${IAMJitAlb.DNSName}"
      - !GetAtt IAMJitFunctionUrl.FunctionUrl

  AlbDnsName:
    Condition: UsePublicALB
    Description: |
      Auto-generated ALB DNS name. Point a CNAME (or Route 53 alias)
      at this to give iam-jit a stable hostname. Without ACM cert +
      custom domain you're stuck with HTTP-only — fine for VPN-
      fronted dev/staging, NOT for production.
    Value: !GetAtt IAMJitAlb.DNSName

  AlbCanonicalHostedZoneId:
    Condition: UsePublicALB
    Description: |
      The canonical hosted zone ID for the ALB. Needed when creating
      a Route 53 ALIAS record pointing at the ALB.
    Value: !GetAtt IAMJitAlb.CanonicalHostedZoneID

  BootstrapClaimUrl:
    Description: |
      One-time URL for the bootstrap admin to claim their account
      without SES. Open it, type your AdminBootstrapEmail and the
      BootstrapSetupKey you generated locally (`openssl rand -hex 32`)
      and passed via --parameter-overrides at deploy time. The URL
      itself contains NO secret — anyone with cloudformation:DescribeStacks
      sees only this bare path. The key lives in the Lambda env var
      IAM_JIT_BOOTSTRAP_SETUP_KEY, narrower than CFN stack-read.
      Single-use: a `[claimed at ...]` marker is appended to the
      bootstrap user's notes on first success. To reset, redeploy
      with a fresh BootstrapSetupKey.
    Value: !If
      - UsePublicALB
      - !If
          - AlbHasCertificate
          - !Sub "https://${IAMJitAlb.DNSName}/setup"
          - !Sub "http://${IAMJitAlb.DNSName}/setup"
      - !Sub "${IAMJitFunctionUrl.FunctionUrl}setup"

  PublicExposurePosture:
    Description: |
      Echoes the deployer's choice. `false` (default) = the deployer has
      committed to fronting the URL with their own access control or to
      using AuthMode=aws_iam. `true` = the deployer explicitly opted in
      with a CORS allowlist set on CorsAllowedOrigins.
    Value: !Ref AllowPublicNetworkExposure

  AlbTlsPosture:
    Condition: UsePublicALB
    Description: |
      Reports the ALB's transport security posture. Read this on
      every deploy; it's the single source of truth for whether
      session cookies and the BootstrapSetupKey form POST are
      protected in transit.

      Values:
        HTTPS — AlbCertificateArn is set; ALB serves 443 with the
                cert, 80 redirects 301 → HTTPS. Production-ready.
        HTTP_ONLY — no cert; ALB serves 80 only. Session cookies
                and the /setup form travel cleartext. ONLY use
                behind a VPN / sandbox. See docs/HTTPS-SETUP.md
                to provision a cert and graduate to HTTPS.
    Value: !If [AlbHasCertificate, "HTTPS", "HTTP_ONLY"]

  SecurityChecklistReminder:
    Description: |
      Operational invariants. Template now enforces DDB PITR,
      Lambda log retention, state-bucket BPA/SSE/versioning, and
      a CFN Rules block. Before sharing the URL, confirm: (1)
      AuthMode is what you intended, (2) MagicLinkSecret is set
      in local mode, (3) BootstrapSetupKey rotated post-claim,
      (4) ALB has HTTPS for any non-sandbox use. Full checklist
      in docs/PRODUCTION-READINESS.md.
    Value: "see docs/PRODUCTION-READINESS.md"

  ApiLambdaRoleName:
    Description: Pass this to per-destination CloudFormation as `HubLambdaRoleName`.
    Value: !Ref ApiLambdaRole

  ApiLambdaRoleArn:
    Description: Full ARN of the Lambda execution role.
    Value: !GetAtt ApiLambdaRole.Arn

  StateBucketArn:
    Value: !GetAtt StateBucket.Arn

  ApiTokensTableArn:
    Value: !GetAtt ApiTokensTable.Arn

  UsersTableArn:
    Value: !GetAtt UsersTable.Arn

  RequestsTableArn:
    Value: !GetAtt RequestsTable.Arn

  RequestsTableName:
    Description: Set IAM_JIT_REQUESTS_TABLE on Lambda to this for DynamoDB-backed request storage.
    Value: !Ref RequestsTable

  AuthMode:
    Description: Active auth mode for this deployment.
    Value: !Ref AuthMode
