# Tier-2 / Tier-3 testing stack: LocalStack (free community edition) + Ollama.
# No real AWS account, no real LLM API keys, no network egress required.
#
#   docker compose -f docker-compose.test.yml up -d
#   scripts/pull-test-models.sh             # one-time: pulls smollm2:135m (~270 MB)
#   pytest -m integration                   # tier 2
#
# Tear down: docker compose -f docker-compose.test.yml down -v

services:
  localstack:
    # Pin to 3.x — newer 4.x/2026 dev tags require a license token even for
    # community features. 3.8 is the last unambiguously-community-friendly
    # tag with the AWS services we need (iam, sts, events, lambda, s3).
    image: localstack/localstack:3.8
    container_name: iam-jit-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: iam,sts,events,lambda,s3
      DEBUG: "0"
      LS_LOG: warn
      AWS_DEFAULT_REGION: us-east-1
      LOCALSTACK_HOST: localhost
    volumes:
      - ./.localstack:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 20

  ollama:
    image: ollama/ollama:latest
    container_name: iam-jit-ollama
    ports:
      - "11434:11434"
    volumes:
      - iam-jit-ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 20

  # Keycloak — real IdP for the OIDC integration tests (closes #153).
  # Lets the OIDC discovery / authorization-code paths in
  # src/iam_jit/oidc.py be exercised against a standards-compliant
  # provider without needing a Google Workspace tenant or Okta org.
  #
  # `start-dev` is the official mode for dev/test (single-instance,
  # in-memory DB, HTTP only — never use in prod). Health endpoint at
  # /health/ready confirms the server is ready to serve OIDC requests.
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: iam-jit-keycloak
    command: ["start-dev"]
    ports:
      - "8088:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      # Bind the management/health interface to 0.0.0.0 so the
      # docker healthcheck (running inside the container) can reach
      # the readiness endpoint without leaking it externally beyond
      # the published 8088 port.
      KC_HTTP_ENABLED: "true"
    healthcheck:
      # /health/ready is the standard Keycloak 25.x readiness endpoint
      # for `start-dev` mode. Returns 200 once the realm bootstrap is
      # complete (typically 20-30s on first boot).
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && printf 'GET /health/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && head -n1 <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

volumes:
  iam-jit-ollama-models:
