site_name: iam-risk-score
site_description: AWS IAM policy risk scoring API + CLI + GitHub Action. Documentation.
site_url: https://docs.iam-risk-score.com/
repo_url: https://github.com/trsreagan3/iam-jit
repo_name: trsreagan3/iam-jit

theme:
  name: material
  palette:
    # Dark theme matches the landing site aesthetic
    - scheme: slate
      primary: blue grey
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Light mode
    - scheme: default
      primary: blue grey
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Dark mode
  font:
    text: -apple-system, BlinkMacSystemFont, system-ui, sans-serif
    code: ui-monospace, "SF Mono", Menlo, monospace
  features:
    - navigation.instant      # SPA-style nav, no full reload
    - navigation.tracking      # update URL on scroll
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy        # copy-button on code blocks
    - content.action.edit
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - API reference: api-reference.md
  - CLI reference: cli-reference.md
  - GitHub Action: github-action.md
  - Calibration model: calibration.md
  - Scoring bands (1-10): scoring-bands.md
  - Action blacklist: blacklist.md
  - Self-hosting:
    - Overview: self-hosting.md
    - Production hardening: production-hardening.md
  - Pricing: pricing.md
  - Compliance: compliance.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/trsreagan3/iam-jit
  generator: false  # remove "Made with Material for MkDocs" footer
