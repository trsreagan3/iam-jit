# Fully-local "deploy" of iam-jit. Spins up the same LocalStack + Ollama as
# the test stack, plus the iam-jit FastAPI app on http://localhost:8000.
#
# Lets contributors evaluate the tool end-to-end without an AWS account.
# Same agnosticism principle as the test stack — if this works, our
# abstractions are clean.
#
#   docker compose -f docker-compose.dev.yml up
#
# (FastAPI service depends on Phase 1b — placeholder commented out below
# until that scaffold lands.)

services:
  localstack:
    extends:
      file: docker-compose.test.yml
      service: localstack

  ollama:
    extends:
      file: docker-compose.test.yml
      service: ollama

