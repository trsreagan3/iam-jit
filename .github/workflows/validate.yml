name: validate

on:
  pull_request:
    paths:
      - "requests/**"
      - "library/**"
      - "schemas/**"
      - "src/**"
      - "tests/**"
      - "examples/**"
      - "pyproject.toml"
      - ".github/workflows/validate.yml"
  push:
    branches: [main]

jobs:
  schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e .[dev]
      # e2e tests require playwright (not in the [dev] extra to keep CI
      # lean); explicitly ignore so the pytest run doesn't fail on
      # ImportError. e2e is run separately via the e2e workflow when
      # it ships.
      #
      # tests/test_calibration_corpus.py is temporarily deselected per
      # #256: scorer has evolved through ~10 feature commits + the
      # corpus YAML's expected scores haven't been re-scored. Re-enable
      # after the calibration sweep lands. Per [[adversarial-loop-process]]
      # this drift is expected; corpus must be re-scored, not the scorer
      # tuned to match outdated expectations (per [[scorer-is-ground-truth]]).
      - run: pytest -q --ignore=tests/e2e --ignore=tests/test_calibration_corpus.py
      - name: Validate request files
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          requests=(requests/*.yaml requests/*.yml)
          if [ ${#requests[@]} -eq 0 ]; then
            echo "No request files to validate."
            exit 0
          fi
          for f in "${requests[@]}"; do
            iam-jit validate "$f"
          done

  optional-extras:
    # ADOPT-6 (#720) + ADOPT-7 (#721) — run the OTel-exporter and custom-PII
    # test files with the optional [otel] and [pii] extras installed so they
    # exercise real code instead of skipping via pytest.importorskip.
    #
    # Kept as a SEPARATE job from `schema` so the heavy transitive installs
    # (opentelemetry-sdk + grpcio + protobuf + presidio-analyzer) don't slow
    # the core matrix. The [dev] extras are included so shared fixtures and
    # the full test helper set are available.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev,otel,pii]"
      # Run only the test files that guard on the optional extras so we get
      # fast, targeted feedback without re-running the full suite here.
      #
      # OTel (ADOPT-6): tests/bouncer/test_audit_export_otel.py
      # PII  (ADOPT-7): tests/test_pii_scan_presidio.py
      #                 tests/test_pii_redaction_path_presidio.py
      #                 tests/test_pii_bouncer_wiring.py
      #                 tests/test_pii_custom_detectors.py
      #                 tests/test_pii_cli_presidio.py
      #                 tests/test_pii_redos_cap.py
      - name: Run optional-extras tests (otel + pii)
        run: |
          pytest -q \
            tests/bouncer/test_audit_export_otel.py \
            tests/test_pii_scan_presidio.py \
            tests/test_pii_redaction_path_presidio.py \
            tests/test_pii_bouncer_wiring.py \
            tests/test_pii_custom_detectors.py \
            tests/test_pii_cli_presidio.py \
            tests/test_pii_redos_cap.py
