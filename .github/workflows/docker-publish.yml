name: docker-publish

# Publish the ibounce container image to GHCR.
#
# Triggers:
#   - push to main         -> ghcr.io/trsreagan3/ibounce:main + :sha-<short>
#   - tag v*               -> ghcr.io/trsreagan3/ibounce:vX.Y.Z + :latest
#   - manual workflow_dispatch (smoke-rebuild without a tag)
#
# The smoke job builds a single-arch (linux/amd64) image first, runs
# `ibounce --version` + `ibounce --help` inside the container to confirm
# the entrypoint wiring, and only then does the multi-arch publish job
# run. This catches a broken Dockerfile before we burn time on a
# multi-arch QEMU build + GHCR push.
#
# Per [[ibounce-honest-positioning]] + [[self-host-zero-billing-dependency]]
# the published image is the same binary as `pip install iam-jit`; the
# only thing different is the packaging surface.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

# GHCR push needs `packages: write`. `contents: read` is the read scope
# the checkout action needs; everything else stays at its default-deny
# (no id-token, no actions:write, no pull-requests, no issues).
permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/trsreagan3/ibounce

jobs:
  # -----------------------------------------------------------------------
  # smoke — build single-arch, run --version + --help inside the container
  # -----------------------------------------------------------------------
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (load into local docker)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: ibounce:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run --version
        run: docker run --rm ibounce:smoke --version

      - name: Run --help
        run: docker run --rm ibounce:smoke --help

      - name: Report image size
        run: docker images ibounce:smoke --format '{{.Repository}}:{{.Tag}} {{.Size}}'

  # -----------------------------------------------------------------------
  # publish — multi-arch build + push to GHCR (gated on smoke passing)
  # -----------------------------------------------------------------------
  publish:
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for cross-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          # branch -> :main, tag v1.2.3 -> :v1.2.3 + :latest, plus a
          # short-sha tag so we can always pin to an exact build.
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=sha,format=short

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
